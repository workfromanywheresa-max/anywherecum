<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

ul { list-style: none; padding: 0; margin: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
  height: 32px;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* Subscribers */
#subscriberList {
  max-height: 220px;
  overflow-y: auto;
}

#subscriberList li {
  flex-direction: column;
  align-items: flex-start;
  height: auto;
  padding: 10px 0;
}

.small-date {
  font-size: 11px;
  opacity: 0.6;
}
</style>
</head>

<body>

<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");

  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `
      <body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;">
        <h1>❌ Access Denied</h1>
      </body>
    `;
    throw new Error("Unauthorized");
  }

  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>

  <div id="totalViews" class="value">Loading...</div>
  <div id="videoViewsTotal" class="value">Video Views: Loading...</div>
  <div id="cycleViewsTotal" class="value">Cycle Views: Loading...</div>

  <br><br>

  <h2>👥 Subscribers (Live)</h2>
  <ul id="subscriberList"></ul>
</div>

<div class="card">
  <h2>📅 Monthly Visits</h2>
  <ul id="monthlyList"></ul>
</div>

<div class="container">
  <div class="card">
    <h2>📊 Page Views</h2>
    <ul id="pageViews"></ul>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------- SUBSCRIBERS ---------- */
const subscriberList = document.getElementById("subscriberList");

const source = new EventSource("https://anywherecumnotifications.workfromanywhere-sa.workers.dev/subscribers-stream");

source.onmessage = (event) => {
  const data = JSON.parse(event.data);
  renderSubscribers(data);
};

function renderSubscribers(data) {
  if (!Array.isArray(data)) return;

  // 🔥 SORT BY DATE (NEWEST FIRST)
  data.sort((a, b) => {
    return new Date(b.updatedAt) - new Date(a.updatedAt);
  });

  let html = "";

  data.forEach(sub => {
    const shortId = sub.userId ? sub.userId.slice(0, 6) + "..." : "unknown";
    const date = sub.updatedAt ? new Date(sub.updatedAt).toLocaleString() : "N/A";

    html += `
      <li>
        <div>${shortId}</div>
        <div class="small-date">${date}</div>
        <div class="value">${sub.subscribed ? "Active" : "Inactive"}</div>
      </li>
    `;
  });

  subscriberList.innerHTML = html;
}

/* ---------- FIREBASE ---------- */
const pageViewsRef = ref(db, "pageViews");
const videoViewsRef = ref(db, "views");
const cycleViewsRef = ref(db, "cycleViews");

const totalEl = document.getElementById("totalViews");
const videoEl = document.getElementById("videoViewsTotal");
const cycleEl = document.getElementById("cycleViewsTotal");

function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + "M";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + "K";
  return num;
}

function sumValues(data) {
  let total = 0;
  if (data) {
    Object.values(data).forEach(v => {
      if (typeof v === "number") total += v;
    });
  }
  return total;
}

onValue(pageViewsRef, (snapshot) => {
  const data = snapshot.val() || {};
  totalEl.innerHTML = "Site Visits: " + formatViews(sumValues(data));
});

onValue(videoViewsRef, (snapshot) => {
  const total = sumValues(snapshot.val() || {});
  videoEl.innerHTML = "Video Views: " + formatViews(total);
});

onValue(cycleViewsRef, (snapshot) => {
  const total = sumValues(snapshot.val() || {});
  cycleEl.innerHTML = "Cycle Views: " + formatViews(total);
});

/* ---------- LOGOUT ---------- */
function logout() {
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
