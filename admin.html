<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Folder Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #ff4444;
}

.container {
  max-width: 600px;
  margin: auto;
}

.card {
  background: #1e1e1e;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
  border-left: 4px solid #ff4444;
}

.folderName {
  font-size: 18px;
  font-weight: bold;
}

.views {
  margin-top: 5px;
  color: #aaa;
}

.topBar {
  text-align: center;
  margin-bottom: 20px;
}

.refresh {
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: #fff;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>📊 Folder Views Dashboard</h1>

<div class="topBar">
  <button class="refresh" onclick="loadData()">🔄 Refresh</button>
</div>

<div class="container" id="folderStats"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("folderStats");

function loadData() {
  const folderRef = ref(db, "folderViews");

  onValue(folderRef, (snapshot) => {
    const data = snapshot.val() || {};

    const sorted = Object.entries(data)
      .sort((a, b) => b[1] - a[1]);

    container.innerHTML = "";

    if (sorted.length === 0) {
      container.innerHTML = "<p style='text-align:center;color:#aaa;'>No data found</p>";
      return;
    }

    sorted.forEach(([folder, views]) => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="folderName">📁 ${folder}</div>
        <div class="views">👁 Views: ${views}</div>
      `;

      container.appendChild(div);
    });
  });
}

loadData();
</script>

</body>
</html>
