<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

ul { list-style: none; padding: 0; margin: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
  height: 32px;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.monthly-box {
  max-height: 120px;
  min-height: 120px;
  overflow-y: auto;
  padding-right: 5px;
}

#pageViews {
  max-height: 300px;
  min-height: 300px;
  overflow-y: auto;
}

.monthly-box::-webkit-scrollbar,
#pageViews::-webkit-scrollbar {
  width: 6px;
}

.monthly-box::-webkit-scrollbar-thumb,
#pageViews::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 3px;
}

/* DIGIT ANIMATION */
.digit {
  display: inline-block;
  height: 1em;
  overflow: hidden;
  width: 0.6em;
  position: relative;
}

.digit-inner {
  display: block;
  transition: transform 0.3s ease;
}
</style>
</head>

<body>

<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");

  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `
      <body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;">
        <h1>❌ Access Denied</h1>
      </body>
    `;
    throw new Error("Unauthorized");
  }

  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>

  <div id="totalViews" class="value">Loading...</div>
  <div id="videoViewsTotal" class="value">Video Views: Loading...</div>
  <div id="cycleViewsTotal" class="value">Cycle Views: Loading...</div>
</div>

<div class="card">
  <h2>📅 Monthly Visits</h2>
  <ul id="monthlyList" class="monthly-box"></ul>
</div>

<div class="container">
  <div class="card">
    <h2>📊 Page Views</h2>
    <ul id="pageViews"></ul>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const pageViewsRef = ref(db, "pageViews");
const videoViewsRef = ref(db, "views");
const cycleViewsRef = ref(db, "cycleViews");

const totalEl = document.getElementById("totalViews");
const videoEl = document.getElementById("videoViewsTotal");
const cycleEl = document.getElementById("cycleViewsTotal");

/* ---------- CACHE ---------- */
function loadCache(key) {
  return localStorage.getItem(key);
}

function saveCache(key, value) {
  localStorage.setItem(key, value);
}

function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + "M";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + "K";
  return num;
}

function sumValues(data) {
  let total = 0;
  if (data) {
    Object.values(data).forEach(v => {
      if (typeof v === "number") total += v;
    });
  }
  return total;
}

/* DIGIT ANIMATION */
function bracket(num) {
  const digits = String(num);

  let html = `<span style="font-size: 0.4em; opacity: 0.5; display: inline-flex;">(`;

  digits.split("").forEach(d => {
    html += `
      <span class="digit">
        <span class="digit-inner">${d}</span>
      </span>
    `;
  });

  html += `)</span>`;

  return html;
}

function animateDigits(container, newValue) {
  const newDigits = String(newValue);
  const digitSpans = container.querySelectorAll(".digit-inner");

  newDigits.split("").forEach((digit, i) => {
    const el = digitSpans[i];
    if (!el) return;

    const oldDigit = el.textContent;

    if (oldDigit !== digit) {
      el.style.transform = "translateY(-100%)";

      setTimeout(() => {
        el.textContent = digit;
        el.style.transition = "none";
        el.style.transform = "translateY(100%)";

        requestAnimationFrame(() => {
          el.style.transition = "transform 0.3s ease";
          el.style.transform = "translateY(0)";
        });
      }, 150);
    }
  });
}

/* ---------- TOTAL ---------- */
totalEl.innerHTML = "Site Visits: " + formatViews(loadCache("totalViews") || 0) + " <span id='totalBracket'></span>";
videoEl.innerHTML = "Video Views: " + formatViews(loadCache("videoViews") || 0) + " <span id='videoBracket'></span>";
cycleEl.innerHTML = "Cycle Views: " + formatViews(loadCache("cycleViews") || 0) + " <span id='cycleBracket'></span>";

/* ---------- MONTH ---------- */
function getMonthLabel(offset) {
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth() - offset, 1);
  return d.toLocaleString("default", { month: "long" });
}

const monthlyList = document.getElementById("monthlyList");

function renderMonthly(data) {
  let html = "";

  for (let i = 0; i < 12; i++) {
    const value = data[i] || 0;

    html += `
      <li>
        <span>${getMonthLabel(i)}</span>
        <span class="value">${formatViews(value)} (${value})</span>
      </li>
    `;
  }

  monthlyList.innerHTML = html;
}

/* ---------- FIREBASE ---------- */
onValue(pageViewsRef, (snapshot) => {
  const data = snapshot.val() || {};

  let monthlyTotals = new Array(12).fill(0);
  monthlyTotals[0] = sumValues(data);

  renderMonthly(monthlyTotals);
  saveCache("monthlyTotals", JSON.stringify(monthlyTotals));
});

/* ---------- PAGE VIEWS ---------- */
const pageList = document.getElementById("pageViews");

function renderPages(data) {
  const items = Object.entries(data || {})
    .map(([key, value]) => [key, typeof value === "number" ? value : 0])
    .sort((a, b) => b[1] - a[1]);

  let html = "";

  items.forEach(([key, value]) => {
    html += `<li>
      <span>${key}</span>
      <span class="value">${formatViews(value)} (${value})</span>
    </li>`;
  });

  pageList.innerHTML = html;
}

onValue(pageViewsRef, (snapshot) => {
  const data = snapshot.val() || {};

  renderPages(data);

  saveCache("pageViewsData", JSON.stringify(data));
  saveCache("totalViews", sumValues(data));
});

/* ---------- VIDEO ---------- */
onValue(videoViewsRef, (snapshot) => {
  const total = sumValues(snapshot.val() || {});
  saveCache("videoViews", total);
});

/* ---------- CYCLE ---------- */
onValue(cycleViewsRef, (snapshot) => {
  const total = sumValues(snapshot.val() || {});
  saveCache("cycleViews", total);
});

/* ---------- LOGOUT ---------- */
function logout() {
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
