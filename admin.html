<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

ul { list-style: none; padding: 0; margin: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
  height: 32px;
}

.value {
  color: #00ffcc;
  font-weight: bold;
  position: relative;
  overflow: hidden;
  display: inline-block;
  height: 1em;
}

.num {
  display: block;
  width: 100%;
}

.old {
  position: absolute;
  left: 0;
  top: 0;
}

.new {
  position: relative;
}

.slide-up {
  animation: slideUp 0.4s ease forwards;
}

.slide-in {
  animation: slideIn 0.4s ease forwards;
}

@keyframes slideUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100%); opacity: 0; }
}

@keyframes slideIn {
  0% { transform: translateY(100%); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.monthly-box {
  max-height: 120px;
  min-height: 120px;
  overflow-y: auto;
  padding-right: 5px;
}

#pageViews {
  max-height: 300px;
  min-height: 300px;
  overflow-y: auto;
}

.monthly-box::-webkit-scrollbar,
#pageViews::-webkit-scrollbar {
  width: 6px;
}

.monthly-box::-webkit-scrollbar-thumb,
#pageViews::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 3px;
}
</style>
</head>

<body>

<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");

  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `
      <body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;">
        <h1>❌ Access Denied</h1>
      </body>
    `;
    throw new Error("Unauthorized");
  }

  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>

  <div id="totalViews" class="value">Loading...</div>
  <div id="videoViewsTotal" class="value">Video Views: Loading...</div>
  <div id="cycleViewsTotal" class="value">Cycle Views: Loading...</div>
</div>

<div class="card">
  <h2>📅 Monthly Visits</h2>
  <ul id="monthlyList" class="monthly-box"></ul>
</div>

<div class="container">
  <div class="card">
    <h2>📊 Page Views</h2>
    <ul id="pageViews"></ul>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const pageViewsRef = ref(db, "pageViews");
const videoViewsRef = ref(db, "views");
const cycleViewsRef = ref(db, "cycleViews");

const totalEl = document.getElementById("totalViews");
const videoEl = document.getElementById("videoViewsTotal");
const cycleEl = document.getElementById("cycleViewsTotal");

/* ---------- CACHE ---------- */
function loadCache(key) {
  return localStorage.getItem(key);
}

function saveCache(key, value) {
  localStorage.setItem(key, value);
}

function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + "M";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + "K";
  return num;
}

function sumValues(data) {
  let total = 0;
  if (data) {
    Object.values(data).forEach(v => {
      if (typeof v === "number") total += v;
    });
  }
  return total;
}

/* ---------- SLIDE ANIMATION ---------- */
function animateCount(element, target, prefix = "") {
  const oldValue = element.dataset.value || target;

  const oldSpan = document.createElement("span");
  const newSpan = document.createElement("span");

  oldSpan.className = "num old slide-up";
  newSpan.className = "num new slide-in";

  oldSpan.innerHTML = prefix + formatViews(oldValue);
  newSpan.innerHTML = prefix + formatViews(target);

  element.innerHTML = "";
  element.appendChild(oldSpan);
  element.appendChild(newSpan);

  element.dataset.value = target;
}

/* ---------- TOTAL ---------- */
totalEl.innerHTML = "Site Visits: " + formatViews(Number(loadCache("totalViews") || 0));
videoEl.innerHTML = "Video Views: " + formatViews(Number(loadCache("videoViews") || 0));
cycleEl.innerHTML = "Cycle Views: " + formatViews(Number(loadCache("cycleViews") || 0));

/* ---------- MONTH ---------- */
function getMonthLabel(offset) {
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth() - offset, 1);
  return d.toLocaleString("default", { month: "long" });
}

const monthlyList = document.getElementById("monthlyList");

function renderMonthly(data) {
  let html = "";

  for (let i = 0; i < 12; i++) {
    const value = data[i] || 0;

    html += `
      <li>
        <span>${getMonthLabel(i)}</span>
        <span class="value">${formatViews(value)}</span>
      </li>
    `;
  }

  monthlyList.innerHTML = html;
}

const cachedMonthly = loadCache("monthlyTotals");
if (cachedMonthly) renderMonthly(JSON.parse(cachedMonthly));

onValue(pageViewsRef, (snapshot) => {
  const data = snapshot.val() || {};

  let monthlyTotals = new Array(12).fill(0);
  monthlyTotals[0] = sumValues(data);

  renderMonthly(monthlyTotals);
  saveCache("monthlyTotals", JSON.stringify(monthlyTotals));
});

/* ---------- PAGE VIEWS ---------- */
const pageList = document.getElementById("pageViews");

function renderPages(data) {
  const items = Object.entries(data || {})
    .map(([key, value]) => [key, typeof value === "number" ? value : 0])
    .sort((a, b) => b[1] - a[1]);

  let html = "";

  items.forEach(([key, value]) => {
    html += `<li>
      <span>${key}</span>
      <span class="value">${formatViews(value)}</span>
    </li>`;
  });

  pageList.innerHTML = html;
}

onValue(pageViewsRef, (snapshot) => {
  const data = snapshot.val() || {};
  const total = sumValues(data);

  renderPages(data);

  saveCache("pageViewsData", JSON.stringify(data));
  saveCache("totalViews", total);

  animateCount(totalEl, total, "Site Visits: ");
});

/* ---------- VIDEO ---------- */
onValue(videoViewsRef, (snapshot) => {
  const total = sumValues(snapshot.val() || {});

  saveCache("videoViews", total);
  animateCount(videoEl, total, "Video Views: ");
});

/* ---------- CYCLE ---------- */
onValue(cycleViewsRef, (snapshot) => {
  const total = sumValues(snapshot.val() || {});

  saveCache("cycleViews", total);
  animateCount(cycleEl, total, "Cycle Views: ");
});

/* ---------- LOGOUT ---------- */
function logout() {
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
