<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

/* TWO COLUMN LAYOUT */
.container {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.column {
  flex: 1;
  min-width: 300px;
}

ul { list-style: none; padding: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

/* TOTAL CARD */
.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>📊 Admin Dashboard</h1>

<div class="total-card">
  <h2>🔥 Total Views</h2>
  <div id="totalViews" class="value">Loading...</div>
</div>

<div class="container">

  <!-- PAGE VIEWS COLUMN -->
  <div class="column">
    <div class="card">
      <h2>📄 Page Views</h2>
      <ul id="pageViews"></ul>
    </div>
  </div>

  <!-- FOLDER VIEWS COLUMN -->
  <div class="column">
    <div class="card">
      <h2>📁 Folder Views</h2>
      <ul id="folderViews"></ul>
    </div>
  </div>

</div>

<script>
const DB = "https://anywherecum-1c8d0-default-rtdb.firebaseio.com";

async function fetchData(path) {
  const res = await fetch(`${DB}/${path}.json`);
  return await res.json();
}

/* ================= LOAD PAGE VIEWS ================= */
async function loadPages() {
  const data = await fetchData("pageViews");
  const list = document.getElementById("pageViews");
  list.innerHTML = "";

  let total = 0;

  if (data) {
    Object.keys(data).forEach(page => {
      const value = typeof data[page] === "number" ? data[page] : 0;
      total += value;

      const li = document.createElement("li");
      li.innerHTML = `<span>${page}</span><span class="value">${value}</span>`;
      list.appendChild(li);
    });
  }

  return total;
}

/* ================= LOAD FOLDER VIEWS ================= */
async function loadFolders() {
  const data = await fetchData("folderViews");
  const list = document.getElementById("folderViews");
  list.innerHTML = "";

  let total = 0;

  if (data) {
    Object.keys(data).forEach(folder => {
      const value = typeof data[folder] === "number" ? data[folder] : 0;
      total += value;

      const li = document.createElement("li");
      li.innerHTML = `<span>${folder}</span><span class="value">${value}</span>`;
      list.appendChild(li);
    });
  }

  return total;
}

/* ================= INIT ================= */
async function init() {
  const pageTotal = await loadPages();
  const folderTotal = await loadFolders();

  document.getElementById("totalViews").innerText = pageTotal + folderTotal;
}

init();
</script>

</body>
</html>
