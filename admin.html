<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  max-height: 300px;
  overflow-y: auto;
}

.card.monthly {
  max-height: 180px;
}

.card::-webkit-scrollbar { width: 6px; }
.card::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 3px;
}

ul { list-style: none; padding: 0; margin: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.sub-date {
  color: #888;
  font-size: 0.7em;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");
  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `<body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;"><h1>❌ Access Denied</h1></body>`;
    throw new Error("Unauthorized");
  }
  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>
  <div id="totalViews"></div>
  <div id="videoViewsTotal"></div>
  <div id="cycleViewsTotal"></div>
  <div id="totalSubscribers"></div>
</div>

<div class="card monthly">
  <h2>🔥 Trending Videos</h2>
  <ul id="trendingList"></ul>
</div>

<div class="card monthly">
  <h2>📅 Monthly Visits</h2>
  <ul id="monthlyList"></ul>
</div>

<div class="card">
  <h2>📊 Page Views</h2>
  <ul id="pageViews"></ul>
</div>

<div class="card">
  <h2>👥 Subscribers</h2>
  <ul id="subscribersList"></ul>
</div>

<div class="card">
  <h2>🌍 Countries</h2>
  <ul id="countryList"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------- CACHE ---------- */
function saveCache(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function loadCache(k){ return JSON.parse(localStorage.getItem(k) || "null"); }

const CACHE = {
  pages: "pages_cache",
  monthly: "monthly_cache",
  subs: "subs_cache",
  totals: "totals_cache",
  trending: "trending_cache",
  country: "country_cache"
};

/* ---------- TOTAL CACHE KEY ---------- */
const TOTALS_KEY = "totals_cache";

/* ---------- FORMAT ---------- */
function formatViews(n){
  if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,"")+"M";
  if(n>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,"")+"K";
  return n;
}

/* ---------- DOM ---------- */
const totalEl = document.getElementById("totalViews");
const videoEl = document.getElementById("videoViewsTotal");
const cycleEl = document.getElementById("cycleViewsTotal");

const pageList = document.getElementById("pageViews");
const monthList = document.getElementById("monthlyList");
const subsList = document.getElementById("subscribersList");
const trendingList = document.getElementById("trendingList");
const countryList = document.getElementById("countryList");

/* ---------- RENDER FUNCTIONS ---------- */
function renderPages(data){
  const sorted = Object.entries(data || {}).sort((a,b)=>b[1]-a[1]);

  pageList.innerHTML = sorted.map(([k,v])=>`
    <li><span>${k}</span><span class="value">${formatViews(typeof v==="object"?v.count:v)}</span></li>
  `).join("");
}

function renderMonthly(data){
  monthList.innerHTML = Object.entries(data||{}).map(([k,v])=>`
    <li><span>${k}</span><span class="value">${formatViews(v)}</span></li>
  `).join("");
}

function renderSubs(data){
  subsList.innerHTML = data.map(s=>`
    <li><span>${s.userId}</span><span class="sub-date">${s.updatedAt}</span></li>
  `).join("");

  document.getElementById("totalSubscribers").innerHTML =
    `<span class="value">Subscribers: ${formatViews(data.length)}</span>`;
}

function renderCountries(data){
  const sorted = Object.entries(data || {}).sort((a,b)=>b[1]-a[1]);

  countryList.innerHTML = sorted.map(([code,count])=>`
    <li>
      <span>${code}</span>
      <span class="value">${formatViews(count)}</span>
    </li>
  `).join("");
}

function renderTrending(data){
  const trending = Object.entries(data||{})
    .map(([id,val])=>({ id, views: typeof val==="number"?val:(val?.count||0) }))
    .sort((a,b)=>b.views-a.views);

  trendingList.innerHTML = trending.map(v=>`
    <li>
      <span>${v.id}</span>
      <span class="value">${formatViews(v.views)}</span>
    </li>
  `).join("");
}

/* ---------- CACHE LOAD ---------- */
const cachedTotals = loadCache(TOTALS_KEY);
if(cachedTotals){
  if(cachedTotals.site)
    totalEl.innerHTML = `<span class="value">Site Visits: ${formatViews(cachedTotals.site)}</span>`;
  if(cachedTotals.video)
    videoEl.innerHTML = `<span class="value">Video Views: ${formatViews(cachedTotals.video)}</span>`;
  if(cachedTotals.cycle)
    cycleEl.innerHTML = `<span class="value">Cycle Views: ${formatViews(cachedTotals.cycle)}</span>`;
}

/* ---------- FIREBASE ---------- */

/* PAGE VIEWS */
onValue(ref(db,"pageViews"),snap=>{
  const data = snap.val()||{};

  renderPages(data);

  let siteTotal=0;
  Object.values(data).forEach(v=>{
    if(typeof v==="object") siteTotal += v.count||0;
  });

  totalEl.innerHTML = `<span class="value">Site Visits: ${formatViews(siteTotal)}</span>`;

  const cached = loadCache(TOTALS_KEY) || {};
  cached.site = siteTotal;
  saveCache(TOTALS_KEY, cached);
});

/* VIDEO VIEWS */
onValue(ref(db,"views"),snap=>{
  const t=Object.values(snap.val()||{}).reduce((a,b)=>a+(typeof b==="number"?b:0),0);

  videoEl.innerHTML = `<span class="value">Video Views: ${formatViews(t)}</span>`;

  const cached = loadCache(TOTALS_KEY) || {};
  cached.video = t;
  saveCache(TOTALS_KEY, cached);
});

/* CYCLE VIEWS */
onValue(ref(db,"cycleViews"),snap=>{
  const data = snap.val()||{};
  const t=Object.values(data).reduce((a,b)=>a+(typeof b==="number"?b:0),0);

  cycleEl.innerHTML = `<span class="value">Cycle Views: ${formatViews(t)}</span>`;

  const cached = loadCache(TOTALS_KEY) || {};
  cached.cycle = t;
  saveCache(TOTALS_KEY, cached);

  renderTrending(data);
  saveCache(CACHE.trending, data);
});

/* COUNTRIES */
onValue(ref(db,"countryCounts"),snap=>{
  const data = snap.val()||{};
  renderCountries(data);
  saveCache(CACHE.country,data);
});

/* SUBSCRIBERS */
async function loadSubs(){
  const res = await fetch("https://anywherecumnotifications.workfromanywhere-sa.workers.dev/subscribers");
  const data = await res.json();

  renderSubs(data);
  saveCache(CACHE.subs, data);
}
loadSubs();
setInterval(loadSubs,10000);

/* LOGOUT */
function logout(){
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
