<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  max-height: 300px;
  overflow-y: auto;
}

.card.monthly { max-height: 180px; }

ul { list-style: none; padding: 0; margin: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  align-items: center;
  gap: 10px;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.sub-date {
  color: #888;
  font-size: 0.7em;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

img.thumb {
  width: 80px;
  height: 45px;
  object-fit: cover;
  border-radius: 6px;
}
</style>
</head>

<body>

<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");
  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `<body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;"><h1>❌ Access Denied</h1></body>`;
    throw new Error("Unauthorized");
  }
  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>
  <div id="totalViews"></div>
  <div id="videoViewsTotal"></div>
  <div id="cycleViewsTotal"></div>
  <div id="totalSubscribers"></div>
</div>

<div class="card">
  <h2>👥 Subscribers</h2>
  <ul id="subscribersList"></ul>
</div>

<div class="card">
  <h2>🔥 Trending Videos</h2>
  <ul id="trendingList"></ul>
</div>

<div class="card monthly">
  <h2>📅 Monthly Visits</h2>
  <ul id="monthlyList"></ul>
</div>

<div class="card">
  <h2>📊 Page Views</h2>
  <ul id="pageViews"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------- CACHE ---------- */
function saveCache(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function loadCache(k){ try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }

const CACHE = {
  site: "site_total_cache",
  video: "video_total_cache",
  cycle: "cycle_total_cache"
};

/* ---------- DOM ---------- */
const totalEl = document.getElementById("totalViews");
const videoEl = document.getElementById("videoViewsTotal");
const cycleEl = document.getElementById("cycleViewsTotal");

const pageList = document.getElementById("pageViews");
const monthList = document.getElementById("monthlyList");
const subsList = document.getElementById("subscribersList");
const trendingList = document.getElementById("trendingList");

/* ---------- FORMAT ---------- */
function formatViews(n){
  if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,"")+"M";
  if(n>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,"")+"K";
  return n;
}

/* ---------- LOAD CACHE (NO BLINK) ---------- */
const cachedSite = loadCache(CACHE.site);
const cachedVideo = loadCache(CACHE.video);
const cachedCycle = loadCache(CACHE.cycle);

if (cachedSite) totalEl.innerHTML = `<span class="value">${cachedSite}</span>`;
if (cachedVideo) videoEl.innerHTML = `<span class="value">${cachedVideo}</span>`;
if (cachedCycle) cycleEl.innerHTML = `<span class="value">${cachedCycle}</span>`;

/* ---------- SITE VIEWS ---------- */
onValue(ref(db,"pageViews"),snap=>{
  let total=0;
  Object.values(snap.val()||{}).forEach(v=>{
    if(typeof v==="object") total+=v.count||0;
  });

  const text = `Site Visits: ${formatViews(total)}`;
  if (loadCache(CACHE.site) !== text) {
    totalEl.innerHTML = `<span class="value">${text}</span>`;
    saveCache(CACHE.site, text);
  }

  renderPages(snap.val()||{});
  renderMonthly(snap.val()||{});
});

/* ---------- VIDEO VIEWS ---------- */
onValue(ref(db,"views"),snap=>{
  const total = Object.values(snap.val()||{})
    .reduce((a,b)=>a+(typeof b==="number"?b:0),0);

  const text = `Video Views: ${formatViews(total)}`;
  if (loadCache(CACHE.video) !== text) {
    videoEl.innerHTML = `<span class="value">${text}</span>`;
    saveCache(CACHE.video, text);
  }
});

/* ---------- CYCLE VIEWS + TRENDING ---------- */
onValue(ref(db,"cycleViews"),snap=>{
  const data = snap.val() || {};

  const total = Object.values(data)
    .reduce((a,b)=>a+(typeof b==="number"?b:0),0);

  const text = `Cycle Views: ${formatViews(total)}`;

  if (loadCache(CACHE.cycle) !== text) {
    cycleEl.innerHTML = `<span class="value">${text}</span>`;
    saveCache(CACHE.cycle, text);
  }

  renderTrending(data);
});

/* ---------- TRENDING ---------- */
function renderTrending(data){
  const trending = Object.entries(data)
    .map(([id,val])=>{
      const views = typeof val==="number"?val:(val?.count||0);
      return {
        id,
        views,
        thumbnail: `https://anywherecum.pages.dev/images/${id}.webp`
      };
    })
    .filter(v=>v.views>=10)
    .sort((a,b)=>b.views-a.views);

  trendingList.innerHTML = trending.map(v=>`
    <li>
      <img class="thumb" src="${v.thumbnail}" onerror="this.style.display='none'"/>
      <div>
        <div>${v.id}</div>
        <div class="value">${formatViews(v.views)}</div>
      </div>
    </li>
  `).join("");
}

/* ---------- PAGE VIEWS ---------- */
function renderPages(data){
  pageList.innerHTML = Object.entries(data)
    .sort((a,b)=>(b[1].count||0)-(a[1].count||0))
    .map(([k,v])=>`
      <li><span>${k}</span><span class="value">${formatViews(v.count||0)}</span></li>
    `).join("");
}

/* ---------- MONTHLY ---------- */
function getKey(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

function calculateMonthly(data){
  const m = {};
  Object.values(data||{}).forEach(i=>{
    if(i?.lastUpdated){
      const d = new Date(i.lastUpdated);
      if(!isNaN(d)){
        const k = getKey(d);
        m[k] = (m[k]||0)+(i.count||0);
      }
    }
  });
  return m;
}

function renderMonthly(data){
  const monthly = calculateMonthly(data);
  monthList.innerHTML = Object.entries(monthly).map(([k,v])=>`
    <li><span>${k}</span><span class="value">${formatViews(v)}</span></li>
  `).join("");
}

/* ---------- SUBSCRIBERS ---------- */
async function loadSubs(){
  const res = await fetch("https://anywherecumnotifications.workfromanywhere-sa.workers.dev/subscribers");
  const data = await res.json();

  subsList.innerHTML = data.map(s=>`
    <li><span>${s.userId}</span><span class="sub-date">${s.updatedAt}</span></li>
  `).join("");
}
loadSubs();
setInterval(loadSubs,10000);

/* ---------- LOGOUT ---------- */
function logout(){
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
