<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  max-height: 300px;
  overflow-y: auto;
}

.card.monthly {
  max-height: 180px;
}

.card::-webkit-scrollbar { width: 6px; }
.card::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 3px;
}

ul { list-style: none; padding: 0; margin: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.sub-date {
  color: #888;
  font-size: 0.7em;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");
  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `<body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;"><h1>❌ Access Denied</h1></body>`;
    throw new Error("Unauthorized");
  }
  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>
  <div id="totalViews"></div>
  <div id="videoViewsTotal"></div>
  <div id="cycleViewsTotal"></div>
  <div id="totalSubscribers"></div>
</div>

 <button onclick="sendNotification()" style="
  padding:15px 30px;
  font-size:18px;
  background:#ff1744;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
">
🚀 Send Notification
</button>

<p id="status" style="margin-top:20px; white-space:pre-line;"></p>

<script>
async function sendNotification() {

  const status = document.getElementById("status");
  status.innerHTML = "Triggering...";

  try {
    const res = await fetch("https://anywherecumnotifications.workfromanywhere-sa.workers.dev/sendNotification", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ trigger: true })
    });

    const data = await res.json();

    if (data.logs && data.logs.length) {
      status.innerHTML = data.logs.map(l => "➡️ " + l).join("<br>");
    }

    if (data.sent === true) {
      status.innerHTML += "<br><br>🚀 Trigger sent successfully";
    } else {
      status.innerHTML += "<br><br>⛔ Trigger failed";
    }

  } catch (err) {
    status.innerHTML = "❌ Error sending";
    console.error(err);
  }
}
</script>
  
<div class="card">
  <h2>👥 Subscribers</h2>
  <ul id="subscribersList"></ul>
</div>

<div class="card monthly">
  <h2>📅 Monthly Visits</h2>
  <ul id="monthlyList"></ul>
</div>

<div class="card">
  <h2>📊 Page Views</h2>
  <ul id="pageViews"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------- CACHE ---------- */
function saveCache(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function loadCache(k){ return JSON.parse(localStorage.getItem(k) || "null"); }

const CACHE = {
  pages: "pages_cache",
  monthly: "monthly_cache",
  subs: "subs_cache",
  totals: "totals_cache",
  video: "video_cache",
  cycle: "cycle_cache"
};

/* ---------- FORMAT ---------- */
function formatViews(n){
  if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,"")+"M";
  if(n>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,"")+"K";
  return n;
}
const bracket = n => `<span style="opacity:.5;font-size:.6em">(${n})</span>`;

/* ---------- DOM ---------- */
const totalEl = document.getElementById("totalViews");
const videoEl = document.getElementById("videoViewsTotal");
const cycleEl = document.getElementById("cycleViewsTotal");
const subsEl = document.getElementById("totalSubscribers");

const pageList = document.getElementById("pageViews");
const monthList = document.getElementById("monthlyList");
const subsList = document.getElementById("subscribersList");

/* ---------- MONTH ---------- */
function parseDate(str){
  if(!str) return null;
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function getKey(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

function calculateMonthly(data){
  const m = {};
  Object.values(data||{}).forEach(i=>{
    if(i?.lastUpdated){
      const d = parseDate(i.lastUpdated);
      if(d){
        const k = getKey(d);
        m[k] = (m[k]||0)+(i.count||0);
      }
    }
  });
  return m;
}

function renderMonthly(data){
  monthList.innerHTML = Object.entries(data||{}).map(([k,v])=>`
    <li><span>${k}</span><span class="value">${formatViews(v)} ${bracket(v)}</span></li>
  `).join("");
}

/* ---------- SORTED PAGES ---------- */
function renderPages(data){
  const sorted = Object.entries(data || {})
    .sort((a, b) => {
      const aVal = typeof a[1] === "object" ? (a[1].count || 0) : a[1];
      const bVal = typeof b[1] === "object" ? (b[1].count || 0) : b[1];
      return bVal - aVal;
    });

  pageList.innerHTML = sorted.map(([k, v]) => {
    const val = typeof v === "object" ? (v.count || 0) : v;
    return `
      <li>
        <span>${k}</span>
        <span class="value">${formatViews(val)}</span>
      </li>
    `;
  }).join("");
}

/* ---------- SUBS ---------- */
function renderSubs(data){
  subsList.innerHTML = data.map(s=>`
    <li><span>${s.userId}</span><span class="sub-date">${s.updatedAt}</span></li>
  `).join("");

  const total = `Subscribers: ${formatViews(data.length)} ${bracket(data.length)}`;
  subsEl.innerHTML = `<span class="value">${total}</span>`;
}

/* ---------- LOAD CACHE ---------- */
const cachedPages = loadCache(CACHE.pages);
const cachedMonthly = loadCache(CACHE.monthly);
const cachedSubs = loadCache(CACHE.subs);
const cachedTotals = loadCache(CACHE.totals);
const cachedVideo = loadCache(CACHE.video);
const cachedCycle = loadCache(CACHE.cycle);

if(cachedPages) renderPages(cachedPages);
if(cachedMonthly) renderMonthly(cachedMonthly);
if(cachedSubs) renderSubs(cachedSubs);

if(cachedTotals){
  totalEl.innerHTML = `<span class="value">${cachedTotals.total}</span>`;
}

if(cachedVideo) videoEl.innerHTML = `<span class="value">${cachedVideo}</span>`;
if(cachedCycle) cycleEl.innerHTML = `<span class="value">${cachedCycle}</span>`;

/* ---------- SUBSCRIBERS ---------- */
let lastHash="";
async function loadSubs(){
  const res = await fetch("https://anywherecumnotifications.workfromanywhere-sa.workers.dev/subscribers");
  const data = await res.json();

  const h = JSON.stringify(data);
  if(h===lastHash) return;
  lastHash=h;

  renderSubs(data);
  saveCache(CACHE.subs, data);
}
loadSubs();
setInterval(loadSubs,10000);

/* ---------- FIREBASE ---------- */
onValue(ref(db,"pageViews"),snap=>{
  const data = snap.val()||{};

  renderPages(data);

  const monthly = calculateMonthly(data);
  renderMonthly(monthly);

  saveCache(CACHE.pages,data);
  saveCache(CACHE.monthly,monthly);

  let total=0;
  Object.values(data).forEach(v=>{
    if(typeof v==="object") total+=v.count||0;
  });

  const text = `Site Visits: ${formatViews(total)} ${bracket(total)}`;
  totalEl.innerHTML = `<span class="value">${text}</span>`;
  saveCache(CACHE.totals, { total: text });
});

onValue(ref(db,"views"),snap=>{
  const t=Object.values(snap.val()||{}).reduce((a,b)=>a+(typeof b==="number"?b:0),0);

  const text=`Video Views: ${formatViews(t)} ${bracket(t)}`;
  videoEl.innerHTML = `<span class="value">${text}</span>`;
  saveCache(CACHE.video, text);
});

onValue(ref(db,"cycleViews"),snap=>{
  const t=Object.values(snap.val()||{}).reduce((a,b)=>a+(typeof b==="number"?b:0),0);

  const text=`Cycle Views: ${formatViews(t)} ${bracket(t)}`;
  cycleEl.innerHTML = `<span class="value">${text}</span>`;
  saveCache(CACHE.cycle, text);
});

/* ---------- LOGOUT ---------- */
function logout(){
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
