<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  max-height: 300px;
  overflow-y: auto;
}

.card.monthly {
  max-height: 180px;
}

.card::-webkit-scrollbar { width: 6px; }
.card::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 3px;
}

ul { list-style: none; padding: 0; margin: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.sub-date {
  color: #888;
  font-size: 0.7em;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");
  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `<body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;"><h1>❌ Access Denied</h1></body>`;
    throw new Error("Unauthorized");
  }
  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>
  <div id="totalViews"></div>
  <div id="videoViewsTotal"></div>
  <div id="cycleViewsTotal"></div>
  <div id="totalSubscribers"></div>
</div>

<div class="card">
  <h2>👥 Subscribers</h2>
  <ul id="subscribersList"></ul>
</div>

<!-- 🔥 TRENDING -->
<div class="card">
  <h2>🔥 Trending Video IDs</h2>
  <ul id="trendingList"></ul>
</div>

<div class="card monthly">
  <h2>📅 Monthly Visits</h2>
  <ul id="monthlyList"></ul>
</div>

<div class="card">
  <h2>📊 Page Views</h2>
  <ul id="pageViews"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------- DOM ---------- */
const totalEl = document.getElementById("totalViews");
const videoEl = document.getElementById("videoViewsTotal");
const cycleEl = document.getElementById("cycleViewsTotal");
const subsEl = document.getElementById("totalSubscribers");

const trendingList = document.getElementById("trendingList");
const subsList = document.getElementById("subscribersList");

/* ---------- FORMAT ---------- */
function formatViews(n){
  if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,"")+"M";
  if(n>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,"")+"K";
  return n;
}
const bracket = n => `<span style="opacity:.5;font-size:.6em">(${n})</span>`;

/* ---------- TRENDING ---------- */
function renderTrending(data){
  if(!data) return;

  const trending = Object.entries(data)
    .filter(([id, val]) => (typeof val === "number" ? val : (val?.count || 0)) >= 10)
    .sort((a,b)=>b[1]-a[1]);

  trendingList.innerHTML = trending.map(([id,val])=>{
    const views = typeof val === "number" ? val : (val?.count || 0);

    return `
      <li>
        <span>${id}</span>
        <span class="value">${formatViews(views)}</span>
      </li>
    `;
  }).join("");
}

/* ---------- SUBSCRIBERS ---------- */
function renderSubs(data){
  subsList.innerHTML = data.map(s=>`
    <li><span>${s.userId}</span><span class="sub-date">${s.updatedAt}</span></li>
  `).join("");

  const total = `Subscribers: ${formatViews(data.length)} ${bracket(data.length)}`;
  subsEl.innerHTML = `<span class="value">${total}</span>`;
}

/* ---------- FIREBASE ---------- */
onValue(ref(db,"cycleViews"),snap=>{
  const data = snap.val() || {};

  const t = Object.values(data).reduce((a,b)=>a+(typeof b==="number"?b:0),0);

  const text=`Cycle Views: ${formatViews(t)} ${bracket(t)}`;
  cycleEl.innerHTML = `<span class="value">${text}</span>`;

  // 🔥 TRENDING
  renderTrending(data);
});

/* ---------- SUBSCRIBERS ---------- */
async function loadSubs(){
  const res = await fetch("https://anywherecumnotifications.workfromanywhere-sa.workers.dev/subscribers");
  const data = await res.json();
  renderSubs(data);
}
loadSubs();
setInterval(loadSubs,10000);

/* ---------- LOGOUT ---------- */
function logout(){
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
