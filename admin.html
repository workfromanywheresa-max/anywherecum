<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

ul { list-style: none; padding: 0; margin: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.sub-date {
  color: #888;
  font-size: 0.7em;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.monthly-box {
  max-height: 120px;
  min-height: 120px;
  overflow-y: auto;
  padding-right: 5px;
}

#pageViews {
  max-height: 300px;
  min-height: 300px;
  overflow-y: auto;
}

.monthly-box::-webkit-scrollbar,
#pageViews::-webkit-scrollbar {
  width: 6px;
}

.monthly-box::-webkit-scrollbar-thumb,
#pageViews::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 3px;
}
</style>
</head>

<body>

<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");

  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `
      <body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;">
        <h1>❌ Access Denied</h1>
      </body>
    `;
    throw new Error("Unauthorized");
  }

  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>

  <div id="totalViews" class="value">Site Visits: 0 (0)</div>
  <div id="videoViewsTotal" class="value">Video Views: 0 (0)</div>
  <div id="cycleViewsTotal" class="value">Cycle Views: 0 (0)</div>
  <div id="totalSubscribers" class="value">Subscribers: 0 (0)</div>
</div>

  <div style="text-align: right;">
  <button onclick="sendNotification()" style="padding:10px 20px; font-size:16px; cursor:pointer;">
    🔔 Send Notification
  </button>
</div>

<script>
async function sendNotification() {
  try {
    const res = await fetch("https://anywherecumnotifications.workfromanywhere-sa.workers.dev/check-now", {
      method: "POST"
    });

    const data = await res.json();
    console.log("Response:", data);

    alert("✅ Notification sent!");
  } catch (err) {
    console.error(err);
    alert("❌ Failed to send notification");
  }
}
</script>

<!-- 👥 Subscribers -->
<div class="card">
  <h2>👥 Subscribers</h2>
  <ul id="subscribersList" class="monthly-box"></ul>
</div>

<div class="card">
  <h2>📅 Monthly Visits</h2>
  <ul id="monthlyList" class="monthly-box"></ul>
</div>

<div class="container">
  <div class="card">
    <h2>📊 Page Views</h2>
    <ul id="pageViews"></ul>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------- CACHE ---------- */
function loadCache(key) {
  return localStorage.getItem(key);
}

function saveCache(key, value) {
  localStorage.setItem(key, value);
}

/* ---------- ELEMENTS ---------- */
const subscribersList = document.getElementById("subscribersList");
const subscribersTotalEl = document.getElementById("totalSubscribers");

const totalEl = document.getElementById("totalViews");
const videoEl = document.getElementById("videoViewsTotal");
const cycleEl = document.getElementById("cycleViewsTotal");

/* ---------- FORMAT ---------- */
function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + "M";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + "K";
  return num;
}

function bracket(num) {
  return `<span style="font-size:0.4em;opacity:0.5;">(${num})</span>`;
}

/* ---------- SUBSCRIBERS ---------- */
let lastSubscribersHash = "";

function subscribersHash(data) {
  return JSON.stringify(data || []);
}

async function loadSubscribers() {
  try {
    const res = await fetch("https://anywherecumnotifications.workfromanywhere-sa.workers.dev/subscribers");
    const data = await res.json();

    const newHash = subscribersHash(data);

    if (newHash === lastSubscribersHash) return;
    lastSubscribersHash = newHash;

    renderSubscribers(data);
  } catch (err) {
    console.error(err);
  }
}

function renderSubscribers(data) {
  if (!Array.isArray(data)) return;

  data.sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));

  const html = data.map(sub => `
    <li>
      <span>${sub.userId || "Unknown"}</span>
      <span class="sub-date">${sub.updatedAt || "N/A"}</span>
    </li>
  `).join("");

  if (subscribersList.innerHTML !== html) {
    subscribersList.innerHTML = html;
  }

  const totalSubs = data.length;

  const newText = `Subscribers: ${formatViews(totalSubs)} ${bracket(totalSubs)}`;

  if (subscribersTotalEl.innerHTML !== newText) {
    subscribersTotalEl.innerHTML = newText;
  }
}

loadSubscribers();
setInterval(loadSubscribers, 10000);

/* ---------- TOTALS ---------- */
function getCachedNumber(key) {
  const val = loadCache(key);
  return val ? Number(val) : 0;
}

const totalViews = getCachedNumber("totalViews");
const videoViews = getCachedNumber("videoViews");
const cycleViews = getCachedNumber("cycleViews");

totalEl.innerHTML = `Site Visits: ${formatViews(totalViews)} ${bracket(totalViews)}`;
videoEl.innerHTML = `Video Views: ${formatViews(videoViews)} ${bracket(videoViews)}`;
cycleEl.innerHTML = `Cycle Views: ${formatViews(cycleViews)} ${bracket(cycleViews)}`;

/* ---------- MONTH ---------- */
function getMonthLabel(offset) {
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth() - offset, 1);
  return d.toLocaleString("default", { month: "long" });
}

const monthlyList = document.getElementById("monthlyList");

function renderMonthly(data) {
  let html = "";

  for (let i = 0; i < 12; i++) {
    const value = data[i] || 0;

    html += `
      <li>
        <span>${getMonthLabel(i)}</span>
        <span class="value">${formatViews(value)} ${bracket(value)}</span>
      </li>
    `;
  }

  monthlyList.innerHTML = html;
}

/* ---------- PAGE VIEWS ---------- */
const pageList = document.getElementById("pageViews");

function renderPages(data) {
  const items = Object.entries(data || {})
    .map(([k, v]) => [k, typeof v === "number" ? v : 0])
    .sort((a, b) => b[1] - a[1]);

  let html = "";

  items.forEach(([key, value]) => {
    html += `
      <li>
        <span>${key}</span>
        <span class="value">${formatViews(value)} ${bracket(value)}</span>
      </li>
    `;
  });

  pageList.innerHTML = html;
}

/* ---------- CACHE ---------- */
const cachedPages = loadCache("pageViewsData");
const cachedMonthly = loadCache("monthlyTotals");

if (cachedPages) renderPages(JSON.parse(cachedPages));
if (cachedMonthly) renderMonthly(JSON.parse(cachedMonthly));

/* ---------- FIREBASE ---------- */
const pageViewsRef = ref(db, "pageViews");
const videoViewsRef = ref(db, "views");
const cycleViewsRef = ref(db, "cycleViews");

onValue(pageViewsRef, (snapshot) => {
  const data = snapshot.val() || {};

  renderPages(data);

  let monthlyTotals = new Array(12).fill(0);
  monthlyTotals[0] = Object.values(data).reduce((a, b) => a + (typeof b === "number" ? b : 0), 0);

  renderMonthly(monthlyTotals);

  saveCache("pageViewsData", JSON.stringify(data));
  saveCache("monthlyTotals", JSON.stringify(monthlyTotals));
  saveCache("totalViews", monthlyTotals[0]);
});

onValue(videoViewsRef, (snapshot) => {
  const total = Object.values(snapshot.val() || {}).reduce((a, b) => a + (typeof b === "number" ? b : 0), 0);
  videoEl.innerHTML = `Video Views: ${formatViews(total)} ${bracket(total)}`;
  saveCache("videoViews", total);
});

onValue(cycleViewsRef, (snapshot) => {
  const total = Object.values(snapshot.val() || {}).reduce((a, b) => a + (typeof b === "number" ? b : 0), 0);
  cycleEl.innerHTML = `Cycle Views: ${formatViews(total)} ${bracket(total)}`;
  saveCache("cycleViews", total);
});

/* ---------- LOGOUT ---------- */
function logout() {
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
