<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

ul { list-style: none; padding: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔐 PASSWORD PROTECTION -->
<script>
const ADMIN_PASSWORD = "Anywherecum1099";

const isLoggedIn = localStorage.getItem("adminLoggedIn");

if (!isLoggedIn) {
  const entered = prompt("Enter Admin Password:");

  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `
      <head>
        <title>Access Denied</title>
        <style>
          body {
            background:#121212;
            color:red;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
          }
        </style>
      </head>
      <body>
        <h1>❌ Access Denied</h1>
      </body>
    `;
    throw new Error("Unauthorized");
  }

  localStorage.setItem("adminLoggedIn", "true");
}
</script>
  
<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>
  <div id="totalViews" class="value">Loading...</div>
</div>

<div class="container">
  <div class="card">
    <h2>📊 Page Views</h2>
    <ul id="pageViews"></ul>
  </div>
</div>

<script>
const DB = "https://anywherecum-1c8d0-default-rtdb.firebaseio.com";

/* 🔥 FORMAT FUNCTION */
function formatViews(num) {
  if (num >= 1000000) {
    return (num / 1000000).toFixed(1).replace(/\.0$/, '') + "M";
  }
  if (num >= 1000) {
    return (num / 1000).toFixed(1).replace(/\.0$/, '') + "K";
  }
  return num;
}

async function fetchData(path) {
  const res = await fetch(`${DB}/${path}.json`);
  return await res.json();
}

/* 🔥 LOAD COMBINED + SORTED */
async function loadAllViews() {
  const pageData = await fetchData("pageViews");
  const folderData = await fetchData("folderViews");

  const list = document.getElementById("pageViews");
  list.innerHTML = "";

  let total = 0;
  let combined = [];

  if (pageData) {
    Object.entries(pageData).forEach(([key, value]) => {
      value = typeof value === "number" ? value : 0;
      total += value;
      combined.push({ name: key, value });
    });
  }

  if (folderData) {
    Object.entries(folderData).forEach(([key, value]) => {
      value = typeof value === "number" ? value : 0;
      total += value;
      combined.push({ name: key, value });
    });
  }

  // 🔥 Sort highest → lowest
  combined.sort((a, b) => b.value - a.value);

  combined.forEach(item => {
    const li = document.createElement("li");
    li.innerHTML = `<span>${item.name}</span><span class="value">${formatViews(item.value)}</span>`;
    list.appendChild(li);
  });

  return total;
}

/* ================= INIT ================= */
async function init() {
  const total = await loadAllViews();
  const formatted = formatViews(total);

  document.getElementById("totalViews").innerText = formatted;

  // 🔥 Safe admin update (won't crash if missing)
  const adminEl = document.getElementById("adminViews");
  if (adminEl) {
    adminEl.innerText = `👁 ${formatted} Admin`;
  }
}

init();

/* ================= AUTO REFRESH ================= */
setInterval(() => {
  init();
}, 10000);

/* ================= LOGOUT ================= */
function logout() {
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
