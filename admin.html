<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: #fff;
  padding: 20px;
}

h2 { color: #ff4444; }

.section {
  margin-top: 20px;
  background: #1c1c1c;
  padding: 15px;
  border-radius: 10px;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid #333;
}
</style>
</head>

<body>

<script>
// 🔐 Password
const correctPassword = "anywherecum1099";
const entered = prompt("Enter admin password:");
if (entered !== correctPassword) {
  document.write("<h2>⛔ Access Denied</h2>");
  throw new Error("Unauthorized");
}
</script>

<h2>📊 Admin Dashboard</h2>

<p>Total Views: <span id="totalViews">0</span></p>

<div class="section">
  <h3>📁 Folder Views</h3>
  <div id="folderViews">Loading...</div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWHoNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getDatabase(app);

// Total views
onValue(ref(db, "views/total"), (snap) => {
  document.getElementById("totalViews").innerText = snap.val() || 0;
});

// Folder views
onValue(ref(db, "views/folders"), (snap) => {
  const data = snap.val() || {};
  const container = document.getElementById("folderViews");

  container.innerHTML = "";

  const entries = Object.entries(data);

  if (entries.length === 0) {
    container.innerHTML = "<p>No data</p>";
    return;
  }

  entries.sort((a, b) => b[1] - a[1]);

  entries.forEach(([folder, views]) => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<span>${folder}</span><span>${views}</span>`;
    container.appendChild(div);
  });
});
</script>

</body>
</html>
