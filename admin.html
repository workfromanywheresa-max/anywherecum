<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

ul { list-style: none; padding: 0; margin: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.sub-date {
  color: #888;
  font-size: 0.7em;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.monthly-box {
  max-height: 150px;
  overflow-y: auto;
  padding-right: 5px;
}

#pageViews {
  max-height: 300px;
  overflow-y: auto;
}

.monthly-box::-webkit-scrollbar,
#pageViews::-webkit-scrollbar {
  width: 6px;
}

.monthly-box::-webkit-scrollbar-thumb,
#pageViews::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 3px;
}
</style>
</head>

<body>

<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");

  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `
      <body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;">
        <h1>❌ Access Denied</h1>
      </body>
    `;
    throw new Error("Unauthorized");
  }

  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>

  <div id="totalViews" class="value">Site Visits: 0 (0)</div>
  <div id="videoViewsTotal" class="value">Video Views: 0 (0)</div>
  <div id="cycleViewsTotal" class="value">Cycle Views: 0 (0)</div>
  <div id="totalSubscribers" class="value">Subscribers: 0 (0)</div>
</div>

<div class="card">
  <h2>👥 Subscribers</h2>
  <ul id="subscribersList" class="monthly-box"></ul>
</div>

<div class="card">
  <h2>📅 Monthly Visits</h2>
  <ul id="monthlyList" class="monthly-box"></ul>
</div>

<div class="container">
  <div class="card">
    <h2>📊 Page Views</h2>
    <ul id="pageViews"></ul>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------- CACHE ---------- */
function loadCache(key) {
  return localStorage.getItem(key);
}

function saveCache(key, value) {
  localStorage.setItem(key, value);
}

/* ---------- ELEMENTS ---------- */
const subscribersList = document.getElementById("subscribersList");
const subscribersTotalEl = document.getElementById("totalSubscribers");

const totalEl = document.getElementById("totalViews");
const videoEl = document.getElementById("videoViewsTotal");
const cycleEl = document.getElementById("cycleViewsTotal");
const pageList = document.getElementById("pageViews");
const monthlyList = document.getElementById("monthlyList");

/* ---------- FORMAT ---------- */
function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + "M";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + "K";
  return num;
}

function bracket(num) {
  return `<span style="font-size:0.4em;opacity:0.5;">(${num})</span>`;
}

/* ---------- SA DATE PARSER ---------- */
function parseSADate(str) {
  if (!str) return null;

  const [datePart, timePart] = str.split(" ");
  if (!datePart) return null;

  const [day, month, year] = datePart.split("/");
  const [hour = "00", minute = "00"] = (timePart || "").split(":");

  return new Date(`${year}-${month}-${day}T${hour}:${minute}:00`);
}

/* ---------- MONTH KEY ---------- */
function getMonthKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
}

/* ---------- MONTHLY CALC ---------- */
function calculateMonthlyTotals(data) {
  const monthly = {};

  Object.values(data || {}).forEach(item => {
    if (!item || typeof item !== "object") return;

    const date = parseSADate(item.lastUpdated);
    if (!date) return;

    const key = getMonthKey(date);

    monthly[key] = (monthly[key] || 0) + (item.count || 0);
  });

  return monthly;
}

/* ---------- RENDER MONTHLY ---------- */
function renderMonthly(monthlyData) {
  const keys = Object.keys(monthlyData).sort().reverse();

  monthlyList.innerHTML = keys.map(key => `
    <li>
      <span>${key}</span>
      <span class="value">${formatViews(monthlyData[key])} ${bracket(monthlyData[key])}</span>
    </li>
  `).join("");
}

/* ---------- PAGE VIEWS ---------- */
function renderPages(data) {
  const items = Object.entries(data || {})
    .map(([key, value]) => {
      let count = 0;
      let updated = "N/A";

      if (typeof value === "number") {
        count = value;
      } else if (value && typeof value === "object") {
        count = value.count || 0;
        updated = value.lastUpdated || "N/A";
      }

      return [key, count, updated];
    })
    .sort((a, b) => b[1] - a[1]);

  pageList.innerHTML = items.map(([key, value, updated]) => `
    <li>
      <span>${key}</span>
      <span class="value">${formatViews(value)} ${bracket(value)}</span>
      <span class="sub-date">🕒 ${updated}</span>
    </li>
  `).join("");
}

/* ---------- SUBSCRIBERS ---------- */
let lastSubscribersHash = "";

function subscribersHash(data) {
  return JSON.stringify(data || []);
}

async function loadSubscribers() {
  try {
    const res = await fetch("https://anywherecumnotifications.workfromanywhere-sa.workers.dev/subscribers");
    const data = await res.json();

    const newHash = subscribersHash(data);

    if (newHash === lastSubscribersHash) return;
    lastSubscribersHash = newHash;

    subscribersList.innerHTML = data.map(sub => `
      <li>
        <span>${sub.userId || "Unknown"}</span>
        <span class="sub-date">${sub.updatedAt || "N/A"}</span>
      </li>
    `).join("");

    subscribersTotalEl.innerHTML =
      `Subscribers: ${formatViews(data.length)} ${bracket(data.length)}`;

  } catch (err) {
    console.error(err);
  }
}

loadSubscribers();
setInterval(loadSubscribers, 10000);

/* ---------- FIREBASE ---------- */
const pageViewsRef = ref(db, "pageViews");
const videoViewsRef = ref(db, "views");
const cycleViewsRef = ref(db, "cycleViews");

/* PAGE VIEWS */
onValue(pageViewsRef, (snapshot) => {
  const data = snapshot.val() || {};

  renderPages(data);

  const monthly = calculateMonthlyTotals(data);
  renderMonthly(monthly);

  let total = 0;

  Object.values(data).forEach(item => {
    if (typeof item === "object") {
      total += item.count || 0;
    }
  });

  saveCache("pageViewsData", JSON.stringify(data));
  saveCache("totalViews", total);

  totalEl.innerHTML = `Site Visits: ${formatViews(total)} ${bracket(total)}`;
});

/* VIDEO VIEWS */
onValue(videoViewsRef, (snapshot) => {
  const total = Object.values(snapshot.val() || {}).reduce((a, b) => a + (typeof b === "number" ? b : 0), 0);
  videoEl.innerHTML = `Video Views: ${formatViews(total)} ${bracket(total)}`;
});

/* CYCLE VIEWS */
onValue(cycleViewsRef, (snapshot) => {
  const total = Object.values(snapshot.val() || {}).reduce((a, b) => a + (typeof b === "number" ? b : 0), 0);
  cycleEl.innerHTML = `Cycle Views: ${formatViews(total)} ${bracket(total)}`;
});

/* ---------- LOGOUT ---------- */
function logout() {
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
