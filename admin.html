<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

ul { list-style: none; padding: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>📊 Admin Dashboard</h1>

<div class="total-card">
  <h2>🔥 Total Views (Pages + Folders)</h2>
  <div id="totalViews" class="value">Loading...</div>
</div>

<div class="container">

  <div class="card">
    <h2>📄 Page Views</h2>
    <ul id="pageViews"></ul>
  </div>

</div>

<script>
const DB = "https://anywherecum-1c8d0-default-rtdb.firebaseio.com";

async function fetchData(path) {
  const res = await fetch(`${DB}/${path}.json`);
  return await res.json();
}

/* ================= PAGE VIEWS ================= */
async function loadPages() {
  const data = await fetchData("pageViews");
  const list = document.getElementById("pageViews");
  list.innerHTML = "";

  let total = 0;

  if (data) {
    Object.keys(data).forEach(page => {
      const value = typeof data[page] === "number" ? data[page] : 0;
      total += value;

      const li = document.createElement("li");
      li.innerHTML = `<span>${page}</span><span class="value">${value}</span>`;
      list.appendChild(li);
    });
  }

  return total;
}

/* ================= FOLDER VIEWS (LOGIC KEPT, UI REMOVED) ================= */
async function loadFolders() {
  const data = await fetchData("folderViews");

  let total = 0;

  if (data) {
    Object.keys(data).forEach(folderKey => {
      const value = typeof data[folderKey] === "number" ? data[folderKey] : 0;
      total += value;
    });
  }

  return total;
}

/* ================= INIT ================= */
async function init() {
  const pageTotal = await loadPages();
  const folderTotal = await loadFolders();

  document.getElementById("totalViews").innerText =
    pageTotal + folderTotal;
}

init();

/* ================= AUTO REFRESH ================= */
setInterval(() => {
  init();
}, 10000);
</script>

</body>
</html>
