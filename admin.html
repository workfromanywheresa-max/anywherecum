<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  padding: 20px;
}

h2 {
  text-align: center;
  color: #ff4444;
  margin-bottom: 20px;
}

.section {
  margin-bottom: 30px;
}

.box {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  border: 1px solid #333;
}

.folderTitle {
  color: #ff4444;
  margin-bottom: 10px;
}

.videoItem {
  padding: 5px 0;
  border-bottom: 1px solid #333;
  font-size: 14px;
}

.videoItem:last-child {
  border-bottom: none;
}
</style>
</head>

<body>

<h2>📊 Admin Dashboard</h2>

<div class="section">
  <h3>🎬 Player Views (By Folder)</h3>
  <div id="playerViewsContainer"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const playerContainer = document.getElementById("playerViewsContainer");

const playerRef = ref(db, "playerViews");

onValue(playerRef, (snapshot) => {
  const data = snapshot.val();
  playerContainer.innerHTML = "";

  if (!data) {
    playerContainer.innerHTML = "<p>No player views yet.</p>";
    return;
  }

  Object.keys(data).forEach(folder => {

    const folderBox = document.createElement("div");
    folderBox.className = "box";

    const title = document.createElement("div");
    title.className = "folderTitle";
    title.textContent = "📁 " + folder;

    folderBox.appendChild(title);

    const videos = data[folder];

    Object.keys(videos).forEach(videoId => {

      const count = videos[videoId];

      const item = document.createElement("div");
      item.className = "videoItem";
      item.textContent = `▶ ${videoId} — ${count} views`;

      folderBox.appendChild(item);
    });

    playerContainer.appendChild(folderBox);
  });
});
</script>

</body>
</html>
