<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #fff;
  padding: 20px;
}

h2 { color: #ff4444; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.card {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 12px;
}

.card h3 {
  margin: 0;
  color: #aaa;
  font-size: 14px;
}

.card p {
  font-size: 26px;
  margin-top: 10px;
  font-weight: bold;
}

.section {
  margin-top: 25px;
  background: #1c1c1c;
  padding: 15px;
  border-radius: 12px;
}

.section h3 {
  color: #ff4444;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid #333;
}
</style>
</head>

<body>

<script>
// 🔐 PASSWORD
const correctPassword = "anywherecum1099";

(function () {
  const entered = prompt("Enter admin password:");
  if (entered !== correctPassword) {
    document.write("<h2 style='color:red;text-align:center;margin-top:50px;'>⛔ Access Denied</h2>");
    document.close();
    throw new Error("Unauthorized");
  }
})();
</script>

<h2>📊 Admin Dashboard</h2>

<div class="grid">
  <div class="card">
    <h3>Total Views</h3>
    <p id="totalViews">0</p>
  </div>

  <div class="card">
    <h3>Pages Tracked</h3>
    <p id="pagesCount">0</p>
  </div>

  <div class="card">
    <h3>Today's Pages</h3>
    <p id="dailyCount">0</p>
  </div>
</div>

<div class="section">
  <h3>📄 Per Page Views</h3>
  <div id="pageViews">Loading...</div>
</div>

<div class="section">
  <h3>📅 Today's Views</h3>
  <div id="dailyViews">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWHoNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const today = new Date().toISOString().split("T")[0];

// 🔢 TOTAL
onValue(ref(db, "views/total"), (snap) => {
  document.getElementById("totalViews").innerText = snap.val() || 0;
});

// 📄 PER PAGE
onValue(ref(db, "views/pages"), (snap) => {
  const data = snap.val() || {};
  const container = document.getElementById("pageViews");

  container.innerHTML = "";

  const entries = Object.entries(data);

  document.getElementById("pagesCount").innerText = entries.length;

  if (entries.length === 0) {
    container.innerHTML = "<p>No data</p>";
    return;
  }

  entries.sort((a, b) => b[1] - a[1]);

  entries.forEach(([page, views]) => {
    container.innerHTML += `
      <div class="item">
        <span>${format(page)}</span>
        <span>${views}</span>
      </div>
    `;
  });
});

// 📅 DAILY
onValue(ref(db, "views/daily/" + today), (snap) => {
  const data = snap.val() || {};
  const container = document.getElementById("dailyViews");

  container.innerHTML = "";

  const entries = Object.entries(data);

  document.getElementById("dailyCount").innerText = entries.length;

  if (entries.length === 0) {
    container.innerHTML = "<p>No data</p>";
    return;
  }

  entries.sort((a, b) => b[1] - a[1]);

  entries.forEach(([page, views]) => {
    container.innerHTML += `
      <div class="item">
        <span>${format(page)}</span>
        <span>${views}</span>
      </div>
    `;
  });
});

function format(page) {
  return page.replace(".html", "").replace("-", " ").toUpperCase();
}
</script>

</body>
</html>
