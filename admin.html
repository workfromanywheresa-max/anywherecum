  btn.disabled = true;

  try {
    const res = await fetch("https://task.workfromanywhere-sa.workers.dev/reset", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ visitId })
    });

    const data = await res.json();

    if (!data.success) {
      alert("Reset failed");
      return;

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------- CACHE ---------- */
function saveCache(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function loadCache(k){ return JSON.parse(localStorage.getItem(k) || "null"); }

const CACHE = {
  pages: "pages_cache",
  monthly: "monthly_cache",
  subs: "subs_cache",
  totals: "totals_cache",
  video: "video_cache",
  cycle: "cycle_cache",
  trending: "trending_cache",
  country: "country_cache"
};

/* ---------- FORMAT ---------- */
function formatViews(n){
  if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,"")+"M";
  if(n>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,"")+"k";
  return n;
}

const bracket = n => `<span style="opacity:.5;font-size:.6em">(${n})</span>`;

// Full format: 1.6k (1566)
function formatFull(n){
  return `${formatViews(n)} ${bracket(n)}`;
}

/* ---------- DOM ---------- */
const totalEl = document.getElementById("totalViews");
const videoEl = document.getElementById("videoViewsTotal");
const cycleEl = document.getElementById("cycleViewsTotal");
const subsEl = document.getElementById("totalSubscribers");

const pageList = document.getElementById("pageViews");
const monthList = document.getElementById("monthlyList");
const subsList = document.getElementById("subscribersList");
const trendingList = document.getElementById("trendingList");
const countryList = document.getElementById("countryList");

/* ---------- COUNTRY ---------- */
const regionNames = new Intl.DisplayNames(['en'], { type: 'region' });

function renderCountries(data){
  const sorted = Object.entries(data || {})
    .sort((a,b)=>b[1]-a[1]);

  countryList.innerHTML = sorted.map(([code,count])=>{
    const flag = `https://flagcdn.com/24x18/${code.toLowerCase()}.png`;
    const fullName = regionNames.of(code) || "Unknown";
    return `
      <li>
        <div style="display:flex;align-items:center;gap:8px;">
          <img src="${flag}" width="24" height="18"/>
          <span>${code} - ${fullName}</span>
        </div>
        <span class="value">${formatFull(count)}</span>
      </li>
    `;
  }).join("");
}

/* ---------- TRENDING ---------- */
function renderTrending(data){
  const trending = Object.entries(data)
    .map(([id,val])=>{
      const views = typeof val==="number" ? val : (val?.count||0);
      return {
        id,
        views,
        thumbnail: `https://anywherecum.pages.dev/images/${id}.webp`
      };
    })
    .filter(v=>v.views>=10)
    .sort((a,b)=>b.views-a.views);

  trendingList.innerHTML = trending.map(v=>`
    <li>
      <img src="${v.thumbnail}" style="width:80px;height:45px;object-fit:cover;border-radius:6px;" onerror="this.style.display='none'"/>
      <div>
        <div>${v.id}</div>
        <div class="value">${formatFull(v.views)}</div>
      </div>
    </li>
  `).join("");
}

/* ---------- MONTH ---------- */
const monthNames = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];

function parseDate(str){
  if(!str) return null;
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function getKey(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}

function calculateMonthly(data){
  const m = {};
  Object.values(data||{}).forEach(i=>{
    if(i?.lastUpdated){
      const d = parseDate(i.lastUpdated);
      if(d){
        const k = getKey(d);
        m[k] = (m[k]||0)+(i.count||0);
      }
    }
  });
  return m;
}

function renderMonthly(data){
  const sortedEntries = Object.entries(data || {}).sort(([aKey],[bKey]) => bKey.localeCompare(aKey));

  monthList.innerHTML = sortedEntries.map(([k,v])=>{
    const [year, month] = k.split("-");
    const monthName = monthNames[parseInt(month,10)-1];
    return `
      <li>
        <span>${year}-${month} (${monthName})</span>
        <span class="value">${formatFull(v)}</span>
      </li>
    `;
  }).join("");
}

/* ---------- SORTED PAGES ---------- */
function renderPages(data){
  const sorted = Object.entries(data || {})
    .sort((a,b)=>{
      const aVal = typeof a[1]==="object" ? (a[1].count||0) : a[1];
      const bVal = typeof b[1]==="object" ? (b[1].count||0) : b[1];
      return bVal-aVal;
    });

  pageList.innerHTML = sorted.map(([k,v])=>{
    const val = typeof v==="object" ? (v.count||0) : v;
    return `
      <li>
        <span>${k}</span>
        <span class="value">${formatFull(val)}</span>
      </li>
    `;
  }).join("");
}

/* ---------- SUBS ---------- */
function renderSubs(data){
  subsList.innerHTML = data.map(s=>`
    <li><span>${s.userId}</span><span class="sub-date">${s.updatedAt}</span></li>
  `).join("");

  subsEl.innerHTML = `<span class="value">Subscribers: ${formatFull(data.length)}</span>`;
}

/* ---------- CACHE LOAD ---------- */
const cachedTrending = loadCache(CACHE.trending);
if(cachedTrending) renderTrending(cachedTrending);

const cachedPages = loadCache(CACHE.pages);
const cachedMonthly = loadCache(CACHE.monthly);
const cachedSubs = loadCache(CACHE.subs);
const cachedTotals = loadCache(CACHE.totals);
const cachedVideo = loadCache(CACHE.video);
const cachedCycle = loadCache(CACHE.cycle);
const cachedCountry = loadCache(CACHE.country);

if(cachedPages) renderPages(cachedPages);
if(cachedMonthly) renderMonthly(cachedMonthly);
if(cachedSubs) renderSubs(cachedSubs);
if(cachedCountry) renderCountries(cachedCountry);

if(cachedTotals){
  totalEl.innerHTML = `<span class="value">Site Visits: ${formatFull(cachedTotals.total)}</span>`;
}

if(cachedVideo){
  videoEl.innerHTML = `<span class="value">Video Views: ${formatFull(cachedVideo)}</span>`;
}

if(cachedCycle){
  cycleEl.innerHTML = `<span class="value">Cycle Views: ${formatFull(cachedCycle)}</span>`;
}

/* ---------- FIREBASE ---------- */
onValue(ref(db,"pageViews"),snap=>{
  const data = snap.val()||{};

  renderPages(data);

  const monthly = calculateMonthly(data);
  renderMonthly(monthly);

  saveCache(CACHE.pages,data);
  saveCache(CACHE.monthly,monthly);

  let total=0;
  Object.values(data).forEach(v=>{
    if(typeof v==="object") total+=v.count||0;
  });

  totalEl.innerHTML = `<span class="value">Site Visits: ${formatFull(total)}</span>`;
  saveCache(CACHE.totals, { total });
});

onValue(ref(db,"views"),snap=>{
  const t=Object.values(snap.val()||{}).reduce((a,b)=>a+(typeof b==="number"?b:0),0);

  videoEl.innerHTML = `<span class="value">Video Views: ${formatFull(t)}</span>`;
  saveCache(CACHE.video, t);
});

onValue(ref(db,"cycleViews"),snap=>{
  const data = snap.val()||{};
  const t=Object.values(data).reduce((a,b)=>a+(typeof b==="number"?b:0),0);

  cycleEl.innerHTML = `<span class="value">Cycle Views: ${formatFull(t)}</span>`;
  saveCache(CACHE.cycle, t);

  renderTrending(data);
  saveCache(CACHE.trending, data);
});

onValue(ref(db,"countryCounts"),snap=>{
  const data = snap.val()||{};
  renderCountries(data);
  saveCache(CACHE.country,data);
});

/* ---------- SUBSCRIBERS ---------- */
let lastHash="";
async function loadSubs(){
  const res = await fetch("https://anywherecumnotifications.workfromanywhere-sa.workers.dev/subscribers");
  const data = await res.json();

  const h = JSON.stringify(data);
  if(h===lastHash) return;
  lastHash=h;

  renderSubs(data);
  saveCache(CACHE.subs, data);
}
loadSubs();
setInterval(loadSubs,10000);

/* ---------- LOGOUT ---------- */
function logout(){
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

<script type="module">
const vipKeysList = document.getElementById("vipKeysList");

// 🔄 LOAD VIP KEYS
async function loadVipKeys() {
  try {
    const res = await fetch(
      "https://vipkeys.workfromanywhere-sa.workers.dev/list-keys",
      { cache: "no-store" }
    );

    if (!res.ok) throw new Error("HTTP " + res.status);

    const data = await res.json();

    renderVipKeys(data.keys || []);

  } catch (e) {
    console.log("VIP keys error", e);
    vipKeysList.innerHTML = "<li>❌ Failed to load VIP keys</li>";
  }
}

// 🕒 FORMAT DATE
function formatDate(sast) {
  if (!sast) return "N/A";

  const d = new Date(
    sast.replace(", ", "T").replace(/\//g, "-")
  );

  if (isNaN(d)) return sast;

  return d.toLocaleString("en-ZA", {
    dateStyle: "medium",
    timeStyle: "short"
  });
}

// 🎯 RENDER KEYS + DATES (FILTERED)
function renderVipKeys(keys) {
  if (!Array.isArray(keys)) return;

  // ❌ REMOVE subscriber entries
  const filteredKeys = keys.filter(item =>
    item.key && !item.key.startsWith("subscriber_")
  );

  vipKeysList.innerHTML = filteredKeys.length
    ? filteredKeys.map(item => `
        <li>
          <span><b>${item.key}</b></span>
          <span class="sub-date">Created: ${formatDate(item.createdAtSAST)}</span>
          <span class="sub-date">Expires: ${formatDate(item.expiresAtSAST)}</span>
        </li>
      `).join("")
    : "<li>No VIP keys found</li>";
}

// 🚀 LOAD + AUTO REFRESH
loadVipKeys();
setInterval(loadVipKeys, 5000);
</script>
  
</body>
