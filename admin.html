<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

/* ALL CARDS SCROLL */
.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  max-height: 300px;
  overflow-y: auto;
}

/* MONTHLY = EXACT 3 ITEMS */
.card.monthly {
  max-height: 180px;
}

/* SCROLLBAR */
.card::-webkit-scrollbar { width: 6px; }
.card::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 3px;
}

/* LISTS */
ul { list-style: none; padding: 0; margin: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.sub-date {
  color: #888;
  font-size: 0.7em;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");
  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `
      <body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;">
        <h1>❌ Access Denied</h1>
      </body>
    `;
    throw new Error("Unauthorized");
  }
  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>
  <div id="totalViews" class="value"></div>
  <div id="videoViewsTotal" class="value"></div>
  <div id="cycleViewsTotal" class="value"></div>
  <div id="totalSubscribers" class="value"></div>
</div>

<div class="card">
  <h2>👥 Subscribers</h2>
  <ul id="subscribersList"></ul>
</div>

<div class="card monthly">
  <h2>📅 Monthly Visits</h2>
  <ul id="monthlyList"></ul>
</div>

<div class="card">
  <h2>📊 Page Views</h2>
  <ul id="pageViews"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------- CACHE ---------- */
const CACHE_KEYS = {
  pages: "cache_pages",
  monthly: "cache_monthly",
  subscribers: "cache_subs",
  totals: "cache_totals"
};

function saveCache(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

function loadCache(key) {
  const data = localStorage.getItem(key);
  return data ? JSON.parse(data) : null;
}

/* ---------- FORMAT ---------- */
function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + "M";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + "K";
  return num;
}

function bracket(num) {
  return `<span style="font-size:0.4em;opacity:0.5;">(${num})</span>`;
}

/* ---------- DOM ---------- */
const subscribersList = document.getElementById("subscribersList");
const subscribersTotalEl = document.getElementById("totalSubscribers");
const totalEl = document.getElementById("totalViews");
const videoEl = document.getElementById("videoViewsTotal");
const cycleEl = document.getElementById("cycleViewsTotal");
const pageList = document.getElementById("pageViews");
const monthlyList = document.getElementById("monthlyList");

/* ---------- RENDER ---------- */
function renderPages(data) {
  const html = Object.entries(data || {}).map(([k, v]) => `
    <li>
      <span>${k}</span>
      <span class="value">${formatViews(v?.count || v || 0)} ${bracket(v?.count || v || 0)}</span>
    </li>
  `).join("");

  pageList.innerHTML = html;
}

function renderMonthly(data) {
  monthlyList.innerHTML = Object.entries(data || {}).map(([k, v]) => `
    <li>
      <span>${k}</span>
      <span class="value">${formatViews(v)} ${bracket(v)}</span>
    </li>
  `).join("");
}

function renderSubscribers(data) {
  subscribersList.innerHTML = data.map(sub => `
    <li>
      <span>${sub.userId}</span>
      <span class="sub-date">${sub.updatedAt}</span>
    </li>
  `).join("");

  subscribersTotalEl.innerHTML =
    `Subscribers: ${formatViews(data.length)} ${bracket(data.length)}`;
}

/* ---------- LOAD CACHE (NO FLICKER) ---------- */
const cachedPages = loadCache(CACHE_KEYS.pages);
const cachedMonthly = loadCache(CACHE_KEYS.monthly);
const cachedSubs = loadCache(CACHE_KEYS.subscribers);
const cachedTotals = loadCache(CACHE_KEYS.totals);

if (cachedPages) renderPages(cachedPages);
if (cachedMonthly) renderMonthly(cachedMonthly);
if (cachedSubs) renderSubscribers(cachedSubs);
if (cachedTotals) {
  totalEl.innerHTML = cachedTotals.total;
  videoEl.innerHTML = cachedTotals.video;
  cycleEl.innerHTML = cachedTotals.cycle;
}

/* ---------- SUBSCRIBERS ---------- */
let lastHash = "";

async function loadSubscribers() {
  const res = await fetch("https://anywherecumnotifications.workfromanywhere-sa.workers.dev/subscribers");
  const data = await res.json();

  const hash = JSON.stringify(data);
  if (hash === lastHash) return;
  lastHash = hash;

  renderSubscribers(data);
  saveCache(CACHE_KEYS.subscribers, data);
}

loadSubscribers();
setInterval(loadSubscribers, 10000);

/* ---------- FIREBASE ---------- */
onValue(ref(db, "pageViews"), (snap) => {
  const data = snap.val() || {};

  renderPages(data);
  saveCache(CACHE_KEYS.pages, data);

  let total = 0;
  Object.values(data).forEach(v => {
    if (typeof v === "object") total += v.count || 0;
  });

  const totals = {
    total: `Site Visits: ${formatViews(total)} ${bracket(total)}`,
    video: videoEl.innerHTML,
    cycle: cycleEl.innerHTML
  };

  totalEl.innerHTML = totals.total;
  saveCache(CACHE_KEYS.totals, totals);
});

onValue(ref(db, "views"), (snap) => {
  const total = Object.values(snap.val() || {}).reduce((a, b) => a + (typeof b === "number" ? b : 0), 0);
  videoEl.innerHTML = `Video Views: ${formatViews(total)} ${bracket(total)}`;
});

onValue(ref(db, "cycleViews"), (snap) => {
  const total = Object.values(snap.val() || {}).reduce((a, b) => a + (typeof b === "number" ? b : 0), 0);
  cycleEl.innerHTML = `Cycle Views: ${formatViews(total)} ${bracket(total)}`;
});

/* ---------- LOGOUT ---------- */
function logout() {
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
