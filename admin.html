<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

ul { list-style: none; padding: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔐 PASSWORD -->
<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");

  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `
      <body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;">
        <h1>❌ Access Denied</h1>
      </body>
    `;
    throw new Error("Unauthorized");
  }

  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button id="triggerBtn">Trigger Notification</button>

<script>
const btn = document.getElementById("triggerBtn");

btn.addEventListener("click", async () => {
  btn.disabled = true;
  btn.innerText = "Sending...";

  try {
    const res = await fetch("https://anywherecumnotifications.workfromanywhere-sa.workers.dev/", {
      method: "POST"
    });

    const text = await res.text();
    let data = JSON.parse(text);

    if (!res.ok) throw new Error(data.error || "HTTP " + res.status);

    if (data.success && data.sent) {
      alert("✅ Notification sent!");
    } else if (data.success && !data.sent) {
      alert("⚠️ No new video");
    } else {
      alert("❌ " + (data.error || "Unknown error"));
    }

  } catch (err) {
    alert("❌ Failed: " + err.message);
  }

  btn.disabled = false;
  btn.innerText = "Trigger Notification";
});
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<!-- 🔥 TOTAL -->
<div class="total-card">
  <h2>🔥 Total Views</h2>
  <div id="totalViews" class="value">Site Visits: Loading...</div>
  <div id="videoViewsTotal" class="value">Video Views: Loading...</div>
  <div id="cycleViewsTotal" class="value">Cycle Views: Loading...</div>
</div>

<!-- 📅 MONTHLY VISITS -->
<div class="card">
  <h2>📅 Monthly Visits</h2>
  <ul id="monthlyList"></ul>

  <button onclick="expandMonths()" style="
    margin-top:10px;
    padding:6px 10px;
    background:#333;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
  ">Show More</button>
</div>

<!-- 📊 PAGE VIEWS -->
<div class="container">
  <div class="card">
    <h2>📊 Page Views (Current Month)</h2>
    <ul id="pageViews"></ul>
  </div>
</div>

<script>
const DB = "https://anywherecum-1c8d0-default-rtdb.firebaseio.com";

/* FORMAT */
function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + "M";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + "K";
  return num;
}

/* FETCH */
async function fetchData(path) {
  const res = await fetch(`${DB}/${path}.json`);
  return await res.json();
}

/* MONTH KEY */
function getMonthKey() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
}

/* LAST MONTHS */
function getLastMonths(count) {
  const months = [];
  const now = new Date();

  for (let i = 0; i < count; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    const label = d.toLocaleString("default", { month: "long" });
    months.push({ key, label });
  }

  return months;
}

/* GROWTH */
function calculateGrowth(current, previous) {
  if (previous === 0) {
    return { text: "New", color: "#00ffcc" };
  }

  const change = ((current - previous) / previous) * 100;
  const rounded = change.toFixed(1);

  if (change > 0) {
    return { text: `+${rounded}%`, color: "lime" };
  } else if (change < 0) {
    return { text: `${rounded}%`, color: "red" };
  } else {
    return { text: "0%", color: "#aaa" };
  }
}

/* PAGE VIEWS */
async function loadPageViews() {
  const month = getMonthKey();
  const data = await fetchData(`pageViews/${month}`);

  const list = document.getElementById("pageViews");
  list.innerHTML = "";

  let total = 0;
  let combined = [];

  if (data) {
    Object.entries(data).forEach(([key, value]) => {
      value = typeof value === "number" ? value : 0;
      total += value;
      combined.push({ name: key, value });
    });
  }

  combined.sort((a, b) => b.value - a.value);

  combined.forEach(item => {
    const li = document.createElement("li");
    li.innerHTML = `<span>${item.name}</span><span class="value">${formatViews(item.value)}</span>`;
    list.appendChild(li);
  });

  return total;
}

/* MONTHLY VISITS */
let monthsToShow = 3;

async function loadMonthlyVisits() {
  const list = document.getElementById("monthlyList");
  list.innerHTML = "";

  const months = getLastMonths(monthsToShow);

  let previousTotal = null;

  for (const m of months) {
    const data = await fetchData(`pageViews/${m.key}`);

    let total = 0;

    if (data) {
      Object.values(data).forEach(v => {
        total += typeof v === "number" ? v : 0;
      });
    }

    let growthHTML = "";

    if (previousTotal !== null) {
      const growth = calculateGrowth(total, previousTotal);

      growthHTML = `
        <span style="margin-left:10px; color:${growth.color}; font-size:12px;">
          ${growth.text}
        </span>
      `;
    }

    const li = document.createElement("li");
    li.innerHTML = `
      <span>${m.label}</span>
      <span class="value">
        ${formatViews(total)}
        ${growthHTML}
      </span>
    `;

    list.appendChild(li);

    previousTotal = total;
  }
}

/* EXPAND */
function expandMonths() {
  monthsToShow += 3;
  loadMonthlyVisits();
}

/* VIDEO TOTAL */
async function loadVideoViewsTotal() {
  const data = await fetchData("views");
  let total = 0;

  if (data) {
    Object.values(data).forEach(v => total += typeof v === "number" ? v : 0);
  }

  return total;
}

/* CYCLE TOTAL */
async function loadCycleViewsTotal() {
  const data = await fetchData("cycleViews");
  let total = 0;

  if (data) {
    Object.values(data).forEach(v => total += typeof v === "number" ? v : 0);
  }

  return total;
}

/* INIT */
async function init() {
  const pageTotal = await loadPageViews();
  const videoTotal = await loadVideoViewsTotal();
  const cycleTotal = await loadCycleViewsTotal();

  document.getElementById("totalViews").innerText =
    "Site Visits (This Month): " + formatViews(pageTotal);

  document.getElementById("videoViewsTotal").innerText =
    "Video Views: " + formatViews(videoTotal);

  document.getElementById("cycleViewsTotal").innerText =
    "Cycle Views: " + formatViews(cycleTotal);

  await loadMonthlyVisits();
}

init();
setInterval(init, 10000);

/* LOGOUT */
function logout() {
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
