<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Visits</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #ff4444;
}

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  border: 1px solid #333;
}

.folder {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #333;
}

.folder:last-child {
  border-bottom: none;
}

.total {
  font-size: 18px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<h1>📊 Visits Dashboard</h1>

<div class="card">
  <div class="total" id="totalVisits">Total Visits: 0</div>
</div>

<div class="card">
  <h3>Visits Per Folder</h3>
  <div id="folderStats"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const totalVisitsEl = document.getElementById("totalVisits");
const folderStatsEl = document.getElementById("folderStats");

const visitsRef = ref(db, "visits");

onValue(visitsRef, (snapshot) => {
  const data = snapshot.val() || {};

  let totalVisits = 0;
  folderStatsEl.innerHTML = "";

  Object.keys(data).forEach(folder => {
    const users = Object.keys(data[folder]);
    const count = users.length;

    totalVisits += count;

    const div = document.createElement("div");
    div.className = "folder";

    div.innerHTML = `
      <span>${folder}</span>
      <span>${count}</span>
    `;

    folderStatsEl.appendChild(div);
  });

  totalVisitsEl.textContent = "Total Visits: " + totalVisits;
});
</script>

</body>
</html>
