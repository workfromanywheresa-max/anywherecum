<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

ul { list-style: none; padding: 0; margin: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
  height: 32px;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.monthly-box {
  max-height: 120px;
  min-height: 120px;
  overflow-y: auto;
  padding-right: 5px;
}

#pageViews {
  max-height: 300px;
  min-height: 300px;
  overflow-y: auto;
}

.monthly-box::-webkit-scrollbar,
#pageViews::-webkit-scrollbar {
  width: 6px;
}

.monthly-box::-webkit-scrollbar-thumb,
#pageViews::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 3px;
}
</style>
</head>

<body>

<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");

  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `
      <body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;">
        <h1>❌ Access Denied</h1>
      </body>
    `;
    throw new Error("Unauthorized");
  }

  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>

  <div id="totalViews" class="value">Loading...</div>
  <div id="videoViewsTotal" class="value">Video Views: Loading...</div>
  <div id="cycleViewsTotal" class="value">Cycle Views: Loading...</div>
  <div id="subscribersTotal" class="value">Subscribers: Loading...</div>
</div>

<!-- Subscribers moved ABOVE monthly -->
<div class="card">
  <h2>👥 Subscribers</h2>
  <ul id="subscribersList"></ul>
</div>

<div class="card">
  <h2>📅 Monthly Visits</h2>
  <ul id="monthlyList" class="monthly-box"></ul>
</div>

<div class="container">
  <div class="card">
    <h2>📊 Page Views</h2>
    <ul id="pageViews"></ul>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------- REFS ---------- */
const pageViewsRef = ref(db, "pageViews");
const videoViewsRef = ref(db, "views");
const cycleViewsRef = ref(db, "cycleViews");
const subscribersRef = ref(db, "subscribers");

/* ---------- ELEMENTS ---------- */
const totalEl = document.getElementById("totalViews");
const videoEl = document.getElementById("videoViewsTotal");
const cycleEl = document.getElementById("cycleViewsTotal");
const subsEl = document.getElementById("subscribersTotal");
const subsList = document.getElementById("subscribersList");

/* ---------- CACHE ---------- */
function loadCache(key) {
  return localStorage.getItem(key);
}

function saveCache(key, value) {
  localStorage.setItem(key, value);
}

function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + "M";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + "K";
  return num;
}

function bracket(num) {
  return `<span style="font-size: 0.4em; opacity: 0.5;">(${num})</span>`;
}

function sumValues(data) {
  let total = 0;
  if (data) {
    Object.values(data).forEach(v => {
      if (typeof v === "number") total += v;
    });
  }
  return total;
}

/* ---------- SUBSCRIBERS ---------- */
const cachedSubs = loadCache("subscribersData");

if (cachedSubs) {
  renderSubscribers(JSON.parse(cachedSubs));
  subsEl.innerHTML = "Subscribers: " + getFormattedCached("subscribersTotal");
}

function renderSubscribers(data) {
  let html = "";
  let count = 0;

  Object.entries(data || {}).forEach(([key, value]) => {
    count++;
    html += `<li><span>${key}</span></li>`;
  });

  subsList.innerHTML = html;
  subsEl.innerHTML = `Subscribers: ${formatViews(count)} ${bracket(count)}`;

  saveCache("subscribersData", JSON.stringify(data));
  saveCache("subscribersTotal", count);
}

/* ---------- CACHE DISPLAY ---------- */
function getFormattedCached(key) {
  const val = loadCache(key);
  if (!val) return "Loading...";
  const num = Number(val);
  return `${formatViews(num)} ${bracket(num)}`;
}

/* ---------- INITIAL DISPLAY ---------- */
totalEl.innerHTML = "Site Visits: " + getFormattedCached("totalViews");
videoEl.innerHTML = "Video Views: " + getFormattedCached("videoViewsTotal");
cycleEl.innerHTML = "Cycle Views: " + getFormattedCached("cycleViewsTotal");
subsEl.innerHTML = "Subscribers: " + getFormattedCached("subscribersTotal");

/* ---------- PAGE VIEWS ---------- */
const pageList = document.getElementById("pageViews");

const cachedPage = loadCache("pageViewsData");
if (cachedPage) renderPages(JSON.parse(cachedPage));

function renderPages(data) {
  const items = Object.entries(data || {})
    .map(([key, value]) => [key, typeof value === "number" ? value : 0])
    .sort((a, b) => b[1] - a[1]);

  let html = "";

  items.forEach(([key, value]) => {
    html += `<li>
      <span>${key}</span>
      <span class="value">${formatViews(value)} ${bracket(value)}</span>
    </li>`;
  });

  pageList.innerHTML = html;
}

/* ---------- FIREBASE ---------- */
onValue(pageViewsRef, (snapshot) => {
  const data = snapshot.val() || {};

  renderPages(data);

  saveCache("pageViewsData", JSON.stringify(data));
  saveCache("totalViews", sumValues(data));
});

/* ---------- VIDEO ---------- */
onValue(videoViewsRef, (snapshot) => {
  const total = sumValues(snapshot.val() || {});

  videoEl.innerHTML = `Video Views: ${formatViews(total)} ${bracket(total)}`;
  saveCache("videoViewsTotal", total);
});

/* ---------- CYCLE ---------- */
onValue(cycleViewsRef, (snapshot) => {
  const total = sumValues(snapshot.val() || {});

  cycleEl.innerHTML = `Cycle Views: ${formatViews(total)} ${bracket(total)}`;
  saveCache("cycleViewsTotal", total);
});

/* ---------- SUBSCRIBERS LIVE ---------- */
onValue(subscribersRef, (snapshot) => {
  const data = snapshot.val() || {};

  renderSubscribers(data);
});

/* ---------- LOGOUT ---------- */
function logout() {
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
