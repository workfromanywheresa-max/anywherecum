<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

ul { list-style: none; padding: 0; margin: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.sub-date {
  color: #888;
  font-size: 0.7em;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.monthly-box {
  max-height: 120px;
  min-height: 120px;
  overflow-y: auto;
  padding-right: 5px;
}

#pageViews {
  max-height: 300px;
  min-height: 300px;
  overflow-y: auto;
}

.monthly-box::-webkit-scrollbar,
#pageViews::-webkit-scrollbar {
  width: 6px;
}

.monthly-box::-webkit-scrollbar-thumb,
#pageViews::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 3px;
}
</style>
</head>

<body>

<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");

  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `
      <body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;">
        <h1>❌ Access Denied</h1>
      </body>
    `;
    throw new Error("Unauthorized");
  }

  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>

  <div id="totalViews" class="value">Site Visits: 0 (0)</div>
  <div id="videoViewsTotal" class="value">Video Views: 0 (0)</div>
  <div id="cycleViewsTotal" class="value">Cycle Views: 0 (0)</div>
  <div id="totalSubscribers" class="value">Subscribers: 0 (0)</div>
</div>

<!-- 👥 Subscribers -->
<div class="card">
  <h2>👥 Subscribers</h2>
  <ul id="subscribersList" class="monthly-box"></ul>
</div>

<div class="card">
  <h2>📅 Monthly Visits</h2>
  <ul id="monthlyList" class="monthly-box"></ul>
</div>

<div class="container">
  <div class="card">
    <h2>📊 Page Views</h2>
    <ul id="pageViews"></ul>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------- ELEMENTS ---------- */
const subscribersList = document.getElementById("subscribersList");
const subscribersTotalEl = document.getElementById("totalSubscribers");

const totalEl = document.getElementById("totalViews");
const videoEl = document.getElementById("videoViewsTotal");
const cycleEl = document.getElementById("cycleViewsTotal");

/* ---------- FORMAT ---------- */
function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + "M";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + "K";
  return num;
}

function bracket(num) {
  return `<span style="font-size:0.4em;opacity:0.5;">(${num})</span>`;
}

/* ---------- SUBSCRIBERS FIX (NO FLICKER) ---------- */
let lastHash = "";

function hashData(data) {
  return data.map(s => `${s.userId}|${s.updatedAt}`).join(";");
}

async function loadSubscribers() {
  try {
    const res = await fetch("https://anywherecumnotifications.workfromanywhere-sa.workers.dev/subscribers");
    const data = await res.json();

    const newHash = hashData(data);

    // ❌ Skip update if nothing changed
    if (newHash === lastHash) return;

    lastHash = newHash;

    renderSubscribers(data);

  } catch (err) {
    console.error(err);
  }
}

function renderSubscribers(data) {
  if (!Array.isArray(data)) return;

  data.sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));

  const html = data.map(sub => `
    <li>
      <span>${sub.userId || "Unknown"}</span>
      <span class="sub-date">${sub.updatedAt || "N/A"}</span>
    </li>
  `).join("");

  if (subscribersList.innerHTML !== html) {
    subscribersList.innerHTML = html;
  }

  const totalSubs = data.length;
  const newText = `Subscribers: ${formatViews(totalSubs)} ${bracket(totalSubs)}`;

  if (subscribersTotalEl.innerHTML !== newText) {
    subscribersTotalEl.innerHTML = newText;
  }
}

/* ---------- INITIAL LOAD ---------- */
loadSubscribers();
setInterval(loadSubscribers, 10000);

/* ---------- CACHE ---------- */
function loadCache(key) {
  return localStorage.getItem(key);
}

function getCachedNumber(key) {
  const val = loadCache(key);
  return val ? Number(val) : 0;
}

const totalViews = getCachedNumber("totalViews");
const videoViews = getCachedNumber("videoViews");
const cycleViews = getCachedNumber("cycleViews");

totalEl.innerHTML = `Site Visits: ${formatViews(totalViews)} ${bracket(totalViews)}`;
videoEl.innerHTML = `Video Views: ${formatViews(videoViews)} ${bracket(videoViews)}`;
cycleEl.innerHTML = `Cycle Views: ${formatViews(cycleViews)} ${bracket(cycleViews)}`;

/* ---------- LOGOUT ---------- */
function logout() {
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
