<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

ul { list-style: none; padding: 0; margin: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.monthly-box {
  max-height: 120px;
  overflow-y: auto;
  padding-right: 5px;
}

.monthly-box::-webkit-scrollbar {
  width: 6px;
}

.monthly-box::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 3px;
}
</style>
</head>

<body>

<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");

  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `
      <body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;">
        <h1>❌ Access Denied</h1>
      </body>
    `;
    throw new Error("Unauthorized");
  }

  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>

  <div id="totalViews" class="value">Site Visits: Loading...</div>
  <div id="videoViewsTotal" class="value">Video Views: Loading...</div>
  <div id="cycleViewsTotal" class="value">Cycle Views: Loading...</div>
</div>

<div class="card">
  <h2>📅 Monthly Visits</h2>
  <ul id="monthlyList" class="monthly-box"></ul>
</div>

<div class="container">
  <div class="card">
    <h2>📊 Page Views</h2>
    <ul id="pageViews"></ul>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

/* ---------------- FIREBASE ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------------- REFERENCES ---------------- */
const pageViewsRef = ref(db, "pageViews");
const videoViewsRef = ref(db, "views");
const cycleViewsRef = ref(db, "cycleViews");

/* ---------------- FORMAT ---------------- */
function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + "M";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + "K";
  return num;
}

/* ---------------- SUM ---------------- */
function sumValues(data) {
  let total = 0;
  if (data) {
    Object.values(data).forEach(v => total += typeof v === "number" ? v : 0);
  }
  return total;
}

/* ---------------- MONTH LABEL ---------------- */
function getMonthLabel(offset) {
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth() - offset, 1);
  return d.toLocaleString("default", { month: "long" });
}

/* ---------------- MONTHLY (STATIC LOAD) ---------------- */
onValue(pageViewsRef, (snapshot) => {
  const data = snapshot.val();
  const list = document.getElementById("monthlyList");
  list.innerHTML = "";

  let total = sumValues(data);

  for (let i = 0; i < 12; i++) {
    const li = document.createElement("li");

    li.innerHTML = `
      <span>${getMonthLabel(i)}</span>
      <span class="value">${i === 0 ? formatViews(total) : 0}</span>
    `;

    list.appendChild(li);
  }
});

/* ---------------- PAGE VIEWS ---------------- */
onValue(pageViewsRef, (snapshot) => {
  const data = snapshot.val();

  const list = document.getElementById("pageViews");
  list.innerHTML = "";

  let total = 0;

  if (data) {
    Object.entries(data).forEach(([key, value]) => {
      value = typeof value === "number" ? value : 0;
      total += value;

      const li = document.createElement("li");
      li.innerHTML = `<span>${key}</span><span class="value">${formatViews(value)}</span>`;
      list.appendChild(li);
    });
  }

  document.getElementById("totalViews").innerText =
    "Site Visits: " + formatViews(total);
});

/* ---------------- VIDEO ---------------- */
onValue(videoViewsRef, (snapshot) => {
  const total = sumValues(snapshot.val());
  document.getElementById("videoViewsTotal").innerText =
    "Video Views: " + formatViews(total);
});

/* ---------------- CYCLE ---------------- */
onValue(cycleViewsRef, (snapshot) => {
  const total = sumValues(snapshot.val());
  document.getElementById("cycleViewsTotal").innerText =
    "Cycle Views: " + formatViews(total);
});

/* ---------------- LOGOUT ---------------- */
function logout() {
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}
</script>

</body>
</html>
