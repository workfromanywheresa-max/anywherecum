<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

ul { list-style: none; padding: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>📊 Admin Dashboard</h1>

<div class="card">
  <h2>🔥 Total Views</h2>
  <div id="totalViews" class="value">Loading...</div>
</div>

<div class="card">
  <h2>📄 Page Views</h2>
  <ul id="pageViews"></ul>
</div>

<div class="card">
  <h2>📁 Folder Views (Derived)</h2>
  <ul id="folderViews"></ul>
</div>

<script>
const DB = "https://anywherecum-1c8d0-default-rtdb.firebaseio.com";

async function fetchData(path) {
  const res = await fetch(`${DB}/${path}.json`);
  return await res.json();
}

function extractFolder(key) {
  // Example key: "folder?folder=Missionary"
  try {
    if (key.includes("folder?")) {
      const query = key.split("?")[1];
      const params = new URLSearchParams(query);
      return params.get("folder") || "Unknown";
    }
  } catch (e) {}

  return "Other";
}

async function loadData() {
  const data = await fetchData("pageViews");

  const pageList = document.getElementById("pageViews");
  const folderList = document.getElementById("folderViews");

  pageList.innerHTML = "";
  folderList.innerHTML = "";

  let total = 0;
  const folderTotals = {};

  if (!data) {
    document.getElementById("totalViews").innerText = 0;
    return;
  }

  Object.keys(data).forEach(page => {
    const value = typeof data[page] === "number" ? data[page] : 0;
    total += value;

    // Page list
    const liPage = document.createElement("li");
    liPage.innerHTML = `<span>${page}</span><span class="value">${value}</span>`;
    pageList.appendChild(liPage);

    // Folder extraction
    const folder = extractFolder(page);

    if (!folderTotals[folder]) {
      folderTotals[folder] = 0;
    }

    folderTotals[folder] += value;
  });

  // Folder list
  Object.keys(folderTotals).forEach(folder => {
    const liFolder = document.createElement("li");
    liFolder.innerHTML = `<span>${folder}</span><span class="value">${folderTotals[folder]}</span>`;
    folderList.appendChild(liFolder);
  });

  document.getElementById("totalViews").innerText = total;
}

loadData();
</script>

</body>
</html>
