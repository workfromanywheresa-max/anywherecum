<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 { color: #ff4444; }

.card {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
}

.container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

ul { list-style: none; padding: 0; }

li {
  padding: 8px;
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
}

.value {
  color: #00ffcc;
  font-weight: bold;
}

.total-card {
  background: #1e1e1e;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.logout-btn {
  float: right;
  background: #ff4444;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔐 PASSWORD PROTECTION -->
<script>
const ADMIN_PASSWORD = "Anywherecum1099";

if (!localStorage.getItem("adminLoggedIn")) {
  const entered = prompt("Enter Admin Password:");

  if (!entered || entered.trim() !== ADMIN_PASSWORD) {
    document.documentElement.innerHTML = `
      <body style="background:#121212;color:red;display:flex;justify-content:center;align-items:center;height:100vh;">
        <h1>❌ Access Denied</h1>
      </body>
    `;
    throw new Error("Unauthorized");
  }

  localStorage.setItem("adminLoggedIn", "true");
}
</script>

<button onclick="sendNotification()">Send Notification</button>
<button class="logout-btn" onclick="logout()">Logout</button>

<div class="total-card">
  <h2>🔥 Total Views</h2>

  <div id="totalViews" class="value">Site Visits: Loading...</div>
  <div id="videoViewsTotal" class="value">Video Views: Loading...</div>
  <div id="cycleViewsTotal" class="value">Cycle Views: Loading...</div>
</div>

<div class="container">
  <div class="card">
    <h2>📊 Page Views</h2>
    <ul id="pageViews"></ul>
  </div>
</div>

<script>
const DB = "https://anywherecum-1c8d0-default-rtdb.firebaseio.com";

/* FORMAT */
function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + "M";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + "K";
  return num;
}

async function fetchData(path) {
  const res = await fetch(`${DB}/${path}.json`);
  return await res.json();
}

/* PAGE VIEWS */
async function loadPageViews() {
  const data = await fetchData("pageViews");

  const list = document.getElementById("pageViews");
  list.innerHTML = "";

  let total = 0;
  let combined = [];

  if (data) {
    Object.entries(data).forEach(([key, value]) => {
      value = typeof value === "number" ? value : 0;
      total += value;
      combined.push({ name: key, value });
    });
  }

  combined.sort((a, b) => b.value - a.value);

  combined.forEach(item => {
    const li = document.createElement("li");
    li.innerHTML = `<span>${item.name}</span><span class="value">${formatViews(item.value)}</span>`;
    list.appendChild(li);
  });

  return total;
}

/* VIDEO VIEWS */
async function loadVideoViewsTotal() {
  const data = await fetchData("views");

  let total = 0;
  if (data) {
    Object.values(data).forEach(v => total += typeof v === "number" ? v : 0);
  }

  return total;
}

/* CYCLE VIEWS */
async function loadCycleViewsTotal() {
  const data = await fetchData("cycleViews");

  let total = 0;
  if (data) {
    Object.values(data).forEach(v => total += typeof v === "number" ? v : 0);
  }

  return total;
}

/* INIT */
async function init() {
  const pageTotal = await loadPageViews();
  const videoTotal = await loadVideoViewsTotal();
  const cycleTotal = await loadCycleViewsTotal();

  document.getElementById("totalViews").innerText = "Site Visits: " + formatViews(pageTotal);
  document.getElementById("videoViewsTotal").innerText = "Video Views: " + formatViews(videoTotal);
  document.getElementById("cycleViewsTotal").innerText = "Cycle Views: " + formatViews(cycleTotal);
}

init();
setInterval(init, 10000);

/* LOGOUT */
function logout() {
  localStorage.removeItem("adminLoggedIn");
  location.reload();
}

/* SEND NOTIFICATION */
async function sendNotification() {
  try {
    const res = await fetch("https://anywherecum.pages.dev/videos.json");

    if (!res.ok) {
      throw new Error("videos.json not found");
    }

    const videos = await res.json();

    if (!videos || videos.length === 0) {
      throw new Error("No videos available");
    }

    const latestVideo = videos.sort(
      (a, b) => new Date(b.date) - new Date(a.date)
    )[0];

    const imageUrl = "https://anywherecum.pages.dev/images/" + latestVideo.thumbnail;

    const response = await fetch("https://anywherecumnotifications.workfromanywhere-sa.workers.dev/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ image: imageUrl })
    });

    if (!response.ok) {
      throw new Error("Worker failed: " + response.status);
    }

    alert("Notification sent ✅");

  } catch (err) {
    console.error(err);
    alert("❌ Error sending notification. Check console.");
  }
}
</script>

</body>
</html>
