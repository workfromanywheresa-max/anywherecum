<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Certificate Verification</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* MAIN CARD */
.card {
  width: 90%;
  max-width: 520px;
  background: #111827;
  border: 1px solid #1f2937;
  border-radius: 14px;
  padding: 25px;
  text-align: center;
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

/* STATUS */
.status {
  font-size: 22px;
  font-weight: bold;
  margin-top: 15px;
}

.valid {
  color: #10b981;
}

.invalid {
  color: #ef4444;
}

/* BADGE */
.badge {
  display: inline-block;
  margin-top: 10px;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  background: #1f2937;
}

/* SEAL */
.seal {
  width: 80px;
  height: 80px;
  margin: auto;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(59,130,246,0.5);
}

.seal img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* INFO BOX */
.info {
  margin-top: 20px;
  text-align: left;
  font-size: 14px;
  line-height: 1.6;
  background: #0f172a;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #1f2937;
}
</style>
</head>

<body>

<div class="card">

  <div class="seal">
    <img src="https://anywherecum.pages.dev/images/certificate.png" />
  </div>

  <h2>Website Certificate Verification</h2>

  <div id="status" class="status">Checking...</div>

  <div id="badge" class="badge">SECURE VERIFICATION SYSTEM</div>

  <div class="info" id="infoBox" style="display:none;">
    <div><b>Certificate ID:</b> <span id="certId"></span></div>
    <div><b>Domain:</b> https://anywherecum.pages.dev/</div>
    <div><b>Status:</b> Official Website Certificate</div>
  </div>

</div>

<script>

const WORKER_URL = "https://certificate.workfromanywhere-sa.workers.dev";

const CERT_ID = "ANC-OFFICIAL-SITE-001";

window.addEventListener("load", () => {
  const params = new URLSearchParams(window.location.search);
  const cert = params.get("cert");

  if (!cert) {
    showInvalid("NO CERTIFICATE PROVIDED");
    return;
  }

  verify(cert);
});

async function verify(certId) {
  const status = document.getElementById("status");
  const info = document.getElementById("infoBox");
  const certBox = document.getElementById("certId");

  try {
    const res = await fetch(`${WORKER_URL}/verify?id=${certId}`);
    const data = await res.json();

    if (data.exists && certId === CERT_ID) {
      status.innerText = "✔ VERIFIED WEBSITE";
      status.className = "status valid";

      certBox.innerText = certId;
      info.style.display = "block";
    } else {
      showInvalid("✖ INVALID CERTIFICATE");
    }

  } catch (err) {
    showInvalid("⚠ VERIFICATION ERROR");
  }
}

function showInvalid(text) {
  document.getElementById("status").innerText = text;
  document.getElementById("status").className = "status invalid";
}

</script>

</body>
</html>
