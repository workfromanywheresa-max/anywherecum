<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Official Website Certificate System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
}

header {
  background: #111827;
  padding: 20px;
  text-align: center;
  border-bottom: 1px solid #1f2937;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #111827;
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
  border: 1px solid #1f2937;
}

.button {
  padding: 10px 16px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.badge {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  margin: 3px;
  display: inline-block;
  color: white;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 60%;
}

#qrcode { position: absolute; left: -9999px; }

.seal {
  width: 90px;
  height: 90px;
  margin: auto;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(59,130,246,0.6);
}

.seal img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<header>
  <h1>Website Certificate Authority</h1>
  <p>Official Digital Verification System</p>
</header>

<div class="container">

  <div class="card" style="text-align:center;">
    <h2>Trust Seal</h2>

    <div class="seal">
      <img src="https://anywherecum.pages.dev/images/certificate.png" />
    </div>

    <div style="margin-top:10px;">
      <span class="badge" style="background:#10b981;">VERIFIED</span>
      <span class="badge" style="background:#3b82f6;">SECURE</span>
      <span class="badge" style="background:#f59e0b;">AUTHENTIC</span>
    </div>
  </div>

  <div class="card">
    <h2>Certificate Actions</h2>
    <button class="button" onclick="downloadPDF()">Generate Website Certificate</button>
  </div>

  <div class="card">
    <h2>Verify Certificate</h2>
    <input id="certInput" placeholder="Enter Certificate ID"/>
    <button class="button" onclick="verifyCertID()">Verify</button>
    <p id="verifyResult"></p>
  </div>

</div>

<div id="qrcode"></div>

  <script>

const WORKER_URL = "https://certificate.workfromanywhere-sa.workers.dev";
const CERT_ID = "ANYWHERECUM-WEBSITE-CERT";

// ===== GENERATE CERT ONCE =====
async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  await fetch(`${WORKER_URL}/certificates`, { method: "POST" });

  const verifyUrl = `${window.location.origin}/verify.html?id=${CERT_ID}`;

  const qrDiv = document.getElementById("qrcode");
  qrDiv.innerHTML = "";

  new QRCode(qrDiv, {
    text: verifyUrl,
    width: 120,
    height: 120
  });

  await new Promise(r => setTimeout(r, 300));

  const qrCanvas = qrDiv.querySelector("canvas");
  const qrData = qrCanvas.toDataURL("image/png");

  doc.text("OFFICIAL WEBSITE CERTIFICATE", 105, 30, { align: "center" });
  doc.text("ANYWHERECUM VERIFIED SITE", 105, 40, { align: "center" });

  doc.text("Certificate ID: " + CERT_ID, 20, 120);
  doc.text("Status: VERIFIED WEBSITE", 20, 130);

  doc.addImage(qrData, "PNG", 140, 200, 50, 50);

  doc.save("website-certificate.pdf");
}

// ===== VERIFY FUNCTION =====
async function verifyCertID() {
  const result = document.getElementById("verifyResult");

  const res = await fetch(`${WORKER_URL}/verify?id=${CERT_ID}`);
  const data = await res.json();

  if (!data.exists) {
    result.innerText = "✖ Not Found";
    result.style.color = "red";
    return;
  }

  const keyRes = await fetch(`${WORKER_URL}/public-key`);
  const { key } = await keyRes.json();

  const binary = Uint8Array.from(atob(key), c => c.charCodeAt(0));

  const publicKey = await crypto.subtle.importKey(
    "spki",
    binary,
    { name: "RSA-PSS", hash: "SHA-256" },
    true,
    ["verify"]
  );

  const signature = Uint8Array.from(atob(data.signature), c => c.charCodeAt(0));
  const msg = new TextEncoder().encode(CERT_ID);

  const valid = await crypto.subtle.verify(
    { name: "RSA-PSS", saltLength: 32 },
    publicKey,
    signature,
    msg
  );

  result.innerText = valid
    ? "✔ REAL VERIFIED WEBSITE CERTIFICATE"
    : "✖ TAMPERED CERTIFICATE";

  result.style.color = valid ? "green" : "red";
}

  </script>

</body>
</html>
