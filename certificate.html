<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Official Website Certificate System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
}

header {
  background: #111827;
  padding: 20px;
  text-align: center;
  border-bottom: 1px solid #1f2937;
}

header h1 { margin: 0; }
header p { color: #9ca3af; }

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #111827;
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
  border: 1px solid #1f2937;
}

.button {
  padding: 10px 16px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.badge {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  margin: 3px;
  display: inline-block;
  color: white;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 60%;
}

#qrcode { position: absolute; left: -9999px; }

/* Seal */
.seal {
  width: 90px;
  height: 90px;
  margin: auto;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(59,130,246,0.6);
}

.seal img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<header>
  <h1>Website Certificate Authority</h1>
  <p>Official Digital Verification System</p>
</header>

<div class="container">

  <div class="card" style="text-align:center;">
    <h2>Trust Seal</h2>

    <div class="seal">
      <img src="https://anywherecum.pages.dev/images/certificate. png" />
    </div>

    <div style="margin-top:10px;">
      <span class="badge" style="background:#10b981;">VERIFIED</span>
      <span class="badge" style="background:#3b82f6;">SECURE</span>
      <span class="badge" style="background:#f59e0b;">AUTHENTIC</span>
    </div>
  </div>

  <div class="card">
    <h2>Certificate Actions</h2>
    <button class="button" onclick="downloadPDF()">Download Government Certificate</button>
  </div>

  <div class="card">
    <h2>Verify Certificate</h2>
    <input id="certInput" placeholder="Enter Certificate ID"/>
    <button class="button" onclick="verifyCertID()">Verify</button>
    <p id="verifyResult"></p>
  </div>

</div>

<div id="qrcode"></div>

<script>

function generateCertID() {
  return "ANC-" + Date.now() + "-" + Math.floor(Math.random() * 9999);
}

function saveCertID(id) {
  let list = JSON.parse(localStorage.getItem("certIDs") || "[]");
  list.push(id);
  localStorage.setItem("certIDs", JSON.stringify(list));
}

function toBase64(url) {
  return fetch(url)
    .then(res => res.blob())
    .then(blob => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    }));
}

async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const certId = generateCertID();
  saveCertID(certId);

  const url = `${window.location.origin}${window.location.pathname}?cert=${certId}`;

  const imgUrl = "https://anywherecum.pages.dev/images/certificate.png";
  const imgData = await toBase64(imgUrl);

  // QR CODE
  const qrDiv = document.getElementById("qrcode");
  qrDiv.innerHTML = "";

  new QRCode(qrDiv, {
    text: url,
    width: 120,
    height: 120
  });

  await new Promise(r => setTimeout(r, 300));

  const qrCanvas = qrDiv.querySelector("canvas");
  const qrData = qrCanvas.toDataURL("image/png");

  // ===== GOVERNMENT STYLE CERTIFICATE =====

  doc.setLineWidth(1);
  doc.rect(10, 10, 190, 277);

  doc.setFont("helvetica", "bold");
  doc.setFontSize(18);
  doc.text("OFFICIAL WEBSITE CERTIFICATE", 105, 30, { align: "center" });

  doc.setFontSize(11);
  doc.setFont("helvetica", "normal");
  doc.text("Digital Government Verification Document", 105, 38, { align: "center" });

  doc.addImage(imgData, "PNG", 85, 45, 40, 40);

  doc.setFontSize(12);
  doc.text("This certifies the following platform is verified:", 20, 95);

  doc.setFont("helvetica", "bold");
  doc.text("Name: AnywhereCum", 20, 110);

  doc.setFont("helvetica", "normal");
  doc.text("Domain: https://anywherecum.pages.dev/", 20, 120);
  doc.text("Certificate ID: " + certId, 20, 130);
  doc.text("Status: VERIFIED DIGITAL PLATFORM", 20, 140);

  doc.text("Scan QR to verify:", 150, 210);
  doc.addImage(qrData, "PNG", 145, 215, 50, 50);

  doc.setFontSize(10);
  doc.text("This certificate is system-generated and digitally verifiable.", 105, 280, {
    align: "center"
  });

  doc.save("government_certificate.pdf");
}

function verifyCertID() {
  const input = document.getElementById("certInput").value;
  const list = JSON.parse(localStorage.getItem("certIDs") || "[]");
  const result = document.getElementById("verifyResult");

  if (list.includes(input)) {
    result.style.color = "#10b981";
    result.innerText = "✔ VALID CERTIFICATE";
  } else {
    result.style.color = "#ef4444";
    result.innerText = "✖ INVALID CERTIFICATE";
  }
}

</script>

</body>
</html>
