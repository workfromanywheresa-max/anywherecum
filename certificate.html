<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Official Website Certificate System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
html, body {
  height: 100vh;
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  display: flex;
  flex-direction: column;
  padding-bottom: 120px;
}

header {
  background: #111827;
  padding: 15px;
  text-align: center;
  border-bottom: 1px solid #1f2937;
  flex-shrink: 0;
}

.container {
  flex: 1;
  max-width: 900px;
  margin: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-evenly;
}

.card {
  background: #111827;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: 1px solid #1f2937;
}

.button {
  padding: 10px 16px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.badge {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  margin: 3px;
  display: inline-block;
  color: white;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 60%;
}

#qrcode {
  position: absolute;
  left: -9999px;
}

.seal {
  width: 70px;
  height: 70px;
  margin: auto;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(59,130,246,0.6);
}

.seal img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<header>
  <h2>Website Certificate Authority</h2>
  <p style="margin:5px 0;">Official Digital Verification System</p>
</header>

<div class="container">

  <div class="card" style="text-align:center;">
    <h3>Trust Seal</h3>

    <div class="seal">
      <img src="https://anywherecum.pages.dev/images/certificate.png" />
    </div>

    <div style="margin-top:8px;">
      <span class="badge" style="background:#10b981;">VERIFIED</span>
      <span class="badge" style="background:#3b82f6;">SECURE</span>
      <span class="badge" style="background:#f59e0b;">AUTHENTIC</span>
    </div>
  </div>

  <div class="card" style="text-align:center;">
    <h3>Certificate</h3>
    <button class="button" onclick="downloadPDF()">Download PDF</button>
  </div>

  <div class="card" style="text-align:center;">
    <h3>Verify Certificate</h3>
    <input id="certInput" placeholder="Enter Certificate ID"/>
    <button class="button" onclick="verifyCertID()">Verify</button>
    <p id="verifyResult"></p>
  </div>

</div>

<div id="qrcode"></div>

<script>

const WORKER_URL = "https://certificate.workfromanywhere-sa.workers.dev";

// ===============================
// CERT DATA
// ===============================
const CERT_ID = "ANC-OFFICIAL-SITE-001";
const ISSUE_DATE = "16 Feb 2025";

// ===============================
// PDF GENERATION
// ===============================
async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const verifyUrl = `${window.location.origin}${window.location.pathname}?cert=${CERT_ID}`;

  const imgData = await toBase64("https://anywherecum.pages.dev/images/certificate.png");

  const qrDiv = document.getElementById("qrcode");
  qrDiv.innerHTML = "";

  new QRCode(qrDiv, {
    text: verifyUrl,
    width: 120,
    height: 120
  });

  await new Promise(r => setTimeout(r, 300));

  const qrCanvas = qrDiv.querySelector("canvas");
  const qrData = qrCanvas.toDataURL("image/png");

  // Border
  doc.rect(10, 10, 190, 277);

  // Title
  doc.setFont("helvetica", "bold");
  doc.setFontSize(20);
  doc.text("OFFICIAL WEBSITE CERTIFICATE", 105, 30, { align: "center" });

  // Subtitle
  doc.setFontSize(11);
  doc.setFont("helvetica", "normal");
  doc.text("Digital Verification Document", 105, 38, { align: "center" });

  // Seal
  doc.addImage(imgData, "PNG", 85, 45, 40, 40);

  // Body
  doc.setFontSize(12);
  doc.text("This certifies that the website below is verified and authentic.", 105, 100, { align: "center" });

  doc.setFont("helvetica", "bold");
  doc.text("AnywhereCum", 105, 115, { align: "center" });

  doc.setFont("helvetica", "normal");
  doc.setFontSize(11);
  doc.text("Domain: https://anywherecum.pages.dev/", 105, 125, { align: "center" });

  doc.text("Certificate ID: " + CERT_ID, 105, 135, { align: "center" });

  doc.setFont("helvetica", "bold");
  doc.text("Status: VERIFIED", 105, 145, { align: "center" });

  // QR
  doc.setFont("helvetica", "normal");
  doc.text("Scan to Verify", 150, 200);
  doc.addImage(qrData, "PNG", 145, 205, 50, 50);

  // =========================
  // BOTTOM LEFT SIGNATURE
  // =========================
  doc.line(20, 240, 80, 240);

  doc.setFontSize(10);
  doc.text("Authorized Signature", 20, 245);

  doc.setFont("helvetica", "bold");
  doc.text("Certificate Authority", 20, 252);

  doc.setFont("helvetica", "normal");
  doc.text("Issued: " + ISSUE_DATE, 20, 260);

  doc.save("certificate.pdf");
}

// ===============================
// VERIFY
// ===============================
async function verifyCertID() {
  const input = document.getElementById("certInput").value;
  const result = document.getElementById("verifyResult");

  if (!input) return;

  try {
    const res = await fetch(`${WORKER_URL}/verify?id=${input}`);
    const data = await res.json();

    if (data.exists) {
      result.style.color = "#10b981";
      result.innerText = "✔ VALID WEBSITE CERTIFICATE";
    } else {
      result.style.color = "#ef4444";
      result.innerText = "✖ INVALID CERTIFICATE";
    }

  } catch (err) {
    result.style.color = "#f59e0b";
    result.innerText = "⚠ Verification error";
  }
}

// AUTO VERIFY
window.addEventListener("load", () => {
  const params = new URLSearchParams(window.location.search);
  const cert = params.get("cert");

  if (cert) {
    document.getElementById("certInput").value = cert;
    autoVerify(cert);
  }
});

async function autoVerify(certId) {
  const result = document.getElementById("verifyResult");

  try {
    const res = await fetch(`${WORKER_URL}/verify?id=${certId}`);
    const data = await res.json();

    if (data.exists) {
      result.style.color = "#10b981";
      result.innerText = "✔ VALID WEBSITE CERTIFICATE (AUTO VERIFIED)";
    } else {
      result.style.color = "#ef4444";
      result.innerText = "✖ INVALID CERTIFICATE";
    }
  } catch (err) {
    result.style.color = "#f59e0b";
    result.innerText = "⚠ Verification error";
  }
}

// BASE64
function toBase64(url) {
  return fetch(url)
    .then(res => res.blob())
    .then(blob => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    }));
}

</script>

</body>
</html>
