<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Official Website Certificate System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
html, body {
  height: 100vh;
  margin: 0;
  overflow: hidden; /* 🚫 NO SCROLL */
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  display: flex;
  flex-direction: column;
}

/* HEADER */
header {
  background: #111827;
  padding: 15px;
  text-align: center;
  border-bottom: 1px solid #1f2937;
  flex-shrink: 0;
}

/* MAIN CONTAINER */
.container {
  flex: 1;
  max-width: 900px;
  margin: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-evenly;
}

/* CARDS */
.card {
  background: #111827;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: 1px solid #1f2937;
}

/* BUTTON */
.button {
  padding: 10px 16px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* BADGES */
.badge {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  margin: 3px;
  display: inline-block;
  color: white;
}

/* INPUT */
input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 60%;
}

/* QR hidden */
#qrcode {
  position: absolute;
  left: -9999px;
}

/* SEAL */
.seal {
  width: 70px;
  height: 70px;
  margin: auto;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(59,130,246,0.6);
}

.seal img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<header>
  <h2>Website Certificate Authority</h2>
  <p style="margin:5px 0;">Official Digital Verification System</p>
</header>

<div class="container">

  <!-- TRUST SEAL -->
  <div class="card" style="text-align:center;">
    <h3>Trust Seal</h3>

    <div class="seal">
      <img src="https://anywherecum.pages.dev/images/certificate.png" />
    </div>

    <div style="margin-top:8px;">
      <span class="badge" style="background:#10b981;">VERIFIED</span>
      <span class="badge" style="background:#3b82f6;">SECURE</span>
      <span class="badge" style="background:#f59e0b;">AUTHENTIC</span>
    </div>
  </div>

  <!-- ACTION -->
  <div class="card" style="text-align:center;">
    <h3>Certificate Actions</h3>
    <button class="button" onclick="downloadPDF()">Generate Certificate</button>
  </div>

  <!-- VERIFY -->
  <div class="card" style="text-align:center;">
    <h3>Verify Certificate</h3>
    <input id="certInput" placeholder="Enter Certificate ID"/>
    <button class="button" onclick="verifyCertID()">Verify</button>
    <p id="verifyResult"></p>
  </div>

</div>

<div id="qrcode"></div>

<script>

const WORKER_URL = "https://certificate.workfromanywhere-sa.workers.dev";

// ===== CERT ID =====
function getCertID() {
  let certId = localStorage.getItem("cert_id");

  if (!certId) {
    certId = "ANC-" + Date.now() + "-" + Math.floor(Math.random() * 9999);
    localStorage.setItem("cert_id", certId);
  }

  return certId;
}

// ===== SAVE =====
async function saveCertID(id) {
  try {
    await fetch(`${WORKER_URL}/certificates`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id })
    });
  } catch (err) {
    console.error(err);
  }
}

// ===== IMAGE TO BASE64 =====
function toBase64(url) {
  return fetch(url)
    .then(res => res.blob())
    .then(blob => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    }));
}

// ===== PDF =====
async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const certId = getCertID();
  await saveCertID(certId);

  const verifyUrl = `${window.location.origin}${window.location.pathname}?cert=${certId}`;

  const imgData = await toBase64("https://anywherecum.pages.dev/images/certificate.png");

  const qrDiv = document.getElementById("qrcode");
  qrDiv.innerHTML = "";

  new QRCode(qrDiv, {
    text: verifyUrl,
    width: 120,
    height: 120
  });

  await new Promise(r => setTimeout(r, 300));

  const qrCanvas = qrDiv.querySelector("canvas");
  const qrData = qrCanvas.toDataURL("image/png");

  doc.rect(10, 10, 190, 277);

  doc.setFont("helvetica", "bold");
  doc.setFontSize(18);
  doc.text("OFFICIAL WEBSITE CERTIFICATE", 105, 30, { align: "center" });

  doc.setFontSize(11);
  doc.setFont("helvetica", "normal");
  doc.text("Digital Verification Document", 105, 38, { align: "center" });

  doc.addImage(imgData, "PNG", 85, 45, 40, 40);

  doc.text("Name: AnywhereCum", 20, 110);
  doc.text("Domain: https://anywherecum.pages.dev/", 20, 120);
  doc.text("Certificate ID: " + certId, 20, 130);
  doc.text("Status: VERIFIED", 20, 140);

  doc.text("Scan QR:", 150, 210);
  doc.addImage(qrData, "PNG", 145, 215, 50, 50);

  doc.save("certificate.pdf");
}

// ===== VERIFY =====
async function verifyCertID() {
  const input = document.getElementById("certInput").value;
  const result = document.getElementById("verifyResult");

  if (!input) return;

  try {
    const res = await fetch(`${WORKER_URL}/verify?id=${input}`);
    const data = await res.json();

    if (data.exists) {
      result.style.color = "#10b981";
      result.innerText = "✔ VALID CERTIFICATE";
    } else {
      result.style.color = "#ef4444";
      result.innerText = "✖ INVALID CERTIFICATE";
    }

  } catch (err) {
    result.style.color = "#f59e0b";
    result.innerText = "⚠ Verification error";
  }
}

</script>

</body>
</html>
