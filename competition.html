<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VIP Giveaway</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  max-width: 400px;
  width: 90%;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  border-radius: 15px;
}

.timer {
  font-size: 22px;
  font-weight: bold;
  color: #00ffcc;
  margin: 10px 0;
}

.live {
  font-size: 13px;
  color: #ffcc00;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 15px 25px;
  background: #00c6ff;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

#msg {
  margin-top: 10px;
  font-size: 14px;
}

#winnerBox {
  display: none;
  margin-top: 15px;
  padding: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🚀 VIP Giveaway</h1>

  <div class="timer" id="countdown">Syncing...</div>
  <div class="live" id="entries">👥 Entries: 0</div>

  <p>We’re selecting <b>1 random winner</b> 🎉</p>

  <input type="text" id="fullName" placeholder="Enter your full name">
  <input type="email" id="email" placeholder="Enter your email">

  <button class="btn" onclick="submitEntry()">👉 Enter Now</button>

  <div id="msg"></div>

  <div id="winnerBox">
    🏆 Winner: <b id="winnerName">Loading...</b><br/>
    📧 Email: <b id="winnerEmail"></b>
  </div>
</div>

<script>
const API = "https://competition.workfromanywhere-sa.workers.dev";

const countdownEl = document.getElementById("countdown");
let endTime = null;

/* ================= CACHE ================= */
let lastEntryCount = null;

/* ================= STATUS ================= */
async function loadStatus() {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    if (data?.end_time) {
      endTime = Number(data.end_time);
      localStorage.setItem("end_time", endTime);
    }
  } catch (err) {
    const saved = localStorage.getItem("end_time");
    if (saved) endTime = Number(saved);
  }
}

/* ================= TIMER ================= */
function updateTimer() {
  if (!endTime) {
    countdownEl.innerHTML = "⏳ Syncing...";
    return;
  }

  const now = Date.now();
  const timeLeft = endTime - now;

  if (timeLeft <= 0) {
    countdownEl.innerHTML = "⏳ Giveaway Ended";
    document.getElementById("winnerBox").style.display = "block";
    loadWinner();
    return;
  }

  const h = Math.floor(timeLeft / 3600000);
  const m = Math.floor((timeLeft % 3600000) / 60000);
  const s = Math.floor((timeLeft % 60000) / 1000);

  countdownEl.innerHTML =
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');
}

/* ================= ENTRIES (FIXED NO BLINK) ================= */
function loadEntries() {
  fetch(API + "/entries")
    .then(async r => {
      const text = await r.text();

      try {
        const data = JSON.parse(text);
        const count = Array.isArray(data) ? data.length : 0;

        // ✅ ONLY update if changed
        if (count !== lastEntryCount) {
          document.getElementById("entries").innerText =
            "👥 Entries: " + count;

          lastEntryCount = count;
        }

      } catch {
        console.log("Entries parse error:", text);
      }
    })
    .catch(err => {
      console.log("Entries fetch error:", err);

      if (lastEntryCount !== 0) {
        document.getElementById("entries").innerText = "👥 Entries: 0";
        lastEntryCount = 0;
      }
    });
}

/* ================= WINNER ================= */
function loadWinner() {
  fetch(API + "/winner")
    .then(r => r.json())
    .then(data => {
      if (data?.winner?.name) {
        document.getElementById("winnerName").innerText =
          data.winner.name + " 🎉";

        document.getElementById("winnerEmail").innerText =
          maskEmail(data.winner.email);
      } else {
        document.getElementById("winnerName").innerText = "No winner yet";
      }
    })
    .catch(err => console.log(err));
}

/* ================= MASK EMAIL ================= */
function maskEmail(email) {
  if (!email?.includes("@")) return email;
  const [n, d] = email.split("@");
  return n.slice(0,2) + "***@" + d;
}

/* ================= SUBMIT ================= */
async function submitEntry() {
  const name = document.getElementById("fullName").value.trim();
  const email = document.getElementById("email").value.trim();
  const msg = document.getElementById("msg");

  if (!name || name.length < 3) return msg.innerText = "⚠️ Invalid name";
  if (!email || !email.includes("@")) return msg.innerText = "⚠️ Invalid email";

  msg.innerText = "⏳ Submitting...";

  try {
    const res = await fetch(API + "/enter", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email })
    });

    const data = await res.json();

    if (res.ok) {
      msg.innerText = "✅ Entry submitted!";
      loadEntries();
    } else {
      msg.innerText = "❌ " + (data.error || "Failed");
    }

  } catch (err) {
    msg.innerText = "❌ " + err.message;
  }
}

/* ================= INIT ================= */
async function init() {
  await loadStatus();

  setInterval(loadStatus, 5000);
  setInterval(updateTimer, 1000);
  setInterval(loadEntries, 5000);

  updateTimer();
  loadEntries();
}

init();
</script>

</body>
</html>
