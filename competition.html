<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VIP Giveaway</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
  }

  .container {
    max-width: 400px;
    padding: 20px;
    background: rgba(0,0,0,0.6);
    border-radius: 15px;
  }

  .timer {
    font-size: 22px;
    font-weight: bold;
    color: #00ffcc;
    margin: 10px 0;
  }

  .live {
    font-size: 13px;
    color: #ffcc00;
  }

  .btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 25px;
    background: #00c6ff;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
  }

  #winnerBox {
    display: none;
    margin-top: 15px;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
  }
</style>
</head>

<body>

<div class="container">
  <h1>🚀 VIP Giveaway</h1>

  <div class="timer" id="countdown">Connecting...</div>

  <div class="live" id="entries">👥 Entries: 0</div>

  <p>We’re selecting <b>1 random winner</b> 🎉</p>

  <a href="support.html" class="btn">👉 Enter Now</a>

  <div id="winnerBox">
    🏆 Winner: <b id="winnerName">Waiting...</b>
  </div>
</div>

<script>
const API = "https://competition.workfromanywhere-sa.workers.dev";

const countdownEl = document.getElementById("countdown");

let winnerLoaded = false;

/* ================= LIVE STREAM (REAL SYNC) ================= */
function startStream() {
  const es = new EventSource(API + "/stream");

  es.onmessage = (event) => {
    const data = JSON.parse(event.data);

    /* TIMER */
    updateTimer(data.time_left);

    /* ENTRIES */
    document.getElementById("entries").innerText =
      "👥 Entries: " + (data.entries || 0);

    /* WINNER */
    if (data.winner && !winnerLoaded) {
      winnerLoaded = true;

      document.getElementById("winnerBox").style.display = "block";
      document.getElementById("winnerName").innerText =
        data.winner.name + " 🎉";
    }
  };

  es.onerror = () => {
    countdownEl.innerText = "Reconnecting...";
  };
}

/* ================= TIMER ================= */
function updateTimer(timeLeft) {
  if (!timeLeft || timeLeft <= 0) {
    countdownEl.innerText = "⏳ Giveaway Ended";
    return;
  }

  const h = Math.floor(timeLeft / 3600000);
  const m = Math.floor((timeLeft % 3600000) / 60000);
  const s = Math.floor((timeLeft % 60000) / 1000);

  countdownEl.innerText =
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');
}

/* ================= START ================= */
startStream();
</script>

</body>
</html>
