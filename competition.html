<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VIP Giveaway</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
  }

  .container {
    max-width: 400px;
    padding: 20px;
    background: rgba(0,0,0,0.6);
    border-radius: 15px;
  }

  .timer {
    font-size: 22px;
    font-weight: bold;
    color: #00ffcc;
    margin: 10px 0;
  }

  .live {
    font-size: 13px;
    color: #ffcc00;
  }

  .btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 25px;
    background: #00c6ff;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
  }

  #winnerBox {
    display: none;
    margin-top: 15px;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
  }
</style>
</head>

<body>

<div class="container">
  <h1>🚀 VIP Giveaway</h1>

  <div class="timer" id="countdown">00:00:00</div>

  <div class="live" id="entries">👥 Entries: 0</div>

  <p>We’re selecting <b>1 random winner</b> 🎉</p>

  <a href="support.html" class="btn">👉 Enter Now</a>

  <div id="winnerBox">
    🏆 Winner: <b id="winnerName">Loading...</b>
  </div>
</div>

<script>
const API = "https://competition.workfromanywhere-sa.workers.dev";

const countdownEl = document.getElementById("countdown");

let endTime = Date.now() + 24 * 60 * 60 * 1000; // fallback instantly

/* ================= STATUS ================= */
async function loadStatus() {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    endTime = data.end_time;
  } catch (e) {
    console.log("Status fallback mode");
  }
}

/* ================= TIMER ================= */
function updateTimer() {
  const now = Date.now();
  const timeLeft = endTime - now;

  if (timeLeft <= 0) {
    countdownEl.innerHTML = "⏳ Giveaway Ended";
    document.getElementById("winnerBox").style.display = "block";
    loadWinner();
    return;
  }

  const h = Math.floor(timeLeft / 3600000);
  const m = Math.floor((timeLeft % 3600000) / 60000);
  const s = Math.floor((timeLeft % 60000) / 1000);

  countdownEl.innerHTML =
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');
}

setInterval(updateTimer, 1000);
loadStatus();

/* ================= ENTRIES ================= */
function loadEntries() {
  fetch(API + "/entries")
    .then(r => r.json())
    .then(data => {
      document.getElementById("entries").innerText =
        "👥 Entries: " + data.length;
    })
    .catch(() => {
      document.getElementById("entries").innerText =
        "👥 Entries: 0";
    });
}

loadEntries();
setInterval(loadEntries, 5000);

/* ================= WINNER ================= */
function loadWinner() {
  fetch(API + "/winner")
    .then(r => r.json())
    .then(data => {
      if (data.winner) {
        document.getElementById("winnerName").innerText =
          data.winner.name + " 🎉";
      } else {
        document.getElementById("winnerName").innerText =
          "No winner yet";
      }
    });
}
</script>

</body>
</html>
