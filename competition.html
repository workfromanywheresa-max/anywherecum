<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VIP Giveaway</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  max-width: 400px;
  width: 90%;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  border-radius: 15px;
}

.timer {
  font-size: 22px;
  font-weight: bold;
  color: #00ffcc;
  margin: 10px 0;
}

.live {
  font-size: 13px;
  color: #ffcc00;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
}

.btn {
  margin-top: 15px;
  padding: 15px 25px;
  background: #00c6ff;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

#msg {
  margin-top: 10px;
  font-size: 14px;
}

/* FIXED WINNER BOX (NO FLICKER) */
#winnerBox {
  margin-top: 15px;
  padding: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;

  min-height: 70px;

  visibility: hidden; /* prevents blank flash */
}
</style>
</head>

<body>

<div class="container">
  <h1>💎 VIP Exclusive Giveaway</h1>

  <div class="timer" id="countdown">00:00:00</div>

  <div class="live">👥 Entries: <span id="entryCount">0</span></div>

  <p>We’re selecting <b>1 random winner</b> 🎉</p>

  <!-- ENTRY FORM -->
  <div id="entryForm">
    <input type="text" id="fullName" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">

    <button class="btn" onclick="submitEntry()">👉 Enter Now</button>
  </div>

  <div id="msg"></div>

  <!-- WINNER -->
  <div id="winnerBox">
    🏆 Winner: <b id="winnerName"></b><br/>
    📧 Email: <b id="winnerEmail"></b>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const API = "https://competition.workfromanywhere-sa.workers.dev";

/* FIREBASE */
const firebaseConfig = {
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let cachedCount = null;
let endTime = null;

/* CACHE ENTRY COUNT */
const savedCount = localStorage.getItem("entryCount");
if (savedCount !== null) {
  cachedCount = Number(savedCount);
  document.getElementById("entryCount").textContent = cachedCount;
}

/* CACHE TIMER */
const savedTime = localStorage.getItem("end_time");
if (savedTime !== null) {
  endTime = Number(savedTime);
  updateTimer();
}

/* LOAD STATUS */
async function loadStatus() {
  try {
    const res = await fetch(API + "/status");
    const data = await res.json();

    if (data?.end_time) {
      endTime = Number(data.end_time);
      localStorage.setItem("end_time", endTime);
      updateTimer();
    }

  } catch {
    console.log("cached status");
  }
}

/* TIMER */
function updateTimer() {
  if (!endTime) return;

  const now = Date.now();
  const diff = endTime - now;

  const el = document.getElementById("countdown");

  if (diff <= 0) {
    el.innerText = "⏳ Giveaway Ended";

    document.getElementById("entryForm").style.display = "none";

    loadWinner();
    return;
  }

  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  el.innerText =
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');
}

/* ENTRIES */
function startRealtimeEntries() {
  const entriesRef = ref(db, "entries");

  onValue(entriesRef, (snapshot) => {
    const data = snapshot.val();
    const count = data ? Object.keys(data).length : 0;

    if (count === cachedCount) return;

    cachedCount = count;
    document.getElementById("entryCount").textContent = count;

    localStorage.setItem("entryCount", count);
  });
}

/* WINNER FIX (NO FLICKER) */
async function loadWinner() {
  try {
    const res = await fetch(API + "/winner");
    const data = await res.json();

    if (data?.winner?.name) {
      const winner = data.winner;

      document.getElementById("winnerName").innerText =
        winner.name + " 🎉";

      document.getElementById("winnerEmail").innerText =
        maskEmail(winner.email);

      // SHOW ONLY WHEN READY (prevents blank flash)
      document.getElementById("winnerBox").style.visibility = "visible";
    }

  } catch (err) {
    console.log(err);
  }
}

/* MASK EMAIL */
function maskEmail(email) {
  if (!email?.includes("@")) return email;
  const [n, d] = email.split("@");
  return n.slice(0,2) + "***@" + d;
}

/* SUBMIT */
async function submitEntry() {
  const name = document.getElementById("fullName").value.trim();
  const email = document.getElementById("email").value.trim();
  const msg = document.getElementById("msg");

  if (!name || name.length < 3) return msg.innerText = "⚠️ Invalid name";
  if (!email || !email.includes("@")) return msg.innerText = "⚠️ Invalid email";

  msg.innerText = "⏳ Submitting...";

  try {
    const res = await fetch(API + "/enter", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email })
    });

    const data = await res.json();

    msg.innerText = res.ok
      ? "✅ Entry submitted!"
      : "❌ " + (data.error || "Failed");

  } catch (err) {
    msg.innerText = "❌ " + err.message;
  }
}

window.submitEntry = submitEntry;

/* INIT */
async function init() {
  await loadStatus();
  startRealtimeEntries();
  setInterval(updateTimer, 1000);
  updateTimer();
}

init();
</script>

</body>
</html>
