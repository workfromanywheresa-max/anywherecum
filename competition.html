<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VIP Giveaway</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container {
  max-width:400px;
  padding:20px;
  background:rgba(0,0,0,0.6);
  border-radius:15px;
  text-align:center;
}
.timer {
  font-size:22px;
  font-weight:bold;
  color:#00ffcc;
}
.live {
  font-size:13px;
  color:#ffcc00;
}
.btn {
  display:inline-block;
  margin-top:20px;
  padding:15px 25px;
  background:#00c6ff;
  color:white;
  border-radius:10px;
  text-decoration:none;
}
#winnerBox {
  display:none;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🚀 VIP Giveaway</h1>

  <div class="timer" id="countdown">Loading...</div>
  <div class="live" id="entries">👥 Entries: 0</div>

  <a href="support.html" class="btn">👉 Enter Now</a>

  <div id="winnerBox">
    🏆 Winner: <b id="winnerName"></b>
  </div>
</div>

<script>
const API = "https://competition.workfromanywhere-sa.workers.dev";

let endTime = null;
const countdownEl = document.getElementById("countdown");

/* ================= LOAD STATUS ================= */
async function loadStatus() {
  try {
    const res = await fetch(API + "/status");

    if (!res.ok) throw new Error();

    const data = await res.json();

    console.log("SESSION:", data.session_id);

    const serverEnd = Number(data.end_time);

    // Only update if valid
    if (!isNaN(serverEnd) && serverEnd > Date.now()) {
      endTime = serverEnd;
      localStorage.setItem("end_time", endTime);
    }

  } catch (e) {
    console.log("Using cached timer");

    const saved = localStorage.getItem("end_time");
    if (saved) {
      endTime = Number(saved);
    }
  }
}

/* ================= TIMER ================= */
function updateTimer() {
  if (endTime === null || isNaN(endTime)) {
    countdownEl.innerHTML = "Connecting...";
    return;
  }

  const now = Date.now();
  const diff = endTime - now;

  if (diff <= 0) {
    countdownEl.innerHTML = "⏳ Ended";
    document.getElementById("winnerBox").style.display = "block";
    loadWinner();
    return;
  }

  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  countdownEl.innerHTML =
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');
}

setInterval(updateTimer, 1000);
loadStatus();

/* ================= ENTRIES ================= */
function loadEntries() {
  fetch(API + "/entries")
    .then(r => r.json())
    .then(data => {
      document.getElementById("entries").innerText =
        "👥 Entries: " + (Array.isArray(data) ? data.length : 0);
    });
}

setInterval(loadEntries, 5000);
loadEntries();

/* ================= WINNER ================= */
function loadWinner() {
  fetch(API + "/winner")
    .then(r => r.json())
    .then(data => {
      if (data && data.winner) {
        document.getElementById("winnerName").innerText =
          data.winner.name + " 🎉";
      } else {
        document.getElementById("winnerName").innerText =
          "No winner";
      }
    });
}
</script>

</body>
</html>
