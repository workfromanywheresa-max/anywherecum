<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Giveaway</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
  }

  .container {
    max-width: 400px;
    padding: 20px;
    background: rgba(0,0,0,0.6);
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  .timer {
    font-size: 22px;
    font-weight: bold;
    margin: 10px 0;
    color: #00ffcc;
  }

  .live {
    margin-top: 10px;
    font-size: 13px;
    color: #ffcc00;
  }

  .btn {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 16px;
    color: white;
    background: #00c6ff;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
  }

  #winnerBox {
    display: none;
    margin-top: 15px;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
  }
</style>
</head>

<body>

<div class="container">
  <h1>🚀 VIP Giveaway</h1>

  <!-- TIMER (SERVER CONTROLLED) -->
  <div class="timer" id="countdown">Loading...</div>

  <!-- LIVE ENTRIES -->
  <div class="live" id="entries">👥 Entries: Loading...</div>

  <p>
    We’re selecting <b>1 random winner</b> 🎉
  </p>

  <a href="support.html" class="btn">👉 Enter Now</a>

  <!-- WINNER -->
  <div id="winnerBox">
    🏆 Winner: <b id="winnerName">Loading...</b>
  </div>
</div>

<script>
const countdownEl = document.getElementById("countdown");

let endTime = null;

/* ================= SERVER TIMER ================= */
async function loadStatus() {
  try {
    const res = await fetch("https://competition.workfromanywhere-sa.workers.dev/status");
    const data = await res.json();

    endTime = data.end_time;
    updateTimer();

  } catch (e) {
    countdownEl.innerHTML = "Error loading timer";
  }
}

function updateTimer() {
  if (!endTime) return;

  const now = Date.now();
  const timeLeft = endTime - now;

  if (timeLeft <= 0) {
    countdownEl.innerHTML = "⏳ Giveaway Ended";
    document.getElementById("winnerBox").style.display = "block";
    loadWinner();
    return;
  }

  let h = Math.floor(timeLeft / (1000 * 60 * 60));
  let m = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
  let s = Math.floor((timeLeft % (1000 * 60)) / 1000);

  countdownEl.innerHTML =
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');
}

setInterval(updateTimer, 1000);
loadStatus();

/* ================= LIVE ENTRIES ================= */
function loadEntries() {
  fetch("https://competition.workfromanywhere-sa.workers.dev/entries")
    .then(res => res.json())
    .then(data => {
      document.getElementById("entries").innerText =
        "👥 Entries: " + data.length;
    })
    .catch(() => {
      document.getElementById("entries").innerText =
        "👥 Entries: 0";
    });
}

loadEntries();
setInterval(loadEntries, 5000);

/* ================= WINNER ================= */
function loadWinner() {
  fetch("https://competition.workfromanywhere-sa.workers.dev/winner")
    .then(res => res.json())
    .then(data => {
      if (data.winner) {
        document.getElementById("winnerName").innerText =
          data.winner.name + " 🎉";
      } else {
        document.getElementById("winnerName").innerText =
          "No entries yet";
      }
    });
}
</script>

</body>
</html>
