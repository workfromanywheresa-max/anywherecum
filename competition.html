<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VIP Giveaway</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  max-width: 400px;
  width: 90%;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  border-radius: 15px;
}

.timer {
  font-size: 22px;
  font-weight: bold;
  color: #00ffcc;
  margin: 10px 0;
}

.live {
  font-size: 13px;
  color: #ffcc00;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
}

.btn {
  margin-top: 15px;
  padding: 15px 25px;
  background: #00c6ff;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

#msg {
  margin-top: 10px;
  font-size: 14px;
}

#winnerBox {
  margin-top: 15px;
  padding: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  min-height: 70px;
  visibility: hidden;
}
</style>
</head>

<body>

<div class="container">
  <h1>🚀 VIP Giveaway</h1>

  <div class="timer" id="countdown">00:00:00</div>

  <div class="live">👥 Entries: <span id="entryCount">0</span></div>

  <p>We’re selecting <b>1 random winner</b> 🎉</p>

  <div id="entryForm">
    <input type="text" id="fullName" placeholder="Enter your full name">
    <input type="email" id="email" placeholder="Enter your email">

    <button class="btn" onclick="submitEntry()">👉 Enter Now</button>
  </div>

  <div id="msg"></div>

  <!-- WINNER -->
  <div id="winnerBox">
    🏆 Winner: <b id="winnerName"></b><br/>
    📧 Email: <b id="winnerEmail"></b>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const API = "https://competition.workfromanywhere-sa.workers.dev";

const firebaseConfig = {
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let cachedCount = null;
let endTime = null;

/* EMAIL MASK */
function maskEmail(email) {
  if (!email?.includes("@")) return email;
  const [n, d] = email.split("@");
  return n.slice(0,2) + "***@" + d;
}

/* LOAD CACHED WINNER (FIXED) */
const cachedWinner = localStorage.getItem("winner_data");
if (cachedWinner) {
  const w = JSON.parse(cachedWinner);

  document.getElementById("winnerName").innerText = w.name + " 🎉";
  document.getElementById("winnerEmail").innerText = w.email; // already masked
  document.getElementById("winnerBox").style.visibility = "visible";
}

/* WINNER LOAD */
async function loadWinner() {
  try {

    const cached = localStorage.getItem("winner_data");
    if (cached) {
      const w = JSON.parse(cached);
      showWinner(w);
      return;
    }

    const res = await fetch(API + "/winner");
    const data = await res.json();

    if (data?.winner?.name) {
      const winner = {
        name: data.winner.name,
        email: maskEmail(data.winner.email) // 🔥 STORE MASKED ONLY
      };

      localStorage.setItem("winner_data", JSON.stringify(winner));
      showWinner(winner);
    }

  } catch (err) {
    console.log(err);
  }
}

/* SHOW WINNER */
function showWinner(winner) {
  document.getElementById("winnerName").innerText = winner.name + " 🎉";
  document.getElementById("winnerEmail").innerText = winner.email;

  document.getElementById("winnerBox").style.visibility = "visible";
}

window.submitEntry = async function submitEntry() {
  const name = document.getElementById("fullName").value.trim();
  const email = document.getElementById("email").value.trim();
  const msg = document.getElementById("msg");

  if (!name || name.length < 3) return msg.innerText = "⚠️ Invalid name";
  if (!email || !email.includes("@")) return msg.innerText = "⚠️ Invalid email";

  msg.innerText = "⏳ Submitting...";

  try {
    const res = await fetch(API + "/enter", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email })
    });

    const data = await res.json();

    msg.innerText = res.ok
      ? "✅ Entry submitted!"
      : "❌ " + (data.error || "Failed");

  } catch (err) {
    msg.innerText = "❌ " + err.message;
  }
};
</script>

</body>
</html>
