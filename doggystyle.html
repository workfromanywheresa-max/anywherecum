<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doggystyle Videos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      margin: 0;
      padding: 15px;
    }

    h2 {
      color: #ff4444;
      border-bottom: 2px solid #ff4444;
      padding-bottom: 5px;
      text-align: center;
    }

    .description {
      text-align: center;
      color: #fff;
      margin-bottom: 20px;
    }

    .videoBox {
      background: #222;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .preview {
      position: relative;
      width: 100%;
      height: 220px;
      background: #000;
      border-radius: 5px;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 5px;
      transition: transform 0.3s ease;
    }

    .preview img:hover {
      transform: scale(1.05);
    }

    .download {
      display: block;
      width: fit-content;
      margin: 10px auto 0 auto;
      padding: 8px 15px;
      color: #fff;
      background: #ff4444;
      font-weight: bold;
      text-decoration: none;
      border-radius: 5px;
      text-align: center;
    }

    .download:hover {
      background: #ff2222;
    }

    /* Lightbox overlay */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .lightbox.active {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox iframe {
      width: 90%;
      height: 80%;
      border: none;
      border-radius: 8px;
    }

    .lightbox .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Doggystyle Videos</h2>
  <p class="description">
    All the newest Doggystyle videos in one place – updated often, ready for you to watch.
  </p>
  <div id="videoList"></div>

  <!-- Lightbox overlay -->
  <div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <iframe src="" allowfullscreen></iframe>
  </div>

  <script>
    const lightbox = document.getElementById("lightbox");
    const lightboxIframe = lightbox.querySelector("iframe");
    const closeBtn = lightbox.querySelector(".close");

    // Close lightbox
    closeBtn.addEventListener("click", () => {
      lightbox.classList.remove("active");
      lightboxIframe.src = "";
    });

    // Close if clicking outside the iframe
    lightbox.addEventListener("click", e => {
      if(e.target === lightbox) {
        lightbox.classList.remove("active");
        lightboxIframe.src = "";
      }
    });

    fetch('doggystyle.json')
      .then(response => response.json())
      .then(doggystyleData => {
        const container = document.getElementById("videoList");

        doggystyleData.sort((a,b) => new Date(b.date) - new Date(a.date));

        doggystyleData.forEach(v => {
          const box = document.createElement("div");
          box.className = "videoBox";

          const preview = document.createElement("div");
          preview.className = "preview";

          const img = document.createElement("img");
          img.src = v.thumbnail;
          img.alt = v.title;

          // Open video in lightbox
          img.addEventListener("click", () => {
            lightbox.classList.add("active");
            lightboxIframe.src = v.url;  // open video in iframe
          });

          preview.appendChild(img);
          box.appendChild(preview);

          const button = document.createElement("a");
          button.className = "download";
          button.href = v.url;
          button.target = "_blank";
          button.textContent = `Download (${v.size})`;

          box.appendChild(button);
          container.appendChild(box);
        });
      })
      .catch(err => {
        console.error("Failed to load Doggystyle data:", err);
        document.getElementById("videoList").innerHTML =
          '<p style="text-align:center;color:#ff4444;">Failed to load Doggystyle videos.</p>';
      });
  </script>
</body>
</html>
