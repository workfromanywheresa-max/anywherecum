<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doggystyle Videos</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #1a1a1a;
        color: #fff;
        margin: 0;
        padding: 15px;
      }

      h2 {
        color: #ff4444;
        border-bottom: 2px solid #ff4444;
        padding-bottom: 5px;
        text-align: center;
      }

      .description {
        text-align: center;
        color: #fff;
        margin-bottom: 20px;
      }

      .videoBox {
        background: #222;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      .preview {
        position: relative;
        width: 100%;
        height: 220px;
        background: #000;
        border-radius: 5px;
        overflow: hidden;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 5px;
        transition: transform 0.3s ease;
      }

      .preview img:hover {
        transform: scale(1.05);
      }

      .download {
        display: block;
        width: fit-content;
        margin: 10px auto 0 auto;
        padding: 8px 15px;
        color: #fff;
        background: #ff4444;
        font-weight: bold;
        text-decoration: none;
        border-radius: 5px;
        text-align: center;
      }

      .download:hover {
        background: #ff2222;
      }
    </style>
  </head>
  <body>
    <h2>Doggystyle Folder</h2>
    <p class="description">
      Enjoy our latest Doggystyle videos, updated regularly for your viewing pleasure.
    </p>
    <div id="videoList"></div>

    <script>
      fetch('doggystyle.json')
        .then(response => response.json())
        .then(videos => {
          const container = document.getElementById("videoList");

          // Sort by date descending
          videos.sort((a, b) => new Date(b.date) - new Date(a.date));

          videos.forEach(v => {
            const box = document.createElement("div");
            box.className = "videoBox";

            // Thumbnail preview
            const preview = document.createElement("div");
            preview.className = "preview";

            const img = document.createElement("img");
            img.src = v.thumbnail;
            img.alt = v.title;
            img.addEventListener("click", () => {
              window.open(v.url, "_blank");
            });

            preview.appendChild(img);
            box.appendChild(preview);

            // Download button
            const button = document.createElement("a");
            button.className = "download";
            button.href = v.url;
            button.target = "_blank";
            button.textContent = `Download (${v.size})`;

            box.appendChild(button);
            container.appendChild(box);
          });
        })
        .catch(err => {
          console.error("Failed to load Doggystyle videos:", err);
          document.getElementById("videoList").innerHTML =
            '<p style="text-align:center;color:#ff4444;">Failed to load videos.</p>';
        });
    </script>
  </body>
</html>
