  text-align: center;
  padding: 40px 20px;

  color: #fff;

.box {

h2 {

.payfast-card {

.logo,

input {
  width: 80%;

  font-size: 16px;
  border-radius: 5px;
  border: 1px solid #444;
  text-align: center;
  background: #111;
  color: #fff;
  box-sizing: border-box; /* ✅ prevents overflow */
}

input::placeholder {
  color: #777;
}

#usdDisplay {
  margin-top: 10px;
  font-weight: bold;
  color: #fff;
}

.donate-btn {
  margin-top: 15px;
  width: 100%;
  font-size: 18px;
  background: #555;
  color: white;
  cursor: not-allowed;
  padding: 12px;
  border: none;
  border-radius: 5px;
}

.donate-btn.active {
  background: #000;
  cursor: pointer;
}

.donate-btn:hover.active {
  background: #333;
}

.paypal-btn {
  margin-top: 15px;
  width: 100%;
  font-size: 18px;
  background: #0070ba;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.paypal-btn:hover {

}

.crypto-btn {
  margin-top: 15px;
  width: 100%;
  font-size: 18px;
  background: #111;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.crypto-btn:hover {
  background: #333;
}

.zar-wrapper {
  position: relative;
  width: 80%;
  margin: 15px auto 0;
}

.zar-prefix {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #fff;
  font-size: 16px;
  opacity: 0.8;
  pointer-events: none;
}

.zar-wrapper input {
  width: 100%;
  padding-left: 28px; /* ✅ space for R */
}

/* BACK BUTTON */
.back-btn {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 9999;
  background: #111;
  color: #fff;
  border: 1px solid #333;
  padding: 6px 10px;
  cursor: pointer;
}

  font-size: 12px;

  background: #111;
  margin-top: 10px;

  width: 100%; /* ✅ no overflow */

<script>
let zarToUsdRate = 0;

const donateBtn = document.getElementById("donateBtn");
const customInput = document.getElementById("customAmount");
const usdDisplay = document.getElementById("usdDisplay");

const API_URL = "https://donation.workfromanywhere-sa.workers.dev/rate";

async function fetchRate() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const usdToZar = data.usdToZar;
    zarToUsdRate = 1 / usdToZar;

  } catch (err) {
    console.log("Error fetching rate:", err);
  }

  handleInput();
}

fetchRate();
setInterval(fetchRate, 30000);

customInput.addEventListener("input", handleInput);

function handleInput() {
  const value = parseFloat(customInput.value);

  if (!value || value <= 0) {
    donateBtn.disabled = true;
    donateBtn.classList.remove("active");
    usdDisplay.innerText = "≈ $0.00 USD (Est.)";
    return;
  }

  donateBtn.disabled = false;
  donateBtn.classList.add("active");

  if (zarToUsdRate > 0) {
    const usd = (value * zarToUsdRate).toFixed(2);
    usdDisplay.innerText = `≈ $${usd} USD (Est.)`;
  } else {
    usdDisplay.innerText = "Loading...";
  }
}

function goDonate() {
  const amount = parseFloat(customInput.value);

  if (!amount || amount <= 0) return;

  window.location.href =
    "https://donation.workfromanywhere-sa.workers.dev/?amount=" + amount;
}

function goPayPal() {
  window.location.href = "https://www.paypal.com/ncp/payment/G3ZG35LMYMM7L";
}

function goCrypto() {
  window.location.href = "crypto.html";
}
</script>
