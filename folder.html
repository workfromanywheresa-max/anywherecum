<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* GLOBAL FIX */
* {
  box-sizing: border-box;
}

/* BACK BUTTON CONTAINER */
.topBar {
  display: flex;
  justify-content: flex-start;
  margin-bottom: 10px;
}

/* BUTTON */
button {
  background: #ff4444;
  color: #fff;
  border: none;
  padding: 6px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  display: inline-block;
  width: auto;
}

/* TITLE */
h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

#folderDescription {
  text-align: center;
  color: #aaa;
  font-size: 14px;
}

/* VIDEO LIST CONTAINER */
#normalVideos {
  margin-bottom: 40px;
  min-height: 300px; /* prevents layout jump */
}

/* VIDEO CARD */
.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 30px;
  text-align: center;

  min-height: 250px; /* prevents flicker */
}

/* PLAYER */
.videoFrameWrapper {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  aspect-ratio: 16 / 9;
  border-radius: 8px;
  overflow: hidden;
  background: #000;

  contain: content;
}

.videoFrameWrapper iframe,
.videoFrameWrapper img {
  width: 100%;
  height: 100%;
  border: 0;
  object-fit: cover;
  display: block;
}

/* DROPDOWN */
select {
  padding: 5px;
  border-radius: 5px;
  border: none;
  background: #333;
  color: #fff;
  font-size: 12px;
  margin-bottom: 6px;
  min-width: 120px;
}

/* TEXT */
.videoTitle {
  margin: 6px 0;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
  min-height: 16px;
}

.views {
  color: #aaa;
  margin: 2px 0;
  font-size: 12px;
  min-height: 16px;
}

/* DOWNLOAD LINKS */
.videoBox a {
  text-decoration: none;
  font-size: 12px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
  margin-top: auto;
}

/* SMOOTH RENDERING */
body {
  backface-visibility: hidden;
  -webkit-font-smoothing: antialiased;
}
</style>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {

  await OneSignal.init({
    appId: "9f8d0573-08fa-4522-ab09-4a95fa2f442f"
  });

  async function handleSub() {
    const sub = OneSignal.User.PushSubscription;

    if (!sub) return;

    // ✅ FIX HERE
    const id = sub.token || sub.id;

    if (!id) {
      console.log("Waiting for subscription...", sub);
      return;
    }

    const optedIn = sub.optedIn;

    const lastState = localStorage.getItem("sub_" + id);
    if (lastState === String(optedIn)) return;

    localStorage.setItem("sub_" + id, optedIn);

    console.log("OneSignal Sub Update:", id, optedIn);

    if (window.saveSubscriber) {
      window.saveSubscriber(id, optedIn);
    }
  }

  // ✅ IMPORTANT: OneSignal loads late
  setTimeout(handleSub, 2000);
  setTimeout(handleSub, 5000);

  handleSub();

  OneSignal.User.PushSubscription.addEventListener("change", handleSub);

});
</script>
