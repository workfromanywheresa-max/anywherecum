<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum - Folder</title>
<style>
body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 15px; }
h2 { color: #ff4444; border-bottom: 2px solid #ff4444; padding-bottom: 5px; margin-top:20px; text-align:center; }
ul { list-style:none; padding:0; display:grid; grid-template-columns:repeat(2,1fr); gap:15px; }
li { background:#222; padding:10px; border-radius:8px; text-align:center; transition:0.3s; cursor:pointer; }
li:hover { background:#333; }
a.video-link { color:#ff4444; font-weight:bold; text-decoration:none; display:block; margin-top:5px; }
a.video-link:hover { color:#fff; text-decoration:underline; }
li img { width:100%; height:180px; border-radius:5px; object-fit:cover; }
footer { text-align:center; padding:20px; font-size:12px; color:#aaa; background:#111; margin-top:40px; }
@media(max-width:600px){ ul { grid-template-columns:1fr; } }
</style>
</head>
<body>

<h2 id="folderTitle">Loading Folder...</h2>
<ul id="videoList"></ul>

<footer>© 2026 AnywhereCum – Legal content only. 18+</footer>

<script>
const params = new URLSearchParams(window.location.search);
const folderName = params.get('folder');

if(folderName){
  fetch('videos.json')
    .then(res => res.json())
    .then(folders => {
      const folder = folders[folderName];
      const folderTitle = document.getElementById('folderTitle');
      const videoList = document.getElementById('videoList');

      if(folder && folder.length > 0){
        folderTitle.textContent = folderName;
        folder.sort((a,b)=> new Date(b.date)-new Date(a.date));

        folder.forEach(video => {
          const li = document.createElement('li');

          const img = document.createElement('img');
          img.src = video.thumbnail;
          img.alt = video.title;
          img.addEventListener('click', ()=> window.open(video.url,'_blank'));

          const link = document.createElement('a');
          link.className = "video-link";
          link.href = video.url;
          link.target = "_blank";
          link.textContent = `${video.title} (${video.size})`;

          li.appendChild(img);
          li.appendChild(link);
          videoList.appendChild(li);
        });
      } else {
        folderTitle.textContent = `No videos found in ${folderName}`;
      }
    })
    .catch(err => console.error(err));
} else {
  document.getElementById('folderTitle').textContent = "No folder selected";
}
</script>

</body>
</html>
