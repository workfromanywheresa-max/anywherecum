<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
  text-align: center;
}

.description {
  text-align: center;
  margin-bottom: 20px;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
}

.preview {
  width: 100%;
  height: 220px;
  background: #000;
  border-radius: 5px;
  overflow: hidden;
  cursor: pointer;
}

.preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.videoTitle {
  text-align: center;
  margin: 8px 0 5px 0;
  color: #ddd;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  text-align: center;
  color: #aaa;
  margin: 5px 0;
}

.download {
  display: block;
  width: fit-content;
  margin: 10px auto 0 auto;
  padding: 8px 15px;
  color: #fff;
  background: #ff4444;
  font-weight: bold;
  text-decoration: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<h2 id="folderTitle">Folder</h2>
<p class="description">Enjoy videos in this folder</p>

<div id="videoList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue, set } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("videoList");

// Folder
const urlParams = new URLSearchParams(window.location.search);
const folderName = (urlParams.get("folder") || "").toLowerCase();

document.getElementById("folderTitle").textContent =
  folderName.charAt(0).toUpperCase() + folderName.slice(1);

function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(".0","") + "M+";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(".0","") + "K+";
  return num;
}

async function increaseViews(videoId){
  const viewRef = ref(db,"views/"+videoId);
  runTransaction(viewRef,(v)=>(v||0)+1);
}

// 🔥 Global cycle reference
const cycleRef = ref(db, "cycle/startTime");

const videoStates = {};
let cycleStart = null;

// Ensure global cycle exists
onValue(cycleRef, snap => {
  if (!snap.exists()) {
    set(cycleRef, Date.now());
  } else {
    cycleStart = snap.val();
  }
});

// Reset function (global)
function resetCycleGlobal(){
  set(cycleRef, Date.now());
}

// Check if cycle expired (1 minute)
function isCycleExpired(){
  if (!cycleStart) return false;
  return Date.now() - cycleStart >= 60000;
}

// Build UI
fetch('videos.json')
.then(res=>res.json())
.then(videos=>{

  container.innerHTML = "";

  const IMAGE_BASE = "https://anywherecum.workfromanywhere-sa.workers.dev/images/";

  const folderVideos = videos.filter(v =>
    v.folder.toLowerCase() === folderName
  );

  if(folderVideos.length === 0){
    container.innerHTML = `<p style="text-align:center;color:#aaa;">No videos found.</p>`;
    return;
  }

  folderVideos.forEach((v,index)=>{

    const box = document.createElement("div");
    box.className = "videoBox";

    const preview = document.createElement("div");
    preview.className = "preview";

    const img = document.createElement("img");
    img.src = IMAGE_BASE + v.thumbnail;

    const title = document.createElement("h3");
    title.className = "videoTitle";
    title.textContent = v.title;

    const viewsEl = document.createElement("div");
    viewsEl.className = "views";

    const btn = document.createElement("a");
    btn.className = "download";
    btn.textContent = `Download (${v.size})`;

    const viewRef = ref(db,"views/"+v.id);

    let views = 0;

    function updateUI(){
      viewsEl.textContent = "👁Views: " + formatViews(views);
      viewsEl.style.color = "#aaa";
    }

    videoStates[v.id] = {
      element: box,
      originalIndex: index
    };

    onValue(viewRef,snap=>{
      views = snap.val() || 0;
      updateUI();
    });

    function openVideo(){
      increaseViews(v.id);
      window.open(v.url,"_blank");
    }

    img.onclick = openVideo;
    title.onclick = openVideo;
    btn.onclick = (e)=>{ e.preventDefault(); openVideo(); };

    preview.appendChild(img);
    box.appendChild(preview);
    box.appendChild(title);
    box.appendChild(viewsEl);
    box.appendChild(btn);

    container.appendChild(box);
  });

});

// 🔁 Global sync reset checker (runs for all users)
setInterval(() => {
  if (cycleStart && isCycleExpired()) {
    resetCycleGlobal();

    // Reset UI order locally to original
    const sorted = Object.values(videoStates)
      .sort((a,b)=>a.originalIndex - b.originalIndex);

    sorted.forEach(v => container.appendChild(v.element));
  }
}, 2000);

</script>

</body>
</html>
