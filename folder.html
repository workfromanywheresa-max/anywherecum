<style>
body { font-family:Arial,sans-serif; background:#1a1a1a; color:#fff; margin:0; padding:15px; }
h2 { color:#ff4444; border-bottom:2px solid #ff4444; padding-bottom:5px; text-align:center; }
.description { text-align:center; color:#fff; margin-bottom:20px; }

.videoBox { background:#222; padding:10px; border-radius:8px; margin-bottom:20px; }

.preview {
  width:100%;
  height:220px;
  cursor:pointer;
  overflow:hidden;
  border-radius:5px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.preview img {
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:5px;
  transition: opacity 0.3s ease, transform 0.3s ease;
  opacity:0;
}

.preview img.loaded {
  opacity:1;
}

.preview img:hover { transform:scale(1.05); }

.videoTitle {
  text-align: center;
  margin: 4px 0 4px 0;
  color: #ddd;
  font-size: 16px;
  font-weight: normal;
  cursor: pointer;
  text-decoration: underline;
  transition: color 0.2s ease;
}
.videoTitle:hover { color: #fff; }

.download {
  display:block;
  width:fit-content;
  margin:6px auto 0 auto;
  padding:8px 15px;
  color:#fff;
  background:#ff4444;
  font-weight:bold;
  text-decoration:none;
  border-radius:5px;
  text-align:center;
  transition: background 0.2s ease;
}
.download:hover { background:#ff2222; }

/* Skeleton Loader */
.skeleton {
  position: relative;
  overflow: hidden;
  background: #2a2a2a;
}

.skeleton::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150px;
  width: 150px;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  animation: shimmer 1.2s infinite;
}

@keyframes shimmer {
  100% { transform: translateX(300px); }
}

.skeleton-img { width:100%; height:220px; border-radius:5px; }
.skeleton-text { height:14px; width:70%; margin:10px auto; border-radius:4px; }
.skeleton-btn { height:34px; width:120px; margin:10px auto; border-radius:5px; }
</style>

<style>
@keyframes glow {
  0% { box-shadow:0 0 2px #fff,0 0 5px red; opacity:.8; }
  50% { box-shadow:0 0 6px #fff,0 0 12px red; opacity:1; }
  100% { box-shadow:0 0 2px #fff,0 0 5px red; opacity:.8; }
}
</style>

<div id="videoList"></div>

<script>
// Folder setup
const params = new URLSearchParams(window.location.search);
let folderName = params.get('folder') || 'Unknown';
folderName = folderName.replace(/-/g," ").replace(/\b\w/g,c=>c.toUpperCase());

document.getElementById("folderTitle").textContent = folderName + " Folder";
document.getElementById("folderDesc").textContent =
`Enjoy our latest ${folderName} videos, updated regularly for your viewing pleasure.`;

// Skeletons first
const container = document.getElementById("videoList");
for (let i = 0; i < 6; i++) {
  const box = document.createElement("div");
  box.className = "videoBox";
  box.innerHTML = `
    <div class="preview skeleton skeleton-img"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-btn"></div>
  `;
  container.appendChild(box);
}

// Fetch real data
fetch('videos.json')
  .then(res => res.json())
  .then(videos => {

    container.innerHTML = "";

    const folderVideos = videos.filter(v =>
      v.folder.toLowerCase() === folderName.toLowerCase()
    );

    folderVideos.sort((a,b) => new Date(b.date) - new Date(a.date));

    if(folderVideos.length === 0){
      container.innerHTML = '<p style="text-align:center;color:#ff4444;">No videos found.</p>';
      return;
    }

    const IMAGE_BASE = "https://anywherecum.workfromanywhere-sa.workers.dev/images/";

    folderVideos.forEach(v => {
      const box = document.createElement("div");
      box.className = "videoBox";

      const preview = document.createElement("div");
      preview.className = "preview";

      const img = document.createElement("img");
      img.src = IMAGE_BASE + v.thumbnail;
      img.alt = v.title;

      // fade in when loaded
      img.onload = () => img.classList.add("loaded");

      preview.appendChild(img);
      preview.onclick = () => window.open(v.url,"_blank");
      box.appendChild(preview);

      const title = document.createElement("h3");
      title.className = "videoTitle";
      title.textContent = v.title;
      title.onclick = () => window.open(v.url,"_blank");
      box.appendChild(title);

      const btn = document.createElement("a");
      btn.className = "download";
      btn.href = v.url;
      btn.target = "_blank";
      btn.textContent = `Download (${v.size})`;
      box.appendChild(btn);

      container.appendChild(box);
    });

  })
  .catch(() => {
    container.innerHTML = '<p style="text-align:center;color:#ff4444;">Failed to load videos.</p>';
  });
</script>
