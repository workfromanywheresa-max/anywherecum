}

.videoFrameWrapper {
  width: 100%;
  max-width: 300px; /* VIP SIZE */

  position: relative;

  border-radius: 8px;
  overflow: hidden;
  background: #000;
}

.videoFrameWrapper iframe,
.videoFrameWrapper img {
  width: 100%;
  height: 100%;
  border: 0;
  object-fit: cover;
}

/* TEXT */
.videoTitle {
  text-align: center;
  margin: 6px 0;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  text-align: center;
  color: #aaa;

  font-size: 12px;
}

.download {

  width: fit-content;

  padding: 5px 10px;
  background: #ff4444;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
  font-size: 12px;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
  margin-top: auto;
}
