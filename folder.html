<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folder Videos</title>
<style>
body { font-family:Arial,sans-serif; background:#1a1a1a; color:#fff; margin:0; padding:15px; }
h2 { color:#ff4444; border-bottom:2px solid #ff4444; padding-bottom:5px; text-align:center; }
.description { text-align:center; color:#fff; margin-bottom:20px; }
.videoBox { background:#222; padding:10px; border-radius:8px; margin-bottom:20px; }
.preview { width:100%; height:220px; cursor:pointer; overflow:hidden; border-radius:5px; display:flex; align-items:center; justify-content:center; }
.preview img { width:100%; height:100%; object-fit:cover; border-radius:5px; transition: transform 0.3s ease; }
.preview img:hover { transform:scale(1.05); }

.videoTitle {
  text-align: center;
  margin: 4px 0 4px 0; /* smaller spacing above & below for tight stacking */
  color: #ddd;
  font-size: 16px;
  font-weight: normal; /* thin text */
  cursor: pointer;
  text-decoration: underline; /* underline */
  transition: color 0.2s ease; /* only color transition */
}
.videoTitle:hover { color: #fff; } /* no scaling, only color change */

.download { display:block; width:fit-content; margin:6px auto 0 auto; padding:8px 15px; color:#fff; background:#ff4444; font-weight:bold; text-decoration:none; border-radius:5px; text-align:center; transition: background 0.2s ease; }
.download:hover { background:#ff2222; }
</style>
</head>
<body>

  <!-- JuicyAds PopUnders v3 Start -->
<script type="text/javascript" src="https://js.juicyads.com/jp.php?c=446423z2s214u4r2p294137434&u=https%3A%2F%2Fwww.juicyads.rocks"></script>
<!-- JuicyAds PopUnders v3 End -->

<h2 id="folderTitle">Folder Videos</h2>
<p class="description" id="folderDesc">Enjoy our latest videos.</p>

  <!-- JuicyAds v3.0 with glowing 🔴 Live -->
<div style="position: relative; width: 300px; height: 112px; margin: 0 auto; border: 2px solid red; border-radius: 8px; overflow: hidden; text-align: center;">

  <!-- 🔴 Live label -->
  <div style="
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    background-color: red;
    color: white;
    font-weight: bold;
    font-size: 12px;
    padding: 2px 6px;
    border-bottom-left-radius: 4px;
    border-bottom-right-radius: 4px;
    z-index: 9999; /* 🔥 Make it super high */
    pointer-events: none; /* Allows clicks through label */
    animation: glow 1s infinite alternate;
  ">
    🔴 Live
  </div>

  <!-- JuicyAds script -->
  <script type="text/javascript" data-cfasync="false" async src="https://poweredby.jads.co/js/jads.js"></script>
  <ins id="1113177" data-width="300" data-height="112" style="position: relative; z-index: 1;"></ins>
  <script type="text/javascript" data-cfasync="false" async>
    (adsbyjuicy = window.adsbyjuicy || []).push({'adzone':1113177});
  </script>
</div>

<!-- Glowing animation -->
<style>
@keyframes glow {
  0% {
    box-shadow: 0 0 2px #fff, 0 0 5px red;
    opacity: 0.8;
  }
  50% {
    box-shadow: 0 0 6px #fff, 0 0 12px red;
    opacity: 1;
  }
  100% {
    box-shadow: 0 0 2px #fff, 0 0 5px red;
    opacity: 0.8;
  }
}
</style>
  
<div id="videoList"></div>

<script>
// Get folder from URL query ?folder=...
const params = new URLSearchParams(window.location.search);
let folderName = params.get('folder') || 'Unknown';
folderName = folderName.replace(/-/g," ").replace(/\b\w/g,c=>c.toUpperCase());

document.getElementById("folderTitle").textContent = folderName + " Folder";
document.getElementById("folderDesc").textContent = `Enjoy our latest ${folderName} videos, updated regularly for your viewing pleasure.`;

// Fetch videos.json
fetch('videos.json')
  .then(res => res.json())
  .then(videos => {
    const container = document.getElementById("videoList");
    const folderVideos = videos.filter(v => v.folder.toLowerCase() === folderName.toLowerCase());
    folderVideos.sort((a,b) => new Date(b.date) - new Date(a.date));

    if(folderVideos.length === 0){
      container.innerHTML = '<p style="text-align:center;color:#ff4444;">No videos found in this folder.</p>';
      return;
    }

    folderVideos.forEach(v => {
      const box = document.createElement("div");
      box.className = "videoBox";

      // Thumbnail preview clickable
      const preview = document.createElement("div");
      preview.className = "preview";
      const img = document.createElement("img");
      img.src = v.thumbnail;
      img.alt = v.title;
      preview.appendChild(img);
      preview.addEventListener("click", () => window.open(v.url,"_blank")); // click thumbnail opens video
      box.appendChild(preview);

      // Title above download button using VIP style
      const titleEl = document.createElement("h3");
      titleEl.className = "videoTitle";
      titleEl.textContent = v.title;
      titleEl.addEventListener("click", () => window.open(v.url,"_blank")); // click title opens video
      box.appendChild(titleEl);

      // Download button
      const button = document.createElement("a");
      button.className = "download";
      button.href = v.url;
      button.target = "_blank";
      button.textContent = `Download (${v.size})`;
      box.appendChild(button);

      container.appendChild(box);
    });
  })
  .catch(err => {
    console.error("Failed to load videos.json:", err);
    document.getElementById("videoList").innerHTML = '<p style="text-align:center;color:#ff4444;">Failed to load videos.</p>';
  });
</script>

<!-- BOTTOM AD (Styled) -->
<div class="bottom-ad">
  <div class="ad-label">

  </div>
  <ins id="1113289" data-width="308" data-height="298"></ins>

    (adsbyjuicy = window.adsbyjuicy || []).push({'adzone':1113289});

</div>

<style>

  position: relative;

  animation: glow 1s infinite alternate;
}

/* Glow effect for the label */
@keyframes glow {
  0% { box-shadow: 0 0 2px #fff, 0 0 5px red; }
  50% { box-shadow: 0 0 6px #fff, 0 0 12px red; }
  100% { box-shadow: 0 0 2px #fff, 0 0 5px red; }
}

/* Blinking label */
.blink-slow { 
  animation: blink-slow 1.6s infinite; 
}
@keyframes blink-slow { 
  0%, 100% { opacity: 1; } 
  50% { opacity: 0; } 
}
       </style>

</body>
</html>
