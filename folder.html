/* Skeleton */
.skeleton { position:relative; overflow:hidden; background:#2a2a2a; }
.skeleton::after {
  content:"";
  position:absolute;
  top:0; left:-150px;
  width:150px; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
  animation:shimmer 1.2s infinite;
}
@keyframes shimmer { 100% { transform:translateX(300px);} }

.skeleton-img { height:220px; }
.skeleton-text { height:14px; width:70%; margin:10px auto; }
.skeleton-btn { height:34px; width:120px; margin:10px auto; }

<script>
const params = new URLSearchParams(window.location.search);
const rawFolder = params.get('folder') || '';
const folderName = rawFolder.toLowerCase();

  .replace(/-/g," ")
  .replace(/\b\w/g,c=>c.toUpperCase());

document.getElementById("folderTitle").textContent = displayFolder + " Folder";
document.getElementById("folderDesc").textContent =
`Enjoy our latest ${displayFolder} videos.`;

// Skeleton

for (let i = 0; i < 6; i++) {
  const box = document.createElement("div");
  box.className = "videoBox";

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("videoList");

// 👉 YOUR IP
const OWNER_IP = "102.214.117.74";

// get user IP
async function getUserIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  } catch {
    return null;
  }
}

// format views
function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(".0","") + "M+";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(".0","") + "K+";
  return num;
}

// increase views + timestamps
async function increaseViews(videoId){

  const userIP = await getUserIP();
  if (userIP && userIP === OWNER_IP) return;

  const viewRef = ref(db,"views/"+videoId);
  const timeRef = ref(db,"viewTimes/"+videoId);

  runTransaction(viewRef,(v)=>(v||0)+1);

  runTransaction(timeRef,(current)=>{
    const now = Date.now();
    let arr = current ? Object.values(current) : [];

    arr.push(now);
    if(arr.length > 200) arr = arr.slice(-200);

    const obj = {};
    arr.forEach((t,i)=> obj[i]=t);

    return obj;
  });
}

const videoStates = {};

fetch('videos.json')
.then(res=>res.json())
.then(videos=>{

  container.innerHTML = "";

  const IMAGE_BASE = "https://anywherecum.workfromanywhere-sa.workers.dev/images/";

  const folderVideos = videos.filter(v =>
    v.folder.toLowerCase() === folderName
  );

  if(folderVideos.length === 0){
    container.innerHTML = `<p style="text-align:center;color:#aaa;">No videos found.</p>`;
    return;
  }

  folderVideos.forEach((v, index)=>{

    const box = document.createElement("div");
    box.className = "videoBox";

    const preview = document.createElement("div");
    preview.className = "preview";

    const img = document.createElement("img");
    img.src = IMAGE_BASE + v.thumbnail;
    img.onload = ()=> img.classList.add("loaded");

    const title = document.createElement("h3");
    title.className = "videoTitle";
    title.textContent = v.title;

    const viewsEl = document.createElement("div");
    viewsEl.className = "views";

    const btn = document.createElement("a");
    btn.className = "download";
    btn.textContent = `Download (${v.size})`;

    const viewRef = ref(db,"views/"+v.id);
    const timeRef = ref(db,"viewTimes/"+v.id);
    const cycleRef = ref(db,"cycleStart/"+v.id);

    let views = 0;
    let timestamps = [];
    let cycleStart = null;

    function getCycleCount(){
      return timestamps.length;
    }

    function updateUI(){
      const count = getCycleCount();

      if(count >= 10){
        viewsEl.textContent = "🔥Trending | 👁Views: " + formatViews(views);
        viewsEl.style.color = "#ffcc00";
      } else {
        viewsEl.textContent = "👁Views: " + formatViews(views);
        viewsEl.style.color = "#aaa";
      }
    }

    videoStates[v.id] = {
      element: box,
      originalIndex: index,
      getScore: () => getCycleCount()
    };

    function sortVideos(){

      const all = Object.values(videoStates);

      const trending = all
        .filter(v => v.getScore() >= 10)
        .sort((a, b) => {
          const diff = b.getScore() - a.getScore();
          if (diff !== 0) return diff;
          return a.originalIndex - b.originalIndex;
        });

      const nonTrending = all
        .filter(v => v.getScore() < 10)
        .sort((a, b) => a.originalIndex - b.originalIndex);

      const finalOrder = [...trending, ...nonTrending];

      finalOrder.forEach(v => container.appendChild(v.element));
    }

    // views listener
    onValue(viewRef,snap=>{
      views = snap.val() || 0;
      updateUI();
      sortVideos();
    });

    // timestamps listener
    onValue(timeRef,snap=>{
      const data = snap.val();
      timestamps = data ? Object.values(data) : [];
      updateUI();
      sortVideos();
    });

    // cycle logic (ROLLING RESET)
    onValue(cycleRef,snap=>{
      cycleStart = snap.val();

      const now = Date.now();

      if(!cycleStart || now - cycleStart >= 86400000){

        const newCycleTime = now;

        runTransaction(cycleRef, ()=> newCycleTime);

        // reset timestamps for new cycle
        runTransaction(timeRef, ()=> ({}));

        timestamps = [];
      }

      updateUI();
      sortVideos();
    });

    function openVideo(){
      increaseViews(v.id);
      window.open(v.url,"_blank");
    }

    img.onclick = openVideo;
    title.onclick = openVideo;
    btn.onclick = (e)=>{ e.preventDefault(); openVideo(); };

    preview.appendChild(img);
    box.appendChild(preview);
    box.appendChild(title);
    box.appendChild(viewsEl);
    box.appendChild(btn);

    container.appendChild(box);
  });

})
.catch(()=>{
  container.innerHTML = '<p style="text-align:center;color:#ff4444;">Failed to load videos.</p>';
});
    </script>
