<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
  text-align: center;
}

.folderSection {
  margin-bottom: 30px;
}

.folderTitle {
  color: #ff4444;
  margin: 15px 0 10px;
  border-left: 4px solid #ff4444;
  padding-left: 8px;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 15px;
}

/* Thumbnail */
.thumbnail {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

/* Iframe */
.videoFrameWrapper {
  width: 100%;
  height: 250px;
  overflow: hidden;
  position: relative;
  border-radius: 8px;
}

.videoFrameWrapper iframe {
  width: 100%;
  height: 450px;
  position: absolute;
  top: -100px;
  left: 0;
  border: 0;
}

.videoTitle {
  text-align: center;
  margin: 8px 0 5px;
  color: #ddd;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  text-align: center;
  color: #aaa;
  margin: 5px 0;
}

.download {
  display: block;
  width: fit-content;
  margin: 10px auto 0;
  padding: 8px 15px;
  color: #fff;
  background: #ff4444;
  font-weight: bold;
  text-decoration: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<h2>All Folders</h2>
<div id="videoList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("videoList");

const IMAGE_BASE = "https://anywherecum.pages.dev/images/";
const TREND_THRESHOLD = 10;

const WORKER_URL = "https://anywherecum.workfromanywhere-sa.workers.dev";
const OWNER_IP = "102.214.117.74";

async function getUserIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  } catch {
    return null;
  }
}

function formatViews(num) {
  if (num >= 1000) return (num / 1000).toFixed(1) + "K+";
  return num;
}

async function increaseViews(videoId){

  const userIP = await getUserIP();
  if (userIP && userIP === OWNER_IP) return;

  runTransaction(ref(db, "views/" + videoId), v => (v || 0) + 1);
  runTransaction(ref(db, "cycleViews/" + videoId), v => (v || 0) + 1);

  fetch(`${WORKER_URL}/increment`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ videoId })
  }).catch(()=>{});
}

// Load videos
fetch('videos.json')
.then(res => res.json())
.then(videos => {

  container.innerHTML = "";

  // Group by folder
  const folders = {};

  videos.forEach(v => {
    const folder = v.folder || "Uncategorized";
    if (!folders[folder]) folders[folder] = [];
    folders[folder].push(v);
  });

  // Render each folder
  Object.keys(folders).forEach(folderName => {

    const section = document.createElement("div");
    section.className = "folderSection";

    const title = document.createElement("h3");
    title.className = "folderTitle";
    title.textContent = folderName;

    section.appendChild(title);

    folders[folderName].forEach(v => {

      const box = document.createElement("div");
      box.className = "videoBox";

      const wrapper = document.createElement("div");
      wrapper.className = "videoFrameWrapper";

      const img = document.createElement("img");
      img.src = IMAGE_BASE + v.thumbnail;
      img.className = "thumbnail";

      img.onclick = () => {
        increaseViews(v.id);

        const iframe = document.createElement("iframe");
        iframe.src = v.url;
        iframe.allowFullscreen = true;
        iframe.allow = "autoplay";

        wrapper.innerHTML = "";
        wrapper.appendChild(iframe);
      };

      wrapper.appendChild(img);

      const titleEl = document.createElement("h3");
      titleEl.className = "videoTitle";
      titleEl.textContent = v.title;

      titleEl.onclick = () => {
        increaseViews(v.id);
        window.open(v.url, "_blank");
      };

      const viewsEl = document.createElement("div");
      viewsEl.className = "views";

      const viewRef = ref(db,"views/"+v.id);
      const cycleRef = ref(db,"cycleViews/"+v.id);

      let totalViews = 0;
      let cycleViews = 0;

      function updateUI(){
        if(cycleViews >= TREND_THRESHOLD){
          viewsEl.textContent = "🔥 Trending | 👁 " + formatViews(totalViews);
          viewsEl.style.color = "#ffcc00";
        } else {
          viewsEl.textContent = "👁 " + formatViews(totalViews);
          viewsEl.style.color = "#aaa";
        }
      }

      onValue(viewRef, snap=>{
        totalViews = snap.val() || 0;
        updateUI();
      });

      onValue(cycleRef, snap=>{
        cycleViews = snap.val() || 0;
        updateUI();
      });

      const btn = document.createElement("a");
      btn.className = "download";
      btn.textContent = `Download (${v.size})`;
      btn.href = "#";
      btn.onclick = (e)=>{
        e.preventDefault();
        increaseViews(v.id);
        window.open(v.url, "_blank");
      };

      box.appendChild(wrapper);
      box.appendChild(titleEl);
      box.appendChild(viewsEl);
      box.appendChild(btn);

      section.appendChild(box);
    });

    container.appendChild(section);
  });

});
</script>

</body>
</html>
