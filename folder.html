<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

button {
  background: #444;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 15px;
}

h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

#folderDescription {
  text-align: center;
  color: #aaa;
  font-size: 14px;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
}

.thumbnail {
  width: 100%;
  height: 350px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

.videoFrameWrapper {
  width: 100%;
  height: 350px;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
}

.videoFrameWrapper iframe {
  width: 100%;
  height: 560px;
  position: absolute;
  top: -210px;
  left: 0;
  border: 0;
}

.videoTitle {
  text-align: center;
  margin: 8px 0;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  text-align: center;
  color: #aaa;
}

/* ✅ FIXED BUTTON (small + compact) */
.download {
  display: block;
  width: fit-content;
  margin: 10px auto;
  padding: 6px 12px;
  background: #ff4444;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
  font-size: 13px;
  text-align: center;
}
</style>
</head>

<body>

<button onclick="history.back()">← Back</button>

<h2 id="folderTitle">Folder</h2>
<p id="folderDescription">
  Enjoy our videos, updated regularly for your viewing pleasure.
</p>

<div id="trendingVideos"></div>
<div id="normalVideos"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

/* Firebase */
const app = initializeApp({
  apiKey: "AIzaSyCEX...",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

/* Folder */
const params = new URLSearchParams(window.location.search);
const folderName = (params.get("folder") || "").toLowerCase();

document.getElementById("folderTitle").textContent =
  folderName ? folderName.toUpperCase() : "ALL VIDEOS";

/* Worker */
async function sendToWorker(videoId) {
  try {
    await fetch("https://anywherecum.workfromanywhere-sa.workers.dev/increment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ videoId })
    });
  } catch (err) {
    console.error("Worker failed:", err);
  }
}

function increaseViews(videoId) {
  sendToWorker(videoId);
}

/* Containers */
const trendingContainer = document.getElementById("trendingVideos");
const normalContainer = document.getElementById("normalVideos");

const videoElements = {};

/* UI Controller */
function updateUI(id) {
  const v = videoElements[id];
  if (!v) return;

  const total = v.totalViews || 0;
  const cycle = v.cycleViews || 0;

  const isTrending = cycle >= 10;

  const target = isTrending ? trendingContainer : normalContainer;
  if (v.box.parentElement !== target) {
    target.appendChild(v.box);
  }

  v.views.textContent = isTrending
    ? `🔥 Trending | 👁 ${total}`
    : `👁 ${total}`;

  v.views.style.color = isTrending ? "#ffcc00" : "#aaa";
}

/* Load Videos */
fetch("videos.json")
.then(res => res.json())
.then(videos => {

  const filtered = folderName
    ? videos.filter(v => v.folder.toLowerCase() === folderName)
    : videos;

  filtered.forEach(v => {

    const box = document.createElement("div");
    box.className = "videoBox";

    const wrapper = document.createElement("div");
    wrapper.className = "videoFrameWrapper";

    const thumb = document.createElement("img");
    thumb.className = "thumbnail";
    thumb.src = "https://anywherecum.pages.dev/images/" + v.thumbnail;

    thumb.onclick = () => {
      increaseViews(v.id);

      const iframe = document.createElement("iframe");
      iframe.src = v.url;
      iframe.allowFullscreen = true;

      wrapper.innerHTML = "";
      wrapper.appendChild(iframe);
    };

    wrapper.appendChild(thumb);

    const title = document.createElement("h3");
    title.className = "videoTitle";
    title.textContent = v.title;

    title.onclick = () => {
      increaseViews(v.id);
      window.open(v.url, "_blank");
    };

    const views = document.createElement("div");
    views.className = "views";
    views.textContent = "👁 0";

    /* ✅ ONLY CHANGE HERE */
    const btn = document.createElement("a");
    btn.className = "download";
    btn.href = "#";
    btn.textContent = `Download (${v.size || "?"})`;

    btn.onclick = (e) => {
      e.preventDefault();
      increaseViews(v.id);
      window.open(v.url, "_blank");
    };

    box.appendChild(wrapper);
    box.appendChild(title);
    box.appendChild(views);
    box.appendChild(btn);

    normalContainer.appendChild(box);

    videoElements[v.id] = {
      box,
      views,
      totalViews: 0,
      cycleViews: 0
    };

    onValue(ref(db, "views/" + v.id), snap => {
      videoElements[v.id].totalViews = snap.val() || 0;
      updateUI(v.id);
    });

    onValue(ref(db, "cycleViews/" + v.id), snap => {
      videoElements[v.id].cycleViews = Number(snap.val()) || 0;
      updateUI(v.id);
    });

  });

});
</script>

</body>
</html>
