<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

* {
  box-sizing: border-box;
}

.topBar {
  display: flex;
  justify-content: flex-start;
  margin-bottom: 10px;
}

button {
  background: #ff4444;
  color: #fff;
  border: none;
  padding: 6px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
}

h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

#folderDescription {
  text-align: center;
  color: #aaa;
  font-size: 14px;
}

#normalVideos {
  margin-bottom: 40px;
  min-height: 300px;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 30px;
  text-align: center;
  min-height: 250px;
}

.videoFrameWrapper {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  aspect-ratio: 16 / 9;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}

.videoFrameWrapper iframe,
.videoFrameWrapper img {
  width: 100%;
  height: 100%;
  border: 0;
  object-fit: cover;
  display: block;
}

select {
  padding: 5px;
  border-radius: 5px;
  border: none;
  background: #333;
  color: #fff;
  font-size: 12px;
  margin-bottom: 6px;
}

.videoTitle {
  margin: 6px 0;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  color: #aaa;
  margin: 2px 0;
  font-size: 12px;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
  margin-top: auto;
}

/* ===== GOOGLE TRANSLATE FIX (TOP RIGHT) ===== */

  position: fixed !important;
  top: 10px !important;
  right: 10px !important;
  left: auto !important;
  z-index: 99999;
  display: flex;
  justify-content: flex-end;
}

.goog-te-gadget {
  display: flex !important;
  align-items: center;
  font-size: 12px !important;
  margin: 0 !important;

.goog-te-combo {
  height: 28px !important;
  font-size: 12px !important;
  padding: 3px 6px !important;
  border-radius: 5px;
  background: #333 !important;
  color: #fff !important;

}

/* Hide Google text */
.goog-te-gadget span,
.goog-te-gadget a {
  display: none !important;
}

.goog-te-gadget {
  color: transparent !important;

  }, 'google_translate_element');

<!-- Banner -->
<div id="topBanner" style="
  position: fixed;
  top: 0;
  left: 50%;
  transform: translate(-50%, -100%);
  width: 95%;
  max-width: 700px;
  background: #fff;
  color: #111;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 3px 12px;
  font-size: 11px;
  z-index: 9999;
  border-radius: 5px;
">
  <span style="flex:1; text-align:center;">
    🔔 Click the bell icon to receive notifications
  </span>
  <button id="closeBtn" style="
    position:absolute;
    right:8px;
    top:-5px;
    background:none;
    border:none;
    font-size:12px;
  ">✖</button>
</div>

<script>
const banner = document.getElementById("topBanner");
const closeBtn = document.getElementById("closeBtn");

const lastClosed = localStorage.getItem("bannerClosedTime");
const now = Date.now();
const day = 24 * 60 * 60 * 1000;

if (!lastClosed || now - lastClosed > day) {
  banner.style.display = "flex";
  setTimeout(() => banner.style.transform = "translate(-50%,0)", 50);

  setTimeout(() => {
    banner.style.transform = "translate(-50%,-100%)";
    setTimeout(() => {
      banner.style.display = "none";
      localStorage.setItem("bannerClosedTime", Date.now());
    }, 500);
  }, 30000);
}

closeBtn.addEventListener("click", () => {
  banner.style.transform = "translate(-50%,-100%)";
  setTimeout(() => {
    banner.style.display = "none";
    localStorage.setItem("bannerClosedTime", Date.now());
  }, 500);
});
</script>
