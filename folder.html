<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
  text-align: center;
}

.description {
  text-align: center;
  margin-bottom: 20px;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
}

.preview {
  width: 100%;
  height: 220px;
  background: #000;
  border-radius: 5px;
  overflow: hidden;
  cursor: pointer;
}

.preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.videoTitle {
  text-align: center;
  margin: 8px 0 5px 0;
  color: #ddd;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  text-align: center;
  color: #aaa;
  margin: 5px 0;
}

.download {
  display: block;
  width: fit-content;
  margin: 10px auto 0 auto;
  padding: 8px 15px;
  color: #fff;
  background: #ff4444;
  font-weight: bold;
  text-decoration: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<h2 id="folderTitle">Folder</h2>
<p class="description">Enjoy videos in this folder</p>

<div id="videoList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("videoList");

const urlParams = new URLSearchParams(window.location.search);
const folderName = (urlParams.get("folder") || "").toLowerCase();

document.getElementById("folderTitle").textContent =
  folderName.charAt(0).toUpperCase() + folderName.slice(1);

const TREND_THRESHOLD = 10;
const WORKER_URL = "https://anywherecum.workfromanywhere-sa.workers.dev";

// ✅ Format views
function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(".0","") + "M+";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(".0","") + "K+";
  return num;
}

// ✅ Increment views + send timestamp
async function increaseViews(videoId){
  runTransaction(ref(db, "views/" + videoId), (current) => {
    return (current || 0) + 1;
  });

  fetch(`${WORKER_URL}/increment`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ videoId })
  }).catch(()=>{});
}

// ✅ Trending calculation
function getTrendingCount(timestamps) {
  if (!timestamps || typeof timestamps !== "object") return 0;

  const now = Date.now();
  const THIRTY_MIN = 30 * 60 * 1000;

  return Object.values(timestamps)
    .filter(t => now - t <= THIRTY_MIN)
    .length;
}

const videoStates = {};

fetch('videos.json')
.then(res=>res.json())
.then(videos=>{

  container.innerHTML = "";
  const IMAGE_BASE = "https://anywherecum.pages.dev/images/";

  const folderVideos = videos.filter(v =>
    v.folder.toLowerCase() === folderName
  );

  if(folderVideos.length === 0){
    container.innerHTML = `<p style="text-align:center;color:#aaa;">No videos found.</p>`;
    return;
  }

  folderVideos.forEach((v,index)=>{

    const box = document.createElement("div");
    box.className = "videoBox";

    const preview = document.createElement("div");
    preview.className = "preview";

    const img = document.createElement("img");
    img.src = IMAGE_BASE + v.thumbnail;

    const title = document.createElement("h3");
    title.className = "videoTitle";
    title.textContent = v.title;

    const viewsEl = document.createElement("div");
    viewsEl.className = "views";

    const btn = document.createElement("a");
    btn.className = "download";
    btn.textContent = `Download (${v.size})`;

    const viewRef = ref(db,"views/"+v.id);
    const viewTimesRef = ref(db,"viewTimes/"+v.id);

    let totalViews = 0;
    let cycleViews = 0;

    function updateUI(){
      if(cycleViews >= TREND_THRESHOLD){
        viewsEl.textContent = "🔥 Trending | 👁 " + formatViews(totalViews);
        viewsEl.style.color = "#ffcc00";
      } else {
        viewsEl.textContent = "👁 " + formatViews(totalViews);
        viewsEl.style.color = "#aaa";
      }
    }

    videoStates[v.id] = {
      element: box,
      getScore: () => cycleViews,
      originalIndex: index
    };

    function sortVideos(){
      const sorted = Object.values(videoStates)
        .sort((a,b)=>{
          const aScore = a.getScore();
          const bScore = b.getScore();

          const aEff = aScore >= TREND_THRESHOLD ? aScore : 0;
          const bEff = bScore >= TREND_THRESHOLD ? bScore : 0;

          if (bEff !== aEff) return bEff - aEff;
          return a.originalIndex - b.originalIndex;
        });

      sorted.forEach(v=>container.appendChild(v.element));
    }

    // ✅ Real-time views
    onValue(viewRef,snap=>{
      totalViews = snap.val() || 0;
      updateUI();
    });

    // ✅ Real-time timestamps → trending
    onValue(viewTimesRef,snap=>{
      const timestamps = snap.val();

      cycleViews = getTrendingCount(timestamps);

      updateUI();
      sortVideos();
    });

    function openVideo(){
      increaseViews(v.id);
      window.open(v.url,"_blank");
    }

    img.onclick = openVideo;
    title.onclick = openVideo;
    btn.onclick = (e)=>{ e.preventDefault(); openVideo(); };

    preview.appendChild(img);
    box.appendChild(preview);
    box.appendChild(title);
    box.appendChild(viewsEl);
    box.appendChild(btn);

    container.appendChild(box);
  });

});
</script>
  
</body>
</html>
