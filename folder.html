<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folder Videos</title>

<style>
body { font-family:Arial,sans-serif; background:#1a1a1a; color:#fff; margin:0; padding:15px; }
h2 { color:#ff4444; border-bottom:2px solid #ff4444; padding-bottom:5px; text-align:center; }
.description { text-align:center; color:#fff; margin-bottom:20px; }

.videoBox { background:#222; padding:10px; border-radius:8px; margin-bottom:20px; }

.preview {
  width:100%;
  height:220px;
  cursor:pointer;
  overflow:hidden;
  border-radius:5px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.preview img {
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:5px;
  transition: opacity 0.3s ease, transform 0.3s ease;
  opacity:0;
}

.preview img.loaded { opacity:1; }
.preview img:hover { transform:scale(1.05); }

.videoTitle {
  text-align:center;
  margin:4px 0;
  color:#ddd;
  font-size:16px;
  cursor:pointer;
  text-decoration:underline;
}
.videoTitle:hover { color:#fff; }

.views { text-align:center; color:#aaa; margin:5px 0; }

.download {
  display:block;
  width:fit-content;
  margin:6px auto;
  padding:8px 15px;
  color:#fff;
  background:#ff4444;
  font-weight:bold;
  text-decoration:none;
  border-radius:5px;
}
.download:hover { background:#ff2222; }

/* Skeleton */
.skeleton { position:relative; overflow:hidden; background:#2a2a2a; }
.skeleton::after {
  content:"";
  position:absolute;
  top:0; left:-150px;
  width:150px; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
  animation:shimmer 1.2s infinite;
}
@keyframes shimmer { 100% { transform:translateX(300px);} }

.skeleton-img { height:220px; }
.skeleton-text { height:14px; width:70%; margin:10px auto; }
.skeleton-btn { height:34px; width:120px; margin:10px auto; }
</style>

</head>

<body>

<!-- Popunder Ads -->
<script src="https://js.juicyads.com/jp.php?c=446423z2s214u4r2p294137434"></script>

<h2 id="folderTitle">Folder Videos</h2>
<p class="description" id="folderDesc"></p>

<div id="videoList"></div>

<script>
const params = new URLSearchParams(window.location.search);

// ✅ SINGLE SOURCE OF TRUTH
const rawFolder = params.get('folder') || '';
const folderName = rawFolder.toLowerCase();

const displayFolder = rawFolder
  .replace(/-/g," ")
  .replace(/\b\w/g,c=>c.toUpperCase());

document.getElementById("folderTitle").textContent = displayFolder + " Folder";
document.getElementById("folderDesc").textContent =
`Enjoy our latest ${displayFolder} videos.`;

// Skeleton
const container = document.getElementById("videoList");
for (let i = 0; i < 6; i++) {
  const box = document.createElement("div");
  box.className = "videoBox";
  box.innerHTML = `
    <div class="preview skeleton skeleton-img"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-btn"></div>
  `;
  container.appendChild(box);
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("videoList");

function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(".0","") + "M+";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(".0","") + "K+";
  return num;
}

function increaseViews(id){
  runTransaction(ref(db,"views/"+id),(v)=>(v||0)+1);
}

fetch('videos.json')
.then(res=>res.json())
.then(videos=>{

  container.innerHTML = "";

  const IMAGE_BASE = "https://anywherecum.workfromanywhere-sa.workers.dev/images/";

  // ✅ FIXED FILTER
  const folderVideos = videos.filter(v =>
    v.folder.toLowerCase() === folderName
  );

  // ✅ EMPTY CHECK
  if(folderVideos.length === 0){
    container.innerHTML = `<p style="text-align:center;color:#aaa;">No videos found.</p>`;
    return;
  }

  folderVideos.sort((a,b)=> new Date(b.date)-new Date(a.date));

  folderVideos.forEach(v=>{

    const box = document.createElement("div");
    box.className = "videoBox";

    const preview = document.createElement("div");
    preview.className = "preview";

    const img = document.createElement("img");
    img.src = IMAGE_BASE + v.thumbnail;
    img.onload = ()=> img.classList.add("loaded");

    const title = document.createElement("h3");
    title.className = "videoTitle";
    title.textContent = v.title;

    const viewsEl = document.createElement("div");
    viewsEl.className = "views";

    const btn = document.createElement("a");
    btn.className = "download";
    btn.textContent = `Download (${v.size})`;

    const viewRef = ref(db,"views/"+v.id);

    onValue(viewRef,snap=>{
      const views = snap.val() || 0;
      viewsEl.textContent = "👁 Views: " + formatViews(views);
    });

    function openVideo(){
      increaseViews(v.id);
      window.open(v.url,"_blank");
    }

    img.onclick = openVideo;
    title.onclick = openVideo;
    btn.onclick = (e)=>{ e.preventDefault(); openVideo(); };

    preview.appendChild(img);
    box.appendChild(preview);
    box.appendChild(title);
    box.appendChild(viewsEl);
    box.appendChild(btn);

    container.appendChild(box);
  });

})
.catch(()=>{
  container.innerHTML = '<p style="text-align:center;color:#ff4444;">Failed to load videos.</p>';
});
</script>

</body>
</html>
