<script>
  const banner = document.getElementById("topBanner");
  const closeBtn = document.getElementById("closeBtn");

  const lastClosed = localStorage.getItem("bannerClosedTime");
  const now = Date.now();
  const twentyFourHours = 24 * 60 * 60 * 1000;

  if (!lastClosed || now - lastClosed > twentyFourHours) {
    // Show banner
    banner.style.display = "flex";

    // Slide down smoothly
    setTimeout(() => {
      banner.style.transform = "translate(-50%, 0)";
    }, 50);

    // Auto-hide after 30 seconds
    setTimeout(() => {
      banner.style.transform = "translate(-50%, -100%)";
      setTimeout(() => {
        banner.style.display = "none";
        localStorage.setItem("bannerClosedTime", Date.now());
      }, 500);
    }, 30000);
  }

  closeBtn.addEventListener("click", () => {
    banner.style.transform = "translate(-50%, -100%)";
    setTimeout(() => {
      banner.style.display = "none";
      localStorage.setItem("bannerClosedTime", Date.now());
    }, 500);
  });
</script>

<style>
#topAd {
  transition: top 0.5s ease, opacity 0.5s ease;
}
#countdown, #closeBtn {
  transition: opacity 0.3s ease;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const ad = document.getElementById("topAd");
  const countdownEl = document.getElementById("countdown");
  const closeBtn = document.getElementById("closeBtn");

  let countdownInterval;
  let cycleTimeout;

  function showAd() {
    ad.style.display = "block";
    ad.style.opacity = "1";

    setTimeout(() => {
      ad.style.top = "0";
    }, 50);

    let timeLeft = 15;

    countdownEl.style.display = "block";
    countdownEl.style.opacity = "1";

    closeBtn.style.display = "none";

    countdownEl.textContent = timeLeft + "s";

    clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
      timeLeft--;
      countdownEl.textContent = timeLeft + "s";

      if (timeLeft <= 0) {
        clearInterval(countdownInterval);

        // fade out timer
        countdownEl.style.opacity = "0";

        setTimeout(() => {
          countdownEl.style.display = "none";

          // show X button in same position
          closeBtn.style.display = "block";
          closeBtn.style.opacity = "1";
        }, 200);
      }
    }, 1000);
  }

  function hideAd() {
    ad.style.top = "-80px";
    ad.style.opacity = "0";

    setTimeout(() => {
      ad.style.display = "none";
      scheduleNextAd();
    }, 500);
  }

  function scheduleNextAd() {
    clearTimeout(cycleTimeout);
    cycleTimeout = setTimeout(showAd, 120000); // 2 minutes
  }

  setTimeout(() => {
    showAd();
    scheduleNextAd();
  }, 10000);

  window.hideAd = hideAd;

});
</script>
