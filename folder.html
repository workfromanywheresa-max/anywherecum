<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum - Folder</title>
<style>
body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; }
header { text-align: center; padding: 5px 10px; background: #111; }
header h1 { color: #ff4444; margin: 2px 0; font-size: 20px; }
header p { margin: 0 0 2px 0; font-size: 12px; }

ul { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(2,1fr); gap: 15px; margin: 20px; }
li { background: #222; padding: 10px; border-radius: 8px; text-align: center; transition: 0.3s; }
li:hover { background: #333; }

li img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; }
li img:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(255, 68, 68, 0.6); }

.folder-video-link { color: #ff4444; font-weight: bold; text-decoration: none; display: block; margin-top: 5px; }
.folder-video-link:hover { color: #fff; text-decoration: underline; }

footer { text-align: center; padding: 20px; font-size: 12px; color: #aaa; background: #111; margin-top: 40px; }

@media(max-width:600px){ ul { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
<h1>AnywhereCum</h1>
<p id="folderTitle">Folder</p>
</header>

<section>
<h2 id="folderHeader">Videos</h2>
<ul id="folderVideos"></ul>
</section>

<footer>© 2026 AnywhereCum – Legal content only. 18+</footer>

<script>
// Get videoId and folder from URL hash
const hash = window.location.hash.slice(1);
const [videoIdPart, folderPart] = hash.split('&');
const videoId = videoIdPart;
const folderName = folderPart ? folderPart.replace('folder=','') : 'unknown';

document.getElementById('folderTitle').textContent = folderName;
document.getElementById('folderHeader').textContent = `${folderName} Videos`;

// Load videos.json
fetch('videos.json')
.then(res => res.json())
.then(foldersData => {
  const folder = foldersData.find(f => f.folder === folderName);
  if(!folder || folder.videos.length === 0){
    document.getElementById('folderVideos').innerHTML = '<li>No videos found in this folder.</li>';
    return;
  }

  const videoList = document.getElementById('folderVideos');
  folder.videos.sort((a,b)=> new Date(b.date)-new Date(a.date));

  folder.videos.forEach(video=>{
    const li = document.createElement('li');

    const thumb = document.createElement('img');
    thumb.src = video.thumbnail;
    thumb.alt = video.title;
    thumb.addEventListener('click', ()=>{
      window.location.href = `#${video.id}&folder=${folderName}`;
    });

    const link = document.createElement('a');
    link.textContent = video.title;
    link.href = `#${video.id}&folder=${folderName}`;
    link.className = "folder-video-link";

    li.appendChild(thumb);
    li.appendChild(link);
    videoList.appendChild(li);
  });

  // Scroll to hash video
  if(videoId){
    const targetLink = Array.from(videoList.querySelectorAll('a')).find(a=>a.getAttribute('href').includes(videoId));
    if(targetLink) targetLink.scrollIntoView({behavior:'smooth', block:'center'});
  }
})
.catch(err=>console.error('Failed to load videos.json', err));
</script>

</body>
</html>
