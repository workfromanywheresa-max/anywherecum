<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum - Folder</title>
<style>
body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 15px; }
h2 { color: #ff4444; border-bottom: 2px solid #ff4444; padding-bottom: 5px; margin-top:20px; }
ul { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(2,1fr); gap: 15px; }
li { background: #222; padding: 10px; border-radius: 8px; text-align: center; transition: 0.3s; }
li:hover { background: #333; }
a.folder-link { color: #ff4444; font-weight: bold; text-decoration: none; display: block; margin-top: 5px; }
a.folder-link:hover { color: #fff; text-decoration: underline; }
#videoList li img { width: 100%; height: 180px; border-radius: 5px; object-fit: cover; cursor: pointer; margin-bottom: 5px; }
</style>
</head>
<body>

<div id="folderTitle"><h2>Loading Folder...</h2></div>
<ul id="videoList"></ul>

<script>
const params = new URLSearchParams(window.location.search);
const folderName = params.get('folder');

if(folderName){
  fetch('videos.json')
    .then(res => res.json())
    .then(folders => {
      const folder = folders.find(f => f.folder === folderName);
      const folderTitle = document.getElementById('folderTitle');
      const videoList = document.getElementById('videoList');

      if(folder && folder.videos && folder.videos.length > 0){
        folderTitle.innerHTML = `<h2>${folder.folder} (${folder.videos.length} videos)</h2>`;
        folder.videos.sort((a,b)=> new Date(b.date)-new Date(a.date));

        folder.videos.forEach(video => {
          const li = document.createElement('li');

          const thumb = document.createElement('img');
          thumb.src = video.thumbnail;
          thumb.alt = video.title;
          thumb.addEventListener('click', () => window.location.href = video.url);

          const link = document.createElement('a');
          link.className = "folder-link";
          link.href = video.url;
          link.textContent = `${video.title} (${video.size})`;

          li.appendChild(thumb);
          li.appendChild(link);
          videoList.appendChild(li);
        });
      } else {
        folderTitle.innerHTML = `<h2>No videos found in ${folderName}</h2>`;
      }
    })
    .catch(err => console.error(err));
} else {
  document.getElementById('folderTitle').innerHTML = "<h2>No folder selected</h2>";
}
</script>

</body>
</html>
