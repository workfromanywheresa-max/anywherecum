<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Content Folder</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1a1a1a;
    color: #fff;
    margin: 0;
    padding: 15px;
  }

  h2 {
    color: #ff4444;
    border-bottom: 2px solid #ff4444;
    padding-bottom: 5px;
    text-align: center;
    margin-top: 20px;
  }

  .folderDescription {
    text-align: center;
    color: #fff;
    margin-bottom: 20px;
  }

  .videoBox {
    background: #222;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 20px;
  }

  .preview {
    position: relative;
    width: 100%;
    height: 220px;
    background: #000;
    border-radius: 5px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 5px;
    transition: transform 0.3s ease;
  }

  .preview img:hover {
    transform: scale(1.05);
  }

  .download {
    display: block;
    width: fit-content;
    margin: 10px auto 0 auto;
    padding: 8px 15px;
    color: #fff;
    background: #ff4444;
    font-weight: bold;
    text-decoration: none;
    border-radius: 5px;
    text-align: center;
  }

  .download:hover {
    background: #ff2222;
  }

  .folderTitle {
    text-align: center;
    font-size: 18px;
    margin-bottom: 10px;
    color: #ff4444;
  }

</style>
</head>
<body>

<h2 id="folderName">Folder</h2>
<p class="folderDescription" id="folderDesc">Loading videos...</p>
<div id="videoList"></div>

<script>
  // Get folder name from URL hash
  const urlParams = new URLSearchParams(window.location.hash.slice(1));
  const folderParam = urlParams.get('folder') || '';

  fetch('videos.json')
    .then(res => res.json())
    .then(folders => {
      const folderData = folders.find(f => f.folder === folderParam);
      const container = document.getElementById('videoList');
      const folderNameEl = document.getElementById('folderName');
      const folderDescEl = document.getElementById('folderDesc');

      if(!folderData || !folderData.videos || folderData.videos.length === 0){
        folderNameEl.textContent = 'Folder not found';
        folderDescEl.textContent = '';
        container.innerHTML = '<p style="text-align:center;color:#ff4444;">No videos available in this folder.</p>';
        return;
      }

      folderNameEl.textContent = folderData.folder;
      folderDescEl.textContent = folderData.description || 'Enjoy the videos in this folder.';

      // Sort videos by date descending
      folderData.videos.sort((a,b) => new Date(b.date) - new Date(a.date));

      folderData.videos.forEach(video => {
        const box = document.createElement('div');
        box.className = 'videoBox';

        const preview = document.createElement('div');
        preview.className = 'preview';
        const img = document.createElement('img');
        img.src = video.thumbnail;
        img.alt = video.title;
        img.addEventListener('click', () => {
          window.location.href = `${folderData.folder}.html#${video.id}&folder=${encodeURIComponent(folderData.folder)}`;
        });
        preview.appendChild(img);
        box.appendChild(preview);

        const button = document.createElement('a');
        button.className = 'download';
        button.href = video.url;
        button.target = '_blank';
        button.textContent = `Download (${video.size})`;
        box.appendChild(button);

        container.appendChild(box);
      });
    })
    .catch(err => {
      console.error('Failed to load videos.json', err);
      document.getElementById('videoList').innerHTML = '<p style="text-align:center;color:#ff4444;">Failed to load videos.</p>';
    });
</script>

</body>
</html>
