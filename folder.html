<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum - Folder</title>
<style>
body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 15px; }
header { text-align: center; padding: 5px 10px; background: #111; }
header h1 { color: #ff4444; margin: 2px 0; font-size: 20px; }
header p { margin: 0 0 2px 0; font-size: 12px; }
header img { max-width: 100%; height: auto; margin: 0; border-radius: 8px; }

h2 { color: #ff4444; border-bottom: 2px solid #ff4444; padding-bottom: 5px; margin-top:20px; text-align:center; }
ul { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(2,1fr); gap: 15px; margin-top:15px; }
li { background: #222; padding: 10px; border-radius: 8px; text-align: center; transition: 0.3s; cursor: pointer; }
li:hover { background: #333; }
a.folder-link { color: #ff4444; font-weight: bold; text-decoration: none; display: block; margin-top: 5px; }
a.folder-link:hover { color: #fff; text-decoration: underline; }
#videoList li img { width: 100%; height: 180px; border-radius: 5px; object-fit: cover; margin-bottom: 5px; }

footer { text-align: center; padding: 20px; font-size: 12px; color: #aaa; background: #111; margin-top: 40px; }
@media(max-width:600px){ ul { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
<h1>AnywhereCum</h1>
<p>Folder Videos</p>
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgcXzmfnaZCcHIY3SCvnmKvNKzqoqlZ2gex-9CNWkM41sD23nP_rzxLeC0uiuxosxFWwOkWoXlLT2pqKycM20NYrGGFhhziXts1tHiLJVyeJz1LTvU2M3kFSwaqvHiJV_p6hItlh48_Qtr09w7hTdz0cmfqgLOzyfM_dOfWG98-Douk-fAp0zZpWhWmXITx/s720/1000167088.jpg">
</header>

<div id="folderTitle"><h2>Loading Folder...</h2></div>
<ul id="videoList"></ul>

<footer>© 2026 AnywhereCum – Legal content only. 18+</footer>

<script>
// Get folder name from URL
const params = new URLSearchParams(window.location.search);
const folderName = params.get('folder');

const folderTitle = document.getElementById('folderTitle');
const videoList = document.getElementById('videoList');

if(folderName){
  fetch('videos.json')
    .then(res => res.json())
    .then(folders => {
      const videos = folders[folderName]; // key-as-folder access

      if(videos && videos.length > 0){
        folderTitle.innerHTML = `<h2>${folderName} (${videos.length} videos)</h2>`;
        // Sort newest first
        videos.sort((a,b) => new Date(b.date) - new Date(a.date));

        videos.forEach(video => {
          const li = document.createElement('li');

          // Thumbnail
          const thumb = document.createElement('img');
          thumb.src = video.thumbnail;
          thumb.alt = video.title;
          thumb.addEventListener('click', () => {
            window.location.href = video.url;
          });

          // Video link
          const link = document.createElement('a');
          link.className = "folder-link";
          link.href = video.url;
          link.textContent = `${video.title} (${video.size})`;

          li.appendChild(thumb);
          li.appendChild(link);
          videoList.appendChild(li);
        });
      } else {
        folderTitle.innerHTML = `<h2>No videos found in ${folderName}</h2>`;
      }
    })
    .catch(err => {
      console.error("Failed to load videos.json:", err);
      folderTitle.innerHTML = "<h2>Failed to load folder</h2>";
    });
} else {
  folderTitle.innerHTML = "<h2>No folder selected</h2>";
}
</script>

</body>
</html>
