<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
  text-align: center;
}

.description {
  text-align: center;
  margin-bottom: 20px;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
}

.thumbnail {
  width: 100%;
  height: 350px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

.videoFrameWrapper {
  width: 100%;
  height: 350px;
  overflow: hidden;
  position: relative;
  border-radius: 8px;
}

.videoFrameWrapper iframe {
  width: 100%;
  height: 560px;
  position: absolute;
  top: -210px;
  left: 0;
  border: 0;
}

.videoTitle {
  text-align: center;
  margin: 8px 0 5px 0;
  color: #ddd;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  text-align: center;
  color: #aaa;
  margin: 5px 0;
}

.download {
  display: block;
  width: fit-content;
  margin: 10px auto 0 auto;
  padding: 8px 15px;
  color: #fff;
  background: #ff4444;
  font-weight: bold;
  text-decoration: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<button onclick="history.back()" style="
display:inline-block;
margin-bottom:15px;
padding:8px 14px;
background:#222;
color:#fff;
border:1px solid #ff4444;
border-radius:6px;
font-size:14px;
cursor:pointer;
">
← Back
</button>

<h2 id="folderTitle">Folder</h2>
<p class="description">Enjoy our videos, updated regularly for your viewing pleasure.</p>

<div id="videoList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("videoList");

const urlParams = new URLSearchParams(window.location.search);
const folderName = (urlParams.get("folder") || "").toLowerCase();

document.getElementById("folderTitle").textContent =
  folderName ? folderName.charAt(0).toUpperCase() + folderName.slice(1) : "All Videos";

fetch('videos.json')
.then(res => res.json())
.then(videos => {

  const IMAGE_BASE = "https://anywherecum.pages.dev/images/";

  const folderVideos = folderName
    ? videos.filter(v => v.folder.toLowerCase() === folderName)
    : videos;

  folderVideos.forEach((v) => {

    const box = document.createElement("div");
    box.className = "videoBox";

    const wrapper = document.createElement("div");
    wrapper.className = "videoFrameWrapper";

    const thumb = document.createElement("img");
    thumb.className = "thumbnail";
    thumb.src = IMAGE_BASE + v.thumbnail;

    thumb.onclick = () => {

      const iframe = document.createElement("iframe");
      iframe.src = v.url;
      iframe.setAttribute("allowfullscreen", "");
      iframe.setAttribute("allow", "autoplay");

      wrapper.innerHTML = "";
      wrapper.appendChild(iframe);

      // ✅ ADD CLICK OVERLAY FOR SECOND CLICK
      const overlay = document.createElement("div");
      overlay.style.position = "absolute";
      overlay.style.top = "0";
      overlay.style.left = "0";
      overlay.style.width = "100%";
      overlay.style.height = "100%";
      overlay.style.zIndex = "10";
      overlay.style.cursor = "pointer";
      overlay.style.background = "transparent";

      overlay.onclick = () => {
        window.location.href = `player.html?video=${encodeURIComponent(v.url)}`;
      };

      wrapper.appendChild(overlay);
    };

    wrapper.appendChild(thumb);

    const title = document.createElement("h3");
    title.className = "videoTitle";
    title.textContent = v.title;

    const viewsEl = document.createElement("div");
    viewsEl.className = "views";
    viewsEl.textContent = "👁 Loading...";

    const btn = document.createElement("a");
    btn.className = "download";
    btn.textContent = `Download (${v.size})`;
    btn.href = "#";

    box.appendChild(wrapper);
    box.appendChild(title);
    box.appendChild(viewsEl);
    box.appendChild(btn);

    container.appendChild(box);

  });

});
</script>

</body>
</html>
