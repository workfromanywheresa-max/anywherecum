<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

* {
  box-sizing: border-box;
}

.topBar {
  display: flex;
  justify-content: flex-start;
  margin-bottom: 10px;
}

button {
  background: #ff4444;
  color: #fff;
  border: none;
  padding: 6px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
}

h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

#folderDescription {
  text-align: center;
  color: #aaa;
  font-size: 14px;
}

#normalVideos {
  margin-bottom: 40px;
  min-height: 300px;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 30px;
  text-align: center;
  min-height: 250px;
}

.videoFrameWrapper {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  aspect-ratio: 16 / 9;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}

.videoFrameWrapper iframe,
.videoFrameWrapper img {
  width: 100%;
  height: 100%;
  border: 0;
  object-fit: cover;
  display: block;
}

select {
  padding: 5px;
  border-radius: 5px;
  border: none;
  background: #333;
  color: #fff;
  font-size: 12px;
  margin-bottom: 6px;
}

.videoTitle {
  margin: 6px 0;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  color: #aaa;
  margin: 2px 0;
  font-size: 12px;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
  margin-top: auto;
}

/* ===== GOOGLE TRANSLATE FIX ===== */
#google_translate_element {
  position: fixed !important;
  top: 0 !important;
  right: 0 !important;
  left: auto !important;
  z-index: 99999;
  margin: 0 !important;
  padding: 0 !important;
}

/* Container */
.goog-te-gadget {
  font-size: 0 !important; /* hides "Select Language" */
  background: transparent !important;
  margin: 0 !important;
  padding: 0 !important;
}

/* Dropdown only */
.goog-te-gadget select.goog-te-combo {
  font-size: 12px !important;
  padding: 3px 6px !important;
  background: #333 !important;
  color: #fff !important;
  border: none !important;
  border-radius: 4px;
  margin: 0 !important;
}

/* Hide everything else */
.goog-te-gadget span,
.goog-te-gadget a,
.goog-logo-link,
.goog-te-banner-frame,
.goog-te-gadget .goog-te-combo + span {
  display: none !important;
}

/* Remove top spacing */
body {
  top: 0 !important;
}

/* Hide translate banner */
.goog-te-banner-frame.skiptranslate {
  display: none !important;
}
</style>

<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "9f8d0573-08fa-4522-ab09-4a95fa2f442f"
  });
});
</script>

<script src="https://pl28956604.profitablecpmratenetwork.com/c7/ba/1d/c7ba1d0cd42bd7cbdf437d03bd000409.js"></script>

</head>

<body>

<!-- Google Translate -->
<div id="google_translate_element"></div>

<script>
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    layout: google.translate.TranslateElement.InlineLayout.HORIZONTAL,
    includedLanguages: 'af,ar,az,be,bg,ca,zh-CN,zh-TW,hr,cs,da,nl,en,eo,et,fi,fr,de,el,he,hi,hu,is,id,it,ja,ko,lv,lt,mk,ms,mt,no,pl,pt,ro,ru,sr,sk,sl,es,sw,sv,th,tr,uk,vi'
  }, 'google_translate_element');
}
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<div class="topBar">
  <button onclick="history.back()">← Back</button>
</div>

<h2 id="folderTitle">Folder</h2>
<p id="folderDescription">
  Enjoy our videos, updated regularly for your viewing pleasure.
</p>

<div id="normalVideos"></div>

<footer>
© 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>
window.VIDEO_CONFIG = {
  dataSource: "videos.json"
};
</script>

<script type="module" src="views2.js"></script>

</body>
</html>
