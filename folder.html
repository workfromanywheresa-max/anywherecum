<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

button {
  background: #444;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 15px;
}

h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
}

.thumbnail {
  width: 100%;
  height: 350px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

.videoFrameWrapper {
  width: 100%;
  height: 350px;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
}

.videoFrameWrapper iframe {
  width: 100%;
  height: 560px;
  position: absolute;
  top: -210px;
  left: 0;
  border: 0;
}

.videoTitle {
  text-align: center;
  margin: 8px 0;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  text-align: center;
  color: #aaa;
}
</style>
</head>

<body>

<button onclick="history.back()">← Back</button>

<h2 id="folderTitle">Folder</h2>

<div id="trendingVideos"></div>
<div id="normalVideos"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

/* Firebase */
const app = initializeApp({
  apiKey: "AIzaSyCEX...",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

/* Session */
let sessionId = sessionStorage.getItem("sessionId");
if (!sessionId) {
  sessionId = Date.now() + "_" + Math.random();
  sessionStorage.setItem("sessionId", sessionId);
}

/* Worker */
async function sendToWorker(videoId) {
  await fetch("https://anywherecum.workers.dev/increment", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ videoId })
  });
}

/* Increase views */
function increaseViews(videoId) {
  sendToWorker(videoId);
}

/* Containers */
const trendingContainer = document.getElementById("trendingVideos");
const normalContainer = document.getElementById("normalVideos");

const videoElements = {};

/* UI Controller (ONLY place that updates UI) */
function updateUI(id) {
  const v = videoElements[id];
  if (!v) return;

  const total = v.totalViews || 0;
  const cycle = v.cycleViews || 0;

  const isTrending = cycle >= 10;

  // Move video
  const target = isTrending ? trendingContainer : normalContainer;
  if (v.box.parentElement !== target) {
    target.appendChild(v.box);
  }

  // Show TOTAL views only (as you requested)
  v.views.textContent = isTrending
    ? `🔥 Trending | 👁 ${total}`
    : `👁 ${total}`;

  v.views.style.color = isTrending ? "#ffcc00" : "#aaa";
}

/* Load videos */
fetch("videos.json")
.then(res => res.json())
.then(videos => {

  videos.forEach(v => {

    const box = document.createElement("div");
    box.className = "videoBox";

    const wrapper = document.createElement("div");
    wrapper.className = "videoFrameWrapper";

    const thumb = document.createElement("img");
    thumb.className = "thumbnail";
    thumb.src = "https://anywherecum.pages.dev/images/" + v.thumbnail;

    thumb.onclick = () => {
      increaseViews(v.id);

      const iframe = document.createElement("iframe");
      iframe.src = v.url;
      iframe.allowFullscreen = true;

      wrapper.innerHTML = "";
      wrapper.appendChild(iframe);
    };

    wrapper.appendChild(thumb);

    const title = document.createElement("h3");
    title.className = "videoTitle";
    title.textContent = v.title;

    title.onclick = () => {
      increaseViews(v.id);
      window.open(v.url, "_blank");
    };

    const views = document.createElement("div");
    views.className = "views";
    views.textContent = "👁 0";

    box.appendChild(wrapper);
    box.appendChild(title);
    box.appendChild(views);

    normalContainer.appendChild(box);

    videoElements[v.id] = {
      box,
      views,
      totalViews: 0,
      cycleViews: 0
    };

    /* TOTAL VIEWS (display only) */
    onValue(ref(db, "views/" + v.id), snap => {
      videoElements[v.id].totalViews = snap.val() || 0;
      updateUI(v.id);
    });

    /* CYCLE VIEWS (controls trending ONLY) */
    onValue(ref(db, "cycleViews/" + v.id), snap => {
      videoElements[v.id].cycleViews = Number(snap.val()) || 0;
      updateUI(v.id);
    });

  });

});
</script>

</body>
</html>
