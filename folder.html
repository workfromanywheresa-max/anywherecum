<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folder Videos</title>

<style>
body { font-family:Arial,sans-serif; background:#1a1a1a; color:#fff; margin:0; padding:15px; }
h2 { color:#ff4444; border-bottom:2px solid #ff4444; padding-bottom:5px; text-align:center; }
.description { text-align:center; color:#fff; margin-bottom:20px; }

.videoBox { 
  background:#222; 
  padding:10px; 
  border-radius:8px; 
  margin-bottom:20px;
  transition: transform 0.4s ease, opacity 0.3s ease; /* ✅ added */
}

.preview {
  width:100%;
  height:220px;
  cursor:pointer;
  overflow:hidden;
  border-radius:5px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.preview img {
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:5px;
  transition: opacity 0.3s ease, transform 0.3s ease;
  opacity:0;
}

.preview img.loaded { opacity:1; }
.preview img:hover { transform:scale(1.05); }

.videoTitle {
  text-align:center;
  margin:4px 0;
  color:#ddd;
  font-size:16px;
  cursor:pointer;
  text-decoration:underline;
}
.videoTitle:hover { color:#fff; }

.views { text-align:center; color:#aaa; margin:5px 0; }

.download {
  display:block;
  width:fit-content;
  margin:6px auto;
  padding:8px 15px;
  color:#fff;
  background:#ff4444;
  font-weight:bold;
  text-decoration:none;
  border-radius:5px;
}
.download:hover { background:#ff2222; }

/* Skeleton */
.skeleton { position:relative; overflow:hidden; background:#2a2a2a; }
.skeleton::after {
  content:"";
  position:absolute;
  top:0; left:-150px;
  width:150px; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
  animation:shimmer 1.2s infinite;
}
@keyframes shimmer { 100% { transform:translateX(300px);} }

.skeleton-img { height:220px; }
.skeleton-text { height:14px; width:70%; margin:10px auto; }
.skeleton-btn { height:34px; width:120px; margin:10px auto; }
</style>

<script>
const params = new URLSearchParams(window.location.search);
const rawFolder = params.get('folder') || '';
const folderName = rawFolder.toLowerCase();

const displayFolder = rawFolder
  .replace(/-/g," ")
  .replace(/\b\w/g,c=>c.toUpperCase());

document.getElementById("folderTitle").textContent = displayFolder + " Folder";
document.getElementById("folderDesc").textContent =
`Enjoy our latest ${displayFolder} videos.`;

// Skeleton
const container = document.getElementById("videoList");
for (let i = 0; i < 6; i++) {
  const box = document.createElement("div");
  box.className = "videoBox";
  box.innerHTML = `
    <div class="preview skeleton skeleton-img"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-btn"></div>
  `;
  container.appendChild(box);
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = { apiKey:"AIzaSy..." };

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("videoList");
const OWNER_IP = "102.214.117.74";

async function getUserIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    return (await res.json()).ip;
  } catch { return null; }
}

function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(".0","") + "M+";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(".0","") + "K+";
  return num;
}

async function increaseViews(videoId){
  const userIP = await getUserIP();
  if (userIP && userIP === OWNER_IP) return;

  runTransaction(ref(db,"views/"+videoId),(v)=>(v||0)+1);

  runTransaction(ref(db,"viewTimes/"+videoId),(current)=>{
    const now = Date.now();
    let arr = current ? Object.values(current) : [];
    arr.push(now);
    if(arr.length > 200) arr = arr.slice(-200);
    const obj = {};
    arr.forEach((t,i)=> obj[i]=t);
    return obj;
  });
}

const videoStates = {};

fetch('videos.json')
.then(res=>res.json())
.then(videos=>{

  container.innerHTML = "";

  const folderVideos = videos.filter(v =>
    v.folder.toLowerCase() === folderName
  );

  folderVideos.forEach(v=>{

    const box = document.createElement("div");
    box.className = "videoBox";

    const img = document.createElement("img");
    img.src = v.thumbnail;

    const title = document.createElement("h3");
    title.textContent = v.title;

    const viewsEl = document.createElement("div");

    let timestamps = [];

    function getLast24hCount(){
      const now = Date.now();
      return timestamps.filter(t => now - t <= 86400000).length;
    }

    function updateUI(){
      const last24h = getLast24hCount();
      viewsEl.textContent = last24h >= 10
        ? "🔥Trending"
        : "👁Views";
    }

    videoStates[v.id] = {
      element: box,
      getScore: () => getLast24hCount()
    };

    // ✅ UPDATED SORT (ONLY ≥10 + animation)
    function sortVideos(){

      const items = Object.values(videoStates);

      const firstPositions = new Map();
      items.forEach(item => {
        firstPositions.set(item.element, item.element.getBoundingClientRect());
      });

      const sorted = items.sort((a, b) => {
        const scoreA = a.getScore();
        const scoreB = b.getScore();

        const isTrendingA = scoreA >= 10;
        const isTrendingB = scoreB >= 10;

        if (isTrendingA && isTrendingB) return scoreB - scoreA;
        if (isTrendingA) return -1;
        if (isTrendingB) return 1;

        return 0;
      });

      sorted.forEach(v => container.appendChild(v.element));

      sorted.forEach(item => {
        const el = item.element;
        const first = firstPositions.get(el);
        const last = el.getBoundingClientRect();
        const deltaY = first.top - last.top;

        if (deltaY !== 0) {
          el.style.transform = `translateY(${deltaY}px)`;
          requestAnimationFrame(() => {
            el.style.transform = "";
          });
        }
      });
    }

    onValue(ref(db,"viewTimes/"+v.id),snap=>{
      timestamps = snap.val() ? Object.values(snap.val()) : [];
      updateUI();
      sortVideos();
    });

    box.appendChild(img);
    box.appendChild(title);
    box.appendChild(viewsEl);
    container.appendChild(box);
  });

});
</script>

</body>
</html>
