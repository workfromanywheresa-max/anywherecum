<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

#folderDescription {
  text-align: center;
  color: #aaa;
  font-size: 14px;
  margin-top: 5px;
}

.sectionTitle {
  margin-top: 20px;
  margin-bottom: 10px;
  text-align: center;
  font-weight: bold;
  color: #ffcc00;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
}

.thumbnail {
  width: 100%;
  height: 350px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

.videoFrameWrapper {
  width: 100%;
  height: 350px;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
}

.videoFrameWrapper iframe {
  width: 100%;
  height: 560px;
  position: absolute;
  top: -210px;
  left: 0;
  border: 0;
}

.videoTitle {
  text-align: center;
  margin: 8px 0;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  text-align: center;
  color: #aaa;
}

.download {
  display: block;
  width: fit-content;
  margin: 10px auto;
  padding: 8px 15px;
  background: #ff4444;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<button onclick="history.back()">← Back</button>

<h2 id="folderTitle">Folder</h2>
<p id="folderDescription">
  Enjoy our videos, updated regularly for your viewing pleasure.
</p>

<div id="trendingContainer">
  <div class="sectionTitle">🔥 Trending</div>
  <div id="trendingVideos"></div>
</div>

<div id="normalContainer">
  <div class="sectionTitle">📺 All Videos</div>
  <div id="normalVideos"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

/* ---------------- Firebase Config (READ ONLY) ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:78827198d1be2904d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------------- Session ---------------- */
let sessionId = sessionStorage.getItem("sessionId");
if (!sessionId) {
  sessionId = Date.now() + "_" + Math.random();
  sessionStorage.setItem("sessionId", sessionId);
}

/* ---------------- Folder ---------------- */
const params = new URLSearchParams(window.location.search);
const folderName = (params.get("folder") || "").toLowerCase();

document.getElementById("folderTitle").textContent =
  folderName
    ? folderName.charAt(0).toUpperCase() + folderName.slice(1)
    : "ALL VIDEOS";

/* ---------------- Get IP ---------------- */
async function getUserIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  } catch {
    return null;
  }
}

const OWNER_IP = "102.214.117.74";

/* ---------------- Send to Worker ONLY ---------------- */
async function increaseViews(videoId) {
  const userIP = await getUserIP();
  if (userIP && userIP === OWNER_IP) return;

  try {
    await fetch("https://anywherecum.workfromanywhere-sa.workers.dev/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ videoId })
    });
  } catch (err) {
    console.error("Worker send failed:", err);
  }
}

/* ---------------- Load Videos ---------------- */
const trendingContainer = document.getElementById("trendingVideos");
const normalContainer = document.getElementById("normalVideos");

// Keep track of DOM elements for live updates
const videoElements = {};

fetch("videos.json")
.then(res => res.json())
.then(videos => {

  const filtered = folderName
    ? videos.filter(v => v.folder.toLowerCase() === folderName)
    : videos;

  // Render each video and listen to cycleViews
  filtered.forEach(v => {
    const box = document.createElement("div");
    box.className = "videoBox";

    const wrapper = document.createElement("div");
    wrapper.className = "videoFrameWrapper";

    const thumb = document.createElement("img");
    thumb.className = "thumbnail";
    thumb.src = "https://anywherecum.pages.dev/images/" + v.thumbnail;

    thumb.onclick = () => {
      increaseViews(v.id);

      const iframe = document.createElement("iframe");
      iframe.src = v.url;
      iframe.allowFullscreen = true;

      wrapper.innerHTML = "";
      wrapper.appendChild(iframe);
    };

    wrapper.appendChild(thumb);

    const title = document.createElement("h3");
    title.className = "videoTitle";
    title.textContent = v.title;

    title.onclick = () => {
      increaseViews(v.id);
      window.open(v.url, "_blank");
    };

    const views = document.createElement("div");
    views.className = "views";
    views.textContent = "👁 loading...";

    const btn = document.createElement("a");
    btn.className = "download";
    btn.textContent = "Download";
    btn.href = "#";

    btn.onclick = (e) => {
      e.preventDefault();
      increaseViews(v.id);
      window.open(v.url, "_blank");
    };

    box.appendChild(wrapper);
    box.appendChild(title);
    box.appendChild(views);
    box.appendChild(btn);

    // Initially put in normal container
    normalContainer.appendChild(box);

    // Save for live updates
    videoElements[v.id] = { box, views, currentSection: "normal" };

    // Listen for live cycleViews changes (READ ONLY)
    const cycleRef = ref(db, "cycleViews/" + v.id);
    onValue(cycleRef, snap => {
      const cycleViews = snap.val() || 0;

      if (cycleViews >= 10) {
        videoElements[v.id].views.textContent = `🔥 Trending | 👁 ${cycleViews}`;
        videoElements[v.id].views.style.color = "#ffcc00";

        if (videoElements[v.id].currentSection !== "trending") {
          trendingContainer.appendChild(videoElements[v.id].box);
          videoElements[v.id].currentSection = "trending";
        }
      } else {
        videoElements[v.id].views.textContent = `👁 ${cycleViews}`;
        videoElements[v.id].views.style.color = "#aaa";

        if (videoElements[v.id].currentSection !== "normal") {
          const originalIndex = filtered.findIndex(vi => vi.id === v.id);

          if (originalIndex === 0 || normalContainer.children.length === 0) {
            normalContainer.prepend(videoElements[v.id].box);
          } else {
            let inserted = false;
            for (let i = 0; i < normalContainer.children.length; i++) {
              const siblingId = filtered.find(f => f.title === normalContainer.children[i].querySelector(".videoTitle").textContent).id;
              if (filtered.findIndex(f => f.id === siblingId) > originalIndex) {
                normalContainer.insertBefore(videoElements[v.id].box, normalContainer.children[i]);
                inserted = true;
                break;
              }
            }
            if (!inserted) normalContainer.appendChild(videoElements[v.id].box);
          }

          videoElements[v.id].currentSection = "normal";
        }
      }
    });
  });
});
</script>

</body>
</html>
