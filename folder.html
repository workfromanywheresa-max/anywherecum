<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  color: #ff4444;
  text-align: center;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
}

.videoFrameWrapper {
  width: 100%;
  height: 350px;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
}

/* Thumbnail */
.thumbnail {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  cursor: pointer;
}

/* Iframe keeps YOUR original sizing */
.videoFrameWrapper iframe {
  width: 100%;
  height: 560px;
  position: absolute;
  top: -210px;
  left: 0;
  border: 0;
}

.views {
  text-align: center;
  color: #aaa;
  margin-top: 5px;
}
</style>
</head>

<body>

<h2 id="folderTitle">Folder</h2>

<div id="trendingVideos"></div>
<div id="normalVideos"></div>

<script type="module">
import { increaseViews, bindVideo } from "./views2.js";

/* ---------------- Containers ---------------- */
const trendingContainer = document.getElementById("trendingVideos");
const normalContainer = document.getElementById("normalVideos");

/* ---------------- Load Videos ---------------- */
fetch("videos.json")
.then(res => res.json())
.then(videos => {

  videos.forEach(v => {

    const box = document.createElement("div");
    box.className = "videoBox";

    const wrapper = document.createElement("div");
    wrapper.className = "videoFrameWrapper";

    const thumb = document.createElement("img");
    thumb.className = "thumbnail";
    thumb.src = "https://anywherecum.pages.dev/images/" + v.thumbnail;

    wrapper.appendChild(thumb);

    const title = document.createElement("h3");
    title.textContent = v.title;

    const views = document.createElement("div");
    views.className = "views";
    views.textContent = "👁 0";

    box.appendChild(wrapper);
    box.appendChild(title);
    box.appendChild(views);

    normalContainer.appendChild(box);

    bindVideo(
      v,
      { box, wrapper, thumb, views },
      { trendingContainer, normalContainer }
    );

  });

});
</script>

</body>
</html>
