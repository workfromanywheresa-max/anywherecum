<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
}

.thumbnail {
  width: 100%;
  height: 350px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

.videoFrameWrapper {
  width: 100%;
  height: 350px;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
}

.videoFrameWrapper iframe {
  width: 100%;
  height: 560px;
  position: absolute;
  top: -210px;
  left: 0;
  border: 0;
}

.videoTitle {
  text-align: center;
  margin: 8px 0;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  text-align: center;
  color: #aaa;
}

.download {
  display: block;
  width: fit-content;
  margin: 10px auto;
  padding: 8px 15px;
  background: #ff4444;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<button onclick="history.back()">← Back</button>

<h2 id="folderTitle">ALL VIDEOS</h2>

<div id="videoList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

/* ---------------- Firebase Config (READ ONLY) ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:78827198d1be2904d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------------- Session ---------------- */
let sessionId = sessionStorage.getItem("sessionId");
if (!sessionId) {
  sessionId = Date.now() + "_" + Math.random();
  sessionStorage.setItem("sessionId", sessionId);
}

/* ---------------- Get IP ---------------- */
async function getUserIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  } catch {
    return null;
  }
}

const OWNER_IP = "102.214.117.74";

/* ---------------- Send Event to Worker ---------------- */
function sendEvent(videoId) {
  fetch("https://anywherecum.workfromanywhere-sa.workers.dev/", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "view",
      videoId,
      sessionId,
      timestamp: Date.now()
    })
  }).catch(err => console.log("Worker error:", err));
}

/* ---------------- Get Stats ---------------- */
function getVideoStats(videoId, callback) {
  const viewRef = ref(db, "views/" + videoId);
  const cycleRef = ref(db, "cycleViews/" + videoId);

  let totalViews = 0;
  let cycleViews = 0;

  onValue(viewRef, snap => {
    totalViews = snap.val() || 0;
    callback({ totalViews, cycleViews });
  });

  onValue(cycleRef, snap => {
    cycleViews = snap.val() || 0;
    callback({ totalViews, cycleViews });
  });
}

/* ---------------- Load Videos ---------------- */
const container = document.getElementById("videoList");

fetch("videos.json")
.then(res => res.json())
.then(videos => {

  videos.forEach(v => {

    const box = document.createElement("div");
    box.className = "videoBox";

    const wrapper = document.createElement("div");
    wrapper.className = "videoFrameWrapper";

    const thumb = document.createElement("img");
    thumb.className = "thumbnail";
    thumb.src = "https://anywherecum.pages.dev/images/" + v.thumbnail;

    thumb.onclick = () => {
      sendEvent(v.id);

      const iframe = document.createElement("iframe");
      iframe.src = v.url;
      iframe.allowFullscreen = true;

      wrapper.innerHTML = "";
      wrapper.appendChild(iframe);
    };

    wrapper.appendChild(thumb);

    const title = document.createElement("h3");
    title.className = "videoTitle";
    title.textContent = v.title;

    title.onclick = () => {
      sendEvent(v.id);
      window.open(v.url, "_blank");
    };

    const views = document.createElement("div");
    views.className = "views";
    views.textContent = "👁 loading...";

    getVideoStats(v.id, ({ totalViews, cycleViews }) => {
      if (cycleViews >= 10) {
        views.textContent = "🔥 Trending | 👁 " + totalViews;
        views.style.color = "#ffcc00";
      } else {
        views.textContent = "👁 " + totalViews;
      }
    });

    const btn = document.createElement("a");
    btn.className = "download";
    btn.textContent = "Download";
    btn.href = "#";

    btn.onclick = (e) => {
      e.preventDefault();
      sendEvent(v.id);
      window.open(v.url, "_blank");
    };

    box.appendChild(wrapper);
    box.appendChild(title);
    box.appendChild(views);
    box.appendChild(btn);

    container.appendChild(box);
  });
});
</script>

</body>
</html>
