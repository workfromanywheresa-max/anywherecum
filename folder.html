<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

button {
  background: #444;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 15px;
}

h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

#folderDescription {
  text-align: center;
  color: #aaa;
  font-size: 14px;
  margin-top: 5px;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
}

.thumbnail {
  width: 100%;
  height: 350px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

.videoFrameWrapper {
  width: 100%;
  height: 350px;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
}

.videoFrameWrapper iframe {
  width: 100%;
  height: 560px;
  position: absolute;
  top: -210px;
  left: 0;
  border: 0;
}

.videoTitle {
  text-align: center;
  margin: 8px 0;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  text-align: center;
  color: #aaa;
}

.download {
  display: block;
  width: fit-content;
  margin: 10px auto;
  padding: 8px 15px;
  background: #ff4444;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<button onclick="history.back()">← Back</button>

<h2 id="folderTitle">Folder</h2>
<p id="folderDescription">
  Enjoy our videos, updated regularly for your viewing pleasure.
</p>

<div id="trendingVideos"></div>
<div id="normalVideos"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

/* ---------------- Firebase Config ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:78827198d1be2904d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ---------------- Session ---------------- */
let sessionId = sessionStorage.getItem("sessionId");
if (!sessionId) {
  sessionId = Date.now() + "_" + Math.random();
  sessionStorage.setItem("sessionId", sessionId);
}

/* ---------------- Folder ---------------- */
const params = new URLSearchParams(window.location.search);
const folderName = (params.get("folder") || "").toLowerCase();

document.getElementById("folderTitle").textContent =
  folderName ? folderName.charAt(0).toUpperCase() + folderName.slice(1) : "ALL VIDEOS";

/* ---------------- IP Check ---------------- */
async function getUserIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  } catch {
    return null;
  }
}

const OWNER_IP = "102.214.117.74";

/* ---------------- Worker ---------------- */
async function sendToWorker(videoId) {
  try {
    await fetch("https://anywherecum.workfromanywhere-sa.workers.dev/increment", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ videoId })
    });
  } catch (err) {
    console.error("Worker send failed:", err);
  }
}

/* ---------------- Views ---------------- */
async function increaseViews(videoId) {
  const userIP = await getUserIP();
  if (userIP && userIP === OWNER_IP) return;
  sendToWorker(videoId);
}

/* ---------------- Containers ---------------- */
const trendingContainer = document.getElementById("trendingVideos");
const normalContainer = document.getElementById("normalVideos");

const videoElements = {};

/* ---------------- Load Videos ---------------- */
fetch("videos.json")
.then(res => res.json())
.then(videos => {

  const filtered = folderName
    ? videos.filter(v => v.folder.toLowerCase() === folderName)
    : videos;

  filtered.forEach(v => {

    const box = document.createElement("div");
    box.className = "videoBox";

    const wrapper = document.createElement("div");
    wrapper.className = "videoFrameWrapper";

    const thumb = document.createElement("img");
    thumb.className = "thumbnail";
    thumb.src = "https://anywherecum.pages.dev/images/" + v.thumbnail;

    thumb.onclick = () => {
      increaseViews(v.id);

      const iframe = document.createElement("iframe");
      iframe.src = v.url;
      iframe.allowFullscreen = true;

      wrapper.innerHTML = "";
      wrapper.appendChild(iframe);
    };

    wrapper.appendChild(thumb);

    const title = document.createElement("h3");
    title.className = "videoTitle";
    title.textContent = v.title;

    title.onclick = () => {
      increaseViews(v.id);
      window.open(v.url, "_blank");
    };

    const views = document.createElement("div");
    views.className = "views";
    views.textContent = "👁 0";

    const btn = document.createElement("a");
    btn.className = "download";
    btn.textContent = "Download";
    btn.href = "#";

    btn.onclick = (e) => {
      e.preventDefault();
      increaseViews(v.id);
      window.open(v.url, "_blank");
    };

    box.appendChild(wrapper);
    box.appendChild(title);
    box.appendChild(views);
    box.appendChild(btn);

    normalContainer.appendChild(box);

    videoElements[v.id] = { box, views };

    /* ---------------- Views Listener ---------------- */
    const viewsRef = ref(db, "views/" + v.id);
    onValue(viewsRef, snap => {
      const totalViews = snap.val() || 0;

      videoElements[v.id].views.textContent =
        totalViews >= 10
          ? `🔥 Trending | 👁 ${totalViews}`
          : `👁 ${totalViews}`;

      videoElements[v.id].views.style.color =
        totalViews >= 10 ? "#ffcc00" : "#aaa";
    });

    /* ---------------- Cycle Views Listener (FIXED) ---------------- */
    const cycleRef = ref(db, "cycleViews/" + v.id);

    onValue(cycleRef, snap => {
      const value = snap.val();
      const cycleViews = Number(value) || 0;

      const videoObj = videoElements[v.id];
      if (!videoObj) return;

      const box = videoObj.box;

      const shouldBeTrending = cycleViews >= 10;
      const targetContainer = shouldBeTrending
        ? trendingContainer
        : normalContainer;

      // Only move if needed
      if (box.parentElement !== targetContainer) {
        targetContainer.appendChild(box);
      }

      // Update UI label
      videoObj.views.textContent =
        shouldBeTrending
          ? `🔥 Trending | 👁 ${cycleViews}`
          : `👁 ${cycleViews}`;

      videoObj.views.style.color =
        shouldBeTrending ? "#ffcc00" : "#aaa";
    });

  });

});
</script>

</body>
</html>
