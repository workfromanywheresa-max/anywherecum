<style>
.slide-up {
  animation: slideUp 0.6s ease-out forwards;
}

.slide-down {
  animation: slideDown 0.4s ease-in forwards;
}

@keyframes slideUp {
  from {
    bottom: -200px;
    opacity: 0;
  }
  to {
    bottom: 0;
    opacity: 1;
  }
}

@keyframes slideDown {
  from {
    bottom: 0;
    opacity: 1;
  }
  to {
    bottom: -200px;
    opacity: 0;
  }
}

@keyframes glow {
  0% { box-shadow:0 0 2px #fff,0 0 5px red; opacity:.8; }
  50% { box-shadow:0 0 6px #fff,0 0 12px red; opacity:1; }
  100% { box-shadow:0 0 2px #fff,0 0 5px red; opacity:.8; }
}
</style>

<script>
const ad = document.getElementById("bottomAd");
const countdownEl = document.getElementById("countdown");
const closeBtn = document.getElementById("closeBtn");

let countdownInterval;
let cycleTimeout;

// Show ad
function showAd() {
  ad.style.display = "block";
  ad.classList.remove("slide-down");
  ad.classList.add("slide-up");

  closeBtn.style.display = "none";

  let timeLeft = 15;
  countdownEl.textContent = timeLeft + "s";

  clearInterval(countdownInterval);

  // Delay countdown start to avoid rendering conflicts with ads
  setTimeout(() => {
    countdownInterval = setInterval(() => {
      timeLeft--;
      countdownEl.textContent = timeLeft + "s";

      if (timeLeft <= 0) {
        clearInterval(countdownInterval);
        closeBtn.style.display = "block";
      }
    }, 1000);
  }, 300);
}

// Hide ad
function hideAd() {
  ad.classList.remove("slide-up");
  ad.classList.add("slide-down");

  setTimeout(() => {
    ad.style.display = "none";
    scheduleNextAd();
  }, 400);
}

// Schedule next ad in 1 minute
function scheduleNextAd() {
  clearTimeout(cycleTimeout);

  cycleTimeout = setTimeout(() => {
    showAd();
  }, 120000);
}

// Initial load
window.onload = function () {
  setTimeout(() => {
    showAd();
    scheduleNextAd();
  }, 10000);
};
</script>
