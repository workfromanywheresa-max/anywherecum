<script>
document.addEventListener("DOMContentLoaded", function () {

  const ad = document.getElementById("topAdMain");
  const countdownEl = document.getElementById("mainCountdown");
  const closeBtn = document.getElementById("mainCloseBtn");

  let countdownInterval;
  let cycleTimeout;

  function showAd() {
    ad.style.top = "10px";

    let timeLeft = 15;

    countdownEl.style.display = "block";
    closeBtn.style.display = "none";

    countdownEl.textContent = timeLeft + "s";

    clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
      timeLeft--;
      countdownEl.textContent = timeLeft + "s";

      if (timeLeft <= 0) {
        clearInterval(countdownInterval);

        countdownEl.style.display = "none";
        closeBtn.style.display = "flex";
      }
    }, 1000);
  }

  function hideMainAd() {
    ad.style.top = "-80px";

    clearInterval(countdownInterval);

    clearTimeout(cycleTimeout);
    cycleTimeout = setTimeout(showAd, 120000);
  }

  closeBtn.addEventListener("click", hideMainAd);

  setTimeout(() => {
    showAd();
  }, 30000);

});
</script>

<script>

/* ================= VIP ================= */
async function loadVIP() {
  const res = await fetch('./vip.json');
  const data = await res.json();

  const container = document.getElementById('vipList');
  container.innerHTML = '';

  if (!data.length) return;

  data.sort((a, b) => new Date(b.date) - new Date(a.date));

  const vip = data[0];

  const card = document.createElement('div');
  card.className = 'card';

  const img = document.createElement('img');
  img.src = "https://anywherecum.pages.dev/images/" + vip.thumbnail;

  const link = document.createElement('a');

  const shortlink = "https://fc-lc.xyz/al0L8qyP";

  link.href = shortlink;
  link.target = "_blank";
  link.textContent = vip.folder;

  card.onclick = () => {
    window.open(shortlink, "_blank");
  };

  card.appendChild(img);
  card.appendChild(link);

  container.appendChild(card);
}

/* ================= FOLDERS ================= */
async function loadFolders() {
  const res = await fetch('./videos.json');
  const data = await res.json();

  const folders = {};

  data.forEach(v => {
    if (!folders[v.folder]) folders[v.folder] = [];
    folders[v.folder].push(v);
  });

  const container = document.getElementById('folderList');
  container.innerHTML = '';

  Object.keys(folders)
    .sort()
    .forEach(name => {

      const vids = folders[name]
        .sort((a,b)=>new Date(b.date)-new Date(a.date));

      const latest = vids[0];

      const card = document.createElement('div');
      card.className = 'card';

      const img = document.createElement('img');
      img.src = "https://anywherecum.pages.dev/images/" + latest.thumbnail;

      const link = document.createElement('a');
      link.href = "folder.html?folder=" + encodeURIComponent(name);
      link.textContent = name;

      card.onclick = () => {
        window.location.href = link.href;
      };

      card.appendChild(img);
      card.appendChild(link);

      container.appendChild(card);
    });
}

/* ================= INIT ================= */
window.addEventListener('load', () => {
  loadVIP();
  loadFolders();
});

</script>
