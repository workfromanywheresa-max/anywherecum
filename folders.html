<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folders</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  text-align: center;
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

.folderBox {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.folderBox:hover {
  transform: scale(1.02);
}

.thumbnail {
  width: 100px;
  height: 70px;
  object-fit: cover;
  border-radius: 6px;
}

.folderTitle {
  font-size: 16px;
  color: #ddd;
  margin: 0;
}

/* ✅ CTA CARD (half height + overlap effect) */
.ctaCard {
  background: #2a2a2a;
  border: 1px solid #ff4444;
  border-radius: 8px;
  padding: 6px 10px; /* smaller = half height */
  margin-top: -5px; /* 👈 makes it "touch" VIP cards */
  margin-bottom: 20px;
  text-align: center;
}

.ctaCard a {
  color: #00ffcc;
  text-decoration: none;
  font-size: 14px;
}

.ctaCard a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<h2>Folders</h2>

<div id="folderList"></div>

<script>
const container = document.getElementById("folderList");
const IMAGE_BASE = "https://anywherecum.pages.dev/images/";

// 🔥 helper to extract folders
function extractFolders(videos) {
  const folders = {};

  videos.forEach(video => {
    if (!video.folder) return;

    if (!folders[video.folder]) {
      folders[video.folder] = video;
    }
  });

  return folders;
}

// 🔥 helper to render folders
function renderFolders(folders) {
  Object.keys(folders).forEach(folderName => {

    const video = folders[folderName];

    const box = document.createElement("div");
    box.className = "folderBox";

    box.onclick = () => {
      window.location.href = "folder.html?folder=" + encodeURIComponent(folderName);
    };

    const img = document.createElement("img");
    img.className = "thumbnail";
    img.src = IMAGE_BASE + (video.thumbnail || "");

    const title = document.createElement("h3");
    title.className = "folderTitle";
    title.textContent = folderName;

    box.appendChild(img);
    box.appendChild(title);

    container.appendChild(box);
  });
}

// 🔥 load BOTH json files
Promise.all([
  fetch("vip.json").then(res => res.json()).catch(() => []),
  fetch("videos.json").then(res => res.json()).catch(() => [])
])
.then(([vipVideos, normalVideos]) => {

  const vipFolders = extractFolders(vipVideos);
  const normalFolders = extractFolders(normalVideos);

  // 🔥 VIP FIRST
  renderFolders(vipFolders);

  // ✅ ADD CTA CARD UNDER VIP
  if (Object.keys(vipFolders).length > 0) {
    const cta = document.createElement("div");
    cta.className = "ctaCard";
    cta.innerHTML = `
      <a href="https://streamtape.com/v/84Lgxedm03F2lV/AnywhereCum_20260315_100916372.mp4" target="_blank">
        Click & Watch how to unlock Free VIP Access
      </a>
    `;
    container.appendChild(cta);
  }

  // 🔥 then normal folders
  renderFolders(normalFolders);

  if (
    Object.keys(vipFolders).length === 0 &&
    Object.keys(normalFolders).length === 0
  ) {
    container.innerHTML = "<p style='text-align:center;color:#aaa;'>No folders found.</p>";
  }

})
.catch(err => {
  console.error(err);
  container.innerHTML = "<p style='text-align:center;color:#aaa;'>Failed to load folders.</p>";
});
</script>

</body>
</html>
