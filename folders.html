<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folders</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  text-align: center;
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

.folderBox {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.2s;

  /* ✅ FIX: prevent tap-to-search / text selection */
  user-select: none;
  -webkit-user-select: none;
}

.folderBox * {
  user-select: none;
  -webkit-user-select: none;
}

.folderBox:hover {
  transform: scale(1.02);
}

.thumbnail {
  width: 100px;
  height: 70px;
  object-fit: cover;
  border-radius: 6px;
}

.folderTitle {
  font-size: 16px;
  color: #ddd;
  margin: 0;
}

/* CTA CARD */
.ctaCard {
  background: #2a2a2a;
  border: 1px solid #ff4444;
  border-radius: 8px;
  padding: 10px;
  margin-top: 0;
  margin-bottom: 20px;
  text-align: center;
}

.ctaContent {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.ctaContent a {
  color: #00ffcc;
  text-decoration: none;
  font-size: 10px;
  font-weight: bold;
}

.ctaContent a:hover {
  text-decoration: underline;
}

.arrow {
  font-size: 18px;
  color: #ff4444;
  animation: bounce 1s infinite;
}

.arrow.left {
  animation-delay: 0s;
}

.arrow.right {
  animation-delay: 0.3s;
}

@keyframes bounce {
  0%, 100% {
    transform: translateX(0);
    opacity: 0.7;
  }
  50% {
    transform: translateX(6px);
    opacity: 1;
  }
}
</style>
</head>

<body>

<h2>Folders</h2>

<div id="vipContainer"></div>
<div id="normalContainer"></div>

<script>
const vipContainer = document.getElementById("vipContainer");
const normalContainer = document.getElementById("normalContainer");

const IMAGE_BASE = "https://anywherecum.pages.dev/images/";

// Extract folders
function extractFolders(videos) {
  const folders = {};
  videos.forEach(video => {
    if (!video.folder) return;
    if (!folders[video.folder]) {
      folders[video.folder] = video;
    }
  });
  return folders;
}

// Render folders
function renderFolders(container, folders, isVip = false) {
  Object.keys(folders).forEach(folderName => {

    const video = folders[folderName];

    const box = document.createElement("div");
    box.className = "folderBox";

    // ✅ Reliable click handling
    box.addEventListener("click", (e) => {
      e.preventDefault();
      if (isVip) {
        window.location.href = "https://fc-lc.xyz/al0L8qyP";
      } else {
        window.location.href = "folder.html?folder=" + encodeURIComponent(folderName);
      }
    });

    const img = document.createElement("img");
    img.className = "thumbnail";
    img.src = IMAGE_BASE + (video.thumbnail || "");

    const title = document.createElement("h3");
    title.className = "folderTitle";
    title.textContent = folderName;

    box.appendChild(img);
    box.appendChild(title);

    container.appendChild(box);
  });
}

// Load JSON files
Promise.all([
  fetch("vip.json").then(res => res.json()).catch(() => []),
  fetch("videos.json").then(res => res.json()).catch(() => [])
])
.then(([vipVideos, normalVideos]) => {

  const vipFolders = extractFolders(vipVideos);
  const normalFolders = extractFolders(normalVideos);

  // VIP folders
  renderFolders(vipContainer, vipFolders, true);

  // CTA under VIP
  if (Object.keys(vipFolders).length > 0) {
    const cta = document.createElement("div");
    cta.className = "ctaCard";

    cta.innerHTML = `
      <div class="ctaContent">
        <span class="arrow left">➡</span>
        <a href="https://streamtape.com/v/84Lgxedm03F2lV/AnywhereCum_20260315_100916372.mp4" target="_blank">
          Click & Watch how to unlock VIP Exclusive for Free
        </a>
        <span class="arrow right">⬅</span>
      </div>
    `;

    vipContainer.appendChild(cta);
  }

  // Normal folders
  renderFolders(normalContainer, normalFolders, false);

  if (
    Object.keys(vipFolders).length === 0 &&
    Object.keys(normalFolders).length === 0
  ) {
    document.body.innerHTML += "<p style='text-align:center;color:#aaa;'>No folders found.</p>";
  }

})
.catch(err => {
  console.error(err);
  document.body.innerHTML += "<p style='text-align:center;color:#aaa;'>Failed to load folders.</p>";
});
</script>

  <script src="views.js" defer></script>

</body>
</html>
