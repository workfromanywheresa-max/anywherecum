<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum - Folders</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  text-align: center;
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

/* GRID LIST */
ul {
  list-style: none;
  padding: 0;
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
}

li {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
}

li:hover {
  background: #333;
}

img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 6px;
  margin-bottom: 5px;
}

a.folder-link {
  color: #fff;
  text-decoration: none;
  font-weight: bold;
}

a.folder-link:hover {
  color: #ff4444;
}

/* AD */
.ad-space {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.ad-lock {
  width: 300px;
  height: 112px;
  overflow: hidden;
  border: 2px solid red;
  border-radius: 8px;
  background: #fff;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>⭐ VIP Folders</h2>
<ul id="vipList"></ul>

<h2>📂 Content Folders</h2>
<ul id="folderList"></ul>

<!-- AD -->
<div class="ad-space">
  <div class="ad-lock">
    <script async src="https://poweredby.jads.co/js/jads.js"></script>
    <ins id="1113665" style="display:block; width:300px; height:112px;"></ins>
    <script>
      (adsbyjuicy = window.adsbyjuicy || []).push({'adzone':1113665});
    </script>
  </div>
</div>

<footer>
© 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>
const BASE_URL = "https://anywherecum.pages.dev/images/";

/* ================= VIP FOLDERS ================= */
fetch('./vip.json')
.then(res => res.json())
.then(data => {
  const vipList = document.getElementById("vipList");
  vipList.innerHTML = "";

  data.forEach(vip => {
    const li = document.createElement("li");

    const img = document.createElement("img");
    img.src = BASE_URL + vip.thumbnail;

    const link = document.createElement("a");
    link.className = "folder-link";
    link.href = "folder.html?folder=" + encodeURIComponent(vip.folder);
    link.textContent = vip.folder;

    img.onclick = () => link.click();
    link.onclick = (e) => {
      e.preventDefault();
      window.location.href = link.href;
    };

    li.appendChild(img);
    li.appendChild(link);
    vipList.appendChild(li);
  });
})
.catch(err => console.error("VIP load error:", err));


/* ================= NORMAL FOLDERS ================= */
fetch('./videos.json')
.then(res => res.json())
.then(videos => {

  const folders = {};

  // Group videos into folders
  videos.forEach(v => {
    if (!folders[v.folder]) folders[v.folder] = [];
    folders[v.folder].push(v);
  });

  const folderList = document.getElementById("folderList");
  folderList.innerHTML = "";

  Object.keys(folders)
  .sort()
  .forEach(folderName => {

    const folderVideos = folders[folderName];

    // Get latest video
    folderVideos.sort((a,b) => new Date(b.date) - new Date(a.date));
    const latest = folderVideos[0];

    const li = document.createElement("li");

    const img = document.createElement("img");
    img.src = BASE_URL + latest.thumbnail;

    const link = document.createElement("a");
    link.className = "folder-link";
    link.href = "folder.html?folder=" + encodeURIComponent(folderName);
    link.textContent = folderName;

    img.onclick = () => link.click();
    link.onclick = (e) => {
      e.preventDefault();
      window.location.href = link.href;
    };

    li.appendChild(img);
    li.appendChild(link);
    folderList.appendChild(li);
  });

})
.catch(err => console.error("Folder load error:", err));
</script>

</body>
</html>
