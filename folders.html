<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folders</title>

<style>
body {
  font-family: Arial;
  background:#1a1a1a;
  color:#fff;
  margin:0;
  padding:15px;
}

h2 {
  text-align:center;
  color:#ff4444;
}

.list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  background:#222;
  padding:12px;
  border-radius:8px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap: wrap;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  background:#2b2b2b;
  transform: scale(1.01);
}

.vip {
  border: 1px solid #ff4444;
  background: #2a1a1a;
  flex-direction: column;
  align-items: flex-start;
}

.thumb {
  width:50px;
  height:50px;
  object-fit:cover;
  border-radius:6px;
}

.card span, .card a {
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}

.vip-wrapper {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 14px;
}

.vip-top {
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
}

.vip-cta-card {
  justify-content:center;
  text-align:center;
  padding: 8px;
}

.vip-cta-card a {
  color:#ff4444;
  margin: 0 4px;
  font-size: 12px;
}

.arrow {
  font-size: 18px;
  color: #ff4444;
}

.arrow.left {
  animation: moveLeft 1s infinite alternate;
}

.arrow.right {
  animation: moveRight 1s infinite alternate;
}

@keyframes moveLeft {
  0% { transform: translateX(0); opacity: 0.6; }
  100% { transform: translateX(-6px); opacity: 1; }
}

@keyframes moveRight {
  0% { transform: translateX(0); opacity: 0.6; }
  100% { transform: translateX(6px); opacity: 1; }
}
</style>
</head>

<body>

<h2>📂 All Folders</h2>

<div id="folders" class="list"></div>

<script>
const BASE_URL = "https://anywherecum.pages.dev/images/";
const container = document.getElementById("folders");

Promise.all([
  fetch('vip.json').then(res => res.json()).catch(() => null),
  fetch('videos.json').then(res => res.json()).catch(() => [])
])
.then(([vipData, videos]) => {

  container.innerHTML = "";

  /* ================= VIP ================= */
  if (vipData) {
    const vipItem = Array.isArray(vipData) ? vipData[0] : vipData;

    const vipWrapper = document.createElement("div");
    vipWrapper.className = "vip-wrapper";

    const vipCard = document.createElement("div");
    vipCard.className = "card vip";

    // ✅ VIP CARD OPENS SHORTLINK
    vipCard.onclick = () => {
      window.open("https://fc-lc.xyz/al0L8qyP", "_blank");
    };

    vipCard.innerHTML = `
      <div class="vip-top">
        <img src="${BASE_URL + vipItem.thumbnail}" class="thumb">
        <span>⭐VIP Exclusive</span>
      </div>
    `;

    const ctaCard = document.createElement("div");
    ctaCard.className = "card vip-cta-card";

    ctaCard.onclick = (e) => {
      e.stopPropagation();
    };

    // ✅ CTA TEXT + STREAMTAPE LINK
    ctaCard.innerHTML = `
      <span class="arrow left">➡️</span>

      <span>
        <a href="https://streamtape.com/v/84Lgxedm03F2lV/AnywhereCum_20260315_100916372.mp4" target="_blank">
          Click & Watch How To Unlock VIP Access
        </a>
      </span>

      <span class="arrow right">⬅️</span>
    `;

    vipWrapper.appendChild(vipCard);
    vipWrapper.appendChild(ctaCard);

    container.appendChild(vipWrapper);
  }

  /* ================= FOLDERS ================= */
  const folderMap = {};

  videos.forEach(v => {
    if (!folderMap[v.folder]) {
      folderMap[v.folder] = [];
    }
    folderMap[v.folder].push(v);
  });

  const folders = Object.keys(folderMap).sort((a, b) =>
    a.toLowerCase().localeCompare(b.toLowerCase())
  );

  folders.forEach(folder => {
    const firstVideo = folderMap[folder][0];

    const div = document.createElement("div");
    div.className = "card";

    div.onclick = () => {
      window.location.href = `folder.html?folder=${encodeURIComponent(folder)}`;
    };

    div.innerHTML = `
      <img src="${BASE_URL + firstVideo.thumbnail}" class="thumb">
      <span>${folder}</span>
    `;

    container.appendChild(div);
  });

})
.catch(() => {
  container.innerHTML = "<p style='text-align:center;'>Failed to load folders.</p>";
});
</script>

</body>
</html>
