<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folders</title>

<style>
html {
  overflow-y: scroll;
}

*, *::before, *::after {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;

  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

#pageWrapper {
  flex: 1;
}

h2 {
  text-align: center;
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

/* LOCK CONTAINERS */
#vipContainer,
#normalContainer {
  overflow: hidden;
}

/* CTA BUTTON */
.vip-btn {
  display: block;
  text-align: center;
  background: linear-gradient(45deg, #ff4444, #ff0000);
  color: #fff;
  padding: 12px;
  margin: 15px 0;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  position: relative;
  overflow: hidden;
  animation: pulse 1.5s infinite;
}

.vip-btn:hover {
  background: linear-gradient(45deg, #ff2222, #cc0000);
}

.vip-btn .arrow {
  margin: 0 6px;
}

/* Pulse animation */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

/* Folder styles */
.folderBox {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.2s;
  user-select: none;

  opacity: 0;
  animation: fadeIn 0.3s forwards;
}

.folderBox:hover {
  transform: scale(1.02);
}

.thumbnail {
  width: 100px;
  height: 70px;
  object-fit: cover;
  border-radius: 6px;
  background: #333;
}

.folderTitle {
  font-size: 16px;
  color: #ddd;
  margin: 0;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* SHIMMER */
.skeleton {
  position: relative;
  overflow: hidden;
  background: #2a2a2a;
  border-radius: 8px;
}

.skeleton::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150px;
  height: 100%;
  width: 150px;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent
  );
  animation: shimmer 1.2s infinite;
}

@keyframes shimmer {
  100% {
    transform: translateX(300px);
  }
}

.skeletonBox {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 10px;
  height: 86px;
}

.skeletonThumb {
  width: 100px;
  height: 70px;
  border-radius: 6px;
}

.skeletonText {
  height: 14px;
  width: 120px;
  border-radius: 4px;
}

/* FOOTER */
footer {
  margin-top: auto;
}
</style>

</head>

<body>

<div id="pageWrapper">

<button onclick="history.back()">← Back</button>

<h2>Folders</h2>

<!-- CTA (ABOVE VIP) -->
<a href="https://streamtape.com/v/84Lgxedm03F2lV/AnywhereCum_20260315_100916372.mp4"
   target="_blank"
   class="vip-btn">
  <span class="arrow">➤</span>
  Click & Watch how to unlock VIP Exclusive for Free
  <span class="arrow">◀</span>
</a>

<div id="vipContainer"></div>
<div id="normalContainer"></div>

</div>

<footer style="text-align:center; padding:20px; font-size:12px; color:#aaa; background:#111;">
© 2026 AnywhereCum – Legal content only. 18+<br>
</footer>

<script>
const vipContainer = document.getElementById("vipContainer");
const normalContainer = document.getElementById("normalContainer");

const IMAGE_BASE = "https://anywherecum.pages.dev/images/";

/* Skeleton */
function showSkeleton(container, count = 4) {
  container.innerHTML = "";

  for (let i = 0; i < count; i++) {
    const box = document.createElement("div");
    box.className = "skeletonBox";

    const thumb = document.createElement("div");
    thumb.className = "skeleton skeletonThumb";

    const text = document.createElement("div");
    text.className = "skeleton skeletonText";

    box.appendChild(thumb);
    box.appendChild(text);
    container.appendChild(box);
  }

  requestAnimationFrame(() => {
    container.style.height = container.scrollHeight + "px";
  });
}

/* Extract */
function extractFolders(videos) {
  const folders = {};
  videos.forEach(video => {
    if (!video.folder) return;
    if (!folders[video.folder]) {
      folders[video.folder] = video;
    }
  });
  return folders;
}

/* Render */
function renderFolders(container, folders) {
  container.innerHTML = "";

  Object.keys(folders).forEach(folderName => {

    const video = folders[folderName];

    const box = document.createElement("div");
    box.className = "folderBox";

    const img = document.createElement("img");
    img.className = "thumbnail";
    img.src = IMAGE_BASE + (video.thumbnail || "");

    const title = document.createElement("h3");
    title.className = "folderTitle";
    title.textContent = folderName;

    box.appendChild(img);
    box.appendChild(title);

    container.appendChild(box);
  });
}

/* START */
showSkeleton(vipContainer, 2);
showSkeleton(normalContainer, 6);

Promise.all([
  fetch("vip.json").then(res => res.json()).catch(() => []),
  fetch("videos.json").then(res => res.json()).catch(() => [])
])
.then(([vipVideos, normalVideos]) => {

  const vipFolders = extractFolders(vipVideos);
  const normalFolders = extractFolders(normalVideos);

  renderFolders(vipContainer, vipFolders);
  renderFolders(normalContainer, normalFolders);

  vipContainer.style.height = "auto";
  normalContainer.style.height = "auto";

})
.catch(() => {
  vipContainer.innerHTML = "<p>Failed to load</p>";
  normalContainer.innerHTML = "<p>Failed to load</p>";
});
</script>

</body>
</html>
