<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folders</title>

<style>
html { overflow-y: scroll; }

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

#pageWrapper {
  flex: 1;
}

/* LOCKED AD SPACE */
.ad-space {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.ad-lock {
  width: 300px;
  height: 112px;              /* 🔒 FIXED HEIGHT = NO SHIFT */
  overflow: hidden;
  position: relative;
  border: 2px solid red;
  border-radius: 8px;
  background: #fff;
}

/* Prevent ad script from expanding layout */
.ad-lock * {
  max-width: 300px !important;
  max-height: 112px !important;
}

footer {
  margin-top: 20px;
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
}
</style>
</head>

<body>

<div id="pageWrapper">

<h2 style="text-align:center; color:#ff4444;">Folders</h2>

<!-- CONTENT ABOVE -->
<div style="height:600px;">
  <!-- your folders load here -->
</div>

<!-- 🔒 LOCKED BOTTOM AD -->
<div class="ad-space">
  <div class="ad-lock">

    <!-- JuicyAds -->
    <script async src="https://poweredby.jads.co/js/jads.js"></script>
    <ins id="1113665" style="display:block; width:300px; height:112px;"></ins>
    <script>
      (adsbyjuicy = window.adsbyjuicy || []).push({'adzone':1113665});
    </script>

    <!-- 🔴 Live badge -->
    <div style="
      position:absolute;
      top:2px;
      left:50%;
      transform:translateX(-50%);
      background:red;
      color:#fff;
      font-weight:bold;
      font-size:11px;
      padding:1px 6px;
      border-radius:4px;
      z-index:999;
    ">
      🔴 Live
    </div>

  </div>
</div>

</div>

<footer>
© 2026 AnywhereCum – Legal content only. 18+
</footer>

</body>
</html>
