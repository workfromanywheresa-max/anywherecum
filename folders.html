<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folders</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  text-align: center;
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

.folderBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
  cursor: pointer;
  transition: 0.2s;
}

.folderBox:hover {
  transform: scale(1.02);
}

.thumbnail {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 8px;
}

.folderTitle {
  text-align: center;
  margin-top: 10px;
  color: #ddd;
}
</style>
</head>

<body>

<h2>Folders</h2>

<div id="folderList"></div>

<script>
const container = document.getElementById("folderList");

fetch("folders.json")
.then(res => res.json())
.then(folders => {

  const IMAGE_BASE = "https://anywherecum.pages.dev/images/";

  folders.forEach(folder => {

    const box = document.createElement("div");
    box.className = "folderBox";

    box.onclick = () => {
      window.location.href = "folder.html?folder=" + encodeURIComponent(folder.name);
    };

    const img = document.createElement("img");
    img.className = "thumbnail";
    img.src = IMAGE_BASE + folder.thumbnail;

    const title = document.createElement("h3");
    title.className = "folderTitle";
    title.textContent = folder.name;

    box.appendChild(img);
    box.appendChild(title);

    container.appendChild(box);
  });

})
.catch(() => {
  container.innerHTML = "<p style='text-align:center;color:#aaa;'>Failed to load folders.</p>";
});
</script>

</body>
</html>
