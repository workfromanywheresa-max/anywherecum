<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folders</title>

<style>
html {
  overflow-y: scroll;
}

*, *::before, *::after {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  min-height: 100vh;
}

h2 {
  text-align: center;
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

/* ✅ RESERVED SPACE = NO SHIFT */
#vipContainer {
  min-height: 120px;
}

#normalContainer {
  min-height: 300px;
}

/* Folder styles */
.folderBox {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.2s;
  user-select: none;

  opacity: 0;
  animation: fadeIn 0.3s forwards;
}

.folderBox:hover {
  transform: scale(1.02);
}

.thumbnail {
  width: 100px;
  height: 70px;
  object-fit: cover;
  border-radius: 6px;
  background: #333;
}

.folderTitle {
  font-size: 16px;
  color: #ddd;
  margin: 0;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* 🔥 SHIMMER SKELETON */
.skeleton {
  position: relative;
  overflow: hidden;
  background: #2a2a2a;
  border-radius: 8px;
}

.skeleton::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150px;
  height: 100%;
  width: 150px;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent
  );
  animation: shimmer 1.2s infinite;
}

@keyframes shimmer {
  100% {
    transform: translateX(300px);
  }
}

.skeletonBox {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.skeletonThumb {
  width: 100px;
  height: 70px;
  border-radius: 6px;
}

.skeletonText {
  height: 14px;
  width: 120px;
  border-radius: 4px;
}

/* CTA */
.ctaCard {
  background: #2a2a2a;
  border: 1px solid #ff4444;
  border-radius: 8px;
  padding: 10px;
  margin: 20px 0;
  text-align: center;
}

.ctaContent {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.ctaContent a {
  color: #00ffcc;
  text-decoration: none;
  font-size: 10px;
  font-weight: bold;
}

.arrow {
  font-size: 18px;
  color: #ff4444;
}
</style>

</head>

<body>

<button onclick="history.back()">← Back</button>

<h2>Folders</h2>

<div id="vipContainer"></div>

  <div style="text-align:center; margin-bottom:0px;">

  <a href="https://streamtape.com/v/84Lgxedm03F2lV/AnywhereCum_20260315_100916372.mp4"
     target="_blank"
     class="vip-btn">

    <span class="arrow left">➤</span>

    Click & Watch how to unlock VIP Exclusive for Free

    <span class="arrow right">◀</span>

  </a>

</div>

<style>
.vip-btn {
  color:#fff;
  font-weight:bold;
  text-decoration:none;
  font-size:12px;
  display:inline-block;
  position:relative;
  padding:6px 25px;
  border-radius:6px;
  transition: all 0.3s ease;
  
  /* glow animation */
  animation: glowPulse 2s infinite alternate;
}

/* arrows */
.vip-btn .arrow {
  position:absolute;
  animation: arrowMove 1s infinite alternate;
}

.vip-btn .left {
  left:5px;
}

.vip-btn .right {
  right:5px;
}

/* hover */
.vip-btn:hover {
  transform: scale(1.1);
  text-shadow: 0 0 20px #ff4444, 0 0 30px #ff8888;
}

/* glow effect */
@keyframes glowPulse {
  0% {
    text-shadow: 0 0 5px #ff4444;
  }
  100% {
    text-shadow: 0 0 15px #ff4444, 0 0 25px #ff8888;
  }
}

/* arrow animation */
@keyframes arrowMove {
  0% {
    transform: translateX(0);
  }
  100% {
    transform: translateX(5px);
  }
}
</style>
  
<div id="normalContainer"></div>

<script>
const vipContainer = document.getElementById("vipContainer");
const normalContainer = document.getElementById("normalContainer");

const IMAGE_BASE = "https://anywherecum.pages.dev/images/";

/* 🔥 SHOW SHIMMER */
function showSkeleton(container, count = 4) {
  container.innerHTML = "";

  for (let i = 0; i < count; i++) {
    const box = document.createElement("div");
    box.className = "skeletonBox";

    const thumb = document.createElement("div");
    thumb.className = "skeleton skeletonThumb";

    const text = document.createElement("div");
    text.className = "skeleton skeletonText";

    box.appendChild(thumb);
    box.appendChild(text);

    container.appendChild(box);
  }
}

/* Extract folders */
function extractFolders(videos) {
  const folders = {};
  videos.forEach(video => {
    if (!video.folder) return;
    if (!folders[video.folder]) {
      folders[video.folder] = video;
    }
  });
  return folders;
}

/* Render folders */
function renderFolders(container, folders, isVip = false) {
  container.innerHTML = "";

  Object.keys(folders).forEach(folderName => {

    const video = folders[folderName];

    const box = document.createElement("div");
    box.className = "folderBox";

    box.onclick = () => {
      if (isVip) {
        window.location.href = "https://fc-lc.xyz/al0L8qyP";
      } else {
        window.location.href = "folder.html?folder=" + encodeURIComponent(folderName);
      }
    };

    const img = document.createElement("img");
    img.className = "thumbnail";
    img.src = IMAGE_BASE + (video.thumbnail || "");

    const title = document.createElement("h3");
    title.className = "folderTitle";
    title.textContent = folderName;

    box.appendChild(img);
    box.appendChild(title);

    container.appendChild(box);
  });
}

/* 🚀 Start shimmer immediately */
showSkeleton(vipContainer, 2);
showSkeleton(normalContainer, 6);

/* Load data */
Promise.all([
  fetch("vip.json").then(res => res.json()).catch(() => []),
  fetch("videos.json").then(res => res.json()).catch(() => [])
])
.then(([vipVideos, normalVideos]) => {

  const vipFolders = extractFolders(vipVideos);
  const normalFolders = extractFolders(normalVideos);

  if (Object.keys(vipFolders).length === 0) {
    vipContainer.innerHTML = "<p class='loading'>No VIP folders</p>";
  } else {
    renderFolders(vipContainer, vipFolders, true);
  }

  if (Object.keys(normalFolders).length === 0) {
    normalContainer.innerHTML = "<p class='loading'>No folders</p>";
  } else {
    renderFolders(normalContainer, normalFolders, false);
  }

})
.catch(err => {
  console.error(err);
  vipContainer.innerHTML = "<p class='loading'>Failed to load</p>";
  normalContainer.innerHTML = "<p class='loading'>Failed to load</p>";
});
</script>
