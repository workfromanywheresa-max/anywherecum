<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folders</title>

<style>
html {
  overflow-y: scroll;
}

*, *::before, *::after {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  min-height: 100vh;
}

h2 {
  text-align: center;
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

/* RESERVED SPACE = NO SHIFT */
#vipContainer {
  min-height: 120px;
}

#normalContainer {
  min-height: 300px;
}

/* VIP CTA AREA */
#vipCtaContainer {
  min-height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: -10px;
  margin-bottom: 20px;
}

/* VIP CARD */
.vip-card {
  position: relative;
  background: linear-gradient(145deg, #1f1f1f, #151515);
  padding: 16px 18px;
  border-radius: 12px;
  text-align: center;
  width: 90%;
  max-width: 320px;
  border: 1px solid #ff4444;
  box-shadow: 0 0 12px rgba(255, 68, 68, 0.25);
  overflow: hidden;
}

/* glow animation */
.vip-glow {
  position: absolute;
  inset: -2px;
  background: linear-gradient(90deg, #ff4444, #ff8888, #ff4444);
  filter: blur(10px);
  opacity: 0.4;
  z-index: 0;
  animation: glowMove 3s linear infinite;
}

@keyframes glowMove {
  0% { transform: translateX(-50%); }
  100% { transform: translateX(50%); }
}

.vip-title {
  margin: 0;
  font-size: 15px;
  color: #ff4444;
  position: relative;
  z-index: 1;
}

.vip-text {
  font-size: 12px;
  color: #ccc;
  margin: 8px 0 12px;
  position: relative;
  z-index: 1;
}

/* CTA BUTTON */
.vip-btn-card {
  color:#fff;
  font-weight:bold;
  text-decoration:none;
  font-size:12px;
  display:inline-block;
  padding:7px 20px;
  border-radius:6px;
  background: #ff4444;
  position: relative;
  z-index: 1;
  animation: pulseBtn 1.8s infinite;
}

.vip-btn-card:hover {
  transform: scale(1.08);
  box-shadow: 0 0 15px #ff4444;
}

@keyframes pulseBtn {
  0% { box-shadow: 0 0 5px #ff4444; }
  50% { box-shadow: 0 0 15px #ff4444; }
  100% { box-shadow: 0 0 5px #ff4444; }
}

/* Folder styles */
.folderBox {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.2s;
  user-select: none;

  opacity: 0;
  animation: fadeIn 0.3s forwards;
}

.folderBox:hover {
  transform: scale(1.02);
}

.thumbnail {
  width: 100px;
  height: 70px;
  object-fit: cover;
  border-radius: 6px;
  background: #333;
}

.folderTitle {
  font-size: 16px;
  color: #ddd;
  margin: 0;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* SHIMMER */
.skeleton {
  position: relative;
  overflow: hidden;
  background: #2a2a2a;
  border-radius: 8px;
}

.skeleton::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150px;
  height: 100%;
  width: 150px;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent
  );
  animation: shimmer 1.2s infinite;
}

@keyframes shimmer {
  100% {
    transform: translateX(300px);
  }
}

.skeletonBox {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.skeletonThumb {
  width: 100px;
  height: 70px;
  border-radius: 6px;
}

.skeletonText {
  height: 14px;
  width: 120px;
  border-radius: 4px;
}

</style>

</head>

<body>

<button onclick="history.back()">← Back</button>

<h2>Folders</h2>

<div id="vipContainer"></div>

<!-- VIP CTA CARD -->
<div id="vipCtaContainer">
  <div class="vip-card">
    <div class="vip-glow"></div>

    <h3 class="vip-title">🔓 VIP Access</h3>

    <p class="vip-text">
      Click below to unlock VIP Exclusive content for FREE
    </p>

    <a href="https://streamtape.com/v/84Lgxedm03F2lV/AnywhereCum_20260315_100916372.mp4"
       target="_blank"
       class="vip-btn-card">
      Watch Now
    </a>
  </div>
</div>

<div id="normalContainer"></div>

<script>
const vipContainer = document.getElementById("vipContainer");
const normalContainer = document.getElementById("normalContainer");

const IMAGE_BASE = "https://anywherecum.pages.dev/images/";

function showSkeleton(container, count = 4) {
  container.innerHTML = "";

  for (let i = 0; i < count; i++) {
    const box = document.createElement("div");
    box.className = "skeletonBox";

    const thumb = document.createElement("div");
    thumb.className = "skeleton skeletonThumb";

    const text = document.createElement("div");
    text.className = "skeleton skeletonText";

    box.appendChild(thumb);
    box.appendChild(text);
    container.appendChild(box);
  }
}

function extractFolders(videos) {
  const folders = {};
  videos.forEach(video => {
    if (!video.folder) return;
    if (!folders[video.folder]) {
      folders[video.folder] = video;
    }
  });
  return folders;
}

function renderFolders(container, folders, isVip = false) {
  container.innerHTML = "";

  Object.keys(folders).forEach(folderName => {

    const video = folders[folderName];

    const box = document.createElement("div");
    box.className = "folderBox";

    box.onclick = () => {
      if (isVip) {
        window.location.href = "https://fc-lc.xyz/al0L8qyP";
      } else {
        window.location.href = "folder.html?folder=" + encodeURIComponent(folderName);
      }
    };

    const img = document.createElement("img");
    img.className = "thumbnail";
    img.src = IMAGE_BASE + (video.thumbnail || "");

    const title = document.createElement("h3");
    title.className = "folderTitle";
    title.textContent = folderName;

    box.appendChild(img);
    box.appendChild(title);

    container.appendChild(box);
  });
}

/* Skeleton loading */
showSkeleton(vipContainer, 2);
showSkeleton(normalContainer, 6);

Promise.all([
  fetch("vip.json").then(res => res.json()).catch(() => []),
  fetch("videos.json").then(res => res.json()).catch(() => [])
])
.then(([vipVideos, normalVideos]) => {

  const vipFolders = extractFolders(vipVideos);
  const normalFolders = extractFolders(normalVideos);

  if (Object.keys(vipFolders).length === 0) {
    vipContainer.innerHTML = "<p>No VIP folders</p>";
  } else {
    renderFolders(vipContainer, vipFolders, true);
  }

  if (Object.keys(normalFolders).length === 0) {
    normalContainer.innerHTML = "<p>No folders</p>";
  } else {
    renderFolders(normalContainer, normalFolders, false);
  }

})
.catch(err => {
  console.error(err);
  vipContainer.innerHTML = "<p>Failed to load</p>";
  normalContainer.innerHTML = "<p>Failed to load</p>";
});
</script>
