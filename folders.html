<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folders</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  text-align: center;
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

/* VIP title */
.vipTitle {
  color: gold;
  border-bottom: 2px solid gold;
}

/* 🔥 Compact horizontal card */
.folderBox {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.folderBox:hover {
  transform: scale(1.02);
}

/* 🔥 Small thumbnail */
.thumbnail {
  width: 100px;
  height: 70px;
  object-fit: cover;
  border-radius: 6px;
}

/* 🔥 Text next to image */
.folderTitle {
  font-size: 16px;
  color: #ddd;
  margin: 0;
}
</style>
</head>

<body>

<!-- 🔥 VIP SECTION -->
<h2 class="vipTitle">VIP Exclusive</h2>
<div id="vipList"></div>

<!-- 🔥 NORMAL FOLDERS -->
<h2>Folders</h2>
<div id="folderList"></div>

<script>
const folderContainer = document.getElementById("folderList");
const vipContainer = document.getElementById("vipList");

const IMAGE_BASE = "https://anywherecum.pages.dev/images/";

/* 🔥 LOAD VIP */
fetch("vip.json")
.then(res => {
  if (!res.ok) throw new Error("VIP fetch failed");
  return res.json();
})
.then(videos => {

  videos.forEach(video => {

    const box = document.createElement("div");
    box.className = "folderBox";

    box.onclick = () => {
      window.location.href = "video.html?id=" + encodeURIComponent(video.id || "");
    };

    const img = document.createElement("img");
    img.className = "thumbnail";
    img.src = IMAGE_BASE + (video.thumbnail || "");

    const title = document.createElement("h3");
    title.className = "folderTitle";
    title.textContent = video.title || "VIP Video";

    box.appendChild(img);
    box.appendChild(title);

    vipContainer.appendChild(box);
  });

  if (videos.length === 0) {
    vipContainer.innerHTML = "<p style='text-align:center;color:#aaa;'>No VIP content.</p>";
  }

})
.catch(err => {
  console.error(err);
  vipContainer.innerHTML = "<p style='text-align:center;color:#aaa;'>Failed to load VIP.</p>";
});


/* 🔥 LOAD NORMAL FOLDERS */
fetch("videos.json")
.then(res => {
  if (!res.ok) throw new Error("Failed to fetch");
  return res.json();
})
.then(videos => {

  const folders = {};

  videos.forEach(video => {
    if (!video.folder) return;

    if (!folders[video.folder]) {
      folders[video.folder] = video;
    }
  });

  Object.keys(folders).forEach(folderName => {

    const video = folders[folderName];

    const box = document.createElement("div");
    box.className = "folderBox";

    box.onclick = () => {
      window.location.href = "folder.html?folder=" + encodeURIComponent(folderName);
    };

    const img = document.createElement("img");
    img.className = "thumbnail";
    img.src = IMAGE_BASE + (video.thumbnail || "");

    const title = document.createElement("h3");
    title.className = "folderTitle";
    title.textContent = folderName;

    box.appendChild(img);
    box.appendChild(title);

    folderContainer.appendChild(box);
  });

  if (Object.keys(folders).length === 0) {
    folderContainer.innerHTML = "<p style='text-align:center;color:#aaa;'>No folders found.</p>";
  }

})
.catch(err => {
  console.error(err);
  folderContainer.innerHTML = "<p style='text-align:center;color:#aaa;'>Failed to load folders.</p>";
});
</script>

</body>
</html>
