<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folders</title>

<style>
body {
  font-family: Arial;
  background:#1a1a1a;
  color:#fff;
  margin:0;
  padding:15px;
}

h2 {
  text-align:center;
  color:#ff4444;
}

/* LIST LAYOUT */
.list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* CARD STYLE */
.card {
  background:#222;
  padding:12px;
  border-radius:8px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap: wrap;
}

/* VIP CARD */
.vip {
  border: 1px solid #ff4444;
  background: #2a1a1a;
  flex-direction: column;
  align-items: flex-start;
}

/* THUMBNAIL */
.thumb {
  width:50px;
  height:50px;
  object-fit:cover;
  border-radius:6px;
  flex-shrink:0;
}

/* LINKS */
.card a {
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}

.card a:hover {
  color:#ff4444;
}

/* VIP TOP ROW */
.vip-top {
  display:flex;
  align-items:center;
  gap:10px;
}

/* CTA UNDER VIP */
.vip-cta {
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  margin-top:8px;
  gap:8px;
}

/* ARROWS */
.arrow {
  font-size: 18px;
  color: #ff4444;
}

.arrow.left {
  animation: moveLeft 1s infinite alternate;
}

.arrow.right {
  animation: moveRight 1s infinite alternate;
}

@keyframes moveLeft {
  0% { transform: translateX(0); opacity: 0.6; }
  100% { transform: translateX(-6px); opacity: 1; }
}

@keyframes moveRight {
  0% { transform: translateX(0); opacity: 0.6; }
  100% { transform: translateX(6px); opacity: 1; }
}

/* CTA TEXT */
.vip-cta a {
  font-weight:bold;
  color:#fff;
  text-decoration:none;
}

.vip-cta a:hover {
  color:#ff4444;
}

/* SKELETON */
.skeleton {
  background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius:6px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.skeleton-thumb {
  width:50px;
  height:50px;
}

.skeleton-text {
  height:14px;
  width:120px;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#aaa;
  background:#111;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>📂 All Folders</h2>

<div id="folders" class="list"></div>

<footer style="text-align:center; padding:20px; font-size:12px; color:#aaa; background:#111; margin-top:10px;">
  © 2026 AnywhereCum – Legal content only. 18+<br>

  <div style="margin-top:8px; font-size:8px;">

    <a href="https://www.facebook.com/profile.php?id=100069048046082" target="_blank" style="margin:0 5px;">
      <img src="https://www.facebook.com/images/fb_icon_325x325.png" style="width:14px; height:14px;">
    </a><span>|</span>

    <a href="contact.html" style="color:#ff4444; margin:0 5px;">📨Contact</a><span>|</span>

    <a href="terms-privacy.html" style="color:#ff4444; margin:0 5px;">⚖️Terms & Privacy</a><span>|</span>

    <a href="/" style="color:#ff4444; margin:0 5px;">🏠Home</a><span>|</span>

    <a href="#" onclick="window.scrollTo({top:0, behavior:'smooth'});" style="color:#ff4444; margin:0 5px;">
      ⬆️Back to Top
    </a>

  </div>
</footer>

<script>
const BASE_URL = "https://anywherecum.pages.dev/images/";
const container = document.getElementById("folders");

container.innerHTML = "";

Promise.all([
  fetch('vip.json').then(res => res.json()).catch(() => null),
  fetch('videos.json').then(res => res.json()).catch(() => [])
])
.then(([vipData, videos]) => {

  /* ===== VIP CARD ===== */
  if (vipData) {
    const vipItem = Array.isArray(vipData) ? vipData[0] : vipData;

    const vipCard = document.createElement("div");
    vipCard.className = "card vip";

    vipCard.innerHTML = `
      <div class="vip-top">
        <img src="${BASE_URL + vipItem.thumbnail}" class="thumb" alt="VIP">
        <a href="https://fc-lc.xyz/al0L8qyP" target="_blank">
          ⭐ VIP Exclusive Folder
        </a>
      </div>

      <div class="vip-cta">
        <span class="arrow left">⬅️</span>
        <a href="https://fc-lc.xyz/al0L8qyP" target="_blank">
          Click & Watch How To Unlock Free VIP Access
        </a>
        <span class="arrow right">➡️</span>
      </div>
    `;

    container.appendChild(vipCard);
  }

  /* ===== GROUP FOLDERS ===== */
  const folderMap = {};

  videos.forEach(v => {
    if (!folderMap[v.folder]) {
      folderMap[v.folder] = [];
    }
    folderMap[v.folder].push(v);
  });

  const folders = Object.keys(folderMap).sort((a, b) =>
    a.toLowerCase().localeCompare(b.toLowerCase())
  );

  folders.forEach(folder => {
    const firstVideo = folderMap[folder][0];
    const thumbnail = firstVideo.thumbnail;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${BASE_URL + thumbnail}" class="thumb" alt="thumb">
      <a href="folder.html?folder=${encodeURIComponent(folder)}">
        ${folder}
      </a>
    `;

    container.appendChild(div);
  });

})
.catch(() => {
  container.innerHTML = "<p style='text-align:center;'>Failed to load folders.</p>";
});
</script>

</body>
</html>
