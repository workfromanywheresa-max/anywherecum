<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folders</title>

<style>
html { overflow-y: scroll; }

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

#pageWrapper {
  flex: 1;
}

h2 {
  text-align: center;
  margin-top: 20px;
}

/* LISTS */
ul {
  list-style: none;
  padding: 0;
}

li {
  margin-bottom: 15px;
}

img {
  width: 100%;
  max-width: 300px;
  border-radius: 6px;
  display: block;
}

.folder-link {
  display: block;
  margin-top: 5px;
  color: #fff;
  text-decoration: none;
  font-weight: bold;
}

/* VIP TITLE */
.vip-title {
  color: gold;
}

/* LOCKED AD SPACE */
.ad-space {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.ad-lock {
  width: 300px;
  height: 112px;
  overflow: hidden;
  position: relative;
  border-radius: 8px;
  background: #fff;
}

.ad-lock * {
  max-width: 300px !important;
  max-height: 112px !important;
}

/* FOOTER */
footer {
  margin-top: 20px;
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
}
</style>
</head>

<body>

<div id="pageWrapper">

<h2 class="vip-title">🔥 VIP</h2>
<ul id="vipList"></ul>

<h2>Folders</h2>
<ul id="folderList"></ul>

<!-- AD -->
<div class="ad-space">
  <div class="ad-lock">

    <script async src="https://poweredby.jads.co/js/jads.js"></script>
    <ins id="1113665" style="display:block; width:300px; height:112px;"></ins>
    <script>
      (adsbyjuicy = window.adsbyjuicy || []).push({'adzone':1113665});
    </script>

    <div style="
      position:absolute;
      top:2px;
      left:50%;
      transform:translateX(-50%);
      background:red;
      color:#fff;
      font-size:11px;
      padding:2px 6px;
      border-radius:4px;
    ">
      🔴 Live
    </div>

  </div>
</div>

</div>

<footer>
© 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>
/* ================= LOAD VIP FIRST ================= */
async function loadVIP() {
  try {
    const res = await fetch('./vip.json');
    const videos = await res.json();

    const container = document.getElementById('vipList');
    container.innerHTML = '';

    videos.sort((a,b)=>new Date(b.date)-new Date(a.date));

    videos.forEach(vip => {
      const li = document.createElement('li');

      const img = document.createElement('img');
      img.src = "https://anywherecum.pages.dev/images/" + vip.thumbnail;

      const link = document.createElement('a');
      link.className = "folder-link";
      link.href = "folder.html?folder=" + encodeURIComponent(vip.folder);
      link.textContent = vip.folder;

      img.onclick = () => link.click();
      link.onclick = (e) => {
        e.preventDefault();
        window.location.href = link.href;
      };

      li.appendChild(img);
      li.appendChild(link);

      container.appendChild(li);
    });

  } catch (err) {
    console.error("VIP error:", err);
  }
}

/* ================= LOAD NORMAL FOLDERS ================= */
async function loadFolders() {
  try {
    const res = await fetch('./videos.json');
    const videos = await res.json();

    const folders = {};

    videos.forEach(v => {
      if (!folders[v.folder]) folders[v.folder] = [];
      folders[v.folder].push(v);
    });

    const folderList = document.getElementById('folderList');
    folderList.innerHTML = '';

    Object.keys(folders)
      .sort()
      .forEach(folderName => {

        const vids = folders[folderName]
          .sort((a,b)=> new Date(b.date)-new Date(a.date));

        const latest = vids[0];

        const li = document.createElement('li');

        const img = document.createElement('img');
        img.src = "https://anywherecum.pages.dev/images/" + latest.thumbnail;

        const link = document.createElement('a');
        link.className = "folder-link";
        link.href = "folder.html?folder=" + encodeURIComponent(folderName);
        link.textContent = folderName;

        img.onclick = () => link.click();
        link.onclick = (e) => {
          e.preventDefault();
          window.location.href = link.href;
        };

        li.appendChild(img);
        li.appendChild(link);

        folderList.appendChild(li);
      });

  } catch (err) {
    console.error("Folder error:", err);
  }
}

/* ================= INIT ================= */
window.addEventListener('load', () => {
  loadVIP();       // 🔥 VIP FIRST
  loadFolders();   // then normal folders
});
</script>

</body>
</html>
