<script>

/* ================= VIP ================= */
async function loadVIP() {
  const res = await fetch('./vip.json');
  const data = await res.json();

  const container = document.getElementById('vipList');
  container.innerHTML = '';

  if (!data.length) return;

  data.sort((a, b) => new Date(b.date) - new Date(a.date));

  const vip = data[0];

  const card = document.createElement('div');
  card.className = 'card';

  const img = document.createElement('img');
  img.src = "https://anywherecum.pages.dev/images/" + vip.thumbnail;

  const link = document.createElement('a');

  const shortlink = "https://fc-lc.xyz/al0L8qyP";

  link.href = shortlink;
  link.target = "_blank";
  link.textContent = vip.folder;

  card.onclick = () => {
    window.open(shortlink, "_blank");
  };

  card.appendChild(img);
  card.appendChild(link);

  container.appendChild(card);
}

/* ================= FOLDERS ================= */
async function loadFolders() {
  const res = await fetch('./videos.json');
  const data = await res.json();

  const folders = {};

  data.forEach(v => {
    if (!folders[v.folder]) folders[v.folder] = [];
    folders[v.folder].push(v);
  });

  const container = document.getElementById('folderList');
  container.innerHTML = '';

  Object.keys(folders)
    .sort()
    .forEach(name => {

      const vids = folders[name]
        .sort((a,b)=>new Date(b.date)-new Date(a.date));

      const latest = vids[0];

      const card = document.createElement('div');
      card.className = 'card';

      const img = document.createElement('img');
      img.src = "https://anywherecum.pages.dev/images/" + latest.thumbnail;

      const link = document.createElement('a');
      link.href = "folder.html?folder=" + encodeURIComponent(name);
      link.textContent = name;

      card.onclick = () => {
        window.location.href = link.href;
      };

      card.appendChild(img);
      card.appendChild(link);

      container.appendChild(card);
    });
}

/* ================= INIT ================= */
window.addEventListener('load', () => {
  loadVIP();
  loadFolders();
});

</script>
