<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folders</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

/* HEADER */
h2 {
  text-align: center;
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 8px;
  margin-bottom: 20px;
}

/* CONTAINERS */
.container {
  max-width: 700px;
  margin: 0 auto;
}

/* CTA */
.vip-wrapper {
  text-align: center;
  margin: 20px 0;
}

.vip-btn {
  color: #fff;
  font-weight: bold;
  text-decoration: none;
  font-size: 13px;
  display: inline-block;
  padding: 10px 20px;
  border-radius: 8px;
  background: linear-gradient(45deg, #ff4444, #ff7777);
  animation: glowPulse 2s infinite alternate;
  position: relative;
}

.vip-btn .arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  animation: arrowMove 1s infinite alternate;
}

.vip-btn .left { left: 8px; }
.vip-btn .right { right: 8px; }

.vip-btn:hover {
  transform: scale(1.05);
}

/* GLOW */
@keyframes glowPulse {
  0% { box-shadow: 0 0 5px #ff4444; }
  100% { box-shadow: 0 0 20px #ff4444; }
}

/* ARROW */
@keyframes arrowMove {
  0% { transform: translateY(-50%) translateX(0); }
  100% { transform: translateY(-50%) translateX(5px); }
}

/* FOLDER BOX */
.folderBox {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.2s;
  opacity: 0;
  animation: fadeIn 0.3s forwards;
}

.folderBox:hover {
  transform: scale(1.02);
}

.thumbnail {
  width: 90px;
  height: 65px;
  object-fit: cover;
  border-radius: 6px;
  background: #333;
}

.folderTitle {
  font-size: 15px;
  color: #ddd;
  margin: 0;
}

/* FADE IN */
@keyframes fadeIn {
  to { opacity: 1; }
}

/* SKELETON */
.skeletonBox {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.skeleton {
  position: relative;
  overflow: hidden;
  background: #2a2a2a;
  border-radius: 6px;
}

.skeleton::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150px;
  height: 100%;
  width: 150px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  animation: shimmer 1.2s infinite;
}

@keyframes shimmer {
  100% {
    transform: translateX(300px);
  }
}

.skeletonThumb {
  width: 90px;
  height: 65px;
}

.skeletonText {
  width: 120px;
  height: 14px;
}
</style>
</head>

<body>

<div class="container">

<button onclick="history.back()">← Back</button>

<h2>Folders</h2>

<div id="vipContainer"></div>

<div class="vip-wrapper">
  <a href="https://streamtape.com/v/84Lgxedm03F2lV/AnywhereCum_20260315_100916372.mp4"
     target="_blank"
     class="vip-btn">
    <span class="arrow left">➤</span>
    Click & Watch VIP Exclusive
    <span class="arrow right">◀</span>
  </a>
</div>

<div id="normalContainer"></div>

</div>

<script>
const vipContainer = document.getElementById("vipContainer");
const normalContainer = document.getElementById("normalContainer");

const IMAGE_BASE = "https://anywherecum.pages.dev/images/";

function showSkeleton(container, count = 4) {
  container.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const box = document.createElement("div");
    box.className = "skeletonBox";

    const thumb = document.createElement("div");
    thumb.className = "skeleton skeletonThumb";

    const text = document.createElement("div");
    text.className = "skeleton skeletonText";

    box.appendChild(thumb);
    box.appendChild(text);
    container.appendChild(box);
  }
}

function extractFolders(videos) {
  const folders = {};
  videos.forEach(video => {
    if (!video.folder) return;
    if (!folders[video.folder]) {
      folders[video.folder] = video;
    }
  });
  return folders;
}

function renderFolders(container, folders, isVip = false) {
  container.innerHTML = "";

  Object.keys(folders).forEach(folderName => {
    const video = folders[folderName];

    const box = document.createElement("div");
    box.className = "folderBox";

    box.onclick = () => {
      if (isVip) {
        window.location.href = "https://fc-lc.xyz/al0L8qyP";
      } else {
        window.location.href = "folder.html?folder=" + encodeURIComponent(folderName);
      }
    };

    const img = document.createElement("img");
    img.className = "thumbnail";
    img.src = IMAGE_BASE + (video.thumbnail || "");

    const title = document.createElement("h3");
    title.className = "folderTitle";
    title.textContent = folderName;

    box.appendChild(img);
    box.appendChild(title);
    container.appendChild(box);
  });
}

showSkeleton(vipContainer, 2);
showSkeleton(normalContainer, 6);

Promise.all([
  fetch("vip.json").then(res => res.json()).catch(() => []),
  fetch("videos.json").then(res => res.json()).catch(() => [])
])
.then(([vipVideos, normalVideos]) => {

  const vipFolders = extractFolders(vipVideos);
  const normalFolders = extractFolders(normalVideos);

  if (Object.keys(vipFolders).length === 0) {
    vipContainer.innerHTML = "<p>No VIP folders</p>";
  } else {
    renderFolders(vipContainer, vipFolders, true);
  }

  if (Object.keys(normalFolders).length === 0) {
    normalContainer.innerHTML = "<p>No folders</p>";
  } else {
    renderFolders(normalContainer, normalFolders, false);
  }

})
.catch(() => {
  vipContainer.innerHTML = "<p>Failed to load</p>";
  normalContainer.innerHTML = "<p>Failed to load</p>";
});
</script>

<footer style="text-align:center; padding:20px; font-size:12px; color:#aaa; background:#111; margin-top:20px;">

</footer>

<script type="module" src="views.js"></script>

</body>
</html>
