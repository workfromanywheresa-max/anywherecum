<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folders</title>

<style>
body {
  font-family: Arial;
  background:#1a1a1a;
  color:#fff;
  margin:0;
  padding:15px;
}

h2 {
  text-align:center;
  color:#ff4444;
}

/* LIST LAYOUT */
.list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* CARD STYLE */
.card {
  background:#222;
  padding:12px;
  border-radius:8px;
  display:flex;
  align-items:center;
  gap:10px;
}

/* THUMBNAIL */
.thumb {
  width:50px;
  height:50px;
  object-fit:cover;
  border-radius:6px;
  flex-shrink:0;
}

/* LINK */
.card a {
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}

.card a:hover {
  color:#ff4444;
}

/* ===== SKELETON LOADER ===== */
.skeleton {
  background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius:6px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.skeleton-thumb {
  width:50px;
  height:50px;
}

.skeleton-text {
  height:14px;
  width:120px;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#aaa;
  background:#111;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>📂 All Folders</h2>

<div id="folders" class="list"></div>

<footer style="text-align:center; padding:20px; font-size:12px; color:#aaa; background:#111; margin-top:10px;">
  © 2026 AnywhereCum – Legal content only. 18+<br>

  <div style="margin-top:8px; font-size:8px;">

    <!-- Facebook -->
    <a href="https://www.facebook.com/profile.php?id=100069048046082" 
       target="_blank" 
       rel="noopener noreferrer" 
       style="margin:0 5px; display:inline-block;">
      <img src="https://www.facebook.com/images/fb_icon_325x325.png" 
           alt="Facebook" 
           style="width:14px; height:14px; vertical-align:middle;">
    </a><span>|</span>

    <!-- Contact -->
    <a href="contact.html" 
       style="color:#ff4444; text-decoration:none; margin:0 5px; display:inline-block;">
      📨Contact
    </a><span>|</span>

    <!-- Terms & Privacy -->
    <a href="terms-privacy.html" 
       style="color:#ff4444; text-decoration:underline; margin:0 5px; display:inline-block;">
      ⚖️Terms & Privacy
    </a><span>|</span>

    <!-- Home -->
    <a href="/" 
       style="color:#ff4444; text-decoration:none; margin:0 5px; display:inline-block;">
      🏠Home
    </a><span>|</span>

    <!-- Back to Top -->
    <a href="#" 
       onclick="window.scrollTo({top:0, behavior:'smooth'});" 
       style="color:#ff4444; text-decoration:none; margin:0 5px; display:inline-block; white-space:nowrap;">
      ⬆️Back to Top
    </a>

  </div>
</footer>

<script>
const BASE_URL = "https://anywherecum.pages.dev/images/";
const container = document.getElementById("folders");

/* ===== CREATE SKELETON LOADERS ===== */
function showSkeletons(count = 6) {
  container.innerHTML = "";

  for (let i = 0; i < count; i++) {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="skeleton skeleton-thumb"></div>
      <div class="skeleton skeleton-text"></div>
    `;

    container.appendChild(div);
  }
}

/* Show skeletons immediately */
showSkeletons();

fetch('videos.json')
.then(res => res.json())
.then(videos => {

  const folderMap = {};

  videos.forEach(v => {
    if (!folderMap[v.folder]) {
      folderMap[v.folder] = [];
    }
    folderMap[v.folder].push(v);
  });

  const folders = Object.keys(folderMap).sort((a, b) =>
    a.toLowerCase().localeCompare(b.toLowerCase())
  );

  container.innerHTML = ""; // remove skeletons

  folders.forEach(folder => {
    const firstVideo = folderMap[folder][0];
    const thumbnail = firstVideo.thumbnail;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${BASE_URL + thumbnail}" class="thumb" alt="thumb">
      <a href="folder.html?folder=${encodeURIComponent(folder)}">
        ${folder}
      </a>
    `;

    container.appendChild(div);
  });

})
.catch(() => {
  container.innerHTML = "<p style='text-align:center;'>Failed to load folders.</p>";
});
</script>

</body>
</html>
