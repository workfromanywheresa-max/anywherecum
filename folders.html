<script>
document.addEventListener("DOMContentLoaded", function () {

  const ad = document.getElementById("topAdMain");
  const countdownEl = document.getElementById("mainCountdown");
  const closeBtn = document.getElementById("mainCloseBtn");

  let countdownInterval;
  let cycleTimeout;

  function showAd() {
    ad.style.top = "10px";

    let timeLeft = 15;

    countdownEl.style.display = "block";
    closeBtn.style.display = "none";

    countdownEl.textContent = timeLeft + "s";

    clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
      timeLeft--;
      countdownEl.textContent = timeLeft + "s";

      if (timeLeft <= 0) {
        clearInterval(countdownInterval);

        countdownEl.style.display = "none";
        closeBtn.style.display = "flex";
      }
    }, 1000);
  }

  function hideMainAd() {
    ad.style.top = "-80px";

    clearInterval(countdownInterval);

    clearTimeout(cycleTimeout);
    cycleTimeout = setTimeout(showAd, 120000);
  }

  closeBtn.addEventListener("click", hideMainAd);

  setTimeout(() => {
    showAd();
  }, 30000);

});
</script>

  <script>
/* ================= GLOBAL VIDEO CONTROL ================= */
let currentPlayingVideo = null;

/* ================= INTERSECTION OBSERVER ================= */
const videoObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const video = entry.target;

    if (!entry.isIntersecting) {
      video.pause();
      video.currentTime = 0;
      video.dataset.playing = "false";

      if (currentPlayingVideo === video) {
        currentPlayingVideo = null;
      }
    }
  });
}, { threshold: 0.3 });

/* ================= CREATE VIDEO ================= */
function createVideo(url) {
  const video = document.createElement("video");

  video.src = url;
  video.muted = true;
  video.loop = true;
  video.playsInline = true;
  video.preload = "metadata";

  video.style.width = "80px";
  video.style.height = "55px";
  video.style.objectFit = "cover";
  video.style.borderRadius = "5px";

  video.dataset.playing = "false";

  videoObserver.observe(video);

  return video;
}

/* ================= SWIPE LOGIC ================= */
function addSwipe(card, video, onClick) {

  let startX = 0;
  let isSwiping = false;
  const THRESHOLD = 30;

  card.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    isSwiping = false;
  });

  card.addEventListener("touchmove", (e) => {
    if (Math.abs(e.touches[0].clientX - startX) > THRESHOLD) {
      isSwiping = true;
    }
  });

  card.addEventListener("touchend", (e) => {
    let diff = e.changedTouches[0].clientX - startX;

    if (isSwiping && Math.abs(diff) > THRESHOLD) {

      if (video.dataset.playing === "false") {

        if (currentPlayingVideo && currentPlayingVideo !== video) {
          currentPlayingVideo.pause();
          currentPlayingVideo.currentTime = 0;
          currentPlayingVideo.dataset.playing = "false";
        }

        video.play();
        video.dataset.playing = "true";
        currentPlayingVideo = video;

      } else {

        video.pause();
        video.currentTime = 0;
        video.dataset.playing = "false";
        currentPlayingVideo = null;

      }

    } else {
      if (onClick) onClick();
    }
  });
}

/* ================= FOLDERS ================= */
async function loadFolders() {
  const res = await fetch('./videos.json');
  const data = await res.json();

  const folders = {};

  data.forEach(v => {
    if (!folders[v.folder]) folders[v.folder] = [];
    folders[v.folder].push(v);
  });

  const container = document.getElementById('folderList');
  container.innerHTML = '';

  const vipName = "🔒VIP Exclusive";
  const allNames = Object.keys(folders).sort();

  /* ================= VIP ================= */
  if (folders[vipName]) {
    const vids = folders[vipName].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const latest = vids[0];

    const card = document.createElement('div');
    card.className = 'card';

    const video = createVideo(latest.preview);

    const link = document.createElement('a');
    link.href = "https://fc-lc.xyz/IIivW75";
    link.textContent = vipName;

    /* OPEN IN NEW TAB (ONLY ON CLICK) */
    card.onclick = () => {
      window.open(link.href, "_blank");
    };

    card.appendChild(video);
    card.appendChild(link);

    addSwipe(card, video, () => {
      window.open(link.href, "_blank");
    });

    container.appendChild(card);
  }

  /* ================= OTHER FOLDERS ================= */
  allNames
    .filter(name => name !== vipName)
    .forEach(name => {

      const vids = folders[name]
        .sort((a,b)=>new Date(b.date)-new Date(a.date));

      const latest = vids[0];

      const card = document.createElement('div');
      card.className = 'card';

      const video = createVideo(latest.preview);

      const link = document.createElement('a');
      link.href = "folder.html?folder=" + encodeURIComponent(name);
      link.textContent = name;

      card.onclick = () => {
        window.location.href = link.href;
      };

      card.appendChild(video);
      card.appendChild(link);

      addSwipe(card, video, () => {
        window.location.href = link.href;
      });

      container.appendChild(card);
    });
}

/* ================= INIT ================= */
window.addEventListener('load', () => {
  loadFolders();
});
        </script>
