<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folders</title>

<style>
body {
  font-family: Arial;
  background:#1a1a1a;
  color:#fff;
  margin:0;
  padding:15px;
}

h2 {
  text-align:center;
  color:#ff4444;
}

/* LIST LAYOUT */
.list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* CARD STYLE */
.card {
  background:#222;
  padding:12px;
  border-radius:8px;
  text-align:left;
}

.card a {
  color:#fff;
  text-decoration:none;
  font-weight:bold;
  display:block;
  width:100%;
}

.card a:hover {
  color:#ff4444;
}
</style>
</head>

<body>

<h2>📂 All Folders</h2>

<!-- LIST CONTAINER -->
<div id="folders" class="list"></div>

<footer style="text-align:center; padding:20px; font-size:12px; color:#aaa; background:#111; margin-top:10px;">
  © 2026 AnywhereCum – Legal content only. 18+<br>

  <div style="margin-top:8px; font-size:12px;">

    <!-- Facebook -->
    <a href="https://www.facebook.com/profile.php?id=100069048046082" 
       target="_blank" 
       rel="noopener noreferrer" 
       style="margin:0 5px; display:inline-block;">
      <img src="https://www.facebook.com/images/fb_icon_325x325.png" 
           alt="Facebook" 
           style="width:14px; height:14px; vertical-align:middle;">
    </a><span>|</span>

    <!-- Contact -->
    <a href="contact.html" 
       style="color:#ff4444; text-decoration:none; margin:0 5px; display:inline-block;">
      Contact
    </a><span>|</span>

    <!-- Terms & Privacy -->
    <a href="terms-privacy.html" 
       style="color:#ff4444; text-decoration:underline; margin:0 5px; display:inline-block;">
      Terms & Privacy
    </a><span>|</span>

    <!-- Home -->
    <a href="/" 
       style="color:#ff4444; text-decoration:none; margin:0 5px; display:inline-block;">
      Home
    </a><span>|</span>

    <!-- Back to Top -->
    <a href="#" 
       onclick="window.scrollTo({top:0, behavior:'smooth'});" 
       style="color:#ff4444; text-decoration:none; margin:0 5px; display:inline-block; white-space:nowrap;">
      Back to Top
    </a>

  </div>
</footer>

<script>
fetch('videos.json')
.then(res => res.json())
.then(videos => {

  const container = document.getElementById("folders");

  // Get unique folders and sort alphabetically (case-insensitive)
  const folders = [...new Set(videos.map(v => v.folder))].sort((a, b) =>
    a.toLowerCase().localeCompare(b.toLowerCase())
  );

  folders.forEach(folder => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <a href="folder.html?folder=${encodeURIComponent(folder)}">
        ${folder}
      </a>
    `;

    container.appendChild(div);
  });

});
</script>

</body>
</html>
