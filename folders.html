<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folders</title>

<style>
body {
  font-family: Arial;
  background:#1a1a1a;
  color:#fff;
  margin:0;
  padding:15px;
  user-select: none;
  -webkit-user-select: none;
  -ms-user-select: none;
}

h2 {
  text-align:center;
  color:#ff4444;
}

.list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  background:#222;
  padding:12px;
  border-radius:8px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap: wrap;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  background:#2b2b2b;
  transform: scale(1.01);
}

.vip {
  border: 1px solid #ff4444;
  background: #2a1a1a;
  flex-direction: column;
  align-items: flex-start;
}

.thumb {
  width:50px;
  height:50px;
  object-fit:cover;
  border-radius:6px;
}

.card span, .card a {
  color:#fff;
  text-decoration:none;
  font-weight:bold;
}

.vip-wrapper {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 14px;
}

.vip-top {
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
}

.vip-cta-card {
  justify-content:center;
  text-align:center;
  padding: 8px;
}

.arrow {
  font-size: 14px;
  color: #ff4444;
}

.arrow.left {
  animation: moveLeft 1s infinite alternate;
}

.arrow.right {
  animation: moveRight 1s infinite alternate;
}

@keyframes moveLeft {
  0% { transform: translateX(0); opacity: 0.6; }
  100% { transform: translateX(-6px); opacity: 1; }
}

@keyframes moveRight {
  0% { transform: translateX(0); opacity: 0.6; }
  100% { transform: translateX(6px); opacity: 1; }
}

/* ================= SKELETON ================= */
.skeleton {
  position: relative;
  overflow: hidden;
  background:#2b2b2b;
}

.skeleton::after {
  content:"";
  position:absolute;
  top:0;
  left:-150px;
  height:100%;
  width:150px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  animation: shimmer 1.2s infinite;
}

@keyframes shimmer {
  100% { left:100%; }
}

.skeleton-thumb {
  width:50px;
  height:50px;
  border-radius:6px;
  background:#333;
}

.skeleton-text {
  height:14px;
  width:120px;
  border-radius:4px;
  background:#333;
}

.skeleton-card {
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border-radius:8px;
}

.skeleton-vip {
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:12px;
  border-radius:8px;
}

.skeleton-line {
  height:14px;
  width:60%;
  background:#333;
  border-radius:4px;
}
</style>
</head>

<body>

<h2>📂 All Folders</h2>

<div id="vipContainer" class="list"></div>
<div id="folders" class="list"></div>

<footer style="text-align:center; padding:20px; font-size:12px; color:#aaa; background:#111; margin-top:10px;">
© 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>
const BASE_URL = "https://anywherecum.pages.dev/images/";
const vipContainer = document.getElementById("vipContainer");
const foldersContainer = document.getElementById("folders");

/* ================= VIP SKELETON ================= */
function renderVipSkeleton() {
  vipContainer.innerHTML = `
    <div class="card vip skeleton skeleton-vip">
      <div style="display:flex; gap:10px; align-items:center;">
        <div class="skeleton-thumb"></div>
        <div class="skeleton-line"></div>
      </div>
      <div class="skeleton-line" style="width:80%;"></div>
    </div>

    <div class="card vip skeleton skeleton-vip">
      <div class="skeleton-line" style="width:90%;"></div>
    </div>
  `;
}

/* ================= FOLDER SKELETON ================= */
function renderFolderSkeleton(count = 6) {
  foldersContainer.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const skel = document.createElement("div");
    skel.className = "card skeleton skeleton-card";
    skel.innerHTML = `
      <div class="skeleton-thumb"></div>
      <div class="skeleton-text"></div>
    `;
    foldersContainer.appendChild(skel);
  }
}

/* Initial load */
renderVipSkeleton();
renderFolderSkeleton();

Promise.all([
  fetch('vip.json').then(res => res.json()).catch(() => null),
  fetch('videos.json').then(res => res.json()).catch(() => [])
])
.then(([vipData, videos]) => {

  /* ================= VIP ================= */
  vipContainer.innerHTML = "";

  if (vipData) {
    const vipItem = Array.isArray(vipData) ? vipData[0] : vipData;

    const vipWrapper = document.createElement("div");
    vipWrapper.className = "vip-wrapper";

    const vipCard = document.createElement("div");
    vipCard.className = "card vip";

    vipCard.onclick = () => {
      window.open("https://fc-lc.xyz/al0L8qyP", "_blank");
    };

    vipCard.innerHTML = `
      <div class="vip-top">
        <img src="${BASE_URL + vipItem.thumbnail}" class="thumb">
        <span>⭐VIP Exclusive</span>
      </div>
    `;

    const ctaCard = document.createElement("div");
    ctaCard.className = "card vip-cta-card";

    ctaCard.onclick = (e) => e.stopPropagation();

    ctaCard.innerHTML = `
      <span class="arrow left">➡️</span>
      <span>
        <a href="https://streamtape.com/v/84Lgxedm03F2lV/AnywhereCum_20260315_100916372.mp4" target="_blank">
          Click & Watch How To Unlock VIP Access
        </a>
      </span>
      <span class="arrow right">⬅️</span>
    `;

    vipWrapper.appendChild(vipCard);
    vipWrapper.appendChild(ctaCard);
    vipContainer.appendChild(vipWrapper);
  }

  /* ================= FOLDERS ================= */
  foldersContainer.innerHTML = "";

  const folderMap = {};

  videos.forEach(v => {
    if (!folderMap[v.folder]) folderMap[v.folder] = [];
    folderMap[v.folder].push(v);
  });

  Object.keys(folderMap)
    .sort((a,b)=>a.toLowerCase().localeCompare(b.toLowerCase()))
    .forEach(folder => {

      const firstVideo = folderMap[folder][0];

      const div = document.createElement("div");
      div.className = "card";

      div.onclick = () => {
        window.location.href = `folder.html?folder=${encodeURIComponent(folder)}`;
      };

      div.innerHTML = `
        <img src="${BASE_URL + firstVideo.thumbnail}" class="thumb">
        <span>${folder}</span>
      `;

      foldersContainer.appendChild(div);
    });

})
.catch(() => {
  vipContainer.innerHTML = "<p style='text-align:center;'>Failed to load VIP.</p>";
  foldersContainer.innerHTML = "<p style='text-align:center;'>Failed to load folders.</p>";
});
</script>

</body>
</html>
