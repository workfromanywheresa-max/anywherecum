<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folders</title>

<style>
html { overflow-y: scroll; }

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

/* GRID */
.list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

/* CARD */
.card {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
}

/* 🔥 VERY SMALL THUMBNAIL */
.card img {
  width: 80px;
  height: 55px;
  object-fit: cover;
  border-radius: 5px;
}

/* TEXT */
.card a {
  color: #fff;
  text-decoration: none;
  font-weight: bold;
  font-size: 13px;
}

/* AD */
.ad-space {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.ad-lock {
  width: 300px;
  height: 112px;
  overflow: hidden;
  position: relative;
  background: #fff;
  border-radius: 8px;
}

.ad-lock * {
  max-width: 300px !important;
  max-height: 112px !important;
}

/* FOOTER */
footer {
  margin-top: 20px;
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
}
</style>
</head>

<body>

<!-- VIP LIST -->
<div id="vipList" class="list"></div>

<!-- NORMAL FOLDERS -->
<div id="folderList" class="list" style="margin-top:15px;"></div>

<!-- AD -->
<div class="ad-space">
  <div class="ad-lock">

    <script async src="https://poweredby.jads.co/js/jads.js"></script>
    <ins id="1113665" style="display:block; width:300px; height:112px;"></ins>
    <script>
      (adsbyjuicy = window.adsbyjuicy || []).push({'adzone':1113665});
    </script>

  </div>
</div>

<footer>
© 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>

/* ================= VIP ================= */
async function loadVIP() {
  const res = await fetch('./vip.json');
  const data = await res.json();

  const container = document.getElementById('vipList');
  container.innerHTML = '';

  data.sort((a,b)=>new Date(b.date)-new Date(a.date));

  data.forEach(vip => {
    const card = document.createElement('div');
    card.className = 'card';

    const img = document.createElement('img');
    img.src = "https://anywherecum.pages.dev/images/" + vip.thumbnail;

    const link = document.createElement('a');
    link.href = "folder.html?folder=" + encodeURIComponent(vip.folder);
    link.textContent = vip.folder;

    img.onclick = () => link.click();

    card.appendChild(img);
    card.appendChild(link);
    container.appendChild(card);
  });
}

/* ================= FOLDERS ================= */
async function loadFolders() {
  const res = await fetch('./videos.json');
  const data = await res.json();

  const folders = {};

  data.forEach(v => {
    if (!folders[v.folder]) folders[v.folder] = [];
    folders[v.folder].push(v);
  });

  const container = document.getElementById('folderList');
  container.innerHTML = '';

  Object.keys(folders)
    .sort()
    .forEach(name => {

      const vids = folders[name]
        .sort((a,b)=>new Date(b.date)-new Date(a.date));

      const latest = vids[0];

      const card = document.createElement('div');
      card.className = 'card';

      const img = document.createElement('img');
      img.src = "https://anywherecum.pages.dev/images/" + latest.thumbnail;

      const link = document.createElement('a');
      link.href = "folder.html?folder=" + encodeURIComponent(name);
      link.textContent = name;

      img.onclick = () => link.click();

      card.appendChild(img);
      card.appendChild(link);
      container.appendChild(card);
    });
}

/* ================= INIT ================= */
window.addEventListener('load', () => {
  loadVIP();
  loadFolders();
});

</script>

</body>
</html>
