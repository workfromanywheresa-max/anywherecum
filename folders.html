<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Site Views</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1, h2 {
  color: #fff;
}

/* Containers */
#vipContainer, #normalContainer {
  margin-top: 15px;
  min-height: 120px; /* prevents layout shift */
}

/* Folder Box */
.folderBox {
  display: flex;
  align-items: center;
  background: #1e1e1e;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 8px;
}

/* Thumbnail */
.thumbnail {
  width: 100px;
  height: 70px;
  margin-right: 10px;
  background: #333;
  border-radius: 5px;
  object-fit: cover;
}

/* Text */
.folderText {
  flex: 1;
}

/* ===== SHIMMER ===== */
.shimmer {
  position: relative;
  overflow: hidden;
  background: #2a2a2a;
  border-radius: 8px;
}

.shimmer::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150%;
  width: 150%;
  height: 100%;
  background: linear-gradient(
    90deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0.08) 50%,
    rgba(255,255,255,0) 100%
  );
  animation: shimmerMove 1.2s infinite;
}

@keyframes shimmerMove {
  0% { left: -150%; }
  100% { left: 150%; }
}

/* shimmer blocks */
.skeleton {
  height: 90px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>Admin Dashboard</h1>

<h2>VIP Views</h2>
<div id="vipContainer">
  <div class="folderBox shimmer skeleton"></div>
  <div class="folderBox shimmer skeleton"></div>
</div>

<h2>Normal Views</h2>
<div id="normalContainer">
  <div class="folderBox shimmer skeleton"></div>
  <div class="folderBox shimmer skeleton"></div>
  <div class="folderBox shimmer skeleton"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

/* ---------------- Firebase ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* Containers */
const vipContainer = document.getElementById("vipContainer");
const normalContainer = document.getElementById("normalContainer");

/* Function to render items */
function renderFolder(container, data) {
  container.innerHTML = "";

  if (!data) return;

  Object.values(data).forEach(item => {
    const box = document.createElement("div");
    box.className = "folderBox";

    box.innerHTML = `
      <img class="thumbnail" src="${item.image || ''}" />
      <div class="folderText">
        <h3>${item.title || 'No Title'}</h3>
        <p>Views: ${item.views || 0}</p>
      </div>
    `;

    container.appendChild(box);
  });
}

/* Listen to Firebase */
onValue(ref(db, "vip"), (snapshot) => {
  renderFolder(vipContainer, snapshot.val());
});

onValue(ref(db, "normal"), (snapshot) => {
  renderFolder(normalContainer, snapshot.val());
});
</script>

</body>
</html>
