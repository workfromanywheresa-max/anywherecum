html { overflow-y: scroll; }

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

#pageWrapper {
  flex: 1;

h2 {
  text-align: center;
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

.folderBox {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
}

.thumbnail {
  width: 100px;
  height: 70px;
  object-fit: cover;
  border-radius: 6px;
  background: #333;
}

.folderTitle {
  font-size: 16px;
  color: #ddd;

.vip-btn {

  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  font-size: 10px;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

@keyframes blink {
  50% { opacity: 0.4; }
}

/* 🔒 AD LOCK */
.ad-space {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

/* FIXED SIZE = NO SHIFT */
.ad-lock {
  width: 300px;
  height: 112px;
  overflow: hidden;
  position: relative;
  border: 2px solid red;
  border-radius: 8px;
  background: #fff;
  visibility: hidden; /* hidden until loaded */
}

/* Prevent expansion */
.ad-lock * {
  max-width: 300px !important;
  max-height: 112px !important;
}

footer {
  margin-top: 20px;
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
