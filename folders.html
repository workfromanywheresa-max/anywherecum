<style>
html { overflow-y: scroll; }

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

#pageWrapper { flex: 1; }

h2 {
  text-align: center;
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

/* Folder */
.folderBox {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.2s;

  user-select: none;
  -webkit-user-select: none;
  touch-action: pan-y;
}

.folderBox:hover { transform: scale(1.02); }

.thumbnail {
  width: 100px;
  height: 70px;
  object-fit: cover;
  border-radius: 6px;
  background: #333;
  pointer-events: none;
}

.folderTitle {
  font-size: 16px;
  color: #ddd;
  margin: 0;
  pointer-events: none;
}

/* VIP */
.vip-btn {
  display: block;
  text-align: center;
  background: linear-gradient(45deg, #ff4444, #ff0000);
  color: #fff;
  padding: 12px;
  margin: 15px 0;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  animation: pulse 1.5s infinite;
  font-size: 10px;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

/* Skeleton */
.skeletonBox {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 10px;
  height: 86px;
}

.skeletonThumb {
  width: 100px;
  height: 70px;
  border-radius: 6px;
}

.skeletonText {
  height: 14px;
  width: 120px;
  border-radius: 4px;
}

.skeleton {
  background: #2a2a2a;
  position: relative;
  overflow: hidden;
}

.skeleton::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150px;
  height: 100%;
  width: 150px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  animation: shimmer 1.2s infinite;
}

@keyframes shimmer {
  100% { transform: translateX(300px); }
}

/* AD FIXED SPACE */
#ad-space {
  width: 320px;
  height: 250px;   /* RESERVES SPACE */
  margin: 20px auto;
  position: relative;
}

#ad-container {
  width: 100%;
  height: 100%;
  display: none;
}

#container-c04c459f06eefec9d4eeedb2a131c1d2 {
  width: 100%;
  height: 100%;
}

.skeleton-ad {
  width: 100%;
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  position: absolute;
  top: 0;
  left: 0;
}

footer {
  margin-top: auto;
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
}
</style>
</head>

<script>
const vipContainer = document.getElementById("vipContainer");
const normalContainer = document.getElementById("normalContainer");
const IMAGE_BASE = "https://anywherecum.pages.dev/images/";

/* Skeleton */
function showSkeleton(container, count = 4) {
  container.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const box = document.createElement("div");
    box.className = "skeletonBox";

    const thumb = document.createElement("div");
    thumb.className = "skeleton skeletonThumb";

    const text = document.createElement("div");
    text.className = "skeleton skeletonText";

    box.appendChild(thumb);
    box.appendChild(text);
    container.appendChild(box);
  }
}

/* Extract folders */
function extractFolders(videos) {
  const folders = {};
  videos.forEach(video => {
    if (!video.folder) return;
    if (!folders[video.folder]) folders[video.folder] = video;
  });
  return folders;
}

/* Render */
function renderFolders(container, folders, isVIP = false) {
  container.innerHTML = "";

  Object.keys(folders).forEach(folderName => {
    const video = folders[folderName];

    const box = document.createElement("div");
    box.className = "folderBox";

    const img = document.createElement("img");
    img.className = "thumbnail";
    img.src = IMAGE_BASE + (video.thumbnail || "");

    const title = document.createElement("h3");
    title.className = "folderTitle";
    title.textContent = folderName;

    box.appendChild(img);
    box.appendChild(title);

    let startX = 0, startY = 0, moved = false;

    box.addEventListener("pointerdown", e => {
      startX = e.clientX;
      startY = e.clientY;
      moved = false;
    });

    box.addEventListener("pointermove", e => {
      if (Math.abs(e.clientX - startX) > 10 || Math.abs(e.clientY - startY) > 10) {
        moved = true;
      }
    });

    box.addEventListener("pointerup", () => {
      if (moved) return;

      if (isVIP) {
        window.open("https://fc-lc.xyz/al0L8qyP", "_blank");
      } else {
        window.location.href = "folder.html?folder=" + encodeURIComponent(folderName);
      }
    });

    container.appendChild(box);
  });
}

/* LOAD */
showSkeleton(vipContainer, 2);
showSkeleton(normalContainer, 6);

Promise.all([
  fetch("vip.json").then(r => r.json()).catch(() => []),
  fetch("videos.json").then(r => r.json()).catch(() => [])
]).then(([vipVideos, normalVideos]) => {

  renderFolders(vipContainer, extractFolders(vipVideos), true);
  renderFolders(normalContainer, extractFolders(normalVideos), false);

});

/* AD LOADER FIX */
const skeleton = document.getElementById("skeleton");
const adContainer = document.getElementById("container-c04c459f06eefec9d4eeedb2a131c1d2");
const adWrapper = document.getElementById("ad-container");

const observer = new MutationObserver((mutations, obs) => {
  if (adContainer.children.length > 0) {
    skeleton.style.display = "none";
    adWrapper.style.display = "block";
    obs.disconnect();
  }
});

observer.observe(adContainer, { childList: true, subtree: true });
</script>
