<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folders</title>

<style>
html { overflow-y: scroll; }

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

#pageWrapper {
  flex: 1;
}

/* 🔥 TITLE ON TOP */
.page-title {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 15px;
}

/* LIST */
ul {
  list-style: none;
  padding: 0;
}

/* 🟢 SMALL CARDS */
li {
  margin-bottom: 12px;
}

/* SMALL THUMBNAIL */
img {
  width: 140px;        /* 🔥 SMALL */
  height: 90px;        /* 🔥 SMALL */
  object-fit: cover;
  border-radius: 6px;
  display: block;
}

/* FLEX CARD LAYOUT */
li {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* LINK TEXT */
.folder-link {
  color: #fff;
  text-decoration: none;
  font-weight: bold;
  font-size: 14px;
}

/* VIP TITLE */
.vip-title {
  color: gold;
  text-align: center;
  margin-top: 20px;
}

/* AD */
.ad-space {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.ad-lock {
  width: 300px;
  height: 112px;
  overflow: hidden;
  position: relative;
  background: #fff;
  border-radius: 8px;
}

.ad-lock * {
  max-width: 300px !important;
  max-height: 112px !important;
}

/* FOOTER */
footer {
  margin-top: 20px;
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
}
</style>
</head>

<body>

<div id="pageWrapper">

<!-- 🔥 TOP TITLE -->
<div class="page-title">Folders</div>

<!-- VIP -->
<h2 class="vip-title">🔥 VIP</h2>
<ul id="vipList"></ul>

<!-- NORMAL FOLDERS -->
<h2 class="page-title">Folders</h2>
<ul id="folderList"></ul>

<!-- AD -->
<div class="ad-space">
  <div class="ad-lock">

    <script async src="https://poweredby.jads.co/js/jads.js"></script>
    <ins id="1113665" style="display:block; width:300px; height:112px;"></ins>
    <script>
      (adsbyjuicy = window.adsbyjuicy || []).push({'adzone':1113665});
    </script>

    <div style="
      position:absolute;
      top:2px;
      left:50%;
      transform:translateX(-50%);
      background:red;
      color:#fff;
      font-size:11px;
      padding:2px 6px;
      border-radius:4px;
    ">
      🔴 Live
    </div>

  </div>
</div>

</div>

<footer>
© 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>

/* ================= VIP ================= */
async function loadVIP() {
  const res = await fetch('./vip.json');
  const data = await res.json();

  const container = document.getElementById('vipList');
  container.innerHTML = '';

  data.sort((a,b)=>new Date(b.date)-new Date(a.date));

  data.forEach(vip => {
    const li = document.createElement('li');

    const img = document.createElement('img');
    img.src = "https://anywherecum.pages.dev/images/" + vip.thumbnail;

    const link = document.createElement('a');
    link.className = "folder-link";
    link.href = "folder.html?folder=" + encodeURIComponent(vip.folder);
    link.textContent = vip.folder;

    img.onclick = () => link.click();

    li.appendChild(img);
    li.appendChild(link);

    container.appendChild(li);
  });
}

/* ================= FOLDERS ================= */
async function loadFolders() {
  const res = await fetch('./videos.json');
  const data = await res.json();

  const folders = {};

  data.forEach(v => {
    if (!folders[v.folder]) folders[v.folder] = [];
    folders[v.folder].push(v);
  });

  const container = document.getElementById('folderList');
  container.innerHTML = '';

  Object.keys(folders)
    .sort()
    .forEach(name => {

      const vids = folders[name]
        .sort((a,b)=>new Date(b.date)-new Date(a.date));

      const latest = vids[0];

      const li = document.createElement('li');

      const img = document.createElement('img');
      img.src = "https://anywherecum.pages.dev/images/" + latest.thumbnail;

      const link = document.createElement('a');
      link.className = "folder-link";
      link.href = "folder.html?folder=" + encodeURIComponent(name);
      link.textContent = name;

      img.onclick = () => link.click();

      li.appendChild(img);
      li.appendChild(link);

      container.appendChild(li);
    });
}

/* ================= INIT ================= */
window.addEventListener('load', () => {
  loadVIP();
  loadFolders();
});

</script>

</body>
</html>
