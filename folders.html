<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folders</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  text-align: center;
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

.folderBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
  cursor: pointer;
  transition: 0.2s;
}

.folderBox:hover {
  transform: scale(1.02);
}

.thumbnail {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 8px;
}

.folderTitle {
  text-align: center;
  margin-top: 10px;
  color: #ddd;
}
</style>
</head>

<body>

<h2>Folders</h2>

<div id="folderList"></div>

<script>
const container = document.getElementById("folderList");

fetch("videos.json")
.then(res => {
  if (!res.ok) throw new Error("Failed to fetch");
  return res.json();
})
.then(videos => {

  const IMAGE_BASE = "https://anywherecum.pages.dev/images/";

  // Group videos into folders
  const folders = {};

  videos.forEach(video => {
    if (!video.folder) return;

    // Only keep first video as thumbnail
    if (!folders[video.folder]) {
      folders[video.folder] = video;
    }
  });

  // Render folders
  Object.keys(folders).forEach(folderName => {

    const video = folders[folderName];

    const box = document.createElement("div");
    box.className = "folderBox";

    box.onclick = () => {
      window.location.href = "folder.html?folder=" + encodeURIComponent(folderName);
    };

    const img = document.createElement("img");
    img.className = "thumbnail";
    img.src = IMAGE_BASE + (video.thumbnail || "");

    const title = document.createElement("h3");
    title.className = "folderTitle";
    title.textContent = folderName;

    box.appendChild(img);
    box.appendChild(title);

    container.appendChild(box);
  });

  // If no folders found
  if (Object.keys(folders).length === 0) {
    container.innerHTML = "<p style='text-align:center;color:#aaa;'>No folders found.</p>";
  }

})
.catch(err => {
  console.error(err);
  container.innerHTML = "<p style='text-align:center;color:#aaa;'>Failed to load folders.</p>";
});
</script>

</body>
</html>
