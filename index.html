<style>
body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 15px; }
header { text-align: center; padding: 5px 10px; background: #111; }
header h1 { color: #ff4444; margin: 2px 0; font-size: 20px; }

ul { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(2,1fr); gap: 15px; }
li { background: #222; padding: 10px; border-radius: 8px; text-align: center; }

.folder-link { color: #fff; font-weight: bold; text-decoration: none; display: block; margin-top: 5px; }

#folderList li img { width: 100%; height: 180px; border-radius: 5px; object-fit: cover; margin-bottom: 5px; }

/* Skeleton */
.skeleton { background: #333; border-radius: 5px; position: relative; overflow: hidden; height: 180px; }
.skeleton::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  animation: loading 1.5s infinite;
}

@keyframes loading {
  0% { left: -100%; }
  100% { left: 100%; }
}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWHoNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",

  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.appspot.com",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const viewsRef = ref(db, "views/homepage");

// 🔥 SKELETON LOADER FUNCTION
function showFolderSkeletons(count = 10) {
  const folderList = document.getElementById('folderList');
  folderList.innerHTML = '';

  for (let i = 0; i < count; i++) {
    const li = document.createElement('li');
    li.className = 'skeleton';
    folderList.appendChild(li);
  }
}

document.addEventListener('DOMContentLoaded', () => {

  // 👉 SHOW 10 SKELETONS IMMEDIATELY
  showFolderSkeletons(10);

  fetch('./videos.json')
    .then(res => res.json())
    .then(videos => {

      const folders = {};
      videos.forEach(v => {
        if (!folders[v.folder]) folders[v.folder] = [];
        folders[v.folder].push(v);
      });

      const folderList = document.getElementById('folderList');
      folderList.innerHTML = '';

      Object.keys(folders).sort().forEach(folderName => {
        const folderVideos = folders[folderName];
        folderVideos.sort((a, b) => new Date(b.date) - new Date(a.date));

        const latest = folderVideos[0];
        const li = document.createElement('li');

        const thumb = document.createElement('img');
        thumb.src = latest.thumbnail;
        thumb.onclick = () => window.open("folder.html?folder=" + encodeURIComponent(folderName), "_blank");

        const link = document.createElement('a');
        link.className = "folder-link";
        link.href = "folder.html?folder=" + encodeURIComponent(folderName);
        link.target = "_blank";
        link.textContent = folderName;

        li.appendChild(thumb);
        li.appendChild(link);
        folderList.appendChild(li);
      });

    });

});
</script>
