<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum - Home</title>
<style>
body { font-family: Arial,sans-serif; background:#1a1a1a; color:#fff; margin:0; padding:15px; }
header { text-align:center; padding:5px 10px; background:#111; }
header h1 { color:#ff4444; margin:2px 0; font-size:20px; }
h2 { color:#ff4444; border-bottom:2px solid #ff4444; padding-bottom:5px; margin-top:20px; text-align:center; }
ul { list-style:none; padding:0; display:grid; grid-template-columns:repeat(2,1fr); gap:15px; }
li { background:#222; padding:10px; border-radius:8px; text-align:center; cursor:pointer; transition:0.3s; }
li:hover { background:#333; }
a.folder-link { color:#fff; font-weight:bold; text-decoration:none; display:block; margin-top:5px; }
a.folder-link:hover { color:#ff4444; text-decoration:underline; }
#latestVideo { background:#222; padding:10px; border-radius:8px; margin-bottom:20px; text-align:center; }
#latestVideo img { width:100%; border-radius:5px; margin-bottom:5px; }
footer { text-align:center; padding:20px; font-size:12px; color:#aaa; background:#111; margin-top:40px; }
@media(max-width:600px){ ul { grid-template-columns:1fr; } }
</style>
</head>
<body>

<header>
<h1>AnywhereCum</h1>
<p>Explore our exclusive content folders</p>
</header>

<div id="latestVideo">
<h2>Latest Video</h2>
<p>Loading...</p>
</div>

<h2>Content Folders</h2>
<ul id="folderList"></ul>

<footer>© 2026 AnywhereCum – Legal content only. 18+</footer>

<script>
fetch('videos.json')
  .then(res => res.json())
  .then(videos => {
    const folderList = document.getElementById('folderList');

    // Latest video overall
    if(videos.length>0){
      videos.sort((a,b)=>new Date(b.date)-new Date(a.date));
      const newest = videos[0];
      const latestDiv = document.getElementById('latestVideo');
      latestDiv.innerHTML = `
        <h2>Latest Video</h2>
        <img src="${newest.thumbnail}" alt="${newest.title}">
        <p>${newest.title} (${newest.folder})</p>
        <a href="${newest.url}" target="_blank" style="color:#ff4444;font-weight:bold;text-decoration:none;">Watch Now</a>
      `;
    }

    // Group videos by folder
    const folders = {};
    videos.forEach(v=>{
      if(!folders[v.folder]) folders[v.folder]=[];
      folders[v.folder].push(v);
    });

    // Create folder cards linking to universal folder page
    Object.keys(folders).forEach(folderName=>{
      const vids = folders[folderName];
      vids.sort((a,b)=>new Date(b.date)-new Date(a.date));
      const latestInFolder = vids[0];

      const li = document.createElement('li');

      const thumb = document.createElement('img');
      thumb.src = latestInFolder.thumbnail;
      thumb.alt = folderName;
      thumb.addEventListener('click', () => {
        window.location.href = `folder.html?folder=${encodeURIComponent(folderName.toLowerCase())}`;
      });

      const link = document.createElement('a');
      link.className='folder-link';
      link.href = `folder.html?folder=${encodeURIComponent(folderName.toLowerCase())}`;
      link.textContent = folderName;

      li.appendChild(thumb);
      li.appendChild(link);
      folderList.appendChild(li);
    });

  })
  .catch(err => console.error('Failed to load videos.json:', err));
</script>

</body>
</html>
