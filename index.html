<script>
document.addEventListener('DOMContentLoaded', () => {
  const BASE_URL = "https://anywherecum.pages.dev/images/";

  fetch('./videos.json').then(res=>res.json()).then(videos=>{
    const folders={};
    videos.forEach(v=>{
      if(!folders[v.folder]) folders[v.folder]=[];
      folders[v.folder].push(v);
    });

    const folderList=document.getElementById('folderList');
    folderList.innerHTML='';

    Object.keys(folders).sort().forEach(folderName=>{
      const folderVideos=folders[folderName];
      folderVideos.sort((a,b)=>new Date(b.date)-new Date(a.date));
      const latest=folderVideos[0];

      const li=document.createElement('li');

      const thumb=document.createElement('img');
      thumb.src=BASE_URL + latest.thumbnail;
      thumb.alt=folderName;
      thumb.onclick=()=>window.open("folder.html?folder="+encodeURIComponent(folderName), "");

      const link=document.createElement('a');
      link.className="folder-link";
      link.href="folder.html?folder="+encodeURIComponent(folderName);

      // ✅ UPDATED LOGIC
      link.textContent = folderName.includes("Anal") ? "Anal" : folderName;

      li.appendChild(thumb);
      li.appendChild(link);
      folderList.appendChild(li);
    });

    // Latest Video
    if(videos.length){
      const latestVideo=videos.sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
      const latestDiv=document.getElementById('latestVideo');

      latestDiv.innerHTML=`
        <h2>🎥Latest Video🎥</h2>
        <ul>
          <li>
            <img src="${BASE_URL+latestVideo.thumbnail}" style="width:100%;height:180px;border-radius:5px;object-fit:cover;cursor:pointer;margin-bottom:5px;">
            <a href="folder.html?folder=${encodeURIComponent(latestVideo.folder)}" class="folder-link">
              Watch Now: New Video Available!!!
            </a>
          </li>
        </ul>`;

      latestDiv.querySelector("img").onclick=()=>{
        window.location.href="folder.html?folder="+encodeURIComponent(latestVideo.folder);
      };
    }
  });
});
</script>

<script type="module" src="views.js"></script>
