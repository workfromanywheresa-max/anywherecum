<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum</title>

<style>
body {
  font-family: Arial;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  text-align: center;
  color: #ff4444;
}

ul {
  list-style: none;
  padding: 0;
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
}

li {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
}

img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 5px;
  cursor: pointer;
}

.folder-link {
  color: #fff;
  text-decoration: none;
  display: block;
  margin-top: 5px;
}

.folder-link:hover {
  color: #ff4444;
}

/* CTA */
.cta {
  text-align: center;
  margin: 15px 0;
}

.cta a {
  color: #ff4444;
  font-weight: bold;
  text-decoration: none;
}
</style>

</head>

<body>

<header>
  <h2>AnywhereCum - Video Folders</h2>
</header>

<!-- CTA -->
<div class="cta">
  <a href="https://streamtape.com/v/e4zr74b81VuY6O4/Instruction_On_How_To_Watch_and_Download_Videos.mp4" target="_blank">
    ▶ Watch How to Download & Stream Videos
  </a>
</div>

<!-- Latest Video -->
<h2>Latest Video</h2>
<div id="latestVideoContent"></div>

<!-- Folders -->
<h2>Folders</h2>
<ul id="folderList"></ul>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const BASE_URL = "https://anywherecum.pages.dev/images/";

  fetch('./videos.json')
    .then(res => res.json())
    .then(videos => {

      if (!videos || !videos.length) return;

      /* ---------------- LATEST VIDEO ---------------- */
      const latest = videos
        .slice()
        .sort((a,b) => new Date(b.date) - new Date(a.date))[0];

      const latestContainer = document.getElementById("latestVideoContent");

      const latestUl = document.createElement("ul");

      const latestLi = document.createElement("li");

      const latestImg = document.createElement("img");
      latestImg.src = BASE_URL + latest.thumbnail;

      latestImg.onclick = () => {
        window.location.href = "folder.html?folder=" + encodeURIComponent(latest.folder);
      };

      const latestLink = document.createElement("a");
      latestLink.className = "folder-link";
      latestLink.href = "folder.html?folder=" + encodeURIComponent(latest.folder);
      latestLink.textContent = "Watch Now";

      latestLi.appendChild(latestImg);
      latestLi.appendChild(latestLink);
      latestUl.appendChild(latestLi);

      latestContainer.appendChild(latestUl);

      /* ---------------- FOLDERS ---------------- */
      const folders = {};

      videos.forEach(v => {
        if (!folders[v.folder]) folders[v.folder] = [];
        folders[v.folder].push(v);
      });

      const folderList = document.getElementById("folderList");
      folderList.innerHTML = "";

      Object.keys(folders).sort().forEach(folderName => {

        const folderVideos = folders[folderName]
          .sort((a,b) => new Date(b.date) - new Date(a.date));

        const latestVideo = folderVideos[0];

        const li = document.createElement("li");

        const img = document.createElement("img");
        img.src = BASE_URL + latestVideo.thumbnail;

        img.onclick = () => {
          window.location.href = "folder.html?folder=" + encodeURIComponent(folderName);
        };

        const link = document.createElement("a");
        link.className = "folder-link";
        link.href = "folder.html?folder=" + encodeURIComponent(folderName);
        link.textContent = folderName;

        li.appendChild(img);
        li.appendChild(link);
        folderList.appendChild(li);
      });

    })
    .catch(err => {
      console.error("Error loading videos.json", err);
    });

});
</script>

</body>
</html>
