<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum - Home Auto Preview</title>

<style>
body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 15px; }

header { text-align: center; padding: 5px 10px; background: #111; }
header h1 { color: #ff4444; margin: 2px 0; font-size: 20px; }
header p { margin: 0 0 2px 0; font-size: 12px; }
header img { max-width: 100%; border-radius: 8px; }

#visitSite { font-size: 12px; text-align: center; margin-bottom: 10px; }

h2 { color: #ff4444; border-bottom: 2px solid #ff4444; padding-bottom: 5px; margin-top:20px; }

ul {
list-style: none;
padding: 0;
display: grid;
grid-template-columns: repeat(2,1fr);
gap: 15px;
}

li {
background: #222;
padding: 10px;
border-radius: 8px;
text-align: center;
cursor: pointer;
transition: 0.3s;
}

li:hover { background: #333; }

.folder-link {
color: #ff4444;
font-weight: bold;
text-decoration: none;
display: block;
margin-top: 5px;
}

.folder-link:hover { color: white; }

img {
width: 100%;
height: 180px;
object-fit: cover;
border-radius: 6px;
}

#latestVideo {
background: #222;
padding: 10px;
border-radius: 8px;
margin-bottom: 20px;
text-align: center;
}

footer {
text-align: center;
padding: 20px;
font-size: 12px;
color: #aaa;
background: #111;
margin-top: 40px;
}

@media(max-width:600px){
ul { grid-template-columns: 1fr; }
}
</style>

</head>
<body>

<header>
<h1>AnywhereCum</h1>
<p>Explore our exclusive content folders</p>
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgcXzmfnaZCcHIY3SCvnmKvNKzqoqlZ2gex-9CNWkM41sD23nP_rzxLeC0uiuxosxFWwOkWoXlLT2pqKycM20NYrGGFhhziXts1tHiLJVyeJz1LTvU2M3kFSwaqvHiJV_p6hItlh48_Qtr09w7hTdz0cmfqgLOzyfM_dOfWG98-Douk-fAp0zZpWhWmXITx/s720/1000167088.jpg">
</header>

<div id="visitSite">
<a href="https://thabogushumani.blogspot.com" target="_blank" class="folder-link">
Visit this site to download movies
</a>
</div>

<div id="latestVideo">
<h2>Latest Video</h2>
<p>Loading...</p>
</div>

<section id="vipSection">
<h2>VIP Vault</h2>

<div style="text-align:center; margin-bottom:15px;">
<a href="https://streamtape.com/v/6Rm4rVxXQQu996Q/AnywhereCum_20260313_090812636_%281%29.mp4"
target="_blank"
class="folder-link">
Watch how to unlock FREE VIP Access
</a>
</div>

<ul id="vipList"></ul>
</section>

<h2>Content Folders</h2>
<ul id="folderList"></ul>

<footer>
© 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>

document.addEventListener("DOMContentLoaded", () => {

fetch("./videos.json")
.then(res => res.json())
.then(data => {

const folderList = document.getElementById("folderList");
const latestContainer = document.getElementById("latestVideo");

let allVideos = [];

Object.keys(data).forEach(folder => {

let videos = data[folder];

videos.sort((a,b)=>new Date(b.date)-new Date(a.date));

videos.forEach(v => v.folder = folder);

allVideos.push(...videos);

const latest = videos[0];

const li = document.createElement("li");

const thumb = document.createElement("img");
thumb.src = latest.thumbnail;
thumb.alt = latest.title;

li.appendChild(thumb);

li.onclick = () => {
window.location.href = `folder.html?folder=${encodeURIComponent(folder)}`;
};

const link = document.createElement("a");
link.className = "folder-link";
link.href = `folder.html?folder=${encodeURIComponent(folder)}`;
link.textContent = `${folder} (${latest.size})`;

li.appendChild(link);

folderList.appendChild(li);

});

if(allVideos.length){

allVideos.sort((a,b)=>new Date(b.date)-new Date(a.date));

const latest = allVideos[0];

latestContainer.innerHTML = `
<h2>Latest Video</h2>
<img src="${latest.thumbnail}">
<a class="folder-link" href="folder.html?folder=${encodeURIComponent(latest.folder)}">
Watch Now: ${latest.title} (${latest.size})
</a>
`;

}

})
.catch(err => console.log("Error loading videos:",err));

});

</script>

</body>
</html>
