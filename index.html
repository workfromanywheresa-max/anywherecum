<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum - Home</title>
<style>
body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 15px; }
header { text-align: center; padding: 5px 10px; background: #111; }
header h1 { color: #ff4444; margin: 2px 0; font-size: 20px; }
header p { margin: 0 0 2px 0; font-size: 12px; }
header img { max-width: 100%; height: auto; margin: 0; border-radius: 8px; }

#visitSite { font-size: 12px; text-align: center; margin-bottom: 10px; }
#visitSite a { color: #ff4444; text-decoration: none; font-weight: bold; animation: flash 1s infinite alternate; position: relative; padding: 0 25px; display: inline-block; font-size: 12px; }
#visitSite a::before { content: "➤"; position: absolute; left: 5px; animation: bounceLeft 1s infinite alternate; }
#visitSite a::after { content: "◀"; position: absolute; right: 5px; animation: bounceRight 1s infinite alternate; }
#visitSite a:hover { color: #fff; text-decoration: underline; }

h2 { color: #ff4444; border-bottom: 2px solid #ff4444; padding-bottom: 5px; margin-top:20px; }
ul { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(2,1fr); gap: 15px; }
li { background: #222; padding: 10px; border-radius: 8px; text-align: center; transition: 0.3s; cursor: pointer; }
li:hover { background: #333; }
a.folder-link { color: #ff4444; font-weight: bold; text-decoration: none; display: block; margin-top: 5px; }
a.folder-link:hover { color: #fff; text-decoration: underline; }

#vipList li img, #doggystyleList li img { width: 100%; height: 180px; border-radius: 5px; object-fit: cover; margin-bottom: 5px; }

footer { text-align: center; padding: 20px; font-size: 12px; color: #aaa; background: #111; margin-top: 40px; }

@media(max-width:600px){ ul { grid-template-columns: 1fr; } }

@keyframes flash { 0% { text-shadow: 0 0 5px #ff4444; } 50% { text-shadow: 0 0 20px #ff4444, 0 0 30px #ff8888; } 100% { text-shadow: 0 0 5px #ff4444; } }
@keyframes bounceLeft { 0% { transform: translateX(0); } 50% { transform: translateX(5px); } 100% { transform: translateX(0); } }
@keyframes bounceRight { 0% { transform: translateX(0); } 50% { transform: translateX(-5px); } 100% { transform: translateX(0); } }

.blogspot-style-link { color: #ff4444; font-weight: bold; text-decoration: none; font-size: 12px; display: inline-block; animation: flash 1s infinite alternate; position: relative; padding: 0 25px; }
.blogspot-style-link::before { content: "➤"; position: absolute; left: 5px; animation: bounceLeft 1s infinite alternate; }
.blogspot-style-link::after { content: "◀"; position: absolute; right: 5px; animation: bounceRight 1s infinite alternate; }
.blogspot-style-link:hover { color: #fff; text-decoration: underline; }
</style>
</head>
<body>

<header>
<h1>AnywhereCum</h1>
<p>Explore our exclusive content folders</p>
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgcXzmfnaZCcHIY3SCvnmKvNKzqoqlZ2gex-9CNWkM41sD23nP_rzxLeC0uiuxosxFWwOkWoXlLT2pqKycM20NYrGGFhhziXts1tHiLJVyeJz1LTvU2M3kFSwaqvHiJV_p6hItlh48_Qtr09w7hTdz0cmfqgLOzyfM_dOfWG98-Douk-fAp0zZpWhWmXITx/s720/1000167088.jpg">
</header>

<div id="visitSite">
  <a href="https://thabogushumani.blogspot.com" target="_blank">Visit this site to download movies</a>
</div>

<div id="latestVideo">
  <h2>Latest Video</h2>
  <p>Check individual folders for videos</p>
</div>

<!-- VIP Section -->
<section id="vipSection">
<h2>VIP Vault</h2>
<div id="vipCTA" style="text-align:center; margin-bottom:15px;">
  <a href="https://streamtape.com/v/6Rm4rVxXQQu996Q/AnywhereCum_20260313_090812636_%281%29.mp4" 
     target="_blank" 
     class="blogspot-style-link">
     Watch how to unlock FREE VIP Access
  </a>
</div>
<ul id="vipList"></ul>
</section>

<!-- Doggystyle Section -->
<h2>Doggystyle</h2>
<ul id="doggystyleList"></ul>

<footer>© 2026 AnywhereCum – Legal content only. 18+</footer>

<script>
document.addEventListener('DOMContentLoaded', () => {

  // VIP Section
  fetch('./vip.json')
    .then(res => res.json())
    .then(videos => {
      const container = document.getElementById('vipList');
      if(!videos.length) return;
      videos.sort((a,b)=>new Date(b.date)-new Date(a.date));
      const latestVIP = videos[0];

      const li = document.createElement('li');
      const thumb = document.createElement('img');
      thumb.src = latestVIP.thumbnail;
      thumb.alt = latestVIP.title;
      thumb.addEventListener('click', ()=> {
        window.location.href = latestVIP.url;
      });

      const link = document.createElement('a');
      link.className = "folder-link";
      link.href = "#";
      link.textContent = latestVIP.title;
      link.addEventListener('click', e=>{
        e.preventDefault();
        window.location.href = latestVIP.url;
      });

      li.appendChild(thumb);
      li.appendChild(link);
      container.appendChild(li);
    });

  // Doggystyle Section (like VIP)
  fetch('./doggystyle.json') // JSON file for Doggystyle videos
    .then(res => res.json())
    .then(videos => {
      const container = document.getElementById('doggystyleList');
      if(!videos.length) return;
      videos.sort((a,b)=>new Date(b.date)-new Date(a.date));
      const latestVideo = videos[0];

      const li = document.createElement('li');
      const thumb = document.createElement('img');
      thumb.src = latestVideo.thumbnail;
      thumb.alt = latestVideo.title;
      thumb.addEventListener('click', ()=> {
        window.location.href = latestVideo.url;
      });

      const link = document.createElement('a');
      link.className = "folder-link";
      link.href = "#";
      link.textContent = latestVideo.title;
      link.addEventListener('click', e=>{
        e.preventDefault();
        window.location.href = latestVideo.url;
      });

      li.appendChild(thumb);
      li.appendChild(link);
      container.appendChild(li);
    });

});
</script>

</body>
</html>
