<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum - Video Folders</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: white;
  margin: 0;
  padding: 15px;
}

/* HEADER */
header {
  text-align: center;
  background: #111;
  padding: 10px;
}

h1 {
  color: #ff4444;
  font-size: 20px;
}

/* SECTION HEADINGS */
h2 {
  text-align: center;
  color: #ff4444;
  margin-top: 20px;
}

/* GRID */
ul {
  list-style: none;
  padding: 0;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

li {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  transition: 0.3s;
}

li:hover {
  background: #333;
}

/* IMAGES */
img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 6px;
}

/* LINKS */
a {
  display: block;
  margin-top: 8px;
  color: white;
  text-decoration: none;
  font-weight: bold;
}

a:hover {
  color: #ff4444;
}

/* SKELETON (FIXED - NO FLICKER LOOP) */
.skeleton {
  width: 100%;
  height: 180px;
  border-radius: 6px;
  background: #2a2a2a;
}

/* LOADER OVERLAY (PREVENT FLICKER) */
#loader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

/* MOBILE */
@media (max-width: 600px) {
  ul {
    grid-template-columns: 1fr;
  }
}
</style>

</head>

<body>

<!-- LOADER -->
<div id="loader">Loading...</div>

<!-- HEADER -->
<header>
  <h1>AnywhereCum - Video Folders</h1>
</header>

<!-- VIP -->
<h2>VIP</h2>
<ul id="vipList">
  <li class="skeleton"></li>
</ul>

<!-- LATEST -->
<h2>Latest Video</h2>
<ul id="latestVideo">
  <li class="skeleton"></li>
</ul>

<!-- FOLDERS -->
<h2>Folders</h2>
<ul id="folderList">
  <li class="skeleton"></li>
  <li class="skeleton"></li>
</ul>

<!-- YOUR EXISTING TRACKING SCRIPT -->
<script type="module" src="views.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const BASE_URL = "https://anywherecum.pages.dev/images/";

  try {

    const res = await fetch('./videos.json');
    const videos = await res.json();

    /* GROUP BY FOLDER */
    const folders = {};

    videos.forEach(v => {
      if (!folders[v.folder]) folders[v.folder] = [];
      folders[v.folder].push(v);
    });

    /* LATEST VIDEO */
    const latestVideo = videos.sort((a, b) => new Date(b.date) - new Date(a.date))[0];

    /* VIP */
    const vip = videos.filter(v => v.vip);
    const vipLatest = vip.sort((a, b) => new Date(b.date) - new Date(a.date))[0];

    /* BUILD VIP */
    if (vipLatest) {
      document.getElementById("vipList").innerHTML = `
        <li>
          <img src="${BASE_URL + vipLatest.thumbnail}">
          <a href="#">${vipLatest.folder}</a>
        </li>
      `;
    }

    /* BUILD LATEST */
    if (latestVideo) {
      document.getElementById("latestVideo").innerHTML = `
        <li>
          <img src="${BASE_URL + latestVideo.thumbnail}">
          <a href="folder.html?folder=${encodeURIComponent(latestVideo.folder)}">
            Watch Now
          </a>
        </li>
      `;
    }

    /* BUILD FOLDERS */
    let html = "";

    Object.keys(folders).forEach(folderName => {

      const latest = folders[folderName]
        .sort((a, b) => new Date(b.date) - new Date(a.date))[0];

      html += `
        <li>
          <img src="${BASE_URL + latest.thumbnail}">
          <a href="folder.html?folder=${encodeURIComponent(folderName)}">
            ${folderName}
          </a>
        </li>
      `;
    });

    document.getElementById("folderList").innerHTML = html;

  } catch (err) {
    console.error("Error loading videos:", err);
  }

  /* REMOVE LOADER AFTER EVERYTHING LOADS */
  document.getElementById("loader").style.display = "none";

});
</script>

</body>
</html>
