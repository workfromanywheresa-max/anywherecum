document.addEventListener('DOMContentLoaded', () => {

.then(videos => {

  videos.sort((a,b) => new Date(b.date) - new Date(a.date));
  const latestVIP = videos[0];

  const li = document.createElement('li');

  const thumb = document.createElement('img');
  thumb.src = latestVIP.thumbnail;
  thumb.alt = latestVIP.folder;
  thumb.onclick = () => {
    window.open("https://fc-lc.xyz/ZUkGrHaX", "_blank");
  };

  const link = document.createElement('a');

  link.href = "https://fc-lc.xyz/ZUkGrHaX";
  link.target = "_blank";
  link.textContent = latestVIP.folder;

  li.appendChild(thumb);
  li.appendChild(link);

  container.appendChild(li);
});

// Content Folders
fetch('./videos.json')
.then(res => res.json())
.then(videos => {

const folders = {};

videos.forEach(v => {
  if(!folders[v.folder]) folders[v.folder] = [];
  folders[v.folder].push(v);
});

const folderList = document.getElementById('folderList');

Object.keys(folders).sort().forEach(folderName => {

  const folderVideos = folders[folderName];
  folderVideos.sort((a,b)=>new Date(b.date)-new Date(a.date));

  const latest = folderVideos[0];

  const li = document.createElement('li');

  const thumb = document.createElement('img');
  thumb.src = latest.thumbnail;
  thumb.alt = folderName;
  thumb.onclick = () => {
    window.location.href = "folder.html?folder=" + encodeURIComponent(folderName);
  };

  const link = document.createElement('a');
  link.className = "folder-link";
  link.href = "folder.html?folder=" + encodeURIComponent(folderName);
  link.textContent = folderName;

  li.appendChild(thumb);
  li.appendChild(link);

  folderList.appendChild(li);
});

const latestVideo = videos.sort((a,b)=>new Date(b.date)-new Date(a.date))[0];

</a>

`;

latestDiv.querySelector("img").onclick = () => {

};
