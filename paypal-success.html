<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing Payment...</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      background: #2a2a2a;
      padding: 30px;
      border-radius: 12px;
      max-width: 400px;
      width: 90%;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 20px;
    }

    p {
      color: #ccc;
      font-size: 14px;
    }

    .loader {
      margin: 20px auto 0;
      border: 4px solid #333;
      border-top: 4px solid #00ff99;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Processing Payment</h1>
    <p>Please wait while we confirm your PayPal payment...</p>
    <div class="loader"></div>
  </div>

  <script>
    const url = new URL(window.location.href);
    const token = url.searchParams.get("token");

    if (token) {
      fetch(`/paypal-capture?token=${token}`)
        .then(res => res.json().catch(() => null))
        .finally(() => {
          window.location.href = "/thank-you-vip.html";
        });
    } else {
      document.querySelector(".box").innerHTML = "<h1>Error</h1><p>Missing payment token.</p>";
    }
  </script>

</body>
</html>
