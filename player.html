<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Player</title>

<style>
body {
  margin: 0;
  background: black;
}

.playerWrapper {
  position: relative;
  width: 100%;
  height: 100vh;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Overlay to detect first interaction */
.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
  background: rgba(0,0,0,0.01);
  z-index: 2;
}
</style>
</head>

<body>

<div class="playerWrapper">
  <iframe id="videoFrame" allow="autoplay; fullscreen"></iframe>
  <div id="overlay" class="overlay"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, runTransaction } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

/* Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* Get params */
const urlParams = new URLSearchParams(window.location.search);
const videoUrl = urlParams.get("url");
const videoId = urlParams.get("id");
const folder = urlParams.get("folder") || "unknown";

/* Load iframe */
const iframe = document.getElementById("videoFrame");
iframe.src = videoUrl;

/* Track player interaction */
const overlay = document.getElementById("overlay");

overlay.onclick = () => {
  overlay.style.display = "none";

  const path = "playerViews/" + folder + "/" + videoId;

  runTransaction(ref(db, path), (v) => (v || 0) + 1);
};
</script>

</body>
</html>
