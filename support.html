<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp VIP Button Test</title>

<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
    background: #121212;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
  }

  img.logo {
    width: 90px;
    border-radius: 10px;
  }

  .info-text {
    color: #cccccc;
    font-size: 14px;
    max-width: 320px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 320px;
  }

  input, textarea {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #1f1f1f;
    color: #fff;
  }

  textarea {
    resize: none;
    height: 100px;
  }

  button {
    padding: 14px;
    border-radius: 30px;
    border: none;
    background: #25D366;
    color: black;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
  }
</style>
</head>

<body>

<img class="logo" src="https://anywherecum.pages.dev/images/onesignalfavicon.webp">

<div class="info-text">
  Please fill in your details and send via WhatsApp support.
</div>

<form id="supportForm">
  <input type="text" id="fullName" placeholder="Full Name" required>
  <input type="email" id="email" placeholder="Email" required>
  <input type="text" id="country" placeholder="Country" required>
  <input type="text" id="payment" placeholder="Payment Method / Wallet & Coin Used" required>

  <!-- NEW MESSAGE FIELD -->
  <textarea id="message" placeholder="Your Message" required></textarea>

  <button type="submit">Send on WhatsApp</button>
</form>

<script>
document.getElementById("supportForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const fullName = document.getElementById("fullName").value;
  const email = document.getElementById("email").value;
  const country = document.getElementById("country").value;
  const payment = document.getElementById("payment").value;
  const messageField = document.getElementById("message").value;

  const message =
`🔥 VIP SUPPORT REQUEST 🔥

Full Name: ${fullName}
Email: ${email}
Country: ${country}
Payment Method: ${payment}

Message:
${messageField}`;

  const phone = "27788776178";

  const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
});
</script>

</body>
</html>
