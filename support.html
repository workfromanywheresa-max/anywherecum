<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp VIP Button Test</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    background: #121212;
    font-family: Arial, sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    gap: 10px;
    text-align: center;
    box-sizing: border-box;
    padding: 20px 15px 10px;
  }

  img.logo {
    width: 70px;
    min-height: 70px;
    border-radius: 10px;
    object-fit: cover;
  }

  .info-text {
    color: #cccccc;
    font-size: 13px;
    max-width: 300px;
    line-height: 1.4;
  }

  .sub-text {
    font-size: 10px;
    color: #777;
    font-weight: 300;
    opacity: 0.7;
  }
  /* BACK BUTTON */
.back-btn {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 9999;
  background: #111;
  color: #fff;
  border: 1px solid #333;
  padding: 6px 10px;
  cursor: pointer;
}


  form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 300px;
  }

  input, textarea {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1f1f1f;
    color: #fff;
    font-size: 13px;
  }

  textarea {
    resize: none;
    height: 70px;
  }

  button {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;

    padding: 10px;
    border-radius: 25px;
    border: none;
    background: #25D366;
    color: black;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.03);
  }

  button img {
    width: 18px;
    height: 18px;
  }

  .alt-link {
    margin-top: 5px;
    font-size: 12px;
    color: #aaa;
  }

  .alt-link a {
    color: #25D366;
    text-decoration: none;
  }

  .alt-link a:hover {
    text-decoration: underline;
  }
</style>

</head>

<body>

  <!-- Google Translate -->
<div id="google_translate_element"></div>

<style>
/* ===== GOOGLE TRANSLATE FIX ===== */
#google_translate_element {
  position: fixed !important;
  top: 0 !important;
  right: 0 !important;
  left: auto !important;
  z-index: 9999;
  margin: 0 !important;
  padding: 0 !important;
}

/* Main widget */
.goog-te-gadget {
  font-size: 0 !important; /* hides "Select Language" text */
  background: transparent !important;
  margin: 0 !important;
  padding: 0 !important;
}

/* Dropdown only */
.goog-te-gadget select.goog-te-combo {
  font-size: 12px !important;
  padding: 3px 6px !important;
  background: #333 !important;
  color: #fff !important;
  border: none !important;
  border-radius: 4px;
  margin: 0 !important;
}

/* Hide extra branding / links */
.goog-te-gadget span,
.goog-te-gadget a,
.goog-logo-link,
.goog-te-gadget .goog-te-combo + span {
  display: none !important;
}

/* Hide banner */
.goog-te-banner-frame.skiptranslate {
  display: none !important;
}

/* Prevent page shift */
body {
  top: 0 !important;
}
</style>

<script>
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    layout: google.translate.TranslateElement.InlineLayout.HORIZONTAL,
    includedLanguages: 'af,ar,az,be,bg,ca,zh-CN,zh-TW,hr,cs,da,nl,en,eo,et,fi,fr,de,el,he,hi,hu,is,id,it,ja,ko,lv,lt,mk,ms,mt,no,pl,pt,ro,ru,sr,sk,sl,es,sw,sv,th,tr,uk,vi'
  }, 'google_translate_element');
}
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <button class="back-btn" onclick="history.back()">← Back</button>

<style>
.back-btn {
  position: fixed;
  top: 0px;
  left: 0px;
  z-index: 9999;
}
</style>

<img class="logo" src="https://anywherecum.pages.dev/images/onesignalfavicon.webp">

<div class="info-text">
  Please fill in your details and send via WhatsApp support 
  <span class="sub-text">(Fill in fields that only apply to you)</span>.
</div>

<form id="supportForm">
  <input type="text" id="fullName" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="text" id="country" placeholder="Country">
  <input type="text" id="payment" placeholder="Payment Method / Wallet & Coin Used">

  <textarea id="message" placeholder="Your Message"></textarea>

  <button type="submit">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    Send on WhatsApp
  </button>
</form>

<div class="alt-link">
  Alternatively you can email us <a href="contact.html">here</a>
</div>

  <footer style="text-align:center; padding:20px; font-size:12px; color:#aaa; background:#111; margin-top:10px;">
© 2026 AnywhereCum – Legal content only. 18+<br>

<div style="margin-top:8px; font-size:10px;">

  <a href="https://www.facebook.com/profile.php?id=100069048046082" target="_blank" style="margin:0 5px;">
    <img src="https://www.facebook.com/images/fb_icon_325x325.png" style="width:14px;height:14px; vertical-align:middle;"><span>|</span>

  <a href="terms-privacy.html" style="color:#ff4444; margin:0 5px;">⚖️Terms & Privacy</a><span>|</span>

  <a href="certificate.html" style="color:#ff4444; margin:0 5px;">🏅View Certificate</a><span>|</span>
    
  <a href="/" style="color:#ff4444; margin:0 5px;">🏠Home</a>

</div>
  </footer>

<script>
document.getElementById("supportForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const fullName = document.getElementById("fullName").value;
  const email = document.getElementById("email").value;
  const country = document.getElementById("country").value;
  const payment = document.getElementById("payment").value;
  const messageField = document.getElementById("message").value;

  const message = `
AnywhereCum Team

Full Name: ${fullName}
Email: ${email}
Country: ${country}
Payment Method: ${payment}

Message:
${messageField}`;

  const phone = "27788776178";
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
});
</script>

</body>
</html>
