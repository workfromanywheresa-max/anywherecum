<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp VIP Button Test</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 15px;
      background: #121212;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    .info-text {
      color: #cccccc;
      font-size: 14px;
      max-width: 320px;
      line-height: 1.4;
    }

    .wa-btn, .email-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #1f1f1f;
      color: #ffffff;
      padding: 14px 20px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 15px;
      border: 1px solid #25D366;
      transition: 0.3s ease;
    }

    .email-btn {
      border: 1px solid #4aa3ff;
    }

    .wa-btn:hover {
      background: #25D366;
      color: #000;
      transform: scale(1.05);
    }

    .email-btn:hover {
      background: #4aa3ff;
      color: #000;
      transform: scale(1.05);
    }

    .wa-btn svg {
      fill: currentColor;
    }
  </style>
</head>

<body>

  <!-- Info Text -->
