<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum - Browse Video Folders & Exclusive Content</title>

<link rel="icon" type="image/png" sizes="32x32" href="https://anywherecum.pages.dev/images/favicon.webp">
<link rel="apple-touch-icon" href="https://anywherecum.pages.dev/images/favicon.webp">

<meta name="description" content="Browse categorized video folders and explore exclusive video content.">

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

/* HEADER */
header {
  text-align: center;
  padding: 10px;
  background: #111;

  height: 180px; /* slightly increased for better fit */

  display: flex;
  flex-direction: column;
  justify-content: center;

  box-sizing: border-box;
}

header h1 {
  color: #ff4444;
  margin: 2px 0;
  font-size: 20px;
}

/* FIXED IMAGE (NO ZOOM) */
#headerImage {
  width: 100%;
  height: 120px;
  object-fit: contain; /* 🔥 FIX: removes zoom */
  display: block;
  margin-top: 8px;
  border-radius: 8px;
  background: #000; /* fills empty space */
}

/* VIDEO */
#latestVideo {
  position: relative;
  height: 210px;
  margin-bottom: 10px;
  overflow: hidden;
}

#folderSection {
  position: relative;
  min-height: 620px;
}

h2 {
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
  margin-top: 20px;
  text-align: center;
}

ul {
  list-style: none;
  padding: 0;
  margin: 0;

  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;

  grid-auto-rows: 180px;
}

li {
  background: #222;
  border-radius: 8px;
  position: relative;
  height: 180px;
  overflow: hidden;
}

li video {
  width: 100%;
  height: 130px;
  object-fit: contain;
  background: #000;
}

a.folder-link {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 50px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 13px;
  text-align: center;
  background: #111;
  color: #fff;
  font-weight: bold;
  text-decoration: none;
}

a.folder-link:hover {
  color: #ff4444;
  text-decoration: underline;
}

li:hover {
  background: #333;
}

@media(max-width:600px){
  ul {
    grid-template-columns: 1fr;
  }
}

/* LOADER */
.loader {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 130px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
}

.loader::after {
  content: "";
  width: 25px;
  height: 25px;
  border: 3px solid #444;
  border-top: 3px solid #ff4444;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
  margin-top: 10px;
}
</style>

</head>

<body>

<header>
  <h1>AnywhereCum - Video Folders & Exclusive Content</h1>
  <img id="headerImage" src="https://anywherecum.pages.dev/images/header-image.webp" alt="Header">
</header>

<h2>🎥 Latest Video 🎥</h2>
<div id="latestVideo"></div>

<h2>📂 Content Folders 📂</h2>
<div id="folderSection">
  <ul id="folderList"></ul>
</div>

<footer>
  © 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const BASE_URL = "https://pub-9d2dda426f5442ebbb1bd8b6ce4ab99c.r2.dev/";
  const VIP_FOLDER = "🔒VIP Exclusive";
  const VIP_LINK = "https://fc-lc.xyz/IIivW75";

  let activeVideo = null;

  function createPreviewItem(video, folderURL, linkText) {

    const li = document.createElement('li');

    const container = document.createElement('div');
    container.style.position = "relative";
    container.style.width = "100%";
    container.style.height = "130px";
    container.style.overflow = "hidden";
    container.style.background = "#000";

    const loader = document.createElement('div');
    loader.className = "loader";

    const videoEl = document.createElement('video');

    if (video.preview) {
      videoEl.src = video.preview.startsWith("http")
        ? video.preview
        : BASE_URL + video.preview;
    }

    videoEl.muted = true;
    videoEl.loop = true;
    videoEl.playsInline = true;
    videoEl.preload = "metadata";

    videoEl.style.width = "100%";
    videoEl.style.height = "100%";
    videoEl.style.objectFit = "contain";
    videoEl.style.opacity = "0";

    videoEl.addEventListener('loadeddata', () => {
      loader.style.display = "none";
      videoEl.style.opacity = "1";
    });

    videoEl.addEventListener('error', () => {
      loader.innerHTML = "<span style='color:#aaa;font-size:12px'>Failed to load</span>";
    });

    container.appendChild(loader);
    container.appendChild(videoEl);

    let startX = 0;
    let isPlaying = false;

    container.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
    });

    container.addEventListener('touchmove', (e) => {
      let moveX = e.touches[0].clientX;
      let diff = moveX - startX;

      if (Math.abs(diff) > 25) {
        startX = moveX;

        if (!isPlaying) {
          isPlaying = true;

          if (activeVideo && activeVideo !== videoEl) {
            activeVideo.pause();
            activeVideo.currentTime = 0;
          }

          videoEl.play().catch(() => {});
          activeVideo = videoEl;

        } else {
          isPlaying = false;
          videoEl.pause();
          videoEl.currentTime = 0;

          if (activeVideo === videoEl) activeVideo = null;
        }
      }
    });

    container.addEventListener('mouseenter', () => {
      if (window.matchMedia("(pointer: fine)").matches) {

        if (activeVideo && activeVideo !== videoEl) {
          activeVideo.pause();
          activeVideo.currentTime = 0;
        }

        videoEl.play().catch(() => {});
        activeVideo = videoEl;
      }
    });

    container.addEventListener('mouseleave', () => {
      videoEl.pause();
      videoEl.currentTime = 0;

      if (activeVideo === videoEl) activeVideo = null;
    });

    container.addEventListener('click', () => {
      window.location.href = folderURL;
    });

    const link = document.createElement('a');
    link.className = "folder-link";
    link.href = folderURL;
    link.textContent = linkText;

    li.appendChild(container);
    li.appendChild(link);

    return li;
  }

  fetch('./videos.json')
    .then(res => res.json())
    .then(videos => {

      const folders = {};

      videos.forEach(v => {
        if (!folders[v.folder]) folders[v.folder] = [];
        folders[v.folder].push(v);
      });

      const folderList = document.getElementById('folderList');
      folderList.innerHTML = '';

      let folderNames = Object.keys(folders);

      folderNames.sort((a, b) => {
        if (a === VIP_FOLDER) return -1;
        if (b === VIP_FOLDER) return 1;
        return 0;
      });

      folderNames.forEach(folderName => {

        const latest = folders[folderName]
          .sort((a,b)=> new Date(b.date)-new Date(a.date))[0];

        const folderURL = folderName === VIP_FOLDER
          ? VIP_LINK
          : "folder.html?folder=" + encodeURIComponent(folderName);

        const li = createPreviewItem(
          latest,
          folderURL,
          folderName === VIP_FOLDER ? "🔒 VIP Exclusive" : folderName
        );

        folderList.appendChild(li);
      });

      const nonVipVideos = videos.filter(v => v.folder !== VIP_FOLDER);

      if (nonVipVideos.length) {

        const latest = nonVipVideos
          .sort((a,b)=> new Date(b.date)-new Date(a.date))[0];

        const latestDiv = document.getElementById('latestVideo');
        latestDiv.innerHTML = '';

        const li = createPreviewItem(
          latest,
          "folder.html?folder=" + encodeURIComponent(latest.folder),
          "Watch Now: New Video Available!!!"
        );

        latestDiv.appendChild(li);
      }

    });

});
</script>

</body>
</html>
