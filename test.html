<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Video Preview with Ad</title>

<style>
body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.preview {
  position: relative;
  width: 320px;
  height: 200px;
}

.preview video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Ad overlay */
.ad-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);

  /* Hidden by default */
  visibility: hidden;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.ad-overlay.show {
  visibility: visible;
  opacity: 1;
}
</style>
</head>

<body>

<div class="preview">
  <video id="video" src="https://www.w3schools.com/html/mov_bbb.mp4" controls></video>

  <div class="ad-overlay" id="adOverlay">
    <!-- JuicyAds Ad -->
    <ins id="1113664" data-width="308" data-height="298"></ins>
  </div>
</div>

<!-- JuicyAds script -->
<script async src="https://poweredby.jads.co/js/jads.js"></script>

<script>
window.addEventListener("load", () => {

  const video = document.getElementById("video");
  const ad = document.getElementById("adOverlay");

  let adShown = false;

  function showAd() {
    ad.classList.add("show");

    setTimeout(() => {
      window.adsbyjuicy = window.adsbyjuicy || [];
      window.adsbyjuicy.push({ adzone: 1113664 });
    }, 100);
  }

  function hideAd() {
    ad.classList.remove("show");
  }

  video.addEventListener("play", () => {
    if (!adShown) {
      showAd();
      adShown = true;
    }
  });

  video.addEventListener("pause", hideAd);

});
</script>

</body>
</html>
