<!DOCTYPE html>
<html>
<head>
<title>Ad Simulation</title>
<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
    padding-top: 100px;
  }

  .popup-ad {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 300px;
    height: 250px;
    background: #222;
    border: 2px solid #555;
    display: none;
    justify-content: center;
    align-items: center;
  }

  .close-btn {
    position: absolute;
    top: 5px;
    right: 10px;
    cursor: pointer;
    color: red;
  }
</style>
</head>

<body>

<h1>Website Content</h1>
<p>This is your page content.</p>

<div class="popup-ad" id="fakeAd">
  <div class="close-btn" onclick="closeAd()">X</div>
  <p>Ad Content Here</p>
</div>

<script>
  // Simulate popunder after 3 seconds
  setTimeout(() => {
    document.getElementById("fakeAd").style.display = "flex";
  }, 3000);

  function closeAd() {
    document.getElementById("fakeAd").style.display = "none";
  }
</script>

</body>
</html>
