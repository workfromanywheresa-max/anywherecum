<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Banner</title>

<style>
body {
  background: #111;
  margin: 0;
  font-family: Arial;
  display: flex;
  justify-content: center;
}

.wrapper {
  width: 100%;
  max-width: 600px;
  padding: 4px;
  box-sizing: border-box;
}

.banner {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 5px;
  box-shadow: 0 0 8px rgba(255,0,0,0.15);
}

/* 🔥 SCROLL CONTAINER */
.live-container {
  display: flex;
  flex-wrap: nowrap;
  overflow-x: auto;
  gap: 8px;
  padding: 3px 6px;
  align-items: center;
  scroll-behavior: smooth;
}

/* Hide scrollbar */
.live-container::-webkit-scrollbar {
  display: none;
}

.live-container {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.live-user {
  min-width: 65px;
  text-align: center;
  color: white;
  cursor: pointer;
  flex-shrink: 0;
}

.live-ring {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  padding: 2px;
  background: linear-gradient(45deg, red, orange, red);
  animation: pulse 1.5s infinite;
  position: relative;
  margin: 0 auto;
}

.live-ring img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.live-badge {
  position: absolute;
  top: -4px;
  left: -4px;
  background: red;
  color: white;
  font-size: 8px;
  padding: 1px 4px;
  border-radius: 4px;
  font-weight: bold;
}

.viewers {
  display: block;
  font-size: 9px;
  margin-top: 3px;
  color: #ccc;
}

/* Pulse */
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
  70% { box-shadow: 0 0 0 8px rgba(255,0,0,0); }
  100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="banner">
    <div class="live-container" id="liveContainer"></div>
  </div>
</div>

<script>
const API_URL = "https://anywherecum.pages.dev/videos.json";

async function loadLives() {
  try {
    const res = await fetch(API_URL);
    const fullData = await res.json();
    renderLives(fullData);
  } catch (err) {
    console.error("Error loading JSON:", err);
  }
}

function renderLives(data) {
  const container = document.getElementById("liveContainer");
  container.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "live-user";
    div.onclick = () => openLive(item.stream);

    div.innerHTML = `
      <div class="live-ring">
        <span class="live-badge">LIVE</span>
        <img src="https://anywherecum.pages.dev/images/${item.thumbnail}" 
             onerror="this.src='https://anywherecum.pages.dev/default.webp'">
      </div>
      <span class="viewers">👁️ ${item.viewers || randomViews()}</span>
    `;

    container.appendChild(div);
  });
}

// Random views fallback
function randomViews() {
  const num = Math.floor(Math.random() * 9000 + 100);
  return num > 1000 ? (num / 1000).toFixed(1) + "k" : num;
}

// Open live
function openLive(streamUrl) {
  window.open("https://www.juicyads.rocks", "_blank");

  setTimeout(() => {
    window.location.href = streamUrl;
  }, 1000);
}

loadLives();
</script>

</body>
</html>
