<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Banner</title>

<style>
body {
  background: #111;
  margin: 0;
  font-family: Arial;
  display: flex;
  justify-content: center;
}

/* 🔥 Banner container */
.wrapper {
  width: 100%;
  max-width: 600px;
  padding: 4px;
  box-sizing: border-box;
}

/* 🔥 Banner */
.banner {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 5px;
  box-shadow: 0 0 8px rgba(255,0,0,0.15);
}

/* 🔥 Scroll row */
.live-container {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 3px 6px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

/* Hide scrollbar */
.live-container::-webkit-scrollbar {
  display: none;
}

.live-user {
  min-width: 65px;
  text-align: center;
  color: white;
  cursor: pointer;
  flex-shrink: 0;
}

/* 🔥 Circle */
.live-ring {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  padding: 2px;
  background: linear-gradient(45deg, red, orange, red);
  animation: pulse 1.5s infinite;
  position: relative;
  margin: 0 auto;
}

/* Profile image */
.live-ring img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

/* 🔴 LIVE badge */
.live-badge {
  position: absolute;
  top: -4px;
  left: -4px;
  background: red;
  color: white;
  font-size: 8px;
  padding: 1px 4px;
  border-radius: 4px;
  font-weight: bold;
  z-index: 2;
}

/* Viewers text */
.viewers {
  display: block;
  font-size: 9px;
  margin-top: 3px;
  color: #ccc;
}

/* 🔥 Pulse animation */
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
  70% { box-shadow: 0 0 0 8px rgba(255,0,0,0); }
  100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="banner">
    <div class="live-container" id="liveContainer"></div>
  </div>
</div>

<script>
const API_URL = "https://anywherecum.pages.dev/videos.json";

/* 🔴 Load JSON */
async function loadLives() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const container = document.getElementById("liveContainer");
    container.innerHTML = "";

    data.forEach(item => {

      const div = document.createElement("div");
      div.className = "live-user";
      div.onclick = () => openLive(item.stream);

      div.innerHTML = `
        <div class="live-ring">
          <span class="live-badge">LIVE</span>
          <img src="https://anywherecum.pages.dev/images/${item.thumbnail}" 
               onerror="this.src='https://anywherecum.pages.dev/default.webp'">
        </div>
        <span class="viewers">👁️ ${item.viewers || randomViews()}</span>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error("Error loading JSON:", err);
  }
}

/* 👁️ Random viewers */
function randomViews() {
  const num = Math.floor(Math.random() * 9000 + 100);
  return num > 1000 ? (num / 1000).toFixed(1) + "k" : num;
}

/* 🔥 Click handler */
function openLive(streamUrl) {
  window.open("https://www.juicyads.rocks", "_blank");

  setTimeout(() => {
    window.location.href = streamUrl;
  }, 1000);
}

loadLives();
</script>

</body>
</html>
