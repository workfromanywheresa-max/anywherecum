<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Video Preview with Ad</title>

<style>
body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.preview {
  position: relative;
  width: 320px;
  height: 200px;
}

.preview video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.ad-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  display: none;
}
</style>
</head>

<body>

<div class="preview">
  <video id="video" src="https://pub-9d2dda426f5442ebbb1bd8b6ce4ab99c.r2.dev/vip/vip1.mp4" controls></video>

  <div class="ad-overlay" id="adOverlay">
    <ins id="1113664" data-width="308" data-height="298"></ins>
  </div>
</div>

<script type="text/javascript" data-cfasync="false" async src="https://poweredby.jads.co/js/jads.js"></script>

<script>
window.addEventListener("load", () => {

  (adsbyjuicy = window.adsbyjuicy || []).push({
    adzone: 1113664
  });

  const video = document.getElementById("video");
  const ad = document.getElementById("adOverlay");

  video.addEventListener("play", () => {
    ad.style.display = "block";
  });

  video.addEventListener("pause", () => {
    ad.style.display = "none";
  });

});
</script>

</body>
</html>
