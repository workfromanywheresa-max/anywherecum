<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum - Browse Video Folders & Exclusive Content</title>

<link rel="icon" href="https://anywherecum.pages.dev/images/favicon.webp">

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

header {
  text-align: center;
  background: #111;
  padding: 10px;
}

#headerImage {
  width: 100%;
  height: auto;
  object-fit: contain;
  border-radius: 8px;
  margin-top: 5px;
}

/* ✅ GRID FIX */
ul {
  list-style: none;
  padding: 0;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

li {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  min-height: 230px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* ✅ IMAGE FIX */
img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 5px;
  display: block;
  background: #333;
}

/* LINKS */
a.folder-link {
  color: #fff;
  text-decoration: none;
  font-weight: bold;
  margin-top: 5px;
}
a.folder-link:hover {
  color: #ff4444;
}

/* ✅ SKELETON */
.card-skeleton {
  background: #222;
  border-radius: 8px;
  min-height: 230px;
  position: relative;
  overflow: hidden;
}

.card-skeleton::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150%;
  width: 150%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
  0% { left: -150%; }
  100% { left: 150%; }
}

/* FADE IN */
.folder-card {
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 0.4s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h2 {
  text-align: center;
  color: #ff4444;
}

@media(max-width:600px){
  ul { grid-template-columns: 1fr; }
}
</style>

</head>

<body>

<header>
  <h1>AnywhereCum</h1>
  <img id="headerImage" src="https://anywherecum.pages.dev/images/header-image.webp">
</header>

<h2>🎥 Latest Video 🎥</h2>
<div id="latestVideo"></div>

<h2>📂 Content Folders 📂</h2>
<ul id="folderList"></ul>

<footer style="text-align:center; margin-top:20px;">
  © 2026 AnywhereCum
</footer>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const BASE_URL = "https://anywherecum.pages.dev/images/";
  const folderList = document.getElementById('folderList');

  // 🔥 ADD SKELETON LOADER FIRST
  for (let i = 0; i < 6; i++) {
    const skeleton = document.createElement('li');
    skeleton.className = "card-skeleton";
    folderList.appendChild(skeleton);
  }

  fetch('./videos.json')
    .then(res => res.json())
    .then(videos => {

      const folders = {};
      videos.forEach(v => {
        if (!folders[v.folder]) folders[v.folder] = [];
        folders[v.folder].push(v);
      });

      // Clear skeletons
      folderList.innerHTML = '';

      Object.keys(folders).forEach(folderName => {

        const latest = folders[folderName]
          .sort((a,b)=> new Date(b.date)-new Date(a.date))[0];

        const li = document.createElement('li');
        li.className = "folder-card";

        const img = document.createElement('img');
        img.src = BASE_URL + latest.thumbnail;
        img.loading = "lazy";

        const link = document.createElement('a');
        link.className = "folder-link";
        link.href = "folder.html?folder=" + encodeURIComponent(folderName);
        link.textContent = folderName;

        li.appendChild(img);
        li.appendChild(link);
        folderList.appendChild(li);
      });

      // Latest video
      if (videos.length) {

        const latest = videos.sort((a,b)=> new Date(b.date)-new Date(a.date))[0];

        const latestDiv = document.getElementById('latestVideo');
        latestDiv.innerHTML = '';

        const li = document.createElement('li');

        const img = document.createElement('img');
        img.src = BASE_URL + latest.thumbnail;

        const link = document.createElement('a');
        link.className = "folder-link";
        link.href = "folder.html?folder=" + encodeURIComponent(latest.folder);
        link.textContent = "Watch Now";

        li.appendChild(img);
        li.appendChild(link);
        latestDiv.appendChild(li);
      }

    });
});
</script>

</body>
</html>
