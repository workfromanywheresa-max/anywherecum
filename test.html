<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Banner</title>

<style>
body {
  background: #111;
  margin: 0;
  font-family: Arial;
  display: flex;
  justify-content: center;
}

.wrapper {
  width: 100%;
  max-width: 600px;
  padding: 4px;
  box-sizing: border-box;
}

.banner {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 5px;
  box-shadow: 0 0 8px rgba(255,0,0,0.15);
}

/* SCROLL CONTAINER */
.live-container {
  display: flex;
  gap: 8px;
  padding: 3px 6px;
  align-items: center;
  transition: transform 0.8s ease;
}

.live-user {
  min-width: 65px;
  text-align: center;
  color: white;
  cursor: pointer;
  flex-shrink: 0;
}

.live-ring {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  padding: 2px;
  background: linear-gradient(45deg, red, orange, red);
  animation: pulse 1.5s infinite;
  position: relative;
  margin: 0 auto;
}

.live-ring img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.live-badge {
  position: absolute;
  top: -4px;
  left: -4px;
  background: red;
  color: white;
  font-size: 8px;
  padding: 1px 4px;
  border-radius: 4px;
  font-weight: bold;
}

.viewers {
  display: block;
  font-size: 9px;
  margin-top: 3px;
  color: #ccc;
}

/* Arrow */
.arrow-ring {
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(45deg, #ff0000, #ff7b00);
  font-size: 20px;
  font-weight: bold;
  animation: none;
}

.arrow {
  transform: translateX(2px);
}

/* Pulse */
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
  70% { box-shadow: 0 0 0 8px rgba(255,0,0,0); }
  100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="banner">
    <div class="live-container" id="liveContainer"></div>
  </div>
</div>

<script>
const API_URL = "https://anywherecum.pages.dev/videos.json";

let fullData = [];
let startIndex = 0;

const VISIBLE_COUNT = 4;
const SLIDE_INTERVAL = 3600000;

async function loadLives() {
  try {
    const res = await fetch(API_URL);
    fullData = await res.json();

    renderLives();

    setInterval(() => {
      smoothSlideNext();
    }, SLIDE_INTERVAL);

  } catch (err) {
    console.error("Error loading JSON:", err);
  }
}

function renderLives() {
  const container = document.getElementById("liveContainer");
  container.innerHTML = "";

  // 4 LIVE ITEMS
  for (let i = 0; i < VISIBLE_COUNT; i++) {
    const index = (startIndex + i) % fullData.length;
    const item = fullData[index];

    const div = document.createElement("div");
    div.className = "live-user";
    div.onclick = () => openLive(item.stream);

    div.innerHTML = `
      <div class="live-ring">
        <span class="live-badge">LIVE</span>
        <img src="https://anywherecum.pages.dev/images/${item.thumbnail}" 
             onerror="this.src='https://anywherecum.pages.dev/default.webp'">
      </div>
      <span class="viewers">👁️ ${item.viewers || randomViews()}</span>
    `;

    container.appendChild(div);
  }

  // 5TH ITEM = ARROW (ADS)
  const arrow = document.createElement("div");
  arrow.className = "live-user";

  arrow.innerHTML = `
    <div class="live-ring arrow-ring">
      <span class="arrow">➜</span>
    </div>
    <span class="viewers">More</span>
  `;

  // 🔥 TRIGGER ADS HERE
  arrow.onclick = () => window.open("https://www.juicyads.rocks", "_blank");

  container.appendChild(arrow);
}

/* Smooth slide */
function smoothSlideNext() {
  startIndex = (startIndex + VISIBLE_COUNT) % fullData.length;
  renderLives();
}

function randomViews() {
  const num = Math.floor(Math.random() * 9000 + 100);
  return num > 1000 ? (num / 1000).toFixed(1) + "k" : num;
}

function openLive(streamUrl) {
  window.open("https://www.juicyads.rocks", "_blank");

  setTimeout(() => {
    window.location.href = streamUrl;
  }, 1000);
}

loadLives();
</script>

</body>
</html>
