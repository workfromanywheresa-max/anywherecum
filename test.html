<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
  text-align: center;
}

.description {
  text-align: center;
  margin-bottom: 20px;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
}

iframe {
  width: 100%;
  height: 600px;
  border: 0;
}

.videoTitle {
  text-align: center;
  margin: 8px 0 5px 0;
  color: #ddd;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  text-align: center;
  color: #aaa;
  margin: 5px 0;
}

.download {
  display: block;
  width: fit-content;
  margin: 10px auto 0 auto;
  padding: 8px 15px;
  color: #fff;
  background: #ff4444;
  font-weight: bold;
  text-decoration: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<h2 id="folderTitle">Folder</h2>
<p class="description">Enjoy our videos</p>

<div id="videoList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("videoList");

// Folder from URL
const urlParams = new URLSearchParams(window.location.search);
const folderName = (urlParams.get("folder") || "").toLowerCase();

document.getElementById("folderTitle").textContent =
  folderName ? folderName.charAt(0).toUpperCase() + folderName.slice(1) : "All Videos";

function formatViews(num) {
  if (num >= 1000) return (num / 1000).toFixed(1) + "K+";
  return num;
}

function increaseViews(id){
  runTransaction(ref(db, "views/" + id), v => (v || 0) + 1);
}

fetch('videos.json')
.then(res => res.json())
.then(videos => {

  container.innerHTML = "";

  const folderVideos = folderName
    ? videos.filter(v => v.folder.toLowerCase() === folderName)
    : videos;

  if(folderVideos.length === 0){
    container.innerHTML = `<p style="text-align:center;color:#aaa;">No videos found.</p>`;
    return;
  }

  folderVideos.forEach(v => {

    const box = document.createElement("div");
    box.className = "videoBox";

    // ✅ IFRAME DIRECTLY
    const iframe = document.createElement("iframe");
    iframe.src = v.url;
    iframe.setAttribute("allowfullscreen", "");
    iframe.setAttribute("allowtransparency", "");
    iframe.setAttribute("allow", "autoplay");
    iframe.setAttribute("scrolling", "no");
    iframe.setAttribute("frameborder", "0");

    iframe.onclick = () => {
      increaseViews(v.id);
      window.open(v.url, "_blank");
    };

    const title = document.createElement("h3");
    title.className = "videoTitle";
    title.textContent = v.title;
    title.onclick = () => {
      increaseViews(v.id);
      window.open(v.url, "_blank");
    };

    const viewsEl = document.createElement("div");
    viewsEl.className = "views";

    onValue(ref(db,"views/"+v.id), snap=>{
      viewsEl.textContent = "👁 " + formatViews(snap.val()||0);
    });

    const btn = document.createElement("a");
    btn.className = "download";
    btn.textContent = "Download";
    btn.href = "#";
    btn.onclick = (e)=>{
      e.preventDefault();
      increaseViews(v.id);
      window.open(v.url, "_blank");
    };

    box.appendChild(iframe);
    box.appendChild(title);
    box.appendChild(viewsEl);
    box.appendChild(btn);

    container.appendChild(box);
  });

});
</script>

</body>
</html>
