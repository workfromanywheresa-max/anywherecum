<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum - Browse Video Folders & Exclusive Content</title>

<link rel="icon" type="image/png" sizes="32x32" href="https://anywherecum.pages.dev/images/favicon.webp">
<link rel="apple-touch-icon" href="https://anywherecum.pages.dev/images/favicon.webp">

<meta name="description" content="Browse categorized video folders and explore exclusive video content.">

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

header {
  text-align: center;
  padding: 5px 10px;
  background: #111;
}

header h1 {
  color: #ff4444;
  margin: 2px 0;
  font-size: 20px;
}

#headerImage {
  width: 100%;
  display: block;
  margin-top: 5px;
  border-radius: 8px;
}

#latestVideo {
  position: relative;
  height: 210px;
  margin-bottom: 10px;
}

#folderSection {
  position: relative;
  min-height: 620px;
}

h2 {
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
  margin-top: 20px;
  text-align: center;
}

ul {
  list-style: none;
  padding: 0;
  margin: 0;

  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;

  grid-auto-rows: 180px;
}

li {
  background: #222;
  border-radius: 8px;
  position: relative;
  height: 180px;
  overflow: hidden;
}

/* THUMBNAIL */
li img {
  width: 100%;
  height: 130px;
  object-fit: contain;
  background: #111;
  display: block;
}

/* PREVIEW VIDEO */
.preview-video {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 130px;
  object-fit: cover;
  display: none;
  background: black;
  z-index: 2;
}

/* LINK */
a.folder-link {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 50px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 13px;
  text-align: center;
  background: #111;
  color: #fff;
  font-weight: bold;
  text-decoration: none;
}

li:hover {
  background: #333;
}

@media(max-width:600px){
  ul {
    grid-template-columns: 1fr;
  }
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
  margin-top: 10px;
}
</style>

</head>

<body>

<header>
  <h1>AnywhereCum - Video Folders & Exclusive Content</h1>
  <img id="headerImage" src="https://anywherecum.pages.dev/images/header-image.webp" alt="Header">
</header>

<h2>🎥 Latest Video 🎥</h2>
<div id="latestVideo"></div>

<h2>📂 Content Folders 📂</h2>
<div id="folderSection">
  <ul id="folderList"></ul>
</div>

<footer>
  © 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const BASE_URL = "https://anywherecum.pages.dev/images/";
  const VIP_FOLDER = "🔒VIP Exclusive";
  const VIP_LINK = "https://fc-lc.xyz/IIivW75";

  fetch('./videos.json')
    .then(res => res.json())
    .then(videos => {

      const folders = {};

      videos.forEach(v => {
        if (!folders[v.folder]) folders[v.folder] = [];
        folders[v.folder].push(v);
      });

      const folderList = document.getElementById('folderList');
      folderList.innerHTML = '';

      let folderNames = Object.keys(folders);

      folderNames.sort((a, b) => {
        if (a === VIP_FOLDER) return -1;
        if (b === VIP_FOLDER) return 1;
        return 0;
      });

      function addPreviewEvents(li, videoSrc, img) {
        let startX = 0;

        const video = document.createElement('video');
        video.className = 'preview-video';
        video.src = videoSrc;
        video.loop = true;
        video.muted = true;
        video.playsInline = true;

        li.appendChild(video);

        li.addEventListener('touchstart', (e) => {
          startX = e.touches[0].clientX;
        });

        li.addEventListener('touchmove', (e) => {
          const moveX = e.touches[0].clientX;

          if (Math.abs(moveX - startX) > 30) {
            video.style.display = 'block';
            img.style.display = 'none';

            if (video.paused) {
              video.play();
            }
          }
        });

        li.addEventListener('touchend', () => {
          video.pause();
          video.currentTime = 0;
          video.style.display = 'none';
          img.style.display = 'block';
        });
      }

      folderNames.forEach(folderName => {

        const latest = folders[folderName]
          .sort((a,b)=> new Date(b.date)-new Date(a.date))[0];

        const li = document.createElement('li');

        const img = document.createElement('img');
        img.src = BASE_URL + latest.thumbnail;

        const link = document.createElement('a');
        link.className = "folder-link";

        const folderURL = "folder.html?folder=" + encodeURIComponent(folderName);

        if (folderName === VIP_FOLDER) {
          link.href = VIP_LINK;
          link.target = "_blank";
          link.textContent = "🔒 VIP Exclusive";

          img.onclick = () => window.open(VIP_LINK, "_blank");

        } else {
          link.href = folderURL;
          link.textContent = folderName;

          img.onclick = () => window.location.href = folderURL;

          // ADD PREVIEW VIDEO (dynamic field if exists)
          if (latest.preview) {
            addPreviewEvents(li, latest.preview, img);
          }
        }

        li.appendChild(img);
        li.appendChild(link);
        folderList.appendChild(li);
      });

    });

});
</script>

</body>
</html>
