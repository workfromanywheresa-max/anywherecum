<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Video Preview with Ad</title>

<style>
body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.preview {
  position: relative;
  width: 320px;
  height: 200px;
}

.preview video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Ad overlay */
.ad-overlay {
  position: absolute;
  inset: 0;
  display: none; /* hidden initially */
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.8);
}

.ad-overlay.show {
  display: flex;
}
</style>
</head>

<body>

<div class="preview">
  <video id="video" src="https://www.w3schools.com/html/mov_bbb.mp4" controls></video>

  <div class="ad-overlay" id="adOverlay">
    <!-- JuicyAds -->
    <ins class="jads" 
         data-width="300" 
         data-height="250" 
         data-zone="1113664"></ins>
  </div>
</div>

<!-- JuicyAds script -->
<script async src="https://poweredby.jads.co/js/jads.js"></script>

<script>
window.addEventListener("load", () => {

  const video = document.getElementById("video");
  const ad = document.getElementById("adOverlay");

  let adShown = false;

  video.addEventListener("play", () => {
    if (!adShown) {
      ad.classList.add("show");
      adShown = true;

      // Let JuicyAds render after showing
      setTimeout(() => {
        if (window.adsbyjuicy) {
          window.adsbyjuicy.push({});
        }
      }, 200);
    }
  });

  video.addEventListener("pause", () => {
    ad.classList.remove("show");
  });

});
</script>

</body>
</html>
