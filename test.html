<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

button {
  background: #ff4444;
  color: #fff;
  border: none;
  padding: 6px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
}

/* TITLE */
h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

#folderDescription {
  text-align: center;
  color: #aaa;
  font-size: 14px;
}

/* VIDEO LIST CONTAINER */
#normalVideos {
  margin-bottom: 40px;
}

/* VIDEO CARD */
.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 30px;
  text-align: center;
}

/* PLAYER */
.videoFrameWrapper {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  aspect-ratio: 16 / 9;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}

.videoFrameWrapper iframe,
.videoFrameWrapper img {
  width: 100%;
  height: 100%;
  border: 0;
  object-fit: cover;
}

/* DROPDOWN */
select {
  padding: 5px;
  border-radius: 5px;
  border: none;
  background: #333;
  color: #fff;
  font-size: 12px;
  margin-bottom: 6px;
}

/* TEXT */
.videoTitle {
  margin: 6px 0;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  color: #aaa;
  margin: 2px 0;
  font-size: 12px;
}

/* DOWNLOAD LINKS */
.videoBox a {
  text-decoration: none;
  font-size: 12px;
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
  margin-top: auto;
}
</style>

</head>

<body>

<button onclick="history.back()">← Back</button>

<h2 id="folderTitle">Folder</h2>

<p id="folderDescription">
  Enjoy our videos, updated regularly for your viewing pleasure.
</p>

<!-- ✅ ONLY CONTAINER NOW -->
<div id="normalVideos"></div>

<footer>
© 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>
window.VIDEO_CONFIG = {
  dataSource: "test.json"
};
</script>

<!-- MAIN LOGIC -->
<script type="module" src="test.js"></script>

</body>
</html>
