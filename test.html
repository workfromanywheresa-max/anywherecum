<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folder Videos</title>

<!-- YOUR CSS (UNCHANGED) -->
<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

button {
  background: #444;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 15px;
}

h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
}

#mainContainer {
  flex-grow: 1;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 30px;
  text-align: center;
}

.videoFrameWrapper {
  width: 100%;
  max-width: 300px;
  margin: 0 auto;
  aspect-ratio: 16 / 9;
}

.videoFrameWrapper iframe {
  width: 100%;
  height: 100%;
}

.videoTitle {
  font-size: 13px;
  text-decoration: underline;
}

.views {
  font-size: 12px;
  color: #aaa;
}

.download {
  background: #ff4444;
  color: #fff;
  padding: 5px 8px;
  font-size: 12px;
  border-radius: 5px;
  text-decoration: none;
  margin: 5px;
}
</style>

</head>

<body>

<button onclick="history.back()">← Back</button>

<h2 id="folderTitle">Folder</h2>

<div id="mainContainer">
  <div id="normalVideos"></div>
</div>

<!-- ✅ CONFIG (IMPORTANT) -->
<script>
const params = new URLSearchParams(window.location.search);

window.VIDEO_CONFIG = {
  dataSource: "test.json",   // ✅ USING test.json
  folder: params.get("folder") || ""
};
</script>

<!-- ✅ MAIN LOGIC -->
<script>
const container = document.getElementById("normalVideos");

fetch(window.VIDEO_CONFIG.dataSource)
.then(res => res.json())
.then(videos => {

  const folder = window.VIDEO_CONFIG.folder;

  const filtered = folder
    ? videos.filter(v => v.folder === folder)
    : videos;

  filtered.forEach(video => {

    const box = document.createElement("div");
    box.className = "videoBox";

    const title = document.createElement("div");
    title.className = "videoTitle";
    title.innerText = video.title;

    const views = document.createElement("div");
    views.className = "views";
    views.innerText = video.views + " views";

    const frame = document.createElement("div");
    frame.className = "videoFrameWrapper";

    const iframe = document.createElement("iframe");

    // DEFAULT = 480p
    iframe.src = video.qualities[0].embed;

    frame.appendChild(iframe);

    // ✅ DROPDOWN
    const select = document.createElement("select");

    video.qualities.forEach(q => {
      const opt = document.createElement("option");
      opt.value = q.embed;
      opt.textContent = q.label;
      select.appendChild(opt);
    });

    select.addEventListener("change", () => {
      iframe.src = select.value;
    });

    // ✅ DOWNLOAD SIDE BY SIDE WITH |
    const downloadDiv = document.createElement("div");

    video.qualities.forEach((q, i) => {

      const a = document.createElement("a");
      a.href = q.download;
      a.className = "download";
      a.innerText = "Download " + q.label;

      downloadDiv.appendChild(a);

      if (i === 0) {
        const sep = document.createElement("span");
        sep.innerText = " | ";
        downloadDiv.appendChild(sep);
      }
    });

    box.appendChild(title);
    box.appendChild(views);
    box.appendChild(frame);

    // Dropdown ABOVE download (as you asked)
    box.appendChild(select);

    box.appendChild(downloadDiv);

    container.appendChild(box);
  });

});
</script>

  <script src="test.js"></script>

</body>
</html>
