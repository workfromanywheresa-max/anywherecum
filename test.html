<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Circles</title>

<style>
body {
  background: #111;
  margin: 0;
  font-family: Arial;
  display: flex;
  justify-content: center;
}

/* 🔥 Wrapper (safe, no overflow) */
.wrapper {
  width: 100%;
  max-width: 600px;
  overflow: hidden;
  padding: 10px;
  box-sizing: border-box;
}

/* 🔥 Scrollable row */
.live-container {
  display: flex;
  gap: 15px;
  padding: 10px 0;

  width: 100%;
  overflow-x: auto;
  overflow-y: hidden;

  box-sizing: border-box;
  scroll-behavior: smooth;

  -webkit-overflow-scrolling: touch;
}

/* Hide scrollbar */
.live-container::-webkit-scrollbar {
  display: none;
}

.live-user {
  min-width: 90px;
  text-align: center;
  color: white;
  cursor: pointer;
}

/* 🔥 SMALLER CIRCLE */
.live-ring {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  padding: 3px;
  background: linear-gradient(45deg, red, orange, red);
  animation: pulse 1.5s infinite;
  position: relative;
}

.live-ring img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.live-ring::after {
  content: "LIVE";
  position: absolute;
  bottom: -5px;
  left: 50%;
  transform: translateX(-50%);
  background: red;
  color: white;
  font-size: 9px;
  padding: 2px 5px;
  border-radius: 5px;
}

.viewers {
  display: block;
  font-size: 11px;
  margin-top: 6px;
  color: #ccc;
}

/* 🔥 Pulse animation */
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
  70% { box-shadow: 0 0 0 12px rgba(255,0,0,0); }
  100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="live-container" id="liveContainer"></div>
</div>

<script>
const API_URL = "https://anywherecum.pages.dev/videos.json";

/* 🔴 Load JSON */
async function loadLives() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const container = document.getElementById("liveContainer");
    container.innerHTML = "";

    data.forEach(item => {

      const div = document.createElement("div");
      div.className = "live-user";
      div.onclick = () => openLive(item.stream);

      div.innerHTML = `
        <div class="live-ring">
          <img src="https://anywherecum.pages.dev/images/${item.thumbnail}" 
               onerror="this.src='https://anywherecum.pages.dev/default.webp'">
        </div>
        <span class="viewers">👁️ ${item.viewers || randomViews()}</span>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error("Error loading JSON:", err);
  }
}

/* 👁️ Random viewers */
function randomViews() {
  const num = Math.floor(Math.random() * 9000 + 100);
  return num > 1000 ? (num / 1000).toFixed(1) + "k" : num;
}

/* 🔥 Click handler */
function openLive(streamUrl) {
  window.open("https://www.juicyads.rocks", "_blank");

  setTimeout(() => {
    window.location.href = streamUrl;
  }, 1000);
}

loadLives();
</script>

</body>
</html>
