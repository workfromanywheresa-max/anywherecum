<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum - Browse Video Folders & Exclusive Content</title>

<link rel="icon" type="image/png" sizes="32x32" href="https://anywherecum.pages.dev/images/favicon.webp">
<link rel="apple-touch-icon" href="https://anywherecum.pages.dev/images/favicon.webp">
<link rel="shortcut icon" href="https://anywherecum.pages.dev/images/favicon.webp">

<meta name="description" content="Browse categorized video folders and explore exclusive video content. Fast, organized video library with easy navigation and latest uploads.">
<meta name="keywords" content="video folders, browse video collections, exclusive video content, online video library, categorized videos, media streaming folders, video directory">
<meta name="robots" content="index, follow">
<meta name="author" content="AnywhereCum">

<meta property="og:title" content="AnywhereCum - Video Folders & Exclusive Content">
<meta property="og:description" content="Browse categorized video folders and discover exclusive video content in a fast and organized layout.">
<meta property="og:url" content="https://anywherecum.pages.dev/">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">

<style>
body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 15px; }

header { text-align: center; padding: 5px 10px; background: #111; }
header h1 { color: #ff4444; margin: 2px 0; font-size: 20px; }

h2 { color: #ff4444; border-bottom: 2px solid #ff4444; padding-bottom: 5px; margin-top:20px; text-align: center; }

ul { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(2,1fr); gap: 15px; }
li { background: #222; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; }
li:hover { background: #333; }

a.folder-link { color: #fff; font-weight: bold; text-decoration: none; display: block; margin-top: 5px; }
a.folder-link:hover { color: #ff4444; text-decoration: underline; }

img { width: 100%; height: 180px; border-radius: 5px; object-fit: cover; margin-bottom: 5px; }

@media(max-width:600px){ ul { grid-template-columns: 1fr; } }

footer { text-align: center; padding: 20px; font-size: 12px; color: #aaa; background: #111; margin-top: 10px; }
</style>

</head>

<body>

<div id="google_translate_element"></div>

<header>
  <h1>AnywhereCum - Video Folders & Exclusive Content</h1>

  <nav style="margin-top:10px; font-size:10px;">
    <a href="folders.html" style="color:#fff;">📂All Folders</a> |
    <a href="contact.html" style="color:#fff;">📨Contact</a> |
    <a href="terms-privacy.html" style="color:#fff;">⚖️Terms & Privacy</a>
  </nav>

  <img src="" id="headerImage" style="max-width:100%; border-radius:8px; margin-top:5px;">
</header>

<h2>🎥 Latest Video 🎥</h2>
<div id="latestVideo"></div>

<h2>📂 Content Folders 📂</h2>
<ul id="folderList"></ul>

<footer>
  © 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const BASE_URL = "https://anywherecum.pages.dev/images/";

  const headerImg = document.getElementById('headerImage');
  headerImg.src = BASE_URL + "header-image.webp";

  fetch('./videos.json')
    .then(res => res.json())
    .then(videos => {

      const folders = {};
      videos.forEach(v => {
        if (!folders[v.folder]) folders[v.folder] = [];
        folders[v.folder].push(v);
      });

      const folderList = document.getElementById('folderList');
      folderList.innerHTML = '';

      Object.keys(folders).forEach(folderName => {
        const latest = folders[folderName].sort((a,b)=> new Date(b.date)-new Date(a.date))[0];

        const li = document.createElement('li');

        const img = document.createElement('img');
        img.src = BASE_URL + latest.thumbnail;
        img.onclick = () => window.location.href = "folder.html?folder=" + encodeURIComponent(folderName);

        const link = document.createElement('a');
        link.className = "folder-link";
        link.href = "folder.html?folder=" + encodeURIComponent(folderName);
        link.textContent = folderName;

        li.appendChild(img);
        li.appendChild(link);
        folderList.appendChild(li);
      });

      if (videos.length) {
        const latest = videos.sort((a,b)=> new Date(b.date)-new Date(a.date))[0];

        const latestDiv = document.getElementById('latestVideo');
        latestDiv.innerHTML = '';

        const li = document.createElement('li');

        const img = document.createElement('img');
        img.src = BASE_URL + latest.thumbnail;
        img.onclick = () => window.location.href = "folder.html?folder=" + encodeURIComponent(latest.folder);

        const link = document.createElement('a');
        link.className = "folder-link";
        link.href = "folder.html?folder=" + encodeURIComponent(latest.folder);
        link.textContent = "Watch Now: New Video Available!!!";

        li.appendChild(img);
        li.appendChild(link);
        latestDiv.appendChild(li);
      }
    });
});
</script>

</body>
</html>
