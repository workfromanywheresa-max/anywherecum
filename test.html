<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

button {
  background: #444;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 15px;
}

h2 {
  color: #ff4444;
  text-align: center;
}

#mainContainer {
  flex-grow: 1;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 30px;
  text-align: center;
}

.videoFrameWrapper {
  width: 100%;
  max-width: 300px;
  margin: auto;
  aspect-ratio: 16 / 9;
  border-radius: 8px;
  overflow: hidden;
  background: black;
  position: relative;
}

/* ✅ IMPORTANT FIX */
.videoFrameWrapper iframe,
.videoFrameWrapper img {
  width: 100%;
  height: 100%;
  border: 0;
  position: absolute;
  top: 0;
  left: 0;
}

.videoTitle {
  font-size: 13px;
  margin: 6px 0;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  font-size: 12px;
  color: #aaa;
}

select {
  width: 100%;
  margin-top: 5px;
  padding: 5px;
}

.download {
  display: block;
  width: fit-content;
  margin: 6px auto;
  padding: 5px 10px;
  background: #ff4444;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
  font-size: 12px;
}
</style>

</head>
