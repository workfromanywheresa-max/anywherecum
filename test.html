<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Video Preview with Ad</title>

<style>
body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.preview {
  position: relative;
  width: 320px;
  height: 200px;
}

.preview video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.ad-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div class="preview">
  <video id="video" src="https://www.w3schools.com/html/mov_bbb.mp4" controls></video>

  <div class="ad-overlay" id="adOverlay">
    <!-- JuicyAds -->
    <ins id="1113664" data-width="308" data-height="298"></ins>
  </div>
</div>

<!-- JuicyAds script -->
<script async src="https://poweredby.jads.co/js/jads.js"></script>

<script>
window.addEventListener("load", () => {

  const video = document.getElementById("video");
  const ad = document.getElementById("adOverlay");

  function showAd() {
    ad.style.display = "flex";

    // Give DOM time before loading ad
    setTimeout(() => {
      (adsbyjuicy = window.adsbyjuicy || []).push({'adzone': 1113664});
    }, 100);
  }

  function hideAd() {
    ad.style.display = "none";
  }

  video.addEventListener("play", showAd);
  video.addEventListener("pause", hideAd);

});
</script>

</body>
</html>
