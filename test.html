<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folders</title>

<style>
html { overflow-y: scroll; }

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

/* TITLE */
.pageTitle {
  color: #ff4444;
  text-align: center;
  font-size: 22px;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 2px solid #ff4444;
}

button {
  background: #444;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 15px;
}

/* LIST */
.list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

/* CARD */
.card {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
}

.card img {
  width: 80px;
  height: 55px;
  object-fit: cover;
  border-radius: 5px;
}

.card a {
  color: #fff;
  text-decoration: none;
  font-weight: bold;
  font-size: 13px;
}

/* SKELETON */
.skeleton-card {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #222;
  padding: 8px;
  border-radius: 8px;
}

.skeleton-thumb {
  width: 80px;
  height: 55px;
  border-radius: 5px;
  background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}

.skeleton-text {
  flex: 1;
  height: 14px;
  border-radius: 4px;
  background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* AD */
.ad-space {
  width: 100%;
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

/* FOOTER */
footer {
  margin-top: 20px;
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
}
</style>

</head>

<body>

<button onclick="history.back()">← Back</button>

<h2 class="pageTitle">Folders</h2>

<!-- AD -->
<div class="ad-space">
  <script async src="https://poweredby.jads.co/js/jads.js"></script>
  <ins id="1113665" data-width="300" data-height="112"></ins>
  <script>
    (adsbyjuicy = window.adsbyjuicy || []).push({'adzone':1113665});
  </script>
</div>

<!-- FOLDERS -->
<div id="folderList" class="list" style="margin-top:15px;">

  <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-text"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-text"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-text"></div></div>
  <div class="skeleton-card"><div class="skeleton-thumb"></div><div class="skeleton-text"></div></div>

</div>

<footer>
© 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>

/* ================= FOLDERS ================= */
async function loadFolders() {
  const res = await fetch('./videos.json');
  const data = await res.json();

  const folders = {};

  data.forEach(v => {
    if (!folders[v.folder]) folders[v.folder] = [];
    folders[v.folder].push(v);
  });

  const container = document.getElementById('folderList');
  container.innerHTML = '';

  const vipName = "🔒VIP Exclusive";
  const allNames = Object.keys(folders).sort();

  /* ================= VIP FIRST ================= */
  if (folders[vipName]) {
    const vids = folders[vipName].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const latest = vids[0];

    const vipCard = document.createElement('div');
    vipCard.className = 'card';

    const img = document.createElement('img');
    img.src = "https://anywherecum.pages.dev/images/" + latest.thumbnail;

    const link = document.createElement('a');
    link.href = "https://fc-lc.xyz/IIivW75";
    link.textContent = vipName;

    vipCard.onclick = () => {
      window.location.href = link.href;
    };

    vipCard.appendChild(img);
    vipCard.appendChild(link);

    container.appendChild(vipCard);
  }

  /* ================= OTHER FOLDERS ================= */
  allNames
    .filter(name => name !== vipName)
    .forEach(name => {

      const vids = folders[name]
        .sort((a,b)=>new Date(b.date)-new Date(a.date));

      const latest = vids[0];

      const card = document.createElement('div');
      card.className = 'card';

      const img = document.createElement('img');
      img.src = "https://anywherecum.pages.dev/images/" + latest.thumbnail;

      const link = document.createElement('a');
      link.href = "folder.html?folder=" + encodeURIComponent(name);
      link.textContent = name;

      card.onclick = () => {
        window.location.href = link.href;
      };

      card.appendChild(img);
      card.appendChild(link);

      container.appendChild(card);
    });
}

/* ================= INIT ================= */
window.addEventListener('load', () => {
  loadFolders();
});

</script>

</body>
</html>
