<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {

  await OneSignal.init({
    appId: "9f8d0573-08fa-4522-ab09-4a95fa2f442f"
  });

  async function handleSub() {
    const sub = OneSignal.User.PushSubscription;

    if (!sub) return;

    // ✅ FIX HERE
    const id = sub.token || sub.id;

    if (!id) {
      console.log("Waiting for subscription...", sub);
      return;
    }

    const optedIn = sub.optedIn;

    const lastState = localStorage.getItem("sub_" + id);
    if (lastState === String(optedIn)) return;

    localStorage.setItem("sub_" + id, optedIn);

    console.log("OneSignal Sub Update:", id, optedIn);

    if (window.saveSubscriber) {
      window.saveSubscriber(id, optedIn);
    }
  }

  // ✅ IMPORTANT: OneSignal loads late
  setTimeout(handleSub, 2000);
  setTimeout(handleSub, 5000);

  handleSub();

  OneSignal.User.PushSubscription.addEventListener("change", handleSub);

});
</script>

<script>

/* ================= FOLDERS ================= */
async function loadFolders() {
  const res = await fetch('./videos.json');
  const data = await res.json();

  const folders = {};

  data.forEach(v => {
    if (!folders[v.folder]) folders[v.folder] = [];
    folders[v.folder].push(v);
  });

  const container = document.getElementById('folderList');
  container.innerHTML = '';

  const vipName = "🔒VIP Exclusive";
  const allNames = Object.keys(folders).sort();

  /* ================= VIP FIRST ================= */
  if (folders[vipName]) {
    const vids = folders[vipName].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const latest = vids[0];

    const vipCard = document.createElement('div');
    vipCard.className = 'card';

    const img = document.createElement('img');
    img.src = "https://anywherecum.pages.dev/images/" + latest.thumbnail;

    const link = document.createElement('a');
    link.href = "https://fc-lc.xyz/IIivW75";
    link.textContent = vipName;

    vipCard.onclick = () => {
      window.location.href = link.href;
    };

    vipCard.appendChild(img);
    vipCard.appendChild(link);

    container.appendChild(vipCard);
  }

  /* ================= OTHER FOLDERS ================= */
  allNames
    .filter(name => name !== vipName)
    .forEach(name => {

      const vids = folders[name]
        .sort((a,b)=>new Date(b.date)-new Date(a.date));

      const latest = vids[0];

      const card = document.createElement('div');
      card.className = 'card';

      const img = document.createElement('img');
      img.src = "https://anywherecum.pages.dev/images/" + latest.thumbnail;

      const link = document.createElement('a');
      link.href = "folder.html?folder=" + encodeURIComponent(name);
      link.textContent = name;

      card.onclick = () => {
        window.location.href = link.href;
      };

      card.appendChild(img);
      card.appendChild(link);

      container.appendChild(card);
    });
}

/* ================= INIT ================= */
window.addEventListener('load', () => {
  loadFolders();
});

</script>
