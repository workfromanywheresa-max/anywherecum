<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Folder Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
  text-align: center;
}

.description {
  text-align: center;
  margin-bottom: 20px;
}

.back-btn {
  display:inline-block;
  margin-bottom:15px;
  padding:8px 14px;
  background:#222;
  color:#fff;
  border:1px solid #ff4444;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
}

/* Wrapper */
.videoFrameWrapper {
  width: 100%;
  height: 350px;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}

/* Thumbnail */
.thumbnail {
  width: 100%;
  height: 100%;
  object-fit: cover;
  cursor: pointer;
}

/* Iframe */
.videoFrameWrapper iframe {
  width: 100%;
  height: 560px;
  position: absolute;
  top: -210px;
  left: 0;
  border: 0;
  display: none;
}

.videoTitle {
  text-align: center;
  margin: 8px 0 5px 0;
  color: #ddd;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  text-align: center;
  color: #aaa;
  margin: 5px 0;
}

.download {
  display: block;
  width: fit-content;
  margin: 10px auto 0 auto;
  padding: 8px 15px;
  color: #fff;
  background: #ff4444;
  font-weight: bold;
  text-decoration: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<button class="back-btn" onclick="goBack()">← Back</button>

<script>
function goBack() {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = "index.html";
  }
}
</script>

<h2 id="folderTitle">Folder</h2>
<p class="description">Enjoy our videos</p>

<div id="videoList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("videoList");

const WORKER_URL = "https://anywherecum.workfromanywhere-sa.workers.dev";
const OWNER_IP = "102.214.117.74";
const TREND_THRESHOLD = 10;

/* Folder */
const urlParams = new URLSearchParams(window.location.search);
const folderName = (urlParams.get("folder") || "").toLowerCase();

document.getElementById("folderTitle").textContent =
  folderName.charAt(0).toUpperCase() + folderName.slice(1);

/* Helpers */
async function getUserIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  } catch {
    return null;
  }
}

function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(".0","") + "M+";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(".0","") + "K+";
  return num;
}

/* Views */
async function increaseViews(videoId){

  const userIP = await getUserIP();
  if (userIP && userIP === OWNER_IP) return;

  runTransaction(ref(db, "views/" + videoId), v => (v || 0) + 1);
  runTransaction(ref(db, "cycleViews/" + videoId), v => (v || 0) + 1);

  fetch(`${WORKER_URL}/increment`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ videoId })
  }).catch(()=>{});
}

/* State */
const videoStates = {};

/* Load videos */
fetch('videos.json')
.then(res => res.json())
.then(videos => {

  container.innerHTML = "";

  const IMAGE_BASE = "https://anywherecum.pages.dev/images/";

  const folderVideos = videos.filter(v =>
    v.folder.toLowerCase() === folderName
  );

  if(folderVideos.length === 0){
    container.innerHTML = `<p style="text-align:center;color:#aaa;">No videos found.</p>`;
    return;
  }

  folderVideos.forEach((v,index)=>{

    const box = document.createElement("div");
    box.className = "videoBox";

    const wrapper = document.createElement("div");
    wrapper.className = "videoFrameWrapper";

    // Thumbnail
    const thumb = document.createElement("img");
    thumb.src = IMAGE_BASE + v.thumbnail;
    thumb.className = "thumbnail";

    // Iframe
    const iframe = document.createElement("iframe");
    iframe.dataset.src = v.url;
    iframe.allowFullscreen = true;

    // Title
    const title = document.createElement("h3");
    title.className = "videoTitle";
    title.textContent = v.title;

    const viewsEl = document.createElement("div");
    viewsEl.className = "views";

    const viewRef = ref(db,"views/"+v.id);
    const cycleRef = ref(db,"cycleViews/"+v.id);

    let totalViews = 0;
    let cycleViews = 0;

    function updateUI(){
      if(cycleViews >= TREND_THRESHOLD){
        viewsEl.textContent = "🔥 Trending | 👁 " + formatViews(totalViews);
        viewsEl.style.color = "#ffcc00";
      } else {
        viewsEl.textContent = "👁 " + formatViews(totalViews);
        viewsEl.style.color = "#aaa";
      }
    }

    videoStates[v.id] = {
      element: box,
      getScore: () => cycleViews,
      originalIndex: index
    };

    function sortVideos(){
      const sorted = Object.values(videoStates)
        .sort((a,b)=>{
          const aEff = a.getScore() >= TREND_THRESHOLD ? a.getScore() : 0;
          const bEff = b.getScore() >= TREND_THRESHOLD ? b.getScore() : 0;

          if (bEff !== aEff) return bEff - aEff;
          return a.originalIndex - b.originalIndex;
        });

      sorted.forEach(v => container.appendChild(v.element));
    }

    onValue(viewRef, snap=>{
      totalViews = snap.val() || 0;
      updateUI();
    });

    onValue(cycleRef, snap=>{
      cycleViews = snap.val() || 0;
      updateUI();
      sortVideos();
    });

    function openVideo(){
      increaseViews(v.id);
      iframe.src = iframe.dataset.src;
      iframe.style.display = "block";
      thumb.style.display = "none";
    }

    thumb.onclick = openVideo;
    title.onclick = openVideo;

    const btn = document.createElement("a");
    btn.className = "download";
    btn.textContent = "Watch / Open";
    btn.href = "#";
    btn.onclick = (e)=>{
      e.preventDefault();
      openVideo();
    };

    wrapper.appendChild(thumb);
    wrapper.appendChild(iframe);

    box.appendChild(wrapper);
    box.appendChild(title);
    box.appendChild(viewsEl);
    box.appendChild(btn);

    container.appendChild(box);
  });

});
</script>

</body>
</html>
