<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum - Browse Video Folders & Exclusive Content</title>

<link rel="icon" type="image/png" sizes="32x32" href="https://anywherecum.pages.dev/images/favicon.webp">
<link rel="apple-touch-icon" href="https://anywherecum.pages.dev/images/favicon.webp">

<meta name="description" content="Browse categorized video folders and explore exclusive video content.">

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

header {
  text-align: center;
  padding: 5px 10px;
  background: #111;
}

header h1 {
  color: #ff4444;
  margin: 2px 0;
  font-size: 20px;
}

#headerImage {
  width: 100%;
  display: block;
  margin-top: 5px;
  border-radius: 8px;
}

/* FIXED AREAS */
#latestVideo {
  position: relative;
  height: 210px;
  margin-bottom: 10px;
}

#folderSection {
  position: relative;
  min-height: 620px;
}

h2 {
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
  margin-top: 20px;
  text-align: center;
}

/* GRID */
ul {
  list-style: none;
  padding: 0;
  margin: 0;

  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;

  grid-auto-rows: 180px;
}

/* ITEMS */
li {
  background: #222;
  border-radius: 8px;
  position: relative;
  height: 180px;
  overflow: hidden;
}

/* IMAGE */
li img {
  width: 100%;
  height: 130px;
  object-fit: contain;
  background: #111;
  display: block;
}

/* VIDEO PREVIEW */
li video {
  width: 100%;
  height: 130px;
  object-fit: contain;
  background: #000;
  display: none;
}

/* LINKS */
a.folder-link {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 50px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 13px;
  text-align: center;
  background: #111;
  color: #fff;
  font-weight: bold;
  text-decoration: none;
}

a.folder-link:hover {
  color: #ff4444;
  text-decoration: underline;
}

li:hover {
  background: #333;
}

@media(max-width:600px){
  ul {
    grid-template-columns: 1fr;
  }
}

footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
  margin-top: 10px;
}
</style>

</head>

<body>

<header>
  <h1>AnywhereCum - Video Folders & Exclusive Content</h1>
  <img id="headerImage" src="https://anywherecum.pages.dev/images/header-image.webp" alt="Header">
</header>

<h2>🎥 Latest Video 🎥</h2>
<div id="latestVideo"></div>

<h2>📂 Content Folders 📂</h2>
<div id="folderSection">
  <ul id="folderList"></ul>
</div>

<footer>
  © 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const BASE_URL = "https://anywherecum.pages.dev/images/";
  const VIP_FOLDER = "🔒VIP Exclusive";
  const VIP_LINK = "https://fc-lc.xyz/IIivW75";

  function createPreviewItem(video, folderURL, linkText) {

    const li = document.createElement('li');

    const container = document.createElement('div');
    container.style.position = "relative";
    container.style.width = "100%";
    container.style.height = "130px";
    container.style.overflow = "hidden";
    container.style.background = "#111";

    const img = document.createElement('img');
    img.src = BASE_URL + video.thumbnail;

    const videoEl = document.createElement('video');
    if (video.preview) {
      videoEl.src = BASE_URL + video.preview;
    }
    videoEl.muted = true;
    videoEl.loop = true;
    videoEl.playsInline = true;

    container.appendChild(img);
    container.appendChild(videoEl);

    let startX = 0;
    let swiping = false;

    container.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
      swiping = true;
    });

    container.addEventListener('touchmove', (e) => {
      if (!swiping) return;

      let moveX = e.touches[0].clientX;
      let diff = moveX - startX;

      if (Math.abs(diff) > 25) {
        img.style.display = "none";
        videoEl.style.display = "block";
        videoEl.play();
      }
    });

    container.addEventListener('touchend', () => {
      swiping = false;

      img.style.display = "block";
      videoEl.style.display = "none";
      videoEl.pause();
      videoEl.currentTime = 0;
    });

    container.addEventListener('click', () => {
      window.location.href = folderURL;
    });

    const link = document.createElement('a');
    link.className = "folder-link";
    link.href = folderURL;
    link.textContent = linkText;

    li.appendChild(container);
    li.appendChild(link);

    return li;
  }

  fetch('./videos.json')
    .then(res => res.json())
    .then(videos => {

      const folders = {};

      videos.forEach(v => {
        if (!folders[v.folder]) folders[v.folder] = [];
        folders[v.folder].push(v);
      });

      const folderList = document.getElementById('folderList');
      folderList.innerHTML = '';

      let folderNames = Object.keys(folders);

      folderNames.sort((a, b) => {
        if (a === VIP_FOLDER) return -1;
        if (b === VIP_FOLDER) return 1;
        return 0;
      });

      folderNames.forEach(folderName => {

        const latest = folders[folderName]
          .sort((a,b)=> new Date(b.date)-new Date(a.date))[0];

        const folderURL = folderName === VIP_FOLDER
          ? VIP_LINK
          : "folder.html?folder=" + encodeURIComponent(folderName);

        const li = createPreviewItem(
          latest,
          folderURL,
          folderName === VIP_FOLDER ? "🔒 VIP Exclusive" : folderName
        );

        folderList.appendChild(li);
      });

      const nonVipVideos = videos.filter(v => v.folder !== VIP_FOLDER);

      if (nonVipVideos.length) {

        const latest = nonVipVideos
          .sort((a,b)=> new Date(b.date)-new Date(a.date))[0];

        const latestDiv = document.getElementById('latestVideo');
        latestDiv.innerHTML = '';

        const li = createPreviewItem(
          latest,
          "folder.html?folder=" + encodeURIComponent(latest.folder),
          "Watch Now: New Video Available!!!"
        );

        latestDiv.appendChild(li);
      }

    });

});
</script>

</body>
</html>
