<script>
const BASE_URL = "https://pub-9d2dda426f5442ebbb1bd8b6ce4ab99c.r2.dev/";
const VIP_FOLDER = "🔒VIP Exclusive";

function createPreviewItem(folderName, folderURL) {

  const li = document.createElement('li');

  li.innerHTML = `
    <a class="folder-link">${folderName}</a>
  `;

  li.addEventListener('click', () => {
    if (folderName === VIP_FOLDER) {
      // ✅ VIP FIX
      window.location.href = "vip.html";
    } else {
      window.location.href = folderURL;
    }
  });

  return li;
}

fetch('./videos.json')
.then(res => res.json())
.then(videos => {

  const folders = {};
  videos.forEach(v => {
    if (!folders[v.folder]) folders[v.folder] = [];
    folders[v.folder].push(v);
  });

  const folderList = document.getElementById('folderList');

  Object.keys(folders).forEach(folderName => {

    const folderURL = "folder.html?folder=" + encodeURIComponent(folderName);

    folderList.appendChild(
      createPreviewItem(folderName, folderURL)
    );
  });

});
</script>
