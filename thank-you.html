<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<style>
  html, body {
    height: 100%;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    background: #1e1e1e;
    padding: 30px 25px;
    border-radius: 12px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);

    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-size: 20px;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  /* ✅ Center paragraphs properly */
  .card p {
    font-size: 14px;
    line-height: 1.5;
    margin: 8px 0;
    text-align: center;
  }

  a {
    color: #ffffff;
    text-decoration: underline;
  }

  .links {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  .btn-link {
    color: #fff;
    text-decoration: none;
    padding: 10px;
    border: 1px solid #333;
    border-radius: 8px;
    display: block;
    transition: 0.2s;
    text-align: center;
  }

  .btn-link:hover {
    background: #2a2a2a;
  }
</style>
</head>

<body>

  <div class="card">

    <h1>
      <img src="https://anywherecum.pages.dev/images/pray.png" alt="pray" style="width:22px;">
      Thank You!
    </h1>
    
    <p>Your donation has been received.</p>
    <p>We really appreciate your support ❤️</p>

    <div class="links">
      <a class="btn-link" href="/">Go Back Home</a>
    </div>

  </div>

</body>
</html>
