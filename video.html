<script>
document.addEventListener("DOMContentLoaded", function () {

  const ad = document.getElementById("topAdMain");
  const countdownEl = document.getElementById("mainCountdown");
  const closeBtn = document.getElementById("mainCloseBtn");

  let countdownInterval;
  let cycleTimeout;

  function showAd() {
    ad.style.top = "0px"; // ✅ Now it touches the very top

    let timeLeft = 15;

    countdownEl.style.display = "block";
    closeBtn.style.display = "none";

    countdownEl.textContent = timeLeft + "s";

    clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
      timeLeft--;
      countdownEl.textContent = timeLeft + "s";

      if (timeLeft <= 0) {
        clearInterval(countdownInterval);
        countdownEl.style.display = "none";
        closeBtn.style.display = "flex";
      }
    }, 1000);
  }

  function hideMainAd() {
    ad.style.top = "-80px";

    clearInterval(countdownInterval);

    clearTimeout(cycleTimeout);
    cycleTimeout = setTimeout(showAd, 120000);
  }

  closeBtn.addEventListener("click", hideMainAd);

  setTimeout(() => {
    showAd();
  }, 30000);

});
</script>

  position: fixed;

">

    🔔 Click the bell icon on your bottom left to receive notifications
  </span>
  <button id="closeBtn" style="
    position: absolute;
    right: 8px;
    background: transparent;
    border: none;
    color: #111;
    font-size: 12px;
    cursor: pointer;
    line-height: 1;
  ">✖</button>
</div>

<script>
  const banner = document.getElementById("topBanner");
  const closeBtn = document.getElementById("closeBtn");

  const lastClosed = localStorage.getItem("bannerClosedTime");
  const now = Date.now();
  const twentyFourHours = 24 * 60 * 60 * 1000;

  if (!lastClosed || now - lastClosed > twentyFourHours) {
    // Show banner
    banner.style.display = "flex";

    // Slide down smoothly
    setTimeout(() => {
      banner.style.transform = "translate(-50%, 0)";
    }, 50);

    // Auto-hide after 30 seconds
    setTimeout(() => {
      banner.style.transform = "translate(-50%, -100%)";
      setTimeout(() => {
        banner.style.display = "none";
        localStorage.setItem("bannerClosedTime", Date.now());
      }, 500);
    }, 30000);
  }

  closeBtn.addEventListener("click", () => {
    banner.style.transform = "translate(-50%, -100%)";
    setTimeout(() => {
      banner.style.display = "none";
      localStorage.setItem("bannerClosedTime", Date.now());
    }, 500);
  });
</script>

const skeleton = document.getElementById("skeleton");
const adContainer = document.getElementById("container-c04c459f06eefec9d4eeedb2a131c1d2");
const adWrapper = document.getElementById("ad-container");

// Observe changes inside the ad container
const observer = new MutationObserver((mutations, obs) => {
  if (adContainer.children.length > 0) {
    skeleton.style.display = "none";
    adWrapper.style.display = "block";
    obs.disconnect();
  }
});

observer.observe(adContainer, { childList: true, subtree: true });
</script>
