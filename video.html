<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnywhereCum – Video Link</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #111;
  gap: 35px;
}

/* Button style */
button {
  padding: 18px 32px;
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 10px;
  font-size: 20px;
  font-weight: bold;
  animation: glowPulse 1.6s infinite;
}

@keyframes glowPulse {
  0% { transform: scale(1); box-shadow: 0 0 5px rgba(0,123,255,0.7); }
  50% { transform: scale(1.12); box-shadow: 0 0 25px rgba(0,123,255,0.9), 0 0 50px rgba(0,123,255,0.6); }
  100% { transform: scale(1); box-shadow: 0 0 5px rgba(0,123,255,0.7); }
}

button:hover {
  background: #0056b3;
  animation-play-state: paused;
}

/* Floating movement on mobile */
@keyframes floatButton {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

.button-box {
  display: flex;
  justify-content: center;
}

/* Mobile optimization */
@media (max-width:700px) {
  body { gap: 20px; }
  .button-box { animation: floatButton 3s infinite; }
}

/* Ad glow animation */
@keyframes glow {
  0% { box-shadow: 0 0 2px #fff,0 0 5px red; }
  50% { box-shadow: 0 0 6px #fff,0 0 12px red; }
  100% { box-shadow: 0 0 2px #fff,0 0 5px red; }
}

/* Blinking animations */
.blink { animation: blink 1s infinite; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

.blink-slow { animation: blink-slow 1.6s infinite; }
@keyframes blink-slow { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>

<!-- Load JuicyAds script ONCE -->
<script type="text/javascript" data-cfasync="false" async src="https://poweredby.jads.co/js/jads.js"></script>

<!-- TOP AD -->
<div style="position:relative;width:300px;height:112px;border:2px solid red;border-radius:8px;overflow:hidden;text-align:center;">
  <div style="
      position:absolute;
      top:0;
      left:50%;
      transform:translateX(-50%);
      background:red;
      color:white;
      font-weight:bold;
      font-size:12px;
      padding:2px 6px;
      border-bottom-left-radius:4px;
      border-bottom-right-radius:4px;
      z-index:9999;
      pointer-events:none;
      animation:glow 1s infinite alternate;
  ">
    <span class="blink">🔴 Live</span>
  </div>
  <ins id="1113177" data-width="300" data-height="112"></ins>
  <script type="text/javascript">
    (adsbyjuicy = window.adsbyjuicy || []).push({'adzone':1113177});
  </script>
</div>

<!-- BUTTON -->
<div class="button-box">
  <button onclick="window.open('https://omg10.com/4/10236414','_blank')">
    Click to See Video
  </button>
</div>

<!-- BOTTOM AD (independent blinking) -->
<div style="position:relative;width:308px;height:298px;border:2px solid red;border-radius:8px;overflow:hidden;text-align:center;">
  <div style="
      position:absolute;
      top:0;
      left:50%;
      transform:translateX(-50%);
      background:red;
      color:white;
      font-weight:bold;
      font-size:12px;
      padding:2px 6px;
      border-bottom-left-radius:4px;
      border-bottom-right-radius:4px;
      z-index:9999;
      pointer-events:none;
      animation:glow 1s infinite alternate;
  ">
    <span class="blink-slow">🔴 Live</span>
  </div>
  <ins id="1113289" data-width="308" data-height="298"></ins>
  <script type="text/javascript" data-cfasync="false" async>
    (adsbyjuicy = window.adsbyjuicy || []).push({'adzone':1113289});
  </script>
</div>

</body>
</html>
