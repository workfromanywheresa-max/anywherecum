<!DOCTYPE html>
<html>
<head>
<title>Video Link</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #111;
}

/* Button style */
button {
  padding: 16px 28px;
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 8px;
  font-size: 20px;
  font-weight: bold;
  animation: pulse 1.5s infinite;
}

/* Pulse animation */
@keyframes pulse {
  0% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(0,123,255,0.7);
  }
  70% {
    transform: scale(1.08);
    box-shadow: 0 0 0 15px rgba(0,123,255,0);
  }
  100% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(0,123,255,0);
  }
}

button:hover {
  background: #0056b3;
}
</style>

</head>
<body>

<button onclick="window.open('https://omg10.com/4/10236414', '_blank')">
Click to See Video
</button>

</body>
</html>
