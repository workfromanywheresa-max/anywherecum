body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #111;
  gap: 35px; /* more spacing between ads & button */
}

/* Button style */
button {
  padding: 18px 32px;
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 10px;
  font-size: 20px;
  font-weight: bold;
  animation: glowPulse 1.6s infinite;
}

@keyframes glowPulse {
  0% { transform: scale(1); box-shadow: 0 0 5px rgba(0,123,255,0.7); }
  50% { transform: scale(1.12); box-shadow: 0 0 25px rgba(0,123,255,0.9), 0 0 50px rgba(0,123,255,0.6); }
  100% { transform: scale(1); box-shadow: 0 0 5px rgba(0,123,255,0.7); }
}

button:hover {
  background: #0056b3;
  animation-play-state: paused;
}

/* Floating movement on mobile */
@keyframes floatButton {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

.button-box {
  display: flex;
  justify-content: center;
}

/* Mobile optimization */
@media (max-width:700px) {
  body { gap: 20px; }
  .button-box { animation: floatButton 3s infinite; }
}

/* Ads */
.blink { animation: blink 1s infinite; }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

.ad-wrapper {
  width: 100%;
  display: flex;
  justify-content: center;
}

.ad-container {
  text-align: center;
  border: 1px solid #ff0000;
  border-radius: 10px;
  background: #1a1a1a;

.ad-text {
  font-size: 14px;

  color: #fff;
  margin-bottom: 4px;

@keyframes glow {

  50% { box-shadow: 0 0 6px #fff,0 0 12px red; }
  100% { box-shadow: 0 0 2px #fff,0 0 5px red; }
}
