body {
  margin: 0;

  padding: 20px;
  display: flex;
  flex-direction: column;

/* Button styles */
button {
  padding: 18px 32px;
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 10px;
  font-size: 20px;
  font-weight: bold;
  animation: glowPulse 1.6s infinite;
}
@keyframes glowPulse {
  0% { transform: scale(1); box-shadow: 0 0 5px rgba(0,123,255,0.7); }
  50% { transform: scale(1.12); box-shadow: 0 0 25px rgba(0,123,255,0.9), 0 0 50px rgba(0,123,255,0.6); }
  100% { transform: scale(1); box-shadow: 0 0 5px rgba(0,123,255,0.7); }
}
button:hover { background: #0056b3; animation-play-state: paused; }

/* Back button smaller */
.back-btn {
  padding:8px 14px;
  background:#222;
  color:#fff;
  border:1px solid #ff4444;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
  transition:0.2s;
}

/* Skeleton loader */
.skeleton {
  width: 100%;
  height: 250px;
  border-radius: 10px;
  background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* Bottom ad animations */
.slide-up { animation: slideUp 0.6s ease-out forwards; }
.slide-down { animation: slideDown 0.4s ease-in forwards; }
@keyframes slideUp { from { bottom: -200px; opacity:0; } to { bottom:0; opacity:1; } }
@keyframes slideDown { from { bottom:0; opacity:1; } to { bottom:-200px; opacity:0; } }

@keyframes glow { 0%{box-shadow:0 0 2px #fff,0 0 5px red;opacity:.8;}50%{box-shadow:0 0 6px #fff,0 0 12px red;opacity:1;}100%{box-shadow:0 0 2px #fff,0 0 5px red;opacity:.8;} }
</style>

  <script>
  const skeleton = document.getElementById("skeleton");
  const adContainer = document.getElementById("container-c04c459f06eefec9d4eeedb2a131c1d2");
  const adWrapper = document.getElementById("ad-container");

  const observer = new MutationObserver((mutations, obs) => {
    if (adContainer.children.length > 0) {
      skeleton.style.display = "none";
      adWrapper.style.display = "block";
      obs.disconnect();
    }
  });
  observer.observe(adContainer, { childList: true, subtree: true });
  </script>

  <!-- Bottom Floating Ad -->
  <div id="bottomAd" style="
    position: fixed; bottom: -200px; left: 50%;
    transform: translateX(-50%);
    width: 300px; height: 62px;
    border: 2px solid red; border-radius: 8px;
    overflow: hidden; text-align: center;
    z-index: 9999; background: #fff; opacity: 0;
    display: none;">
    
    <div id="countdown" style="position:absolute; top:2px; right:30px; background:black; color:#fff; font-size:12px; font-weight:bold; padding:2px 6px; border-radius:4px; z-index:10000;">15s</div>

  <script>
  const ad = document.getElementById("bottomAd");
  const countdownEl = document.getElementById("countdown");
  const closeBtn = document.getElementById("closeBtn");

  let countdownInterval, cycleTimeout;

  function showAd() {
    ad.style.display = "block";
    ad.classList.remove("slide-down");
    ad.classList.add("slide-up");
    closeBtn.style.display = "none";
    let timeLeft = 15;
    countdownEl.textContent = timeLeft + "s";
    clearInterval(countdownInterval);
    setTimeout(() => {
      countdownInterval = setInterval(() => {
        timeLeft--;
        countdownEl.textContent = timeLeft + "s";
        if(timeLeft<=0){
          clearInterval(countdownInterval);
          closeBtn.style.display = "block";
        }
      },1000);
    },300);
  }

  function hideAd(){
    ad.classList.remove("slide-up");
    ad.classList.add("slide-down");
    setTimeout(()=>{ ad.style.display="none"; scheduleNextAd(); },400);
  }

  function scheduleNextAd(){
    clearTimeout(cycleTimeout);
    cycleTimeout = setTimeout(()=>{ showAd(); },120000);
  }

  window.onload = function(){
    setTimeout(()=>{ showAd(); scheduleNextAd(); },10000);
  };
  </script>
