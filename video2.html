<script>
document.addEventListener("DOMContentLoaded", function () {

  const ad = document.getElementById("topAdMain");
  const countdownEl = document.getElementById("mainCountdown");
  const closeBtn = document.getElementById("mainCloseBtn");

  let countdownInterval;
  let cycleTimeout;

  function showAd() {
    ad.style.top = "10px";

    let timeLeft = 15;

    countdownEl.style.display = "block";
    closeBtn.style.display = "none";

    countdownEl.textContent = timeLeft + "s";

    clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
      timeLeft--;
      countdownEl.textContent = timeLeft + "s";

      if (timeLeft <= 0) {
        clearInterval(countdownInterval);

        countdownEl.style.display = "none";
        closeBtn.style.display = "flex";
      }
    }, 1000);
  }

  function hideMainAd() {
    ad.style.top = "-80px";

    clearInterval(countdownInterval);

    clearTimeout(cycleTimeout);
    cycleTimeout = setTimeout(showAd, 120000);
  }

  closeBtn.addEventListener("click", hideMainAd);

  setTimeout(() => {
    showAd();
  }, 30000);

});
</script>

<script>
const skeleton = document.getElementById("skeleton");
const adContainer = document.getElementById("ad-container");
const adWrapper = document.getElementById("ad-container");

// Observe changes inside the ad container
const observer = new MutationObserver((mutations, obs) => {
  if (adContainer.children.length > 0) {
    skeleton.style.display = "none";
    adWrapper.style.display = "block";
    obs.disconnect();
  }
});

observer.observe(adContainer, { childList: true, subtree: true });
</script>
