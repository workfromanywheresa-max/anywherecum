<script>
  const banner = document.getElementById("topBanner");
  const closeBtn = document.getElementById("closeBtn");

  const lastClosed = localStorage.getItem("bannerClosedTime");
  const now = Date.now();
  const twentyFourHours = 24 * 60 * 60 * 1000;

  if (!lastClosed || now - lastClosed > twentyFourHours) {
    // Show banner
    banner.style.display = "flex";

    // Slide down smoothly
    setTimeout(() => {
      banner.style.transform = "translate(-50%, 0)";
    }, 50);

    // Auto-hide after 30 seconds
    setTimeout(() => {
      banner.style.transform = "translate(-50%, -100%)";
      setTimeout(() => {
        banner.style.display = "none";
        localStorage.setItem("bannerClosedTime", Date.now());
      }, 500);
    }, 30000);
  }

  closeBtn.addEventListener("click", () => {
    banner.style.transform = "translate(-50%, -100%)";
    setTimeout(() => {
      banner.style.display = "none";
      localStorage.setItem("bannerClosedTime", Date.now());
    }, 500);
  });
</script>

<style>
.slide-up { animation: slideUp 0.6s ease-out forwards; }
.slide-down { animation: slideDown 0.4s ease-in forwards; }
@keyframes slideUp { from { bottom: -200px; opacity: 0; } to { bottom: 0; opacity: 1; } }
@keyframes slideDown { from { bottom: 0; opacity: 1; } to { bottom: -200px; opacity: 0; } }

<script>
const ad = document.getElementById("bottomAd");
const countdownEl = document.getElementById("countdown");
const closeBtn = document.getElementById("closeBtn");

let countdownInterval;
let cycleTimeout;

// Show ad
function showAd() {
  ad.style.display = "block";
  ad.classList.remove("slide-down");
  ad.classList.add("slide-up");

  closeBtn.style.display = "none";

  let timeLeft = 15;
  countdownEl.textContent = timeLeft + "s";

  clearInterval(countdownInterval);

  setTimeout(() => {
    countdownInterval = setInterval(() => {
      timeLeft--;
      countdownEl.textContent = timeLeft + "s";

      if (timeLeft <= 0) {
        clearInterval(countdownInterval);
        closeBtn.style.display = "block";
      }
    }, 1000);
  }, 300);
}

// Hide ad
function hideAd() {
  ad.classList.remove("slide-up");
  ad.classList.add("slide-down");

  setTimeout(() => {
    ad.style.display = "none";
    scheduleNextAd();
  }, 400);
}

// Schedule next ad in 2 minutes
function scheduleNextAd() {
  clearTimeout(cycleTimeout);

  cycleTimeout = setTimeout(() => {
    showAd();
  }, 120000);
}

// Initial load
window.onload = function () {
  setTimeout(() => {
    showAd();
    scheduleNextAd();
  }, 10000);
};
</script>
