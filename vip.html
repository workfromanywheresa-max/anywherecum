<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIP Videos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      margin: 0;
      padding: 15px;
    }

    h2 {
      color: #ff4444;
      border-bottom: 2px solid #ff4444;
      padding-bottom: 5px;
      text-align: center;
    }

    .description {
      text-align: center;
      color: #fff;
      margin-bottom: 20px;
    }

    .videoBox {
      background: #222;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }

    .videoBox img {
      width: 100%;
      max-width: 400px;
      border-radius: 5px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .videoBox img:hover {
      transform: scale(1.05);
    }

    .download {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 15px;
      color: #fff;
      background: #ff4444;
      font-weight: bold;
      text-decoration: none;
      border-radius: 5px;
    }

    .download:hover {
      background: #ff2222;
    }
  </style>
</head>
<body>
  <h2>VIP Exclusive</h2>
  <p class="description">
    Enjoy our premium selection of VIP videos, updated regularly for exclusive content.
  </p>
  <div id="videoList"></div>

  <script>
    fetch('vip.json')
      .then(res => res.json())
      .then(videos => {
        const container = document.getElementById("videoList");

        // Sort by date descending
        videos.sort((a, b) => new Date(b.date) - new Date(a.date));

        videos.forEach(v => {
          const box = document.createElement("div");
          box.className = "videoBox";

          // Thumbnail image
          const img = document.createElement("img");
          img.src = v.thumbnail;
          img.alt = v.title;
          img.addEventListener("click", () => {
            window.open(v.url, "_blank"); // open link, not video embed
          });

          box.appendChild(img);

          // Video title
          const title = document.createElement("p");
          title.textContent = v.title;
          title.style.margin = "10px 0 5px 0";
          title.style.fontWeight = "bold";
          box.appendChild(title);

          // Video size
          const size = document.createElement("p");
          size.textContent = `Size: ${v.size}`;
          size.style.margin = "0 0 10px 0";
          box.appendChild(size);

          // Watch & Download link
          const link = document.createElement("a");
          link.className = "download";
          link.href = v.url;
          link.target = "_blank";
          link.textContent = "Watch & Download";
          box.appendChild(link);

          container.appendChild(box);
        });
      })
      .catch(err => {
        console.error("Failed to load VIP data:", err);
        document.getElementById("videoList").innerHTML =
          '<p style="text-align:center;color:#ff4444;">Failed to load VIP videos.</p>';
      });
  </script>
</body>
</html>
