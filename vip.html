<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VIP Exclusive</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

button {
  background: #444;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 15px;
}

h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

#folderDescription {
  text-align: center;
  color: #aaa;
  font-size: 14px;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
  text-align: center;
  transition: transform 0.2s, box-shadow 0.2s;
}

.videoBox:hover {
  transform: scale(1.02);
  box-shadow: 0 4px 12px rgba(255, 68, 68, 0.5);
}

.videoFrameWrapper {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  position: relative;
  aspect-ratio: 16 / 9;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}

.videoFrameWrapper iframe,
.videoFrameWrapper img {
  width: 100%;
  height: 100%;
  border: 0;
  object-fit: cover;
}

.videoTitle {
  text-align: center;
  margin: 6px 0;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
  color: #fff;
}

.videoTitle:hover {
  color: #ff4444;
}

.views {
  text-align: center;
  color: #aaa;
  margin: 2px 0;
  font-size: 12px;
}

.download {
  display: block;
  width: fit-content;
  margin: 6px auto;
  padding: 5px 10px;
  background: #ff4444;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
  font-size: 12px;
  transition: background 0.2s;
}

.download:hover {
  background: #ff2222;
}

/* SKELETON LOADERS */
.videoBox.skeleton {
  background: none;
  padding: 10px;
  text-align: center;
}

.videoBox.skeleton .videoFrameWrapper,
.videoBox.skeleton .videoTitle,
.videoBox.skeleton .views,
.videoBox.skeleton .download {
  border-radius: 6px;
  background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

.videoBox.skeleton .videoFrameWrapper {
  aspect-ratio: 16 / 9;
  width: 100%;
  max-width: 400px;
  margin: 0 auto 6px;
}

.videoBox.skeleton .videoTitle {
  height: 14px;
  width: 70%;
  margin: 4px auto;
}

.videoBox.skeleton .views {
  height: 12px;
  width: 40%;
  margin: 2px auto;
}

.videoBox.skeleton .download {
  height: 18px;
  width: 50px;
  margin: 6px auto;
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
</style>
</head>

<body>

<button onclick="history.back()">← Back</button>

<h2 id="folderTitle">🔐 VIP Exclusive</h2>
<p id="folderDescription">
  Enjoy our VIP Exclusive videos, updated regularly for your viewing pleasure.
</p>

<div id="normalVideos">
  <!-- Skeleton placeholders -->
  <div class="videoBox skeleton">
    <div class="videoFrameWrapper"></div>
    <div class="videoTitle"></div>
    <div class="views"></div>
    <div class="download"></div>
  </div>
  <div class="videoBox skeleton">
    <div class="videoFrameWrapper"></div>
    <div class="videoTitle"></div>
    <div class="views"></div>
    <div class="download"></div>
  </div>
  <div class="videoBox skeleton">
    <div class="videoFrameWrapper"></div>
    <div class="videoTitle"></div>
    <div class="views"></div>
    <div class="download"></div>
  </div>
</div>

<footer style="text-align:center; padding:20px; font-size:12px; color:#aaa; background:#111; margin-top:10px;">
© 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>
window.VIDEO_CONFIG = {
  dataSource: "vip.json"
};

// Load videos inside skeletons
fetch(window.VIDEO_CONFIG.dataSource)
  .then(res => res.json())
  .then(videos => {
    const skeletons = document.querySelectorAll('#normalVideos .videoBox.skeleton');

    videos.forEach((video, index) => {
      if (!skeletons[index]) {
        // Extra videos if more than skeletons
        const container = document.getElementById('normalVideos');
        const box = document.createElement('div');
        box.className = 'videoBox';
        box.innerHTML = `
          <div class="videoFrameWrapper"><iframe src="${video.url}" allowfullscreen></iframe></div>
          <div class="videoTitle">${video.title}</div>
          <div class="views">${video.views} views</div>
          <a class="download" href="${video.download}">Download</a>
        `;
        container.appendChild(box);
        return;
      }

      const box = skeletons[index];
      box.classList.remove('skeleton');
      box.querySelector('.videoFrameWrapper').innerHTML = `<iframe src="${video.url}" allowfullscreen></iframe>`;
      box.querySelector('.videoTitle').textContent = video.title;
      box.querySelector('.views').textContent = video.views + " views";
      box.querySelector('.download').innerHTML = `<a href="${video.download}" class="download">Download</a>`;
    });
  });
</script>

</body>
</html>
