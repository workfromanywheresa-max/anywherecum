  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {

  await OneSignal.init({
    appId: "9f8d0573-08fa-4522-ab09-4a95fa2f442f"
  });

  async function handleSub() {
    const sub = OneSignal.User.PushSubscription;

    if (!sub) return;

    // ✅ FIX HERE
    const id = sub.token || sub.id;

    if (!id) {
      console.log("Waiting for subscription...", sub);
      return;
    }

    const optedIn = sub.optedIn;

    const lastState = localStorage.getItem("sub_" + id);
    if (lastState === String(optedIn)) return;

    localStorage.setItem("sub_" + id, optedIn);

    console.log("OneSignal Sub Update:", id, optedIn);

    if (window.saveSubscriber) {
      window.saveSubscriber(id, optedIn);
    }
  }

  // ✅ IMPORTANT: OneSignal loads late
  setTimeout(handleSub, 2000);
  setTimeout(handleSub, 5000);

  handleSub();

  OneSignal.User.PushSubscription.addEventListener("change", handleSub);

});
</script>

  <div id="topBanner" style="
  position: fixed;

">

  </span>
  <button id="closeBtn" style="
    position: absolute;
    right: 8px;
    top: 2px;
    background: transparent;
    border: none;
    color: #111;
    font-size: 12px;
    cursor: pointer;
    line-height: 1;
  ">✖</button>
</div>

<script>
  const banner = document.getElementById("topBanner");
  const closeBtn = document.getElementById("closeBtn");

  const lastClosed = localStorage.getItem("bannerClosedTime");
  const now = Date.now();
  const twentyFourHours = 24 * 60 * 60 * 1000;

  if (!lastClosed || now - lastClosed > twentyFourHours) {
    // Show banner
    banner.style.display = "flex";

    // Slide down smoothly
    setTimeout(() => {
      banner.style.transform = "translate(-50%, 0)";
    }, 50);

    // Auto-hide after 30 seconds
    setTimeout(() => {
      banner.style.transform = "translate(-50%, -100%)";
      setTimeout(() => {
        banner.style.display = "none";
        localStorage.setItem("bannerClosedTime", Date.now());
      }, 500);
    }, 30000);
  }

  closeBtn.addEventListener("click", () => {
    banner.style.transform = "translate(-50%, -100%)";
    setTimeout(() => {
      banner.style.display = "none";
      localStorage.setItem("bannerClosedTime", Date.now());
    }, 500);
  });
</script>
