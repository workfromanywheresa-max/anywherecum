    <style>
      body {
        font-family: Arial, sans-serif;
        background: #1a1a1a;
        color: #fff;
        margin: 0;
        padding: 15px;
      }

      h2 {
        color: #ff4444;
        border-bottom: 2px solid #ff4444;
        padding-bottom: 5px;
        text-align: center;
      }

      .description {
        text-align: center;
        color: #fff;
        margin-bottom: 20px;
      }

      .videoBox {
        background: #222;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      .preview {
        position: relative;
        width: 100%;
        height: 220px;
        background: #000;
        border-radius: 5px;
        overflow: hidden;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 5px;
        transition: transform 0.3s ease;
      }

      .preview img:hover {
        transform: scale(1.05);
      }

      .videoTitle {
        text-align: center;
        margin: 8px 0 5px 0;
        color: #ddd;
        font-size: 16px;
        font-weight: normal;
        cursor: pointer;
        text-decoration: underline;
      }

      .videoTitle:hover {
        color: #fff; /* brightens on hover */
      }

      .download {
        display: block;
        width: fit-content;
        margin: 10px auto 0 auto;
        padding: 8px 15px;
        color: #fff;
        background: #ff4444;
        font-weight: bold;
        text-decoration: none;
        border-radius: 5px;
        text-align: center;
      }

      .download:hover {
        background: #ff2222;
      }
    </style>
  </head>

<!-- Glowing animation -->
<style>
@keyframes glow {
  0% {
    box-shadow: 0 0 2px #fff, 0 0 5px red;
    opacity: 0.8;
  }
  50% {
    box-shadow: 0 0 6px #fff, 0 0 12px red;

  100% {

    <div id="videoList"></div>

    <script>
      fetch('vip.json')
        .then(response => response.json())
        .then(vipData => {
          const container = document.getElementById("videoList");

          // Sort by date descending
          vipData.sort((a, b) => new Date(b.date) - new Date(a.date));

          vipData.forEach(v => {
            const box = document.createElement("div");
            box.className = "videoBox";

            // Thumbnail preview
            const preview = document.createElement("div");
            preview.className = "preview";

            const img = document.createElement("img");
            img.src = v.thumbnail;   // thumbnail image
            img.alt = v.title;
            img.addEventListener("click", () => {
              window.open(v.url, "_blank");  // clicking thumbnail opens watch link
            });

            preview.appendChild(img);
            box.appendChild(preview);

            // Clickable title above download button
            const titleEl = document.createElement("h3");
            titleEl.className = "videoTitle";
            titleEl.textContent = v.title;
            titleEl.addEventListener("click", () => {
              window.open(v.url, "_blank"); // clicking title opens link
            });
            box.appendChild(titleEl);

            // Download button with size only
            const button = document.createElement("a");
            button.className = "download";
            button.href = v.url;
            button.target = "_blank";
            button.textContent = `Download (${v.size})`;

            box.appendChild(button);
            container.appendChild(box);
          });
        })
        .catch(err => {
          console.error("Failed to load VIP data:", err);
          document.getElementById("videoList").innerHTML =
            '<p style="text-align:center;color:#ff4444;">Failed to load VIP videos.</p>';
        });
    </script>
