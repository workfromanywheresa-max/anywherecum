  }

  @keyframes shimmer {
    0% { background-position: -200% 0; }

<script>  
  const container = document.getElementById("videoList");

  // Skeletons
  for (let i = 0; i < 5; i++) {
    const skel = document.createElement("div");
    skel.className = "skeleton-box";

    skel.innerHTML = `
      <div class="skeleton skeleton-thumb"></div>
      <div class="skeleton skeleton-text"></div>
      <div class="skeleton skeleton-btn"></div>
    `;

    container.appendChild(skel);
  }

  fetch('vip.json')
    .then(response => response.json())
    .then(vipData => {

      container.innerHTML = "";

      vipData.sort((a, b) => new Date(b.date) - new Date(a.date));

      vipData.forEach(v => {
        const box = document.createElement("div");
        box.className = "videoBox";

        const preview = document.createElement("div");
        preview.className = "preview";

        const img = document.createElement("img");
        img.src = "https://anywherecum.workfromanywhere-sa.workers.dev/images/" + v.thumbnail;
        img.alt = v.title;
        img.addEventListener("click", () => {
          window.open(v.url, "_blank");
        });

        preview.appendChild(img);
        box.appendChild(preview);

        const titleEl = document.createElement("h3");
        titleEl.className = "videoTitle";
        titleEl.textContent = v.title;
        titleEl.addEventListener("click", () => {
          window.open(v.url, "_blank");
        });
        box.appendChild(titleEl);

        const button = document.createElement("a");
        button.className = "download";
        button.href = v.url;
        button.target = "_blank";
        button.textContent = `Download (${v.size})`;

        box.appendChild(button);
        container.appendChild(box);
      });
    })
    .catch(err => {
      console.error("Failed to load VIP data:", err);
      container.innerHTML =
        '<p style="text-align:center;color:#ff4444;">Failed to load VIP videos.</p>';
    });
