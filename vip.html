<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VIP Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

h2 {
  color: #ff4444;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
  text-align: center;
}

.description {
  text-align: center;
  margin-bottom: 20px;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
}

.preview {
  width: 100%;
  height: 220px;
  background: #000;
  border-radius: 5px;
  overflow: hidden;
  cursor: pointer;
}

.preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.videoTitle {
  text-align: center;
  margin: 8px 0 5px 0;
  color: #ddd;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  text-align: center;
  color: #aaa;
  margin: 5px 0;
}

.trending {
  text-align: center;
  color: #ffcc00;
  font-weight: bold;
  margin: 5px 0;
}

.download {
  display: block;
  width: fit-content;
  margin: 10px auto 0 auto;
  padding: 8px 15px;
  color: #fff;
  background: #ff4444;
  font-weight: bold;
  text-decoration: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<h2>VIP Exclusive</h2>
<p class="description">Premium videos with live views & trending system.</p>

<div id="videoList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("videoList");

// Format views (1K+, 1.2K+, etc.)
function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(".0", "") + "M+";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(".0", "") + "K+";
  return num;
}

// Increase views
function increaseViews(videoId) {
  const viewRef = ref(db, "views/" + videoId);
  runTransaction(viewRef, (current) => (current || 0) + 1);
}

// Load videos
fetch('vip.json')
.then(res => res.json())
.then(vipData => {

  container.innerHTML = "";

  vipData.sort((a, b) => new Date(b.date) - new Date(a.date));

  vipData.forEach(v => {

    const box = document.createElement("div");
    box.className = "videoBox";

    const preview = document.createElement("div");
    preview.className = "preview";

    const img = document.createElement("img");
    img.src = "https://anywherecum.workfromanywhere-sa.workers.dev/images/" + v.thumbnail;

    img.addEventListener("click", () => {
      increaseViews(v.id);
      window.open(v.url, "_blank");
    });

    preview.appendChild(img);

    const titleEl = document.createElement("h3");
    titleEl.className = "videoTitle";
    titleEl.textContent = v.title;

    titleEl.addEventListener("click", () => {
      increaseViews(v.id);
      window.open(v.url, "_blank");
    });

    const viewsEl = document.createElement("div");
    viewsEl.className = "views";

    const trendingEl = document.createElement("div");
    trendingEl.className = "trending";

    const viewRef = ref(db, "views/" + v.id);

    onValue(viewRef, (snapshot) => {
      const views = snapshot.val() || 0;

      viewsEl.textContent = "Views: " + formatViews(views);

      // 🔥 Trending (permanent, no expiry)
      if (views >= 500) {
        trendingEl.textContent = "🔥 Trending • " + formatViews(views);
        trendingEl.style.display = "block";
      } else {
        trendingEl.style.display = "none";
      }
    });

    const button = document.createElement("a");
    button.className = "download";
    button.href = v.url;
    button.target = "_blank";
    button.textContent = `Download (${v.size})`;

    box.appendChild(preview);
    box.appendChild(titleEl);
    box.appendChild(trendingEl);
    box.appendChild(viewsEl);
    box.appendChild(button);

    container.appendChild(box);
  });

})
.catch(err => {
  console.error(err);
  container.innerHTML = "<p style='text-align:center;color:red;'>Failed to load videos</p>";
});
</script>

</body>
</html>
