<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, runTransaction, onValue } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCEX5dpi6Tp8KBxCLScWH6oNqPpppR4kx0",
  authDomain: "anywherecum-1c8d0.firebaseapp.com",
  databaseURL: "https://anywherecum-1c8d0-default-rtdb.firebaseio.com",
  projectId: "anywherecum-1c8d0",
  storageBucket: "anywherecum-1c8d0.firebasestorage.app",
  messagingSenderId: "686718460803",
  appId: "1:686718460803:web:5d0ec20634dfe2a7d98cb6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("videoList");

const TREND_THRESHOLD = 10;
const WORKER_URL = "https://anywherecum.workfromanywhere-sa.workers.dev";

// ✅ YOUR IP (blocked)
const OWNER_IP = "102.214.117.74";

// ✅ get user IP
async function getUserIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip;
  } catch (e) {
    return null;
  }
}

// ✅ format views
function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(".0","") + "M+";
  if (num >= 1000) return (num / 1000).toFixed(1).replace(".0","") + "K+";
  return num;
}

// ✅ CLICK HANDLER (views + cycleViews + IP block)
async function increaseViews(videoId){

  const userIP = await getUserIP();

  // 🚫 block your IP
  if (userIP && userIP === OWNER_IP) {
    console.log("Owner detected — not counting");
    return;
  }

  // ✅ total views
  runTransaction(ref(db, "views/" + videoId), (current) => {
    return (current || 0) + 1;
  });

  // ✅ cycleViews (trending)
  runTransaction(ref(db, "cycleViews/" + videoId), (current) => {
    return (current || 0) + 1;
  });

  // optional worker log
  fetch(`${WORKER_URL}/increment`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ videoId })
  }).catch(()=>{});
}

const videoStates = {};

fetch('vip.json')
.then(res => res.json())
.then(vipData => {

  container.innerHTML = "";

  // newest first
  vipData.sort((a, b) => new Date(b.date) - new Date(a.date));

  vipData.forEach((v, index) => {

    const box = document.createElement("div");
    box.className = "videoBox";

    const preview = document.createElement("div");
    preview.className = "preview";

    const img = document.createElement("img");
    img.src = "https://anywherecum.pages.dev/images/" + v.thumbnail;

    const titleEl = document.createElement("h3");
    titleEl.className = "videoTitle";
    titleEl.textContent = v.title;

    const viewsEl = document.createElement("div");
    viewsEl.className = "views";

    const button = document.createElement("a");
    button.className = "download";
    button.href = v.url;
    button.textContent = `Download (${v.size})`;

    const viewRef = ref(db, "views/" + v.id);
    const cycleViewsRef = ref(db, "cycleViews/" + v.id);

    let totalViews = 0;
    let cycleViews = 0;

    function updateUI(){
      if(cycleViews >= TREND_THRESHOLD){
        viewsEl.textContent = "🔥 Trending | 👁 " + formatViews(totalViews);
        viewsEl.style.color = "#ffcc00";
      } else {
        viewsEl.textContent = "👁 " + formatViews(totalViews);
        viewsEl.style.color = "#aaa";
      }
    }

    videoStates[v.id] = {
      element: box,
      getScore: () => cycleViews,
      originalIndex: index
    };

    function sortVideos(){
      const sorted = Object.values(videoStates)
        .sort((a,b)=>{
          const aScore = a.getScore();
          const bScore = b.getScore();

          const aEff = aScore >= TREND_THRESHOLD ? aScore : 0;
          const bEff = bScore >= TREND_THRESHOLD ? bScore : 0;

          if (bEff !== aEff) return bEff - aEff;
          return a.originalIndex - b.originalIndex;
        });

      sorted.forEach(v => container.appendChild(v.element));
    }

    onValue(viewRef, snap => {
      totalViews = snap.val() || 0;
      updateUI();
    });

    onValue(cycleViewsRef, snap => {
      cycleViews = snap.val() || 0;
      updateUI();
      sortVideos();
    });

    function openVideo(){
      increaseViews(v.id);
      window.open(v.url, "_blank");
    }

    img.onclick = openVideo;
    titleEl.onclick = openVideo;
    button.onclick = (e) => {
      e.preventDefault();
      openVideo();
    };

    preview.appendChild(img);
    box.appendChild(preview);
    box.appendChild(titleEl);
    box.appendChild(viewsEl);
    box.appendChild(button);

    container.appendChild(box);
  });

})
.catch(err => {
  console.error(err);
  container.innerHTML = "<p style='text-align:center;color:red;'>Failed to load videos</p>";
});
        </script>
