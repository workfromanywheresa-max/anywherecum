<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIP Videos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    button {
      background: #444;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 15px;
      align-self: flex-start;
    }

    h2 {
      color: #ff4444;
      text-align: center;
      border-bottom: 2px solid #ff4444;
      padding-bottom: 5px;
    }

    #folderDescription {
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }

    #normalVideos {
      margin-bottom: 50px;
      flex-grow: 1;
    }

    .videoBox {
      background: #222;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 30px;
      text-align: center;
    }

    .videoFrameWrapper {
      width: 100%;
      max-width: 300px;
      margin: 0 auto;
      position: relative;
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
    }

    .videoFrameWrapper iframe,
    .videoFrameWrapper img {
      width: 100%;
      height: 100%;
      border: 0;
      object-fit: cover;
    }

    .videoTitle {
      margin: 6px 0;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
    }

    .views {
      color: #aaa;
      font-size: 12px;
    }

    .download {
      display: block;
      width: fit-content;
      margin: 6px auto;
      padding: 5px 10px;
      background: #ff4444;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-size: 12px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #aaa;
      background: #111;
      margin-top: auto;
    }

    footer div a img {
      width: 14px;
      height: 14px;
    }

    /* Loader animation */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
  </style>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>

<body>

<!-- TOP BANNER -->
<div id="topBanner" style="
  position: fixed;
  top: 0;
  left: 50%;
  transform: translate(-50%, -100%);
  width: 95%;
  max-width: 700px;
  background: #ffffff;
  color: #111;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 3px 12px;
  font-size: 11px;
  z-index: 9999;
  border-radius: 5px;
  white-space: nowrap;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  transition: transform 0.5s ease;
">
  <span style="flex: 1; text-align: center;">
    🔔 Click the bell icon on your bottom left to receive notifications
  </span>
  <button id="closeBtn" style="
    position: absolute;
    right: 8px;
    top: -5px;
    background: transparent;
    border: none;
    font-size: 12px;
    cursor: pointer;
  ">✖</button>
</div>

<script>
  const banner = document.getElementById("topBanner");
  const closeBtn = document.getElementById("closeBtn");

  const lastClosed = localStorage.getItem("bannerClosedTime");
  const now = Date.now();
  const oneDay = 86400000;

  if (!lastClosed || now - lastClosed > oneDay) {
    banner.style.display = "flex";
    setTimeout(() => banner.style.transform = "translate(-50%, 0)", 50);

    setTimeout(() => {
      banner.style.transform = "translate(-50%, -100%)";
      setTimeout(() => {
        banner.style.display = "none";
        localStorage.setItem("bannerClosedTime", Date.now());
      }, 500);
    }, 30000);
  }

  closeBtn.onclick = () => {
    banner.style.transform = "translate(-50%, -100%)";
    setTimeout(() => {
      banner.style.display = "none";
      localStorage.setItem("bannerClosedTime", Date.now());
    }, 500);
  };
</script>

<button onclick="history.back()">← Back</button>

<h2>🔐VIP Exclusive</h2>
<p id="folderDescription">Enjoy our Exclusive VIP videos, updated regularly.</p>

<!-- ✅ FIXED TOP AD (NO JUMP) -->
<div style="width:320px; height:50px; margin:10px auto; position:relative;">
  
  <!-- Loader -->
  <div id="adLoader" style="
    position:absolute;
    inset:0;
    background: linear-gradient(90deg,#eee 25%,#ddd 50%,#eee 75%);
    background-size:200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius:12px;
  "></div>

  <!-- Ad container -->
  <div id="adContainerTop" style="
    width:100%;
    height:100%;
    border:2px solid red;
    border-radius:12px;
    overflow:hidden;
    background:#fff;
  ">
    <script>
      atOptions = {
        'key' : '58e0d60dc3ec78d2ff8981481d093080',
        'format' : 'iframe',
        'height' : 50,
        'width' : 320,
        'params' : {}
      };
    </script>
    <script src="https://www.highperformanceformat.com/58e0d60dc3ec78d2ff8981481d093080/invoke.js"></script>
  </div>
</div>

<script>
  const adTop = document.getElementById("adContainerTop");
  const loader = document.getElementById("adLoader");

  const obs = new MutationObserver((m, o) => {
    if (adTop.children.length > 1) {
      loader.style.display = "none";
      o.disconnect();
    }
  });

  obs.observe(adTop, { childList: true });
</script>

<!-- VIDEOS -->
<div id="normalVideos"></div>

<footer>
  © 2026 AnywhereCum – Legal content only. 18+<br>
</footer>

</body>
</html>
