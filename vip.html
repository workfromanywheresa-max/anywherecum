<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIP Videos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* BUTTONS & HEADERS */
    button {
      background: #444;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 15px;
    }
    h2 {
      color: #ff4444;
      text-align: center;
      border-bottom: 2px solid #ff4444;
      padding-bottom: 5px;
    }
    #folderDescription {
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }

    /* VIDEOS CONTAINER */
    #normalVideos {
      margin-bottom: 50px; /* space for footer */
      flex-grow: 1; /* push footer down if content is short */
    }

    /* VIDEO BOX */
    .videoBox {
      background: #222;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      visibility: visible; /* Ensure visibility is on by default */
      transition: transform 0.5s ease, visibility 0s ease; /* Transition for transform only */
    }

    /* VIDEO PLAYER */
    .videoFrameWrapper {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      position: relative;
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
    }
    .videoFrameWrapper iframe,
    .videoFrameWrapper img {
      width: 100%;
      height: 100%;
      border: 0;
      object-fit: cover;
    }

    /* TEXT */
    .videoTitle {
      text-align: center;
      margin: 6px 0;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
    }
    .views {
      text-align: center;
      color: #aaa;
      margin: 2px 0;
      font-size: 12px;
    }
    .download {
      display: block;
      width: fit-content;
      margin: 6px auto;
      padding: 5px 10px;
      background: #ff4444;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-size: 12px;
    }

    /* SMOOTH TRANSITION FOR MOVING */
    .videoBox.moving {
      visibility: hidden; /* Hide element while it moves */
      transform: translateY(-50px); /* Move element up */
      transition: transform 0.5s ease, visibility 0s ease 0.5s; /* Delay visibility change until transition ends */
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #aaa;
      background: #111;
      margin-top: auto; /* keeps footer at bottom if content is short */
    }
    footer div a img {
      width: 14px;
      height: 14px;
    }
  </style>
</head>

<body>

  <button onclick="history.back()">← Back</button>

  <h2 id="folderTitle">🔐VIP Exclusive</h2>
  <p id="folderDescription">Enjoy our exclusive VIP videos, updated regularly.</p>

  <!-- VIDEOS CONTAINER -->
  <div id="normalVideos"></div>

  <footer>

        <img src="https://www.facebook.com/images/fb_icon_325x325.png">
      </a><span>|</span>
      <a href="contact.html" style="color:#ff4444; margin:0 5px;">📨Contact</a><span>|</span>

      <a href="/" style="color:#ff4444; margin:0 5px;">🏠Home</a><span>|</span>
      <a href="#" onclick="window.scrollTo({top:0, behavior:'smooth'});" style="color:#ff4444;">⬆️Back to Top</a>

  <!-- VIDEO CONFIG & MODULE -->
  <script>
    const params = new URLSearchParams(window.location.search);

    };
