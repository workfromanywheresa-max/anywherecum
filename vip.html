<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* BUTTON */
button {
  background: #444;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 15px;
  align-self: flex-start;
}

/* HEADER */
h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

#folderDescription {
  text-align: center;
  color: #aaa;
  font-size: 14px;
}

/* VIDEOS */
#normalVideos {
  margin-bottom: 50px;
  flex-grow: 1;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 30px;
  text-align: center;
  transition: transform 0.5s ease;
}

.videoBox.moving {
  visibility: hidden;
  transform: translateY(-50px);
}

.videoFrameWrapper {
  width: 100%;
  max-width: 300px;
  margin: 0 auto;
  aspect-ratio: 16 / 9;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}

.videoFrameWrapper iframe,
.videoFrameWrapper img {
  width: 100%;
  height: 100%;
  border: 0;
  object-fit: cover;
}

.videoTitle {
  margin: 6px 0;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  color: #aaa;
  font-size: 12px;
}

.download {
  display: block;
  margin: 6px auto;
  padding: 5px 10px;
  background: #ff4444;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
  font-size: 12px;
}

/* TOP AD SKELETON */
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.topAdSkeleton {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, #eee 25%, #ddd 50%, #eee 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}

/* BOTTOM AD */
.skeleton {
  width: 100%;
  height: 250px;
  border-radius: 10px;
  background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

#ad-container {
  display: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
  margin-top: auto;
}
footer div a img {
  width: 14px;
  height: 14px;
}
</style>

<!-- OneSignal -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {

  await OneSignal.init({
    appId: "9f8d0573-08fa-4522-ab09-4a95fa2f442f"
  });

  async function handleSub() {
    const sub = OneSignal.User.PushSubscription;
    if (!sub) return;

    const id = sub.token || sub.id;
    if (!id) return;

    const optedIn = sub.optedIn;
    const lastState = localStorage.getItem("sub_" + id);
    if (lastState === String(optedIn)) return;

    localStorage.setItem("sub_" + id, optedIn);

    if (window.saveSubscriber) {
      window.saveSubscriber(id, optedIn);
    }
  }

  setTimeout(handleSub, 2000);
  setTimeout(handleSub, 5000);
  handleSub();

  OneSignal.User.PushSubscription.addEventListener("change", handleSub);
});
</script>

🔔 Click the bell icon to receive notifications
</span>
<button id="closeBtn" style="position:absolute;right:8px;top:-5px;background:none;border:none;">✖</button>
</div>

<script>
const banner = document.getElementById("topBanner");
const closeBtn = document.getElementById("closeBtn");

const lastClosed = localStorage.getItem("bannerClosedTime");
const now = Date.now();

if (!lastClosed || now - lastClosed > 86400000) {
  banner.style.display = "flex";
  setTimeout(() => {
    banner.style.transform = "translate(-50%,0)";
  }, 50);

  setTimeout(() => {
    banner.style.transform = "translate(-50%,-100%)";
    setTimeout(() => {
      banner.style.display = "none";
      localStorage.setItem("bannerClosedTime", Date.now());
    }, 500);
  }, 30000);
}

closeBtn.onclick = () => {
  banner.style.transform = "translate(-50%,-100%)";
  setTimeout(() => {
    banner.style.display = "none";
    localStorage.setItem("bannerClosedTime", Date.now());
  }, 500);
};
</script>
