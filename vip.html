<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {

  await OneSignal.init({
    appId: "9f8d0573-08fa-4522-ab09-4a95fa2f442f"
  });

  async function handleSub() {
    const sub = OneSignal.User.PushSubscription;

    if (!sub) return;

    // ✅ FIX HERE
    const id = sub.token || sub.id;

    if (!id) {
      console.log("Waiting for subscription...", sub);
      return;
    }

    const optedIn = sub.optedIn;

    const lastState = localStorage.getItem("sub_" + id);
    if (lastState === String(optedIn)) return;

    localStorage.setItem("sub_" + id, optedIn);

    console.log("OneSignal Sub Update:", id, optedIn);

    if (window.saveSubscriber) {
      window.saveSubscriber(id, optedIn);
    }
  }

  // ✅ IMPORTANT: OneSignal loads late
  setTimeout(handleSub, 2000);
  setTimeout(handleSub, 5000);

  handleSub();

  OneSignal.User.PushSubscription.addEventListener("change", handleSub);

});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const ad = document.getElementById("topAdMain");
  const adContainer = document.getElementById("adContainer");
  const countdownEl = document.getElementById("mainCountdown");
  const closeBtn = document.getElementById("mainCloseBtn");

  let countdownInterval;
  let cycleTimeout;
  let adLoaded = false;

  function loadAdScriptOnce() {
    if (adLoaded) return;
    adLoaded = true;

    const script1 = document.createElement("script");
    script1.async = true;
    script1.src = "https://poweredby.jads.co/js/jads.js";

    const ins = document.createElement("ins");
    ins.setAttribute("id", "1113670");
    ins.setAttribute("data-width", "300");
    ins.setAttribute("data-height", "62");

    const script2 = document.createElement("script");
    script2.text = "(adsbyjuicy = window.adsbyjuicy || []).push({'adzone':1113670});";

    adContainer.appendChild(script1);
    adContainer.appendChild(ins);
    adContainer.appendChild(script2);
  }

  function showAd() {
    ad.style.top = "10px";

    // Load ad only when needed
    loadAdScriptOnce();

    let timeLeft = 15;

    countdownEl.style.display = "block";
    closeBtn.style.display = "none";

    countdownEl.textContent = timeLeft + "s";

    clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
      timeLeft--;
      countdownEl.textContent = timeLeft + "s";

      if (timeLeft <= 0) {
        clearInterval(countdownInterval);

        countdownEl.style.display = "none";
        closeBtn.style.display = "flex";
      }
    }, 1000);
  }

  function hideMainAd() {
    ad.style.top = "-80px";

    clearInterval(countdownInterval);
    clearTimeout(cycleTimeout);

    cycleTimeout = setTimeout(showAd, 120000);
  }

  closeBtn.addEventListener("click", hideMainAd);

  setTimeout(() => {
    showAd();
  }, 30000);

});
</script>
