<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIP Videos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    button {
      background: #444;
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 15px;
      align-self: flex-start;
    }

    h2 {
      color: #ff4444;
      text-align: center;
      border-bottom: 2px solid #ff4444;
      padding-bottom: 5px;
    }

    #folderDescription {
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }

    #normalVideos {
      margin-bottom: 50px;
      flex-grow: 1;
    }

    .videoBox {
      background: #222;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 30px;
      text-align: center;
      transition: transform 0.5s ease;
    }

    .videoFrameWrapper {
      width: 100%;
      max-width: 300px;
      margin: 0 auto;
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
    }

    .videoFrameWrapper iframe,
    .videoFrameWrapper img {
      width: 100%;
      height: 100%;
      border: 0;
      object-fit: cover;
    }

    .videoTitle {
      margin: 6px 0;
      font-size: 13px;
      text-decoration: underline;
    }

    .views {
      color: #aaa;
      font-size: 12px;
    }

    .download {
      display: block;
      margin: 6px auto;
      padding: 5px 10px;
      background: #ff4444;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-size: 12px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #aaa;
      background: #111;
      margin-top: auto;
    }

    /* ✅ Skeleton animation for top ad */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .topAdSkeleton {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #eee 25%, #ddd 50%, #eee 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }

    #ad-container {
      display: none;
    }
  </style>
</head>

<body>

<button onclick="history.back()">← Back</button>

<h2>🔐VIP Exclusive</h2>
<p id="folderDescription">Enjoy our Exclusive VIP videos, updated regularly.</p>

<!-- ✅ FIXED TOP AD -->
<div style="display:flex; justify-content:center; margin:10px 0 20px;">
  <div style="
    width:320px;
    height:50px;
    border:2px solid red;
    border-radius:10px;
    overflow:hidden;
    background:#fff;
    position:relative;
  ">
    <!-- skeleton -->
    <div id="topAdSkeleton" class="topAdSkeleton"></div>

    <!-- ad container -->
    <div id="adContainer" style="width:100%; height:100%;"></div>
  </div>
</div>

<script>
const adBox = document.getElementById("adContainer");
const skeletonTop = document.getElementById("topAdSkeleton");

const observerTop = new MutationObserver((mutations, obs) => {
  if (adBox.children.length > 0) {
    skeletonTop.style.display = "none";
    obs.disconnect();
  }
});

observerTop.observe(adBox, { childList: true });

// load ad AFTER layout (prevents jump)
setTimeout(() => {
  const s1 = document.createElement("script");
  s1.innerHTML = `
    atOptions = {
      'key' : '58e0d60dc3ec78d2ff8981481d093080',
      'format' : 'iframe',
      'height' : 50,
      'width' : 320
    };
  `;

  const s2 = document.createElement("script");
  s2.src = "https://www.highperformanceformat.com/58e0d60dc3ec78d2ff8981481d093080/invoke.js";

  adBox.appendChild(s1);
  adBox.appendChild(s2);
}, 100);
</script>

<!-- VIDEOS -->
<div id="normalVideos"></div>

<!-- BOTTOM AD (UNCHANGED) -->
<div id="skeleton" class="skeleton"></div>

<div id="ad-container">
  <script async data-cfasync="false"
    src="https://pl28956586.profitablecpmratenetwork.com/c04c459f06eefec9d4eeedb2a131c1d2/invoke.js">
  </script>
  <div id="container-c04c459f06eefec9d4eeedb2a131c1d2"></div>
</div>

<script>
const skeleton = document.getElementById("skeleton");
const adContainer2 = document.getElementById("container-c04c459f06eefec9d4eeedb2a131c1d2");
const adWrapper = document.getElementById("ad-container");

const observer = new MutationObserver((mutations, obs) => {
  if (adContainer2.children.length > 0) {
    skeleton.style.display = "none";
    adWrapper.style.display = "block";
    obs.disconnect();
  }
});

observer.observe(adContainer2, { childList: true, subtree: true });
</script>

<footer>
  © 2026 AnywhereCum – Legal content only. 18+
</footer>

<script>
const params = new URLSearchParams(window.location.search);
window.VIDEO_CONFIG = {
  dataSource: "vip.json",
  folder: params.get("folder") || ""
};
</script>

<script type="module" src="views2.js"></script>

</body>
</html>
