<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VIP Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* BUTTONS & HEADERS */
button {
  background: #444;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 15px;
}
h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}
#folderDescription {
  text-align: center;
  color: #aaa;
  font-size: 14px;
}

/* VIDEOS CONTAINER */
#normalVideos {
  margin-bottom: 50px;
  flex-grow: 1;
}

/* VIDEO BOX */
.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
  text-align: center;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

/* VIDEO PLAYER */
.videoFrameWrapper {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  position: relative;
  aspect-ratio: 16 / 9;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}
.videoFrameWrapper iframe,
.videoFrameWrapper img {
  width: 100%;
  height: 100%;
  border: 0;
  object-fit: cover;
}

/* TEXT */
.videoTitle {
  text-align: center;
  margin: 6px 0;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
}
.views {
  text-align: center;
  color: #aaa;
  margin: 2px 0;
  font-size: 12px;
}
.download {
  display: block;
  width: fit-content;
  margin: 6px auto;
  padding: 5px 10px;
  background: #ff4444;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
  font-size: 12px;
}

/* ---------------- SKELETON ---------------- */
.skeleton-video {
  background: #222;
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 20px;
}
.skeleton-frame {
  width: 100%;
  max-width: 400px;
  aspect-ratio: 16/9;
  border-radius: 8px;
  background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  margin: 0 auto;
}
.skeleton-text {
  height: 12px;
  margin: 6px auto;
  max-width: 70%;
  border-radius: 4px;
  background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}
.skeleton-button {
  width: 60px;
  height: 18px;
  margin: 6px auto;
  border-radius: 5px;
  background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
  margin-top: auto;
}
footer div a img {
  width: 14px;
  height: 14px;
}
</style>
</head>

<body>

<button onclick="history.back()">← Back</button>

<h2 id="folderTitle">🔐VIP Exclusive</h2>
<p id="folderDescription">Enjoy our exclusive VIP videos, updated regularly.</p>

<!-- VIDEOS CONTAINER WITH SKELETONS -->
<div id="normalVideos">
  <div class="videoBox skeleton-video">
    <div class="videoFrameWrapper skeleton-frame"></div>
    <div class="videoTitle skeleton-text"></div>
    <div class="views skeleton-text"></div>
    <div class="download skeleton-button"></div>
  </div>
  <div class="videoBox skeleton-video">
    <div class="videoFrameWrapper skeleton-frame"></div>
    <div class="videoTitle skeleton-text"></div>
    <div class="views skeleton-text"></div>
    <div class="download skeleton-button"></div>
  </div>
  <div class="videoBox skeleton-video">
    <div class="videoFrameWrapper skeleton-frame"></div>
    <div class="videoTitle skeleton-text"></div>
    <div class="views skeleton-text"></div>
    <div class="download skeleton-button"></div>
  </div>
</div>

<footer>
© 2026 AnywhereCum – Legal content only. 18+<br>
<div style="margin-top:8px; font-size:8px;">
  <a href="https://www.facebook.com/profile.php?id=100069048046082" target="_blank" style="margin:0 5px;">
    <img src="https://www.facebook.com/images/fb_icon_325x325.png">
  </a><span>|</span>
  <a href="contact.html" style="color:#ff4444; margin:0 5px;">📨Contact</a><span>|</span>
  <a href="terms-privacy.html" style="color:#ff4444; margin:0 5px;">⚖️Terms & Privacy</a><span>|</span>
  <a href="/" style="color:#ff4444; margin:0 5px;">🏠Home</a><span>|</span>
  <a href="#" onclick="window.scrollTo({top:0, behavior:'smooth'});" style="color:#ff4444;">⬆️Back to Top</a>
</div>
</footer>

<script>
const params = new URLSearchParams(window.location.search);
window.VIDEO_CONFIG = {
  dataSource: "vip.json",
  folder: params.get("folder") || ""
};

const IMAGE_BASE = "https://anywherecum.pages.dev/images/";

// Function to remove skeletons and render videos
function renderVideos(videos) {
  const container = document.getElementById("normalVideos");
  container.innerHTML = ""; // Remove skeletons

  videos.forEach(v => {
    const box = document.createElement("div");
    box.className = "videoBox";

    const wrapper = document.createElement("div");
    wrapper.className = "videoFrameWrapper";

    const thumb = document.createElement("img");
    thumb.src = IMAGE_BASE + encodeURIComponent(v.thumbnail);
    thumb.onclick = () => {
      const iframe = document.createElement("iframe");
      iframe.src = v.embed;
      iframe.allowFullscreen = true;
      wrapper.innerHTML = "";
      wrapper.appendChild(iframe);
    };
    wrapper.appendChild(thumb);

    const title = document.createElement("h3");
    title.className = "videoTitle";
    title.textContent = v.title;
    title.onclick = () => window.open(v.url, "_blank");

    const views = document.createElement("div");
    views.className = "views";
    views.textContent = `👁 ${v.views || 0}`;

    const btn = document.createElement("a");
    btn.className = "download";
    btn.href = v.url;
    btn.textContent = `Download (${v.size || "?"})`;
    btn.target = "_blank";

    box.appendChild(wrapper);
    box.appendChild(title);
    box.appendChild(views);
    box.appendChild(btn);
    container.appendChild(box);
  });
}

// Fetch data and render videos
fetch(window.VIDEO_CONFIG.dataSource)
  .then(res => res.json())
  .then(data => {
    const folder = window.VIDEO_CONFIG.folder.toLowerCase();
    const videos = folder
      ? data.filter(v => v.folder && v.folder.toLowerCase() === folder)
      : data;
    renderVideos(videos);
  })
  .catch(err => console.error("Failed to load videos:", err));
</script>

</body>
</html>
