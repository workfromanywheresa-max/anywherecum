<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;

  padding: 15px;
}

button {
  background: #444;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 15px;

h2 {

#folderDescription {
  text-align: center;

}

/* VIDEO BOX */
.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
  text-align: center;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

/* VIDEO PLACEHOLDER */
.videoBox.placeholder {
  height: 250px;
  background: linear-gradient(90deg,#2a2a2a 25%,#3a3a3a 50%,#2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

@keyframes shimmer {0%{background-position:-200% 0;}100%{background-position:200% 0;}}

/* CLEAN 16:9 PLAYER */
.videoFrameWrapper {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  position: relative;
  aspect-ratio: 16 / 9;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}

.videoFrameWrapper iframe,
.videoFrameWrapper img {
  width: 100%;
  height: 100%;
  border: 0;
  object-fit: cover;
}

/* TEXT */
.videoTitle {
  text-align: center;
  margin: 6px 0;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
}

.views {
  text-align: center;
  color: #aaa;
  margin: 2px 0;
  font-size: 12px;
}

.download {
  display: block;
  width: fit-content;
  margin: 6px auto;
  padding: 5px 10px;
  background: #ff4444;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
  font-size: 12px;
}
</style>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({ appId: "9f8d0573-08fa-4522-ab09-4a95fa2f442f" });

  async function handleSub() {
    const sub = OneSignal.User.PushSubscription;
    if (!sub) return;
    const id = sub.token || sub.id;
    if (!id) { console.log("Waiting for subscription...", sub); return; }
    const optedIn = sub.optedIn;
    const lastState = localStorage.getItem("sub_" + id);
    if (lastState === String(optedIn)) return;
    localStorage.setItem("sub_" + id, optedIn);
    console.log("OneSignal Sub Update:", id, optedIn);
    if (window.saveSubscriber) { window.saveSubscriber(id, optedIn); }
  }

  setTimeout(handleSub, 2000);
  setTimeout(handleSub, 5000);
  handleSub();
  OneSignal.User.PushSubscription.addEventListener("change", handleSub);
});
</script>
