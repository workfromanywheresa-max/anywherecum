    /* ✅ FIXED TOP BANNER */
    #topBanner {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translate(-50%, -100%);
      width: 95%;
      max-width: 700px;
      background: #ffffff;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px 12px;
      font-size: 11px;
      z-index: 9999;
      border-radius: 5px;
      white-space: nowrap;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: transform 0.4s ease, opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }

    #topBanner button {
      position: absolute;
      right: 8px;
      top: -5px;
      background: transparent;
      border: none;
      color: #111;
      font-size: 12px;
      cursor: pointer;
    }

    .skeleton {
      width: 100%;
      height: 250px;
      border-radius: 10px;
      background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    #ad-container {
      display: none;
    }

<!-- ✅ TOP BANNER -->
<div id="topBanner">

    🔔 Click the bell icon on your bottom left to receive notifications
  </span>
  <button id="closeBtn">✖</button>
</div>

<script>
const banner = document.getElementById("topBanner");
const closeBtn = document.getElementById("closeBtn");

const lastClosed = localStorage.getItem("bannerClosedTime");
const now = Date.now();
const twentyFourHours = 24 * 60 * 60 * 1000;

if (!lastClosed || now - lastClosed > twentyFourHours) {

  banner.style.opacity = "1";
  banner.style.pointerEvents = "auto";

  requestAnimationFrame(() => {
    banner.style.transform = "translate(-50%, 0)";
  });

  setTimeout(() => {
    banner.style.transform = "translate(-50%, -100%)";
    setTimeout(() => {
      banner.style.opacity = "0";
      banner.style.pointerEvents = "none";
      localStorage.setItem("bannerClosedTime", Date.now());
    }, 400);
  }, 30000);
}

closeBtn.addEventListener("click", () => {
  banner.style.transform = "translate(-50%, -100%)";
  setTimeout(() => {
    banner.style.opacity = "0";
    banner.style.pointerEvents = "none";
    localStorage.setItem("bannerClosedTime", Date.now());
  }, 400);
});
</script>
