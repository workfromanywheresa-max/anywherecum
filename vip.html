    /* VIDEO BOX */
    .videoBox {
      background: #222;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      visibility: visible; /* Default visibility is visible */
      transition: transform 0.5s ease, visibility 0s ease; /* Only apply transform with a 0.5s delay */
    }

    /* VIDEO PLAYER */
    .videoFrameWrapper {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      position: relative;
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
    }
    .videoFrameWrapper iframe,
    .videoFrameWrapper img {
      width: 100%;
      height: 100%;
      border: 0;
      object-fit: cover;
    }

    /* TEXT */
    .videoTitle {
      text-align: center;

    .views {

      padding: 5px 10px;
      background: #ff4444;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-size: 12px;
    }

    /* SMOOTH TRANSITION FOR MOVING */
    .videoBox.moving {
      visibility: hidden; /* Hide the element while moving */
      transform: translateY(-50px); /* Move element up */
      transition: transform 0.5s ease, visibility 0s ease 0.5s; /* Delay visibility change */
    }

    /* FOOTER */

  background-size: 200% 100%;

}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

#ad-container {

</style>

<script>
const skeleton = document.getElementById("skeleton");

const observer = new MutationObserver((mutations, obs) => {
  if (adContainer.children.length > 0) {
    skeleton.style.display = "none";
    adWrapper.style.display = "block";
    obs.disconnect();
  }
});

observer.observe(adContainer, { childList: true, subtree: true });
</script>
