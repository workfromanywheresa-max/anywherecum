<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VIP Exclusive</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
}

button {
  background: #444;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 15px;
}

h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}

#folderDescription {
  text-align: center;
  color: #aaa;
  font-size: 14px;
}

.videoBox {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 20px;
  text-align: center;
  transition: transform 0.2s, box-shadow 0.2s;
}

.videoBox:hover {
  transform: scale(1.02);
  box-shadow: 0 4px 12px rgba(255, 68, 68, 0.5);
}

.videoFrameWrapper {
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  position: relative;
  aspect-ratio: 16 / 9;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}

.videoFrameWrapper iframe,
.videoFrameWrapper img {
  width: 100%;
  height: 100%;
  border: 0;
  object-fit: cover;
}

.videoTitle {
  text-align: center;
  margin: 6px 0;
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
  color: #fff;
}

.videoTitle:hover {
  color: #ff4444;
}

.views {
  text-align: center;
  color: #aaa;
  margin: 2px 0;
  font-size: 12px;
}

.download {
  display: block;
  width: fit-content;
  margin: 6px auto;
  padding: 5px 10px;
  background: #ff4444;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
  font-size: 12px;
  transition: background 0.2s;
}

.download:hover {
  background: #ff2222;
}

footer {
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#aaa;
  background:#111;
  margin-top:10px;
}
</style>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];

OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({ appId: "9f8d0573-08fa-4522-ab09-4a95fa2f442f" });

  async function handleSub() {
    const sub = OneSignal.User.PushSubscription;
    if (!sub) return;

    const id = sub.token || sub.id;
    if (!id) return;

    const optedIn = sub.optedIn;
    const lastState = localStorage.getItem("sub_" + id);
    if (lastState === String(optedIn)) return;

    localStorage.setItem("sub_" + id, optedIn);
    if (window.saveSubscriber) window.saveSubscriber(id, optedIn);
  }

  setTimeout(handleSub, 2000);
  setTimeout(handleSub, 5000);
  handleSub();
  OneSignal.User.PushSubscription.addEventListener("change", handleSub);
});
</script>

</head>
<body>

<button onclick="history.back()">← Back</button>

<h2 id="folderTitle">🔐 VIP Exclusive</h2>
<p id="folderDescription">
  Enjoy our VIP Exclusive videos, updated regularly for your viewing pleasure.
</p>

<div id="normalVideos"></div>

<footer>
© 2026 AnywhereCum – Legal content only. 18+
</footer>

<script type="module" src="views.js"></script>
</body>
</html>
