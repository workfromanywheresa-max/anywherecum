<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VIP Videos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  margin: 0;
  padding: 15px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* BUTTONS & HEADERS */
button {
  background: #444;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 15px;
}
h2 {
  color: #ff4444;
  text-align: center;
  border-bottom: 2px solid #ff4444;
  padding-bottom: 5px;
}
#folderDescription {
  text-align: center;
  color: #aaa;
  font-size: 14px;
}

/* VIP VIDEO LIST */
#normalVideos {
  margin-bottom: 50px; /* space for footer */
  flex-grow: 1;
  display: grid;
  gap: 15px;
  grid-template-columns: 1fr; /* can change to 2fr or auto-fit for larger screens */
}

/* VIDEO CARD */
.videoCard {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #222;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.2s ease;
}
.videoCard:hover {
  transform: scale(1.02);
}

/* THUMB */
.videoCard img {
  width: 120px;
  height: 68px;
  object-fit: cover;
  border-radius: 5px;
}

/* TEXT */
.videoCard a {
  color: #fff;
  text-decoration: none;
  font-weight: bold;
  font-size: 13px;
}

/* SKELETON LOADER */
.skeleton-card {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #222;
  padding: 10px;
  border-radius: 8px;
}
.skeleton-thumb {
  width: 120px;
  height: 68px;
  border-radius: 5px;
  background: linear-gradient(90deg,#2a2a2a 25%,#3a3a3a 50%,#2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}
.skeleton-text {
  flex: 1;
  height: 14px;
  border-radius: 4px;
  background: linear-gradient(90deg,#2a2a2a 25%,#3a3a3a 50%,#2a2a2a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #aaa;
  background: #111;
  margin-top: auto; /* keep footer at bottom */
}
footer div a img {
  width: 14px;
  height: 14px;
}
</style>
</head>

<body>

<button onclick="history.back()">← Back</button>

<h2 id="folderTitle">🔐VIP Exclusive</h2>
<p id="folderDescription">Enjoy our exclusive VIP videos, updated regularly.</p>

<!-- VIP VIDEO LIST -->
<div id="normalVideos">
  <!-- Skeleton loaders while videos load -->
  <div class="skeleton-card">
    <div class="skeleton-thumb"></div>
    <div class="skeleton-text"></div>
  </div>
  <div class="skeleton-card">
    <div class="skeleton-thumb"></div>
    <div class="skeleton-text"></div>
  </div>
  <div class="skeleton-card">
    <div class="skeleton-thumb"></div>
    <div class="skeleton-text"></div>
  </div>
</div>
