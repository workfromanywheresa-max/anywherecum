<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Watch Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0;background:#1a1a1a;color:white;font-family:Arial;">

  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;">
    <h1 id="title">🔴 LIVE Video</h1>

    <p>
      Redirecting in <span id="timer">5</span> seconds...
    </p>

    <video id="player" controls autoplay playsinline
      style="width:100%;max-width:900px;border-radius:10px;">
    </video>
  </div>

  <script>
    const BASE = "https://pub-9d2dda426f5442ebbb1bd8b6ce4ab99c.r2.dev/live/";
    const adBridge = "/bridge.html";

    const params = new URLSearchParams(location.search);
    const video = params.get("video");

    if (!video) {
      document.body.innerHTML = "<h1>No video selected</h1>";
      throw new Error("No video");
    }

    // video plays normally
    document.getElementById("player").src = BASE + video;

    // clean UI title (no filenames shown)
    document.title = "🔴 LIVE Video";

    let timeLeft = 5;
    const timer = document.getElementById("timer");

    const countdown = setInterval(() => {
      timeLeft--;
      timer.textContent = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(countdown);

        history.replaceState(null, "", "/");

        window.location.replace(adBridge + "?video=" + encodeURIComponent(video));
      }
    }, 1000);
  </script>

</body>
</html>
