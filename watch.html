<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title id="pageTitle">Watch Video</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" id="metaDesc" content="Watch video online in HD">

  <link rel="canonical" id="canonicalLink" href="">

  <meta name="robots" content="index, follow">
</head>

<body style="margin:0; background:black; color:white; font-family:Arial;">

  <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:20px;">

    <h1 id="title" style="font-size:18px; margin-bottom:10px;">
      Loading video...
    </h1>

    <!-- ⏱️ TIMER -->
    <p style="opacity:0.8; font-size:14px; margin-bottom:10px;">
      Redirecting to 🔴LIVE video in <span id="timer">5</span> seconds...
    </p>

    <video id="player"
      controls
      autoplay
      playsinline
      preload="metadata"
      style="width:100%; max-width:900px; border-radius:10px; background:black;">
    </video>

  </div>

  <script>
    const adUrl = "https://www.juicyads.rocks";
    const BASE = "https://pub-9d2dda426f5442ebbb1bd8b6ce4ab99c.r2.dev/live/";

    const params = new URLSearchParams(window.location.search);
    const video = params.get("video");

    if (!video) {
      document.body.innerHTML = `
        <h1 style="color:white;text-align:center;margin-top:50px;">
          No video selected
        </h1>`;
      throw new Error("No video provided");
    }

    const url = BASE + video;
    const player = document.getElementById("player");
    player.src = url;

    const cleanName = video.replace(".mp4", "").replace(/[-_]/g, " ");
    const titleText = "Watch " + cleanName;

    document.getElementById("title").textContent = titleText;
    document.getElementById("pageTitle").textContent = titleText;
    document.getElementById("metaDesc").content = titleText + " full HD video online";

    document.getElementById("canonicalLink").href =
      window.location.origin + "/watch.html?video=" + video;

    // ⏱️ Countdown
    let timeLeft = 5;
    const timerEl = document.getElementById("timer");

    const countdown = setInterval(() => {
      timeLeft--;
      timerEl.textContent = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(countdown);

        // ✅ FIX: remove watch.html from history BEFORE redirect
        history.replaceState(null, "", "/");

        // go to ad
        window.location.href = adUrl;
      }
    }, 1000);
  </script>

</body>
</html>
