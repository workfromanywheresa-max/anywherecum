<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Watch Video</title>

<!-- ✅ DEFAULT META DESCRIPTION (fallback for Google) -->
<meta id="metaDesc" name="description" content="Watch videos in high quality online." />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

.topBar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px;
  background: #000;
  position: sticky;
  top: 0;
  z-index: 10;

  /* ✅ allows wrapping when label becomes long */
  flex-wrap: wrap;
  gap: 6px;
}

.backBtn {
  background: transparent;
  border: 1px solid #444;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

#watchLabel {
  font-size: 12px;
  color: #aaa;
  max-width: 70%;
  text-align: center;

  /* ✅ FIX: allow multiline instead of "..." */
  white-space: normal;
  overflow: visible;
  text-overflow: unset;
  word-break: break-word;

  flex: 1;
}

.container {
  padding: 10px;
}

iframe {
  width: 100%;
  height: 220px;
  border: none;
  border-radius: 10px;
  background: black;
}

select {
  display: block;
  width: fit-content;
  max-width: 90%;
  margin: 6px auto;

  padding: 5px 10px;
  border-radius: 5px;
  border: none;
  background: #333;
  color: #fff;
  font-size: 12px;
}

.title {
  margin-top: 10px;
  font-size: 12px;
  text-align: center;
  text-decoration: underline;
}
</style>

</head>
<body>

<div class="topBar">
  <button class="backBtn" onclick="history.back()">← Back</button>
  <div id="watchLabel">Watch</div>
  <div></div>
</div>

<div class="container">

  <select id="quality"></select>

  <div id="player"></div>

  <div id="title" class="title"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const videoId = params.get("video");
const qIndex = Number(params.get("q") || 0);

const player = document.getElementById("player");
const titleEl = document.getElementById("title");
const qualityEl = document.getElementById("quality");
const watchLabel = document.getElementById("watchLabel");

let videoData = null;
let currentIndex = qIndex;

function loadPlayer() {
  const q = videoData.qualities[currentIndex];
  player.innerHTML = `<iframe src="${q.embed}" allowfullscreen></iframe>`;
}

function init() {
  if (!videoId) {
    titleEl.textContent = "No video selected";
    return;
  }

  fetch("videos.json")
    .then(r => r.json())
    .then(videos => {

      videoData = videos.find(v => v.id === videoId);

      if (!videoData) {
        titleEl.textContent = "Video not found";
        return;
      }

      // ✅ Page title (Google + browser tab)
      document.title = videoData.title;

      // ✅ On-page title
      titleEl.textContent = videoData.title;

      // ✅ Top bar UI text (now wraps properly)
      watchLabel.textContent =
  `Watch "${videoData.title}" — streaming now in high quality`;

      // ✅ Google SEO meta description
      document.getElementById("metaDesc").setAttribute(
        "content",
        `Watch ${videoData.title} — streaming now in high quality`
      );

      // quality dropdown
      videoData.qualities.forEach((q, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = q.label;
        if (i === currentIndex) opt.selected = true;
        qualityEl.appendChild(opt);
      });

      qualityEl.onchange = () => {
        currentIndex = Number(qualityEl.value);
        loadPlayer();
        history.replaceState(null, "", `?video=${videoId}&q=${currentIndex}`);
      };

      loadPlayer();

    })
    .catch(err => {
      titleEl.textContent = "Error loading video";
      console.error(err);
    });
}

init();
</script>

  <script type="module" src="watch.js"></script>
  
</body>
</html>
