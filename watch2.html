<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Watch Video</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

/* TOP BAR */
.topBar {
  padding: 10px;
  display: flex;
  justify-content: space-between;
  background: #1a1a1a;
}

button {
  background: #ff4444;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 5px;
  cursor: pointer;
}

/* CONTAINER */
.container {
  padding: 10px;
  max-width: 900px;
  margin: auto;
}

/* VIDEO BOX */
.videoBox {
  width: 100%;
  background: #222;
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* VIDEO */
.videoBox iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: 0;
}

/* TITLE */
h1 {
  font-size: 18px;
  margin: 10px 0 5px;
}

/* META */
.meta {
  color: #aaa;
  font-size: 13px;
}

/* DROPDOWN */
select {
  display: block;
  width: fit-content;
  max-width: 90%;
  margin: 6px auto;
  padding: 5px 10px;
  border-radius: 5px;
  border: none;
  background: #333;
  color: #fff;
  font-size: 12px;
}

/* =========================
   ACTION BUTTONS (NEW)
========================= */
.actionBar {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 8px;
  background: #1a1a1a;
  flex-wrap: wrap;
}

.actionBar button {
  font-size: 12px;
  padding: 6px 10px;
}

/* optional hover effect */
.actionBar button:hover {
  opacity: 0.85;
}
</style>
</head>

<body>

<div class="topBar">
  <button onclick="history.back()">← Back</button>
</div>

<div class="container">

  <h1 id="title">Loading...</h1>

  <select id="qualitySelect"></select>

  <div class="videoBox">
    <iframe id="player" allowfullscreen></iframe>

    <!-- ✅ ACTION BUTTONS ADDED HERE -->
    <div class="actionBar">
      <button onclick="downloadVideo()">⬇ Download</button>
      <button onclick="shareVideo()">🔗 Share</button>
      <button onclick="embedVideo()"></> Embed</button>
    </div>
  </div>

  <div class="meta" id="desc"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const videoId = params.get("video");
const qualityIndex = Number(params.get("q")) || 0;

const titleEl = document.getElementById("title");
const descEl = document.getElementById("desc");
const player = document.getElementById("player");
const select = document.getElementById("qualitySelect");

let currentVideo = null;
let currentEmbed = "";

/* DESCRIPTION */
function generateDescription(title) {
  return `Watch "${title}" in high quality. Stream this video online with smooth playback anytime.`;
}

/* LOAD VIDEOS */
fetch("videos.json")
  .then(res => res.json())
  .then(videos => {

    const video = videos.find(v => v.id === videoId);
    if (!video) {
      titleEl.textContent = "Video not found";
      return;
    }

    currentVideo = video;

    titleEl.textContent = video.title;

    const description = video.description || generateDescription(video.title);
    descEl.textContent = description;

    select.innerHTML = "";

    video.qualities.forEach((q, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = q.label || `Quality ${index + 1}`;
      if (index === qualityIndex) option.selected = true;
      select.appendChild(option);
    });

    function loadQuality(index) {
      const q = video.qualities[index];
      if (!q) return;
      currentEmbed = q.embed;
      player.src = q.embed;
    }

    loadQuality(qualityIndex);

    select.onchange = () => {
      loadQuality(select.value);
    };

  });

/* =========================
   BUTTON ACTIONS
========================= */
function downloadVideo() {
  if (!currentVideo) return;
  window.open(currentEmbed, "_blank");
}

function shareVideo() {
  if (navigator.share && currentVideo) {
    navigator.share({
      title: currentVideo.title,
      url: window.location.href
    });
  } else {
    alert("Share not supported on this device");
  }
}

function embedVideo() {
  if (!currentEmbed) return;
  prompt("Copy embed link:", currentEmbed);
}
</script>

</body>
</html>
