<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Watch Video</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

.topBar {
  padding: 10px;
  display: flex;
  justify-content: space-between;
  background: #1a1a1a;
}

button {
  background: #ff4444;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 5px;
  cursor: pointer;
}

.container {
  padding: 10px;
  max-width: 900px;
  margin: auto;
}

/* ===== SAME VIDEO BOX STYLE (MATCH HOME PAGE) ===== */
.videoBox {
  background: #222;
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 10px;
}

.videoFrameWrapper {
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #000;
}

.videoFrameWrapper iframe {
  width: 100%;
  height: 100%;
  border: 0;
}

.videoTitle {
  margin: 6px 0;
  font-size: 13px;
  text-align: center;
}

.views {
  color: #aaa;
  font-size: 12px;
  margin-bottom: 5px;
}

/* dropdown */
select {
  display: block;
  width: fit-content;
  max-width: 90%;
  margin: 6px auto;
  padding: 5px 10px;
  border-radius: 5px;
  border: none;
  background: #333;
  color: #fff;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="topBar">
  <button onclick="history.back()">← Back</button>
</div>

<div class="container">

  <!-- 🔥 THIS IS WHERE views2.js WILL INJECT SAME VIDEO BOX -->
  <div id="videoContainer"></div>

</div>

<script type="module" src="watch.js"></script>

</body>
</html>
