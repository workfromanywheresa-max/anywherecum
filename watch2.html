<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Watch Video</title>

<meta id="metaDesc" name="description" content="Watch videos in high quality online." />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

.topBar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px;
  background: #000;
  position: sticky;
  top: 0;
  z-index: 10;
  flex-wrap: wrap;
  gap: 6px;
}

.backBtn {
  background: transparent;
  border: 1px solid #444;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

#watchLabel {
  font-size: 12px;
  color: #aaa;
  max-width: 70%;
  text-align: center;
  white-space: normal;
  overflow: visible;
  word-break: break-word;
  flex: 1;
}

.container {
  padding: 10px;
}

iframe {
  width: 100%;
  height: 220px;
  border: none;
  border-radius: 10px;
  background: black;
}

select {
  display: block;
  width: fit-content;
  max-width: 90%;
  margin: 6px auto;
  padding: 5px 10px;
  border-radius: 5px;
  border: none;
  background: #333;
  color: #fff;
  font-size: 12px;
}

.title {
  margin-top: 10px;
  font-size: 12px;
  text-align: center;
  text-decoration: underline;
}

/* 🔥 BUTTONS */
#actionBar {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-top: 10px;
}

.actionBtn {
  background: #222;
  border: 1px solid #444;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="topBar">
  <button class="backBtn" onclick="history.back()">← Back</button>
  <div id="watchLabel">Watch</div>
  <div></div>
</div>

<div class="container">

  <select id="quality"></select>

  <div id="player"></div>

  <!-- 🔥 BUTTON AREA -->
  <div id="actionBar"></div>

  <div id="title" class="title"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const videoId = params.get("video");
const qIndex = Number(params.get("q") || 0);

const player = document.getElementById("player");
const titleEl = document.getElementById("title");
const qualityEl = document.getElementById("quality");
const watchLabel = document.getElementById("watchLabel");
const actionBar = document.getElementById("actionBar");

let videoData = null;
let currentIndex = qIndex;

function loadPlayer() {
  const q = videoData.qualities[currentIndex];
  player.innerHTML = `<iframe src="${q.embed}" allowfullscreen></iframe>`;
}

/* ---------------- BUTTONS ---------------- */
function createButtons(video) {

  const wrap = document.createElement("div");
  wrap.style.display = "flex";
  wrap.style.flexWrap = "wrap";
  wrap.style.justifyContent = "center";
  wrap.style.gap = "8px";

  function btn(text) {
    const b = document.createElement("button");
    b.className = "actionBtn";
    b.textContent = text;
    return b;
  }

  // SHARE
  const share = btn("Share");
  share.onclick = async () => {
    const url = location.href;
    if (navigator.share) {
      try { await navigator.share({ url }); } catch {}
    } else {
      prompt("Copy link:", url);
    }
  };

  // EMBED
  const embed = btn("Embed");
  embed.onclick = () => {
    const q = video.qualities[0];
    prompt("Embed code:",
      `<iframe src="${q.embed}" width="100%" height="300" frameborder="0" allowfullscreen></iframe>`
    );
  };

  // DOWNLOAD
  const download = btn("Download");
  download.onclick = () => {
    alert(video.qualities.map(q => `${q.label}: ${q.download}`).join("\n"));
  };

  // DONATE
  const donate = btn("Donate");
  donate.onclick = () => {
    window.location.href = "donate.html";
  };

  // LIKE
  let liked = false;
  const like = btn("Like ❤️");
  like.onclick = () => {
    liked = !liked;
    like.textContent = liked ? "Liked ❤️" : "Like ❤️";
  };

  wrap.appendChild(share);
  wrap.appendChild(embed);
  wrap.appendChild(download);
  wrap.appendChild(donate);
  wrap.appendChild(like);

  return wrap;
}

/* ---------------- INIT ---------------- */
function init() {
  if (!videoId) {
    titleEl.textContent = "No video selected";
    return;
  }

  fetch("videos.json")
    .then(r => r.json())
    .then(videos => {

      videoData = videos.find(v => v.id === videoId);

      if (!videoData) {
        titleEl.textContent = "Video not found";
        return;
      }

      document.title = videoData.title;
      titleEl.textContent = videoData.title;

      watchLabel.textContent =
        `Watch "${videoData.title}" — streaming now in high quality`;

      document.getElementById("metaDesc").setAttribute(
        "content",
        `Watch ${videoData.title} — streaming now in high quality`
      );

      videoData.qualities.forEach((q, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = q.label;
        if (i === currentIndex) opt.selected = true;
        qualityEl.appendChild(opt);
      });

      qualityEl.onchange = () => {
        currentIndex = Number(qualityEl.value);
        loadPlayer();
        history.replaceState(null, "", `?video=${videoId}&q=${currentIndex}`);
      };

      loadPlayer();

      /* 🔥 ADD BUTTONS HERE */
      actionBar.innerHTML = "";
      actionBar.appendChild(createButtons(videoData));
    })
    .catch(console.error);
}

init();
</script>

</body>
</html>
