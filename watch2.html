/* =========================
   SKELETON BASE ANIMATION
========================= */
.skeleton {
  background: #1e1e1e;
  position: relative;
  overflow: hidden;
}

.skeleton::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150%;
  width: 150%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent
  );
  animation: shimmer 1.2s infinite;
}

@keyframes shimmer {
  100% {
    left: 100%;
  }
}

function timeAgo(dateString) {
  const now = new Date().getTime(); // FIXED (force proper Date object)
  const past = new Date(dateString).getTime();

  if (isNaN(past)) return "invalid date";

  const diff = now - past;

  if (diff < 0) return "just now";

  const sec = Math.floor(diff / 1000);
  const min = Math.floor(sec / 60);
  const hr = Math.floor(min / 60);
  const day = Math.floor(hr / 24);

  if (sec < 60) return "just now";
  if (min < 60) return `${min} min${min === 1 ? "" : "s"} ago`;
  if (hr < 24) return `${hr} hr${hr === 1 ? "" : "s"} ago`;
  if (day < 7) return `${day} day${day === 1 ? "" : "s"} ago`;

  const weeks = Math.floor(day / 7);
  if (day < 30) return `${weeks} week${weeks === 1 ? "" : "s"} ago`;

  const months = Math.floor(day / 30);
  if (day < 365) return `${months} month${months === 1 ? "" : "s"} ago`;

  const years = Math.floor(day / 365);
  return `${years} year${years === 1 ? "" : "s"} ago`;
}

function openModal(modal) {
  modal.style.display = "flex";

  // push history only once per open
  if (!modal._opened) {
    history.pushState({ modalOpen: true }, "");
    modal._opened = true;
  }

  modalStack.push(modal);
}

/* =========================
   CLOSE TOP MODAL (CORE)
========================= */
function closeTopModal() {
  const modal = modalStack.pop();

  if (!modal) return;

  modal.style.display = "none";

  // if no more modals, reset state
  if (modalStack.length === 0) {
    embedModal._opened = false;
    downloadModal._opened = false;
  }
}

function getLikeCache(videoId) {
  return Number(localStorage.getItem("likes_" + videoId)) || 0;
}

}

function getLikedState(videoId) {
  return localStorage.getItem("liked_" + videoId) === "1";
}

function setLikedState(videoId, state) {
  localStorage.setItem("liked_" + videoId, state ? "1" : "0");
}

function formatLikes(num) {
  if (num < 1000) return num;

  if (num < 1000000) {
    return (num / 1000).toFixed(num >= 10000 ? 0 : 1) + "K";
  }

  return (num / 1000000).toFixed(num >= 10000000 ? 0 : 1) + "M";
                     }

function formatViews(num) {
  num = Number(num);

  if (num >= 1_000) return (num / 1_000).toFixed(1).replace(".0","") + "K";
  return num || 0;
}

/* ---------------- INIT ---------------- */
function init() {
  watchLabel.classList.add("skeleton", "label-skeleton");
  watchLabel.textContent = "";

  const titleEl = document.getElementById("title");
  titleEl.textContent = "";
  if (!videoId) {
    titleEl.textContent = "No video selected";
    return;
  }

  fetch("videos.json")
    .then(r => r.json())
    .then(videos => {
      videoData = videos.find(v => v.id === videoId);

      if (!videoData) {
        titleEl.textContent = "Video not found";
        return;
      }

// ✅ ADD THIS LINE
updateVideoSchema(videoData);

      document.title = videoData.title;
      titleEl.textContent = videoData.title;
titleEl.classList.remove("skeleton");

      watchLabel.classList.remove("skeleton", "label-skeleton");
watchLabel.textContent =
  `Watch "${videoData.title}" — streaming now in high quality`;

      metaDesc.setAttribute(
        "content",
        `Watch ${videoData.title} — streaming now in high quality`
      );

      videoData.qualities.forEach((q, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = q.label;
        if (i === currentIndex) opt.selected = true;
        qualityEl.appendChild(opt);
      });

  qualityEl.classList.remove("skeleton");

      qualityEl.onchange = () => {
        currentIndex = Number(qualityEl.value);
        loadPlayer();
      };

      loadPlayer();
      injectButtons(videoData);
    })
    .catch(err => {
      console.error(err);
      titleEl.textContent = "Error loading video";
    });
}

  init();

  <script>
(function () {

  /* =========================
     VIP CHECK (FROM URL)
  ========================= */
  const params = new URLSearchParams(window.location.search);
  const folder = (params.get("folder") || "").toLowerCase();

  const isVIP =
    folder.includes("vip") ||
    folder.includes("🔓");

  if (isVIP) {
    document.body.classList.add("vip");
    console.log("💎 VIP mode enabled");
  } else {
    document.body.classList.remove("vip");
    console.log("❌ NOT VIP — normal mode");
    return;
  }

  /* =========================
     REMOVE BUTTONS (SAFE)
  ========================= */
  function removeButtons() {

    const leftGroup = document.querySelector("#actionRow > div > div:first-child");
    if (!leftGroup) return;

    leftGroup.querySelectorAll("div").forEach(stack => {

      const labelEl = stack.firstElementChild;
      if (!labelEl) return;

      const label = labelEl.textContent?.trim().toLowerCase();

      if (stack.children.length === 2) {
        if (label === "share" || label === "embed") {
          stack.remove();
        }
      }

    });
  }

  /* =========================
     RUN + WATCH
  ========================= */
  removeButtons();

  const observer = new MutationObserver(removeButtons);

  const actionRow = document.getElementById("actionRow");
  if (actionRow) {
    observer.observe(actionRow, {
      childList: true,
      subtree: true
    });
  }

})();
  </script>
