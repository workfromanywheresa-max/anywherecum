<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Watch Video</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

.topBar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px;
  background: #000;
  position: sticky;
  top: 0;
  z-index: 10;
}

.backBtn {
  background: transparent;
  border: 1px solid #444;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

.container {
  padding: 10px;
}

iframe {
  width: 100%;
  height: 220px;
  border: none;
  border-radius: 10px;
  background: black;
}

.select {
  margin-top: 10px;
  width: 100%;
  padding: 8px;
  background: #222;
  color: white;
  border: 1px solid #333;
  border-radius: 6px;
}

/* TITLE NOW CENTERED UNDER VIDEO */
.title {
  margin-top: 10px;
  font-size: 16px;
  text-align: center;
}
</style>

</head>
<body>

<div class="topBar">
  <button class="backBtn" onclick="history.back()">← Back</button>
  <div>Watch</div>
  <div></div>
</div>

<div class="container">

  <div id="title" class="title"></div>

  <select id="quality" class="select"></select>

  <div id="player"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const videoId = params.get("video");
const qIndex = Number(params.get("q") || 0);

const player = document.getElementById("player");
const titleEl = document.getElementById("title");
const qualityEl = document.getElementById("quality");

let videoData = null;
let currentIndex = qIndex;

function loadPlayer() {
  const q = videoData.qualities[currentIndex];
  player.innerHTML = `<iframe src="${q.embed}" allowfullscreen></iframe>`;
}

function init() {
  if (!videoId) {
    titleEl.textContent = "No video selected";
    return;
  }

  fetch("videos.json")
    .then(r => r.json())
    .then(videos => {

      videoData = videos.find(v => v.id === videoId);

      if (!videoData) {
        titleEl.textContent = "Video not found";
        return;
      }

      document.title = videoData.title;
      titleEl.textContent = videoData.title;

      videoData.qualities.forEach((q, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = q.label;
        if (i === currentIndex) opt.selected = true;
        qualityEl.appendChild(opt);
      });

      qualityEl.onchange = () => {
        currentIndex = Number(qualityEl.value);
        loadPlayer();
        history.replaceState(null, "", `?video=${videoId}&q=${currentIndex}`);
      };

      loadPlayer();

    })
    .catch(err => {
      titleEl.textContent = "Error loading video";
      console.error(err);
    });
}

init();
</script>

</body>
</html>
