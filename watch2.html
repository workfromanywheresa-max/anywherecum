<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Watch Video</title>

<meta id="metaDesc" name="description" content="Watch videos in high quality online." />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

/* TOP BAR */
.topBar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px;
  background: #000;
  position: sticky;
  top: 0;
  z-index: 10;
  flex-wrap: wrap;
  gap: 6px;
}

.backBtn {
  background: transparent;
  border: 1px solid #444;
  color: white;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

#watchLabel {
  font-size: 12px;
  color: #aaa;
  max-width: 70%;
  text-align: center;
  word-break: break-word;
  flex: 1;
}

/* MAIN CONTAINER */
.container {
  padding: 10px;
}

/* 🔥 EDGE-TO-EDGE VIDEO FIX */
#player {
  margin-left: -10px;
  margin-right: -10px;
}

#player iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  height: auto;
  border: none;
  border-radius: 0; /* full edge look */
  background: black;
}

/* DROPDOWN */
select {
  display: block;
  width: fit-content;
  max-width: 90%;
  margin: 6px auto;
  padding: 5px 10px;
  border-radius: 5px;
  border: none;
  background: #333;
  color: #fff;
  font-size: 12px;
}

/* TITLE */
.title {
  margin-top: 10px;
  font-size: 12px;
  text-align: center;
  text-decoration: underline;
}

/* BUTTON AREA */
#actionRow {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
}
</style>

</head>
<body>

<div class="topBar">
  <button class="backBtn" onclick="history.back()">← Back</button>
  <div id="watchLabel">Watch</div>
  <div></div>
</div>

<div class="container">

  <!-- QUALITY SELECT -->
  <select id="quality"></select>

  <!-- VIDEO PLAYER -->
  <div id="player"></div>

  <!-- TITLE -->
  <div id="title" class="title"></div>

  <!-- BUTTONS (INJECTED BY watch.js) -->
  <div id="actionRow"></div>

</div>

<!-- SCRIPT -->
<script type="module" src="watch.js"></script>

</body>
</html>
